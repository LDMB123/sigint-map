services:
  gdl-tracker:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - DB_PATH=/data/gdl_data.db
      - AUTO_BOOTSTRAP_IF_EMPTY=false
      - SCHEDULER_ENABLED=false
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tracker.example.com}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-tracker.example.com,localhost,127.0.0.1}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - RELEASE_SHA=${RELEASE_SHA:-dev}
    volumes:
      - gdl_data:/data

volumes:
  gdl_data:
