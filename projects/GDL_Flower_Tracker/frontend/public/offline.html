<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Offline | GDL Flower Tracker</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #12110f;
        color: #f6efe5;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 560px;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        padding: 28px;
        background: rgba(255,255,255,.04);
      }
      h1 { margin-top: 0; font-size: 2rem; }
      p { color: #c3b39e; }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline.</h1>
      <p>The app shell is still available. Reopen the tracker and it will use the last successful dashboard snapshot if one exists on this device.</p>
    </main>
  </body>
  </html>
