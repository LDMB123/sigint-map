name: Deploy Staging

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        type: boolean
        default: false

# Prevent concurrent staging deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  CACHE_VERSION: 'v2'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    working-directory: ./app

jobs:
  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.staging-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # Reuse cached node_modules from CI
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      # Reuse cached wasm-pack
      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-${{ env.RUST_VERSION }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Reuse WASM build cache
      - name: Cache WASM build
        uses: actions/cache@v4
        with:
          path: |
            app/wasm/target
            app/wasm/*/pkg
          key: wasm-${{ env.CACHE_VERSION }}-${{ hashFiles('app/wasm/**/Cargo.toml', 'app/wasm/**/Cargo.lock', 'app/wasm/**/src/**') }}
          restore-keys: |
            wasm-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          bash ../scripts/validate-env.sh staging
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_STAGING }}
          PUBLIC_SITE_URL: https://staging.dmbalmanac.com

      - name: Build WASM modules
        run: npm run wasm:build
        env:
          CARGO_INCREMENTAL: 1
          RUSTFLAGS: '-C opt-level=z -C lto=thin'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_STAGING }}
          PUBLIC_SITE_URL: https://staging.dmbalmanac.com

      - name: Deploy to Vercel (Staging)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "staging-url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | $url |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $(git rev-parse --short HEAD) |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY

      - name: Create deployment record
        run: |
          mkdir -p ../deployments
          VERSION=$(node -p "require('./package.json').version")

          cat > ../deployments/staging-latest.json << EOF
          {
            "environment": "staging",
            "url": "${{ steps.deploy.outputs.staging-url }}",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "version": "$VERSION"
          }
          EOF

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: deployment-record-staging
          path: deployments/staging-latest.json
          retention-days: 30

  # Post-deployment smoke tests
  smoke-tests:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: ${{ !inputs.skip_tests }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright
        run: |
          cd app
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          cd app
          npm run test:e2e -- --grep="@smoke"
        env:
          BASE_URL: ${{ needs.deploy-staging.outputs.staging-url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: app/playwright-report/
          retention-days: 7

  # Performance monitoring (parallel with smoke tests)
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Wait for deployment
        run: sleep 15

      - name: Run Lighthouse
        run: |
          lhci autorun --config=../lighthouserc.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging-url }}

      - name: Check performance budgets
        run: |
          echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Lighthouse audit completed for staging deployment" >> $GITHUB_STEP_SUMMARY

  # Health check monitoring (parallel with other post-deploy jobs)
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    timeout-minutes: 5
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Check deployment health
        run: |
          url="${{ needs.deploy-staging.outputs.staging-url }}"

          # Check multiple routes
          ROUTES=("/" "/songs" "/shows")
          FAILED=0

          echo "## Staging Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Route | Status | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|------|" >> $GITHUB_STEP_SUMMARY

          for route in "${ROUTES[@]}"; do
            start=$(date +%s%3N)
            response=$(curl -s -o /dev/null -w "%{http_code}" "${url}${route}")
            end=$(date +%s%3N)
            duration=$((end - start))

            if [ "$response" = "200" ]; then
              echo "| $route | Pass ($response) | ${duration}ms |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $route | FAIL ($response) | ${duration}ms |" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "::error::Staging deployment health check failed!"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "## Deployment Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The staging deployment is not responding correctly." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate immediately." >> $GITHUB_STEP_SUMMARY
