name: Deploy Staging

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    working-directory: ./app

jobs:
  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.staging-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache WASM build
        uses: actions/cache@v4
        with:
          path: |
            app/wasm/target
            app/wasm/*/pkg
          key: wasm-staging-${{ hashFiles('app/wasm/**/Cargo.toml', 'app/wasm/**/Cargo.lock') }}
          restore-keys: |
            wasm-staging-

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          bash ../scripts/validate-env.sh staging

      - name: Build WASM modules
        run: npm run wasm:build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_STAGING }}
          PUBLIC_SITE_URL: https://staging.dmbalmanac.com

      - name: Deploy to Vercel (Staging)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "staging-url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Staging URL: $url" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Create deployment record
        run: |
          mkdir -p ../deployments
          echo "{
            \"environment\": \"staging\",
            \"url\": \"${{ steps.deploy.outputs.staging-url }}\",
            \"commit\": \"${{ github.sha }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"version\": \"$(cat package.json | grep version | head -1 | cut -d '\"' -f 4)\"
          }" > ../deployments/staging-latest.json

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: deployment-record-staging
          path: deployments/staging-latest.json
          retention-days: 30

  # Post-deployment smoke tests
  smoke-tests:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: ${{ !inputs.skip_tests }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          cd app
          npm ci
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          cd app
          npm run test:e2e -- --grep="@smoke"
        env:
          BASE_URL: ${{ needs.deploy-staging.outputs.staging-url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: app/playwright-report/
          retention-days: 7

  # Performance monitoring
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse
        run: |
          lhci autorun --config=../lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging-url }}

      - name: Check performance budgets
        run: |
          # Parse Lighthouse results and check budgets
          echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Lighthouse audit completed for staging deployment" >> $GITHUB_STEP_SUMMARY

  # Health check monitoring
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-tests]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Check deployment health
        run: |
          url="${{ needs.deploy-staging.outputs.staging-url }}"

          # Check if site is accessible
          response=$(curl -s -o /dev/null -w "%{http_code}" "$url")

          if [ "$response" != "200" ]; then
            echo "::error::Staging deployment health check failed. HTTP status: $response"
            exit 1
          fi

          echo "Staging deployment is healthy (HTTP $response)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deployment health check failed!"
          echo "## Deployment Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The staging deployment is not responding correctly." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate immediately." >> $GITHUB_STEP_SUMMARY
