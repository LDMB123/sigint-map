name: Docs Integrity

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CONTEXT.md'
      - 'STATUS.md'
      - 'data/README.md'
      - 'e2e/README.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/docs-integrity.yml'
      - '.gitignore'

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    name: Docs and Hygiene Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pristine integrity gate
        run: bash scripts/pristine-check.sh
