name: Docs Integrity

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CONTEXT.md'
      - 'STATUS.md'
      - 'data/README.md'
      - 'e2e/README.md'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/docs-integrity.yml'
      - '.gitignore'

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    name: Docs and Hygiene Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pristine integrity gate
        run: bash scripts/pristine-check.sh

      - name: Generate token context reports
        run: |
          mkdir -p .tmp
          python3 scripts/token-context-report.py --scope active --budget 12000 --json-output .tmp/token-context-active.json
          python3 scripts/token-context-report.py --scope all-markdown --budget 12000 --json-output .tmp/token-context-all.json

      - name: Upload token context reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-context-reports
          path: |
            .tmp/token-context-active.json
            .tmp/token-context-all.json
          retention-days: 7
