name: CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  CACHE_VERSION: 'v1'

defaults:
  run:
    working-directory: ./app

jobs:
  # Fast checks that can fail early
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run check

      - name: Check for TypeScript errors in build
        run: npx tsc --noEmit

  # Unit tests (without WASM build requirement)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  # WASM build (separate job, can be slow)
  build-wasm:
    name: Build WASM Modules
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache WASM build
        uses: actions/cache@v4
        with:
          path: |
            app/wasm/target
            app/wasm/*/pkg
          key: wasm-${{ env.CACHE_VERSION }}-${{ hashFiles('app/wasm/**/Cargo.toml', 'app/wasm/**/Cargo.lock') }}
          restore-keys: |
            wasm-${{ env.CACHE_VERSION }}-

      - name: Build WASM modules
        working-directory: ./app
        run: npm run wasm:build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-modules
          path: app/wasm/*/pkg/
          retention-days: 1

  # Full build with WASM
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [build-wasm]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: app/wasm/

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY || 'dummy-key-for-build' }}
          PUBLIC_SITE_URL: https://preview.dmbalmanac.com

      - name: Check build output
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory not found!"
            exit 1
          fi
          echo "Build size:"
          du -sh build/
          echo "Build contents:"
          ls -lh build/ | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: app/build/
          retention-days: 7

  # Bundle size analysis
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: app/build/

      - name: Analyze bundle size
        run: |
          cd app
          npm ci

          # Check JavaScript bundle sizes
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "build/_app/immutable/chunks" ]; then
            echo "### JavaScript Bundles" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY

            find build/_app/immutable/chunks -name "*.js" -type f | while read file; do
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
              gzip_size=$(gzip -c "$file" | wc -c)
              basename=$(basename "$file")
              size_kb=$((size / 1024))
              gzip_kb=$((gzip_size / 1024))
              echo "| $basename | ${size_kb}KB | ${gzip_kb}KB |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          # Check WASM bundle sizes
          if [ -d "build/_app/immutable/assets" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### WASM Modules" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY

            find build -name "*.wasm" -type f | while read file; do
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
              basename=$(basename "$file")
              size_kb=$((size / 1024))
              echo "| $basename | ${size_kb}KB |" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Check bundle size limits
        run: |
          cd app/build

          # Define size limits (in KB)
          MAX_JS_CHUNK=500
          MAX_WASM=2048

          # Check JavaScript chunks
          oversized_js=$(find . -name "*.js" -type f -size +${MAX_JS_CHUNK}k || true)
          if [ ! -z "$oversized_js" ]; then
            echo "::warning::JavaScript chunks exceed ${MAX_JS_CHUNK}KB limit:"
            echo "$oversized_js"
          fi

          # Check WASM modules
          oversized_wasm=$(find . -name "*.wasm" -type f -size +${MAX_WASM}k || true)
          if [ ! -z "$oversized_wasm" ]; then
            echo "::warning::WASM modules exceed ${MAX_WASM}KB limit:"
            echo "$oversized_wasm"
          fi

  # Accessibility audit
  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: app/build/

      - name: Install dependencies
        run: |
          cd app
          npm ci
          npm install -g @axe-core/cli serve

      - name: Start preview server
        run: |
          cd app
          npx serve -l 3000 build &
          echo $! > server.pid
          sleep 5

      - name: Run accessibility audit
        run: |
          # Test main routes
          npx axe http://localhost:3000 --exit || true
          npx axe http://localhost:3000/songs --exit || true
          npx axe http://localhost:3000/shows --exit || true

      - name: Stop server
        if: always()
        run: |
          if [ -f app/server.pid ]; then
            kill $(cat app/server.pid) || true
          fi

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: |
          cd app
          npm audit --audit-level=moderate || true

      - name: Check for secrets
        run: |
          cd app
          # Check for common secret patterns
          if grep -r "VAPID_PRIVATE_KEY\s*=\s*['\"]B" src/ 2>/dev/null; then
            echo "::error::Found potential hardcoded VAPID private key!"
            exit 1
          fi

          if grep -r "PUSH_API_KEY\s*=\s*['\"][^{]" src/ 2>/dev/null; then
            echo "::error::Found potential hardcoded API key!"
            exit 1
          fi

  # Status check job (required for branch protection)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - lint-and-type-check
      - unit-tests
      - build
      - bundle-analysis
      - accessibility-audit
      - security-audit
    if: always()
    steps:
      - name: Check all jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
