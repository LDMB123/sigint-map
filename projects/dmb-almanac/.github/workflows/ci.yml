name: CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

# BUILD-005: Cancel redundant runs on the same PR/branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  CACHE_VERSION: 'v2'

defaults:
  run:
    working-directory: ./app

jobs:
  # BUILD-006: Shared dependency installation job with aggressive caching
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # BUILD-007: Cache node_modules directly to skip npm ci in downstream jobs
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

  # BUILD-008: Fast checks that can fail early (parallel with WASM build)
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [install-deps]
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      # BUILD-009: Run lint and type check in parallel within the step
      - name: Run ESLint and type check in parallel
        run: |
          npm run lint &
          LINT_PID=$!
          npm run check &
          CHECK_PID=$!

          LINT_EXIT=0
          CHECK_EXIT=0

          wait $LINT_PID || LINT_EXIT=$?
          wait $CHECK_PID || CHECK_EXIT=$?

          if [ $LINT_EXIT -ne 0 ]; then
            echo "::error::ESLint failed"
            exit $LINT_EXIT
          fi
          if [ $CHECK_EXIT -ne 0 ]; then
            echo "::error::Type check failed"
            exit $CHECK_EXIT
          fi

  # Unit tests (parallel with lint + WASM build)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [install-deps]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      - name: Run unit tests with coverage
        run: npm test -- --run --reporter=verbose --coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  # BUILD-010: WASM build with improved caching (parallel with lint + tests)
  build-wasm:
    name: Build WASM Modules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            rust
            scripts
            app/package.json
            app/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      # BUILD-011: Cache wasm-pack binary to avoid re-downloading
      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-${{ env.RUST_VERSION }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # BUILD-012: Granular WASM cache with Cargo.lock hash
      - name: Cache WASM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            rust/aggregations/target
            app/src/lib/wasm/aggregations
          key: wasm-${{ env.CACHE_VERSION }}-${{ hashFiles('rust/**/Cargo.toml', 'rust/**/Cargo.lock', 'rust/**/src/**') }}
          restore-keys: |
            wasm-${{ env.CACHE_VERSION }}-${{ hashFiles('rust/**/Cargo.toml', 'rust/**/Cargo.lock') }}
            wasm-${{ env.CACHE_VERSION }}-

      - name: Build WASM modules
        run: bash ../scripts/build-wasm.sh
        env:
          CARGO_INCREMENTAL: 1
          RUSTFLAGS: '-C opt-level=z -C lto=thin'

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-modules
          path: app/src/lib/wasm/aggregations/
          retention-days: 1
          compression-level: 6

  # BUILD-013: Full build with WASM - reuses cached node_modules
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [install-deps, build-wasm, lint-and-type-check]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: app/src/lib/wasm/aggregations/

      # BUILD-014: Cache Vite build artifacts for faster incremental builds
      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            app/node_modules/.vite
            app/.svelte-kit
          key: vite-${{ env.CACHE_VERSION }}-${{ hashFiles('app/vite.config.js', 'app/svelte.config.js') }}-${{ github.sha }}
          restore-keys: |
            vite-${{ env.CACHE_VERSION }}-${{ hashFiles('app/vite.config.js', 'app/svelte.config.js') }}-
            vite-${{ env.CACHE_VERSION }}-

      - name: Build application
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY || 'dummy-key-for-build' }}
          PUBLIC_SITE_URL: https://preview.dmbalmanac.com
          NODE_ENV: production

      # BUILD-015: Comprehensive build output validation
      - name: Validate build output
        run: |
          if [ ! -d "build" ]; then
            echo "::error::Build directory not found!"
            exit 1
          fi

          # Check for critical output files
          ERRORS=0

          # Verify HTML entry exists
          if [ ! -f "build/index.html" ] && [ ! -f "build/200.html" ]; then
            # SvelteKit adapter-node may not produce index.html
            if [ ! -d "build/client" ] && [ ! -d "build/server" ]; then
              echo "::error::No build output found (no index.html, client/, or server/)"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # Verify JS bundles exist
          JS_COUNT=$(find build -name "*.js" -type f 2>/dev/null | wc -l)
          if [ "$JS_COUNT" -eq 0 ]; then
            echo "::error::No JavaScript bundles found in build output"
            ERRORS=$((ERRORS + 1))
          fi

          # Build size report
          echo "## Build Output Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total size:** $(du -sh build/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "**JS bundles:** $JS_COUNT files" >> $GITHUB_STEP_SUMMARY
          echo "**CSS files:** $(find build -name '*.css' -type f 2>/dev/null | wc -l) files" >> $GITHUB_STEP_SUMMARY
          echo "**WASM modules:** $(find build -name '*.wasm' -type f 2>/dev/null | wc -l) files" >> $GITHUB_STEP_SUMMARY

          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: app/build/
          retention-days: 7
          compression-level: 6

  # BUILD-016: Bundle analysis runs in parallel with accessibility + security
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 5
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: Analyze bundle size
        run: |
          # Check JavaScript bundle sizes
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL_JS=0
          TOTAL_GZIP=0

          if [ -d "build/_app/immutable/chunks" ]; then
            echo "### JavaScript Bundles (sorted by size)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Raw | Gzipped | Brotli |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----|---------|--------|" >> $GITHUB_STEP_SUMMARY

            find build/_app/immutable/chunks -name "*.js" -type f -exec stat -c "%s %n" {} \; | sort -rn | while read size file; do
              gzip_size=$(gzip -c "$file" | wc -c)
              # Estimate brotli as ~85% of gzip
              brotli_est=$((gzip_size * 85 / 100))
              basename=$(basename "$file")
              size_kb=$((size / 1024))
              gzip_kb=$((gzip_size / 1024))
              brotli_kb=$((brotli_est / 1024))

              # Flag large chunks
              FLAG=""
              if [ $gzip_kb -gt 50 ]; then
                FLAG=" (large)"
              fi

              echo "| ${basename}${FLAG} | ${size_kb}KB | ${gzip_kb}KB | ~${brotli_kb}KB |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          # Check WASM bundle sizes
          WASM_COUNT=$(find build -name "*.wasm" -type f 2>/dev/null | wc -l)
          if [ "$WASM_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### WASM Modules" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY

            find build -name "*.wasm" -type f -exec stat -c "%s %n" {} \; | while read size file; do
              basename=$(basename "$file")
              size_kb=$((size / 1024))
              echo "| $basename | ${size_kb}KB |" >> $GITHUB_STEP_SUMMARY
            done
          fi
        working-directory: /

      # BUILD-017: Enforce bundle size budgets
      - name: Check bundle size limits
        run: |
          # Define size limits (in KB, gzipped)
          MAX_JS_CHUNK_GZIP=150
          MAX_TOTAL_JS_GZIP=500
          MAX_WASM=2048
          BUDGET_EXCEEDED=0

          # Check individual JavaScript chunks (gzipped)
          if [ -d "build/_app/immutable/chunks" ]; then
            find build/_app/immutable/chunks -name "*.js" -type f | while read file; do
              gzip_size=$(gzip -c "$file" | wc -c)
              gzip_kb=$((gzip_size / 1024))
              if [ $gzip_kb -gt $MAX_JS_CHUNK_GZIP ]; then
                echo "::warning::$(basename $file) is ${gzip_kb}KB gzipped (limit: ${MAX_JS_CHUNK_GZIP}KB)"
              fi
            done
          fi

          # Check WASM modules
          oversized_wasm=$(find build -name "*.wasm" -type f -size +${MAX_WASM}k 2>/dev/null || true)
          if [ -n "$oversized_wasm" ]; then
            echo "::warning::WASM modules exceed ${MAX_WASM}KB limit:"
            echo "$oversized_wasm"
          fi
        working-directory: /

  # Accessibility audit
  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: app/build/

      # BUILD-018: Use npx directly instead of global install
      - name: Start preview server and run audit
        run: |
          npx serve -l 3000 build &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Run accessibility tests on key routes
          ROUTES=("/" "/songs" "/shows" "/search")
          EXIT_CODE=0

          for route in "${ROUTES[@]}"; do
            echo "Testing route: $route"
            npx @axe-core/cli "http://localhost:3000${route}" --exit || EXIT_CODE=$?
          done

          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  # Security audit (runs immediately, no build dependency)
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [install-deps]
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: |
          cd app
          npm audit --audit-level=high 2>&1 | tee /tmp/audit-output.txt || true

          # Parse and summarize
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for hardcoded secrets
        run: |
          cd app
          FOUND=0

          # Check for common secret patterns in source code
          PATTERNS=(
            "VAPID_PRIVATE_KEY\s*=\s*['\"]B"
            "PUSH_API_KEY\s*=\s*['\"][^{]"
            "-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "ghp_[a-zA-Z0-9]{36}"
            "sk_live_[a-zA-Z0-9]+"
          )

          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" src/ 2>/dev/null; then
              echo "::error::Found potential hardcoded secret matching pattern: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            exit 1
          fi

      # BUILD-019: License compliance check
      - name: Check license compliance
        run: |
          cd app
          npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" 2>/dev/null || true

  # Status check job (required for branch protection)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - lint-and-type-check
      - unit-tests
      - build
      - bundle-analysis
      - accessibility-audit
      - security-audit
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Analysis | ${{ needs.bundle-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ needs.accessibility-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
