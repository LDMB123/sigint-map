name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
        default: production
      skip_smoke_tests:
        description: 'Skip smoke tests (emergency deployment only)'
        required: false
        type: boolean
        default: false

# BUILD-020: Prevent concurrent production deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  CACHE_VERSION: 'v2'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    working-directory: ./app

jobs:
  # Pre-deployment validation (BUILD-015)
  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_short: ${{ steps.version.outputs.commit_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Validate deployment conditions
        run: |
          # Check if deploying from main branch
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Production deployments must be from main branch"
            exit 1
          fi

          # Check for recent commits
          COMMIT_AGE=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE_HOURS=$(( ($NOW - $COMMIT_AGE) / 3600 ))

          if [ $AGE_HOURS -gt 168 ]; then
            echo "::warning::Deploying commit that is $AGE_HOURS hours old. Consider updating to latest."
          fi

      - name: Check for breaking changes
        run: |
          if git log -1 --pretty=%B | grep -i "BREAKING"; then
            echo "::warning::This commit contains breaking changes. Ensure migration plan is in place."
          fi

      # BUILD-015: Verify CI passed for this commit
      - name: Verify CI status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd ..
          # Check if the CI workflow passed for this commit
          CI_STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '.check_runs[] | select(.name == "CI Success") | .conclusion' 2>/dev/null || echo "unknown")

          if [ "$CI_STATUS" != "success" ] && [ "$CI_STATUS" != "unknown" ]; then
            echo "::warning::CI has not passed for this commit (status: $CI_STATUS)"
          fi

  # Build and deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    timeout-minutes: 25
    environment:
      name: production
      url: https://dmbalmanac.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # Reuse cached node_modules from CI
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: node-modules-${{ env.CACHE_VERSION }}-${{ hashFiles('app/package-lock.json') }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      # Reuse cached wasm-pack
      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-${{ env.RUST_VERSION }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Reuse WASM build cache
      - name: Cache WASM build
        uses: actions/cache@v4
        with:
          path: |
            rust/aggregations/target
            app/src/lib/wasm/aggregations
          key: wasm-${{ env.CACHE_VERSION }}-${{ hashFiles('rust/**/Cargo.toml', 'rust/**/Cargo.lock', 'rust/**/src/**') }}
          restore-keys: |
            wasm-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: npm ci --production=false

      - name: Validate environment variables
        run: |
          bash ../scripts/validate-env.sh production
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_PRODUCTION }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY_PRODUCTION }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT_PRODUCTION }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY_PRODUCTION }}
          PUBLIC_SITE_URL: https://dmbalmanac.com

      - name: Build WASM modules
        run: bash ../scripts/build-wasm.sh
        env:
          CARGO_INCREMENTAL: 1
          RUSTFLAGS: '-C opt-level=z -C lto=thin'

      # Run final checks in parallel
      - name: Run final checks
        run: |
          npm run check &
          CHECK_PID=$!
          npm run lint &
          LINT_PID=$!

          wait $CHECK_PID || { echo "::error::Type check failed"; exit 1; }
          wait $LINT_PID || { echo "::error::Lint failed"; exit 1; }

      # Cache Vercel CLI
      - name: Cache Vercel CLI
        uses: actions/cache@v4
        with:
          path: ~/.npm/_npx
          key: vercel-cli-${{ runner.os }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY_PRODUCTION }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY_PRODUCTION }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT_PRODUCTION }}
          PUSH_API_KEY: ${{ secrets.PUSH_API_KEY_PRODUCTION }}
          PUBLIC_SITE_URL: https://dmbalmanac.com

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production-url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"

      - name: Record deployment
        run: |
          VERSION="${{ needs.pre-deployment-checks.outputs.version }}"
          mkdir -p ../deployments

          cat > ../deployments/production-latest.json << EOF
          {
            "environment": "production",
            "url": "https://dmbalmanac.com",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "version": "$VERSION",
            "deployed_by": "${{ github.actor }}"
          }
          EOF

          cp ../deployments/production-latest.json "../deployments/production-${VERSION}.json"

      - name: Upload deployment records
        uses: actions/upload-artifact@v4
        with:
          name: deployment-records-production
          path: deployments/
          retention-days: 90

      - name: Create deployment summary
        run: |
          VERSION="${{ needs.pre-deployment-checks.outputs.version }}"
          COMMIT_SHORT="${{ needs.pre-deployment-checks.outputs.commit_short }}"

          echo "## Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://dmbalmanac.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | $VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | $COMMIT_SHORT (${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY

      - name: Tag release
        run: |
          VERSION="${{ needs.pre-deployment-checks.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}" 2>/dev/null || echo "Tag v${VERSION} already exists"
          git push origin "v${VERSION}" 2>/dev/null || echo "Tag already pushed"

  # Post-deployment smoke tests
  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: ${{ !inputs.skip_smoke_tests }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for deployment to propagate
        run: |
          # Smart wait: poll until site responds with new version
          for i in $(seq 1 30); do
            if curl -sf https://dmbalmanac.com > /dev/null 2>&1; then
              echo "Site is responding after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Run smoke tests
        run: npm run test:e2e -- --grep="@smoke"
        env:
          BASE_URL: https://dmbalmanac.com

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-tests
          path: app/playwright-report/
          retention-days: 30

  # Production health monitoring (parallel with smoke tests)
  health-monitoring:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    timeout-minutes: 5
    steps:
      - name: Wait for CDN propagation
        run: sleep 30

      - name: Comprehensive health check
        run: |
          BASE_URL="https://dmbalmanac.com"
          ROUTES=("/" "/songs" "/shows" "/search" "/visualizations")
          FAILED=0

          echo "## Production Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Route | Status | Response Time | Content-Type |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------------|-------------|" >> $GITHUB_STEP_SUMMARY

          for route in "${ROUTES[@]}"; do
            start=$(date +%s%3N)
            response=$(curl -s -o /dev/null -w "%{http_code}|%{content_type}" "${BASE_URL}${route}")
            end=$(date +%s%3N)
            duration=$((end - start))

            http_code=$(echo "$response" | cut -d'|' -f1)
            content_type=$(echo "$response" | cut -d'|' -f2 | cut -d';' -f1)

            if [ "$http_code" = "200" ]; then
              status="Pass"
            else
              status="FAIL"
              FAILED=1
            fi

            echo "| $route | $status ($http_code) | ${duration}ms | $content_type |" >> $GITHUB_STEP_SUMMARY
          done

          if [ $FAILED -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Health check failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** All routes healthy" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify response headers
        run: |
          # Check for expected security and caching headers
          HEADERS=$(curl -sI "https://dmbalmanac.com")

          echo "## Response Headers Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          check_header() {
            local header_name=$1
            if echo "$HEADERS" | grep -iq "$header_name"; then
              echo "| $header_name | Present |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $header_name | Missing |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          echo "| Header | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY

          check_header "x-frame-options"
          check_header "content-security-policy"
          check_header "strict-transport-security"
          check_header "x-content-type-options"
          check_header "cache-control"

      - name: Check Service Worker registration
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://dmbalmanac.com/sw.js")
          if [ "$response" != "200" ]; then
            echo "::warning::Service Worker not accessible (HTTP $response)"
          fi

  # Performance validation (parallel with smoke tests and health check)
  performance-validation:
    name: Production Performance Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Run Lighthouse on production
        run: |
          lhci autorun --config=./app/.lighthouserc.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          PRODUCTION_URL: https://dmbalmanac.com

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-production
          path: .lighthouseci/
          retention-days: 30

  # Rollback preparation
  prepare-rollback:
    name: Prepare Rollback
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get previous deployment
        run: |
          echo "Previous commit: $(git rev-parse HEAD~1)" > rollback-info.txt
          echo "Current commit: ${{ github.sha }}" >> rollback-info.txt
          echo "Deployment time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> rollback-info.txt

      - name: Upload rollback info
        uses: actions/upload-artifact@v4
        with:
          name: rollback-info
          path: rollback-info.txt
          retention-days: 7

      - name: Document rollback procedure
        run: |
          echo "## Rollback Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If issues are detected, run the rollback workflow." >> $GITHUB_STEP_SUMMARY
          echo "Previous commit: $(git rev-parse --short HEAD~1)" >> $GITHUB_STEP_SUMMARY

  # Notify success
  notify-success:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [health-monitoring, smoke-tests, performance-validation]
    if: success()
    steps:
      - name: Send success notification
        run: |
          echo "::notice::Production deployment completed successfully!"
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All post-deployment checks passed. Production is healthy." >> $GITHUB_STEP_SUMMARY
