name: Nightly Scrape Warnings (Rust)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

env:
  RUST_VERSION: 'stable'

jobs:
  rust-scrape-warn-only:
    name: Rust Scrape Warn-Only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          cache: true

      - name: Warn-only live scrape
        run: cargo run -p dmb_pipeline -- scrape --live --warn-only --warnings-output data/warnings.json

      - name: Upload warning report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-scrape-warnings-nightly
          path: rust/data/warnings.json
          retention-days: 14
