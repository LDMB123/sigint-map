name: Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production
      rollback_to:
        description: 'Commit SHA or version to rollback to (leave empty for previous deployment)'
        required: false
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

defaults:
  run:
    working-directory: ./app

jobs:
  # Validate rollback request
  validate-rollback:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target_commit: ${{ steps.determine-target.outputs.commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine rollback target
        id: determine-target
        run: |
          if [ -n "${{ inputs.rollback_to }}" ]; then
            TARGET="${{ inputs.rollback_to }}"
          else
            # Get previous deployment commit
            TARGET=$(git rev-parse HEAD~1)
          fi

          # Validate commit exists
          if ! git rev-parse --verify "$TARGET" > /dev/null 2>&1; then
            echo "::error::Invalid commit SHA: $TARGET"
            exit 1
          fi

          echo "commit=$TARGET" >> $GITHUB_OUTPUT
          echo "Rolling back to commit: $TARGET"

      - name: Create rollback record
        run: |
          echo "## Rollback Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target Commit:** ${{ steps.determine-target.outputs.commit }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "**Initiated by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  # Execute rollback
  execute-rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    needs: [validate-rollback]
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout rollback target
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-rollback.outputs.target_commit }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci

      - name: Build WASM modules
        run: bash ../scripts/build-wasm.sh

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Build Project Artifacts
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ inputs.environment == 'production' && secrets.VITE_VAPID_PUBLIC_KEY_PRODUCTION || secrets.VITE_VAPID_PUBLIC_KEY_STAGING }}
          VAPID_PRIVATE_KEY: ${{ inputs.environment == 'production' && secrets.VAPID_PRIVATE_KEY_PRODUCTION || secrets.VAPID_PRIVATE_KEY_STAGING }}
          VAPID_SUBJECT: ${{ inputs.environment == 'production' && secrets.VAPID_SUBJECT_PRODUCTION || secrets.VAPID_SUBJECT_STAGING }}
          PUSH_API_KEY: ${{ inputs.environment == 'production' && secrets.PUSH_API_KEY_PRODUCTION || secrets.PUSH_API_KEY_STAGING }}
          PUBLIC_SITE_URL: ${{ inputs.environment == 'production' && 'https://dmbalmanac.com' || 'https://staging.dmbalmanac.com' }}

      - name: Deploy Rollback
        id: deploy
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi

          echo "rollback-url=$url" >> $GITHUB_OUTPUT
          echo "Rollback deployed to: $url"

      - name: Record rollback deployment
        run: |
          mkdir -p ../deployments/rollbacks

          echo "{
            \"environment\": \"${{ inputs.environment }}\",
            \"rollback_from\": \"${{ github.sha }}\",
            \"rollback_to\": \"${{ needs.validate-rollback.outputs.target_commit }}\",
            \"reason\": \"${{ inputs.reason }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"executed_by\": \"${{ github.actor }}\",
            \"url\": \"${{ steps.deploy.outputs.rollback-url }}\"
          }" > ../deployments/rollbacks/rollback-$(date +%s).json

      - name: Upload rollback record
        uses: actions/upload-artifact@v4
        with:
          name: rollback-record
          path: deployments/rollbacks/
          retention-days: 90

  # Verify rollback
  verify-rollback:
    name: Verify Rollback
    runs-on: ubuntu-latest
    needs: [execute-rollback]
    timeout-minutes: 10
    steps:
      - name: Wait for propagation
        run: sleep 60

      - name: Health check
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            BASE_URL="https://dmbalmanac.com"
          else
            BASE_URL="https://staging.dmbalmanac.com"
          fi

          ROUTES=("/" "/songs" "/shows")
          FAILED=0

          echo "## Rollback Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Route | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for route in "${ROUTES[@]}"; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}${route}")

            if [ "$response" = "200" ]; then
              status="✅ $response"
            else
              status="❌ $response"
              FAILED=1
            fi

            echo "| $route | $status |" >> $GITHUB_STEP_SUMMARY
          done

          if [ $FAILED -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ❌ Rollback verification failed" >> $GITHUB_STEP_SUMMARY
            echo "::error::Rollback verification failed - manual intervention required"
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ✅ Rollback successful" >> $GITHUB_STEP_SUMMARY
          fi

  # Post-rollback actions
  post-rollback:
    name: Post-Rollback Actions
    runs-on: ubuntu-latest
    needs: [verify-rollback]
    if: always()
    steps:
      - name: Create incident report
        run: |
          echo "## Rollback Incident Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback Target:** ${{ needs.validate-rollback.outputs.target_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Investigate root cause of the issue" >> $GITHUB_STEP_SUMMARY
          echo "2. Create hotfix branch if needed" >> $GITHUB_STEP_SUMMARY
          echo "3. Update monitoring and alerting" >> $GITHUB_STEP_SUMMARY
          echo "4. Document lessons learned" >> $GITHUB_STEP_SUMMARY

      - name: Notify team
        run: |
          echo "::notice::Rollback completed. Review incident report and take appropriate action."

          # Integrate with notification service
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{
          #     "text": "🚨 Rollback executed on ${{ inputs.environment }}",
          #     "blocks": [
          #       {
          #         "type": "section",
          #         "text": {
          #           "type": "mrkdwn",
          #           "text": "*Rollback Details*\n*Environment:* ${{ inputs.environment }}\n*Reason:* ${{ inputs.reason }}\n*By:* ${{ github.actor }}"
          #         }
          #       }
          #     ]
          #   }'
