name: Cutover Rehearsal (Rust Server + Rust E2E)

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - 'rust/**'
      - 'e2e/tests/e2e/rust-*.spec.js'
      - 'e2e/**'
      - 'data/static-data/**'
      - 'scripts/cutover-*.sh'
      - '.github/workflows/cutover-rehearsal.yml'

concurrency:
  group: cutover-rehearsal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'
  RUST_E2E: '1'
  CROSS_BROWSER_SMOKE: '1'

jobs:
  cutover-rehearsal:
    name: Cutover Rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Run cutover rehearsal
        run: bash scripts/cutover-rehearsal.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cutover-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cutover-server-logs
          path: .tmp/cutover-rehearsal/server.log
          if-no-files-found: ignore
          retention-days: 14
