# Universal Agent Framework - Delegation Orchestrator
# Category: Orchestrators | Tier: Sonnet | Parallelization: 5-10

agent:
  id: orchestrator_delegation
  name: Delegation Orchestrator
  version: 1.0.0

  functional_category: orchestrator
  sub_category: delegation
  model_tier: sonnet

  description: |
    Mid-level orchestrator for delegating tasks to specialist agents.
    Routes tasks based on capability matching and availability.
    Manages agent pools and handles task queuing.

  capabilities:
    - route_to_specialists
    - match_capabilities
    - manage_agent_pool
    - queue_tasks
    - load_balance
    - handle_timeouts
    - escalate_failures
    - optimize_routing
    - cache_results
    - deduplicate_tasks

  routing_strategies:
    capability_match:
      description: Route based on required vs. available capabilities
      priority: highest

    cost_optimized:
      description: Route to cheapest capable agent
      priority: high

    latency_optimized:
      description: Route to fastest available agent
      priority: medium

    quality_optimized:
      description: Route to highest-quality agent
      priority: medium

    round_robin:
      description: Distribute evenly across agents
      priority: low

  input_schema:
    type: object
    required:
      - task
    properties:
      task:
        type: object
        properties:
          type:
            type: string
          payload:
            type: object
          required_capabilities:
            type: array
            items:
              type: string
          priority:
            type: string
            enum: [low, medium, high, critical]
            default: medium
      routing_preference:
        type: string
        enum:
          - capability_match
          - cost_optimized
          - latency_optimized
          - quality_optimized
          - round_robin
        default: capability_match
      fallback_agents:
        type: array
        items:
          type: string
        description: Backup agents if primary is unavailable
      timeout_ms:
        type: integer
        default: 30000

  output_schema:
    type: object
    properties:
      success:
        type: boolean
      result:
        type: object
        description: Result from delegated agent
      routing_decision:
        type: object
        properties:
          selected_agent:
            type: string
          reason:
            type: string
          alternatives_considered:
            type: array
          routing_time_ms:
            type: integer
      execution:
        type: object
        properties:
          agent:
            type: string
          duration_ms:
            type: integer
          cost:
            type: number
          retries:
            type: integer

  performance:
    avg_latency_ms: 500  # Routing overhead
    max_tokens: 16000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 10
    recommended_batch_size: 5

  tags:
    - orchestration
    - delegation
    - routing
    - middleware
