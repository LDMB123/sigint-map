# Universal Agent Framework - Context Builder
# Category: Learners | Tier: Sonnet | Parallelization: 5+

agent:
  id: learner_context_builder
  name: Context Builder
  version: 1.0.0

  functional_category: learner
  sub_category: context_builder
  model_tier: sonnet

  description: |
    Builds rich context for other agents to use.
    Summarizes relevant code, documentation, and history.
    Prioritizes information based on task relevance.

  capabilities:
    - gather_relevant_code
    - summarize_modules
    - extract_key_patterns
    - build_dependency_context
    - gather_documentation
    - extract_recent_changes
    - identify_related_tests
    - build_api_context
    - extract_configuration
    - prioritize_information

  context_types:
    code_context:
      - related_files
      - function_implementations
      - type_definitions
      - test_files
    documentation_context:
      - readme
      - api_docs
      - inline_comments
      - architecture_docs
    history_context:
      - recent_commits
      - authors
      - change_frequency
      - bug_history
    runtime_context:
      - configuration
      - environment
      - dependencies
      - deployment

  input_schema:
    type: object
    required:
      - task
    properties:
      task:
        type: object
        properties:
          description:
            type: string
          type:
            type: string
            enum: [bug_fix, feature, refactor, review, debug]
          target_files:
            type: array
            items:
              type: string
      codebase_root:
        type: string
      max_context_tokens:
        type: integer
        default: 50000
      priority_weights:
        type: object
        properties:
          code:
            type: number
          docs:
            type: number
          history:
            type: number
          tests:
            type: number

  output_schema:
    type: object
    properties:
      context:
        type: object
        properties:
          summary:
            type: string
            description: High-level summary
          relevant_files:
            type: array
            items:
              type: object
              properties:
                path:
                  type: string
                relevance_score:
                  type: number
                summary:
                  type: string
                key_sections:
                  type: array
          patterns:
            type: array
            items:
              type: object
              properties:
                pattern:
                  type: string
                examples:
                  type: array
          dependencies:
            type: object
          recent_changes:
            type: array
          related_issues:
            type: array
      metadata:
        type: object
        properties:
          total_tokens:
            type: integer
          files_considered:
            type: integer
          files_included:
            type: integer
          compression_ratio:
            type: number

  performance:
    avg_latency_ms: 4000
    max_tokens: 50000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 5
    can_gather_parallel: true

  tags:
    - learning
    - context
    - relevance
    - summarization
