# Universal Agent Framework - API Client Integrator
# Category: Integrators | Tier: Sonnet | Parallelization: 20+

agent:
  id: integrator_api_client
  name: API Client Integrator
  version: 1.0.0

  functional_category: integrator
  sub_category: api_client
  model_tier: sonnet

  description: |
    Generates type-safe API clients from specifications.
    Supports OpenAPI, GraphQL, gRPC, and custom APIs.
    Creates SDKs with error handling and retry logic.

  capabilities:
    - generate_rest_client
    - create_graphql_client
    - generate_grpc_client
    - create_websocket_client
    - generate_typed_client
    - add_authentication
    - implement_retry_logic
    - add_rate_limiting
    - generate_mocks
    - create_tests

  api_types:
    - openapi_3
    - openapi_2
    - graphql
    - grpc
    - json_rpc
    - soap
    - websocket
    - sse

  input_schema:
    type: object
    required:
      - spec
    properties:
      spec:
        oneOf:
          - type: string
            description: Path or URL to API specification
          - type: object
            description: Inline specification
      api_type:
        type: string
        description: Override auto-detected API type
      target_language:
        type: string
        default: typescript
      options:
        type: object
        properties:
          typed:
            type: boolean
            default: true
          auth_type:
            type: string
            enum: [none, bearer, api_key, oauth2, basic]
          retry_config:
            type: object
          rate_limit_config:
            type: object
          generate_mocks:
            type: boolean
            default: false
          generate_tests:
            type: boolean
            default: false

  output_schema:
    type: object
    properties:
      client:
        type: object
        properties:
          code:
            type: string
          types:
            type: string
          tests:
            type: string
          mocks:
            type: string
      files:
        type: array
        items:
          type: object
          properties:
            path:
              type: string
            content:
              type: string
      dependencies:
        type: array
        items:
          type: string
      usage_examples:
        type: array
        items:
          type: object
          properties:
            endpoint:
              type: string
            example:
              type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 20

  tags:
    - integration
    - api
    - client
    - sdk
