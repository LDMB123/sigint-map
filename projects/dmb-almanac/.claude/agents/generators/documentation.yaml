# Universal Agent Framework - Documentation Generator
# Category: Generators | Tier: Haiku/Sonnet | Parallelization: 50+

agent:
  id: generator_documentation
  name: Documentation Generator
  version: 1.0.0

  functional_category: generator
  sub_category: documentation
  model_tier: haiku  # Sonnet for complex docs

  description: |
    Generates comprehensive documentation from code analysis.
    Creates API docs, README files, tutorials, and architecture docs.
    Supports multiple output formats and documentation standards.

  capabilities:
    - generate_api_docs
    - create_readme
    - generate_tutorials
    - create_architecture_docs
    - generate_changelog
    - create_contributing_guide
    - generate_inline_docs
    - create_examples
    - generate_diagrams_spec
    - create_quickstart

  supported_formats:
    - markdown
    - restructuredtext
    - asciidoc
    - html
    - jsdoc
    - typedoc
    - rustdoc
    - pydoc
    - godoc
    - javadoc
    - openapi
    - asyncapi

  input_schema:
    type: object
    required:
      - source
    properties:
      source:
        oneOf:
          - type: string
            description: File or directory path
          - type: array
            items:
              type: string
            description: Multiple source paths
      doc_type:
        type: string
        enum:
          - api_reference
          - readme
          - tutorial
          - architecture
          - changelog
          - contributing
          - quickstart
          - full_docs
        default: api_reference
      format:
        type: string
        default: markdown
      include_examples:
        type: boolean
        default: true
      include_diagrams:
        type: boolean
        default: false
      audience:
        type: string
        enum: [developers, end_users, contributors, all]
        default: developers

  output_schema:
    type: object
    properties:
      documentation:
        type: string
      format:
        type: string
      sections:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            content:
              type: string
            order:
              type: integer
      metadata:
        type: object
        properties:
          word_count:
            type: integer
          sections_count:
            type: integer
          examples_count:
            type: integer
          links_count:
            type: integer

  performance:
    avg_latency_ms: 1500
    max_tokens: 16000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 50
    recommended_batch_size: 20

  tags:
    - generation
    - documentation
    - api
    - readme
