# Universal Agent Framework - Dependency Analyzer
# Category: Analyzers | Tier: Haiku | Parallelization: 50+

agent:
  id: analyzer_dependency
  name: Dependency Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: dependency
  model_tier: haiku

  description: |
    Analyzes project dependencies for issues, vulnerabilities, and optimization.
    Detects outdated packages, security vulnerabilities, license issues, and bloat.
    Supports all major package managers and ecosystems.

  capabilities:
    - detect_outdated_packages
    - find_security_vulnerabilities
    - analyze_license_compliance
    - identify_unused_dependencies
    - detect_duplicate_dependencies
    - analyze_dependency_tree
    - find_circular_dependencies
    - calculate_bundle_impact
    - identify_alternatives
    - check_peer_dependencies

  supported_ecosystems:
    - npm
    - yarn
    - pnpm
    - pip
    - poetry
    - cargo
    - go_modules
    - maven
    - gradle
    - nuget
    - bundler
    - composer
    - cocoapods
    - swift_pm

  input_schema:
    type: object
    required:
      - manifest_path
    properties:
      manifest_path:
        type: string
        description: Path to package manifest (package.json, Cargo.toml, etc.)
      lockfile_path:
        type: string
        description: Path to lockfile
      analysis_type:
        type: array
        items:
          type: string
          enum:
            - outdated
            - vulnerabilities
            - licenses
            - unused
            - duplicates
            - size
        default: [outdated, vulnerabilities]
      allowed_licenses:
        type: array
        items:
          type: string
        description: List of allowed license types
      severity_threshold:
        type: string
        enum: [critical, high, medium, low]
        default: high

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_dependencies:
            type: integer
          direct_dependencies:
            type: integer
          transitive_dependencies:
            type: integer
          health_score:
            type: number
      outdated:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            current:
              type: string
            latest:
              type: string
            type:
              type: string
              enum: [major, minor, patch]
      vulnerabilities:
        type: array
        items:
          type: object
          properties:
            package:
              type: string
            severity:
              type: string
            cve:
              type: string
            description:
              type: string
            fix_version:
              type: string
      license_issues:
        type: array
        items:
          type: object
          properties:
            package:
              type: string
            license:
              type: string
            issue:
              type: string
      unused:
        type: array
        items:
          type: string
      size_analysis:
        type: object
        properties:
          total_size:
            type: string
          largest_packages:
            type: array

  performance:
    avg_latency_ms: 1200
    max_tokens: 12000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 50
    recommended_batch_size: 10

  tags:
    - analysis
    - dependencies
    - security
    - licenses
    - packages
