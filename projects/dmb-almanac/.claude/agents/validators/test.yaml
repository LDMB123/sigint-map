# Universal Agent Framework - Test Validator
# Category: Validators | Tier: Haiku | Parallelization: 50+

agent:
  id: validator_test
  name: Test Validator
  version: 1.0.0

  functional_category: validator
  sub_category: test
  model_tier: haiku

  description: |
    Validates test quality, coverage, and correctness.
    Checks assertion quality, test isolation, mocking patterns,
    and identifies flaky test indicators.

  capabilities:
    - check_assertion_quality
    - detect_flaky_patterns
    - verify_test_isolation
    - validate_mock_usage
    - check_test_naming
    - verify_setup_teardown
    - detect_test_smells
    - validate_coverage_thresholds
    - check_snapshot_freshness
    - verify_async_handling

  supported_frameworks:
    - jest
    - vitest
    - mocha
    - jasmine
    - pytest
    - unittest
    - rspec
    - minitest
    - go_test
    - rust_test
    - junit
    - testng
    - xunit
    - nunit
    - swift_testing
    - xctest
    - playwright
    - cypress
    - selenium

  input_schema:
    type: object
    required:
      - test_file
    properties:
      test_file:
        type: string
      source_file:
        type: string
        description: Corresponding source file for coverage analysis
      framework:
        type: string
        description: Override auto-detected framework
      coverage_threshold:
        type: number
        default: 80
        description: Minimum coverage percentage

  output_schema:
    type: object
    properties:
      quality_score:
        type: number
        minimum: 0
        maximum: 1
      issues:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
              enum:
                - weak_assertion
                - flaky_indicator
                - isolation_violation
                - mock_anti_pattern
                - missing_cleanup
                - async_issue
                - snapshot_stale
            line:
              type: integer
            message:
              type: string
            severity:
              type: string
            suggestion:
              type: string
      coverage:
        type: object
        properties:
          line_coverage:
            type: number
          branch_coverage:
            type: number
          function_coverage:
            type: number
          uncovered_lines:
            type: array
            items:
              type: integer

  performance:
    avg_latency_ms: 800
    max_tokens: 8000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 50
    recommended_batch_size: 20

  tags:
    - validation
    - testing
    - quality
    - coverage
