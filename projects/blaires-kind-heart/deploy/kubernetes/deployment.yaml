apiVersion: apps/v1
kind: Deployment
metadata:
  name: blaires-kind-heart
  namespace: blaires-kind-heart
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/part-of: blaires-kind-heart
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blaires-kind-heart
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blaires-kind-heart
        app.kubernetes.io/part-of: blaires-kind-heart
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/ldmb123/blaires-kind-heart:main
          imagePullPolicy: Always
          ports:
            - name: web
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: web
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: web
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:0.11.0
          args:
            - "--nginx.scrape-uri=http://127.0.0.1:8080/nginx-status"
          ports:
            - name: metrics
              containerPort: 9113
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-config
          configMap:
            name: blaires-kind-heart-nginx-config
            items:
              - key: default.conf
                path: default.conf
