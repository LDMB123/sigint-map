apiVersion: v1
kind: ConfigMap
metadata:
  name: blaires-kind-heart-nginx-config
  namespace: blaires-kind-heart
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/component: web
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header Cross-Origin-Embedder-Policy "require-corp" always;
      add_header Cross-Origin-Resource-Policy "same-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; media-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

      location /offline.html {
        try_files /offline.html =404;
      }

      location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /index.html =404;
      }

      location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /sw.js =404;
      }

      location = /sw-assets.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /sw-assets.js =404;
      }

      location = /asset-manifest.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /asset-manifest.js =404;
      }

      location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /manifest.webmanifest =404;
      }

      location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /manifest.json =404;
      }

      location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /nginx-status {
        stub_status;
        access_log off;
        allow all;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ~* \.wasm$ {
        types {
          application/wasm wasm;
        }
        add_header Cache-Control "public, max-age=31536000, immutable";
      }

      location ~* \.(css|js|woff2?|ttf|png|jpg|jpeg|webp|svg|json|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
      }
    }
