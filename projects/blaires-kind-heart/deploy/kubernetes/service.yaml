apiVersion: v1
kind: Service
metadata:
  name: blaires-kind-heart
  namespace: blaires-kind-heart
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: blaires-kind-heart
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blaires-kind-heart
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: web
---
apiVersion: v1
kind: Service
metadata:
  name: blaires-kind-heart-metrics
  namespace: blaires-kind-heart
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: blaires-kind-heart
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blaires-kind-heart
  ports:
    - name: metrics
      protocol: TCP
      port: 9113
      targetPort: metrics
