apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blaires-kind-heart
  namespace: blaires-kind-heart
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/part-of: blaires-kind-heart
spec:
  ingressClassName: nginx
  tls:
    - secretName: blaires-kind-heart-tls
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blaires-kind-heart
                port:
                  number: 80
