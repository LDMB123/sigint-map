apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blaires-kind-heart
  namespace: blaires-kind-heart
  labels:
    app.kubernetes.io/name: blaires-kind-heart
    app.kubernetes.io/part-of: blaires-kind-heart
spec:
  namespaceSelector:
    matchNames:
      - blaires-kind-heart
  selector:
    matchLabels:
      app.kubernetes.io/name: blaires-kind-heart
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
