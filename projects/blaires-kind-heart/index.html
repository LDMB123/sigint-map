  <style>
    /* CRITICAL INLINE CSS: Loading screen + GPU canvas (for LCP <2s target) */

    /* CSS Custom Properties (subset for loading screen) */
    :root {
    /* GENERATED CRITICAL TOKENS START */
      --z-loading: 3000;
      --space-xl: 32px;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
      --font-family-display: "SF Pro Rounded", "Chalkboard SE", "Comic Sans MS", system-ui, sans-serif;
      --font-size-xl: 1.65rem;
      --font-weight-bold: 700;
      --color-pink-dark: #C4446A;
      --radius-sm: 12px;
    /* GENERATED CRITICAL TOKENS END */
    }

    /* GPU canvas overlay — transparent, covers viewport, behind interactive elements */
    .gpu-canvas-overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: var(--z-loading);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFE4ED, #E8D5FF);
    }

    .loading-screen[hidden] {
      display: none;
    }

    .loading-screen--exit {
      animation: loading-exit 0.6s var(--ease-smooth) forwards;
    }

    .loading-sparkle {
      width: 180px;
      height: auto;
      animation: sparkle-bounce 1.2s ease-in-out infinite;
    }

    .loading-sparkle-particles {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .sparkle-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-pink, #FF8FAB);
      animation: sparkle-float 2s ease-in-out infinite;
    }

    .sparkle-dot:nth-child(2) {
      animation-delay: 0.4s;
      background: var(--color-purple, #B57EFF);
    }

    .sparkle-dot:nth-child(3) {
      animation-delay: 0.8s;
      background: var(--color-yellow, #FFD32D);
    }

    /* Keyframes */
    @keyframes sparkle-bounce {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-20px) scale(1.05);
      }
    }

    @keyframes sparkle-float {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.6;
      }

      50% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    @keyframes loading-exit {
      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0);
      }

      100% {
        transform: scale(1.1);
        opacity: 0;
        filter: blur(8px);
      }
    }
  </style>
</head>
