[build]
filehash = false
public_url = "/"
inject_scripts = false
minify = "on_release"

# Canonical panel metadata -> generated Rust + JS registry
[[hooks]]
stage = "pre_build"
command = "node"
command_arguments = ["scripts/generate-panel-registry.mjs"]

# Generate asset manifest before WASM compilation
[[hooks]]
stage = "pre_build"
command = "bash"
command_arguments = ["scripts/asset-manifest.sh"]

[wasm-opt]
default_optimizations = "z"

# We must pass the SIMD feature flags to the optimizer because Rust builds
# the wasm code utilizing these intrinsic features.
args = [
    "-Oz",
    "--enable-simd",
    "--enable-bulk-memory",
    "--enable-reference-types",
    "--enable-sign-ext"
]
[watch]
# Prevent rebuild loop: pre_build hook writes these files, which would
# trigger the file watcher, causing another build, ad infinitum.
ignore = [
    "public/asset-manifest.js",
    "public/asset-manifest.json",
    "public/panel-registry.js",
    "rust/panel_registry_generated.rs",
]

[serve]
disable_csp = true
no_autoreload = true
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp", "Cross-Origin-Resource-Policy" = "same-origin", "Permissions-Policy" = "microphone=(), camera=(), geolocation=(), payment=()" }
