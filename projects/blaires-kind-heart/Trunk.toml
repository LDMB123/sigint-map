[build]
filehash = false
public_url = "/"
inject_scripts = false
no_sri = true
minify = "on_release"

# Phase 4.1: Generate asset manifest before WASM compilation
[[hooks]]
stage = "pre_build"
command = "bash"
command_arguments = [".trunk/asset-manifest.sh"]

[wasm-opt]
default_optimizations = "z"

# We must pass the SIMD feature flags to the optimizer because Rust builds
# the wasm code utilizing these intrinsic features.
args = [
    "-Oz",
    "--enable-simd",
    "--enable-bulk-memory",
    "--enable-reference-types",
    "--enable-sign-ext"
]
[serve]
disable_csp = true
no_autoreload = true
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp", "Cross-Origin-Resource-Policy" = "same-origin", "Permissions-Policy" = "microphone=(), camera=(), geolocation=(), payment=()" }
