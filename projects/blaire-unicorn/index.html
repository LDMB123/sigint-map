<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blaire's Unicorn Adventure</title>

    <!-- PWA / iOS 26 Capability -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFD1DC">
    <link rel="manifest" href="manifest.json">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/glass.css">
    <link rel="stylesheet" href="styles/animations.css">

    <!-- Fonts (using system stack for max performance, but preloading if we had custom ones) -->

    <style>
        /* Critical CSS for loading state */
        body {
            background-color: #FFD1DC;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body ontouchstart=""> <!-- Enable active states on iOS -->

    <!-- Zero-JS Navigation Shell -->
    <nav id="main-nav">
        <!-- These will be styled as glass buttons -->
    </nav>

    <main id="app-container">
        <!-- Home View -->
        <section id="view-home" class="view">
            <div class="glass-card title-card">
                <h1>Blaire's<br>Unicorn Adventure</h1>
                <a href="#view-game" class="btn-primary glass-button">Play!</a>
            </div>
        </section>

        <!-- Game View -->
        <section id="view-game" class="view">
            <canvas id="game-canvas"></canvas>
            <div id="game-ui">
                <a href="#view-home" class="btn-back glass-button">🏠</a>
                <div class="kindness-meter glass-pill">
                    <span>💖 0</span>
                </div>
            </div>
        </section>

        <!-- Offline Indicator -->
        <div id="offline-toast" class="glass-toast hidden">
            Using Fairy Magic (Offline)
        </div>
    </main>

    <!-- App Logic -->
    <script src="src/app.js" type="module"></script>
    <script>
        // Simple Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
