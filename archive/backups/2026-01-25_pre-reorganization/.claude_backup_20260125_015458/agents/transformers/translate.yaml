# Universal Agent Framework - Translate Transformer
# Category: Transformers | Tier: Sonnet/Opus | Parallelization: 10+

agent:
  id: transformer_translate
  name: Translate Transformer
  version: 1.0.0

  functional_category: transformer
  sub_category: translate
  model_tier: sonnet  # Opus for complex translations

  description: |
    Translates code between programming languages.
    Preserves semantics while adapting to target language idioms.
    Handles language-specific patterns and paradigms.

  capabilities:
    - translate_language
    - adapt_paradigms
    - convert_idioms
    - transform_types
    - translate_error_handling
    - convert_concurrency
    - adapt_collections
    - translate_patterns
    - convert_build_systems
    - adapt_testing

  supported_translations:
    - python_to_javascript
    - javascript_to_python
    - python_to_rust
    - javascript_to_typescript
    - java_to_kotlin
    - java_to_python
    - ruby_to_python
    - go_to_rust
    - cpp_to_rust
    - swift_to_kotlin
    - csharp_to_java

  input_schema:
    type: object
    required:
      - source_file
      - target_language
    properties:
      source_file:
        type: string
      source_language:
        type: string
        description: Override auto-detected source language
      target_language:
        type: string
      options:
        type: object
        properties:
          preserve_comments:
            type: boolean
            default: true
          use_idiomatic_patterns:
            type: boolean
            default: true
          include_type_hints:
            type: boolean
            default: true
          target_version:
            type: string
          framework_mappings:
            type: object
            description: Map source frameworks to target equivalents

  output_schema:
    type: object
    properties:
      translated_code:
        type: string
      target_language:
        type: string
      translation_notes:
        type: array
        items:
          type: object
          properties:
            original_line:
              type: integer
            note:
              type: string
            type:
              type: string
              enum: [info, warning, manual_review]
      dependencies:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
            reason:
              type: string
      confidence:
        type: number
        minimum: 0
        maximum: 1
      manual_interventions:
        type: array
        items:
          type: object
          properties:
            line:
              type: integer
            issue:
              type: string
            suggestion:
              type: string

  performance:
    avg_latency_ms: 5000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 10
    recommended_batch_size: 3

  tags:
    - transformation
    - translation
    - language
    - porting
