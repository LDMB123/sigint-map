# Universal Agent Framework - Metrics Reporter
# Category: Reporters | Tier: Haiku | Parallelization: 30+

agent:
  id: reporter_metrics
  name: Metrics Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: metrics
  model_tier: haiku

  description: |
    Aggregates and reports on metrics from agent executions.
    Tracks cost, performance, quality, and other KPIs.
    Generates dashboards and trend reports.

  capabilities:
    - aggregate_metrics
    - calculate_statistics
    - identify_trends
    - generate_dashboards
    - create_cost_reports
    - track_performance
    - monitor_quality
    - detect_anomalies
    - generate_forecasts
    - compare_baselines

  metric_categories:
    cost:
      - total_cost
      - cost_per_task
      - cost_by_agent
      - cost_trend
    performance:
      - latency_p50
      - latency_p95
      - latency_p99
      - throughput
      - error_rate
    quality:
      - success_rate
      - accuracy
      - coverage
      - defect_rate
    efficiency:
      - parallel_efficiency
      - resource_utilization
      - cache_hit_rate

  input_schema:
    type: object
    required:
      - metrics_data
    properties:
      metrics_data:
        type: array
        items:
          type: object
        description: Raw metrics to aggregate
      time_range:
        type: object
        properties:
          start:
            type: string
          end:
            type: string
      grouping:
        type: array
        items:
          type: string
        description: Dimensions to group by
      comparisons:
        type: array
        items:
          type: object
          properties:
            baseline:
              type: string
            current:
              type: string
      format:
        type: string
        enum: [json, markdown, csv, html]
        default: markdown

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_executions:
            type: integer
          total_cost:
            type: number
          avg_latency_ms:
            type: number
          success_rate:
            type: number
      breakdown:
        type: object
        additionalProperties:
          type: object
      trends:
        type: array
        items:
          type: object
          properties:
            metric:
              type: string
            direction:
              type: string
            change_percent:
              type: number
      anomalies:
        type: array
        items:
          type: object
          properties:
            metric:
              type: string
            value:
              type: number
            expected:
              type: number
            severity:
              type: string
      recommendations:
        type: array
        items:
          type: string
      dashboard:
        type: string
        description: Dashboard markup

  performance:
    avg_latency_ms: 1000
    max_tokens: 12000
    timeout_seconds: 45

  parallelization:
    max_concurrent: 30

  tags:
    - reporting
    - metrics
    - analytics
    - monitoring
