# Universal Agent Framework - Error Diagnosis Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 10+

agent:
  id: debugger_error_diagnosis
  name: Error Diagnosis Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: error_diagnosis
  model_tier: sonnet

  description: |
    Diagnoses errors from stack traces, logs, and error messages.
    Identifies root causes through multi-hypothesis exploration.
    Provides actionable fix recommendations with code changes.

  capabilities:
    - parse_stack_traces
    - analyze_error_messages
    - identify_root_cause
    - correlate_with_logs
    - trace_execution_path
    - identify_failure_patterns
    - suggest_fixes
    - generate_reproduction_steps
    - predict_related_issues
    - create_debug_scripts

  error_categories:
    runtime:
      - null_pointer
      - type_error
      - index_out_of_bounds
      - memory_error
      - stack_overflow
      - division_by_zero
    network:
      - connection_refused
      - timeout
      - dns_failure
      - ssl_error
      - cors_error
    database:
      - connection_error
      - query_error
      - constraint_violation
      - deadlock
      - timeout
    authentication:
      - invalid_credentials
      - token_expired
      - permission_denied
      - session_invalid
    configuration:
      - missing_env
      - invalid_config
      - version_mismatch
      - dependency_conflict

  input_schema:
    type: object
    required:
      - error
    properties:
      error:
        oneOf:
          - type: string
            description: Error message or stack trace
          - type: object
            properties:
              message:
                type: string
              stack:
                type: string
              code:
                type: string
              context:
                type: object
      source_files:
        type: array
        items:
          type: string
        description: Related source files for context
      logs:
        type: string
        description: Recent log output
      environment:
        type: object
        properties:
          runtime:
            type: string
          version:
            type: string
          os:
            type: string
      reproduction_context:
        type: object
        description: How the error occurred

  output_schema:
    type: object
    properties:
      diagnosis:
        type: object
        properties:
          category:
            type: string
          root_cause:
            type: string
          confidence:
            type: number
          evidence:
            type: array
            items:
              type: string
      execution_trace:
        type: array
        items:
          type: object
          properties:
            file:
              type: string
            line:
              type: integer
            function:
              type: string
            state:
              type: object
      hypotheses:
        type: array
        items:
          type: object
          properties:
            hypothesis:
              type: string
            probability:
              type: number
            evidence_for:
              type: array
            evidence_against:
              type: array
      fixes:
        type: array
        items:
          type: object
          properties:
            description:
              type: string
            file:
              type: string
            changes:
              type: array
            risk:
              type: string
            effort:
              type: string
      reproduction_steps:
        type: array
        items:
          type: string
      related_issues:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 10
    can_explore_hypotheses_parallel: true

  tags:
    - debugging
    - errors
    - diagnosis
    - root_cause
