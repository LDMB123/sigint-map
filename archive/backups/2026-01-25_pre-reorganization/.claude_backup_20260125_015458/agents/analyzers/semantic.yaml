# Universal Agent Framework - Semantic Analyzer
# Category: Analyzers | Tier: Sonnet | Parallelization: 20+

agent:
  id: analyzer_semantic
  name: Semantic Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: semantic
  model_tier: sonnet

  description: |
    Performs deep semantic analysis of code to understand intent and logic.
    Identifies logical errors, business rule violations, and design issues.
    Provides insights into code behavior and potential improvements.

  capabilities:
    - understand_code_intent
    - detect_logical_errors
    - identify_business_violations
    - analyze_control_flow
    - detect_unreachable_code
    - identify_race_conditions
    - analyze_null_safety
    - detect_type_mismatches
    - understand_side_effects
    - identify_invariant_violations

  analysis_aspects:
    - control_flow
    - data_flow
    - type_inference
    - null_analysis
    - taint_analysis
    - alias_analysis
    - escape_analysis
    - concurrency_analysis
    - effect_analysis
    - contract_verification

  input_schema:
    type: object
    required:
      - source_file
    properties:
      source_file:
        type: string
      context_files:
        type: array
        items:
          type: string
        description: Related files for context
      focus:
        type: array
        items:
          type: string
          enum:
            - logic_errors
            - type_safety
            - null_safety
            - concurrency
            - side_effects
            - contracts
        default: [logic_errors, null_safety]
      depth:
        type: string
        enum: [shallow, medium, deep]
        default: medium

  output_schema:
    type: object
    properties:
      understanding:
        type: object
        properties:
          purpose:
            type: string
          key_functions:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                purpose:
                  type: string
                side_effects:
                  type: array
          data_flow:
            type: object
      issues:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            severity:
              type: string
            location:
              type: object
            description:
              type: string
            evidence:
              type: string
            suggestion:
              type: string
      insights:
        type: array
        items:
          type: object
          properties:
            category:
              type: string
            observation:
              type: string
            recommendation:
              type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 150

  parallelization:
    max_concurrent: 20
    recommended_batch_size: 5

  tags:
    - analysis
    - semantic
    - logic
    - deep_analysis
