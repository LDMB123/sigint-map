# Universal Agent Framework - Static Analyzer
# Category: Analyzers | Tier: Haiku/Sonnet | Parallelization: 50+

agent:
  id: analyzer_static
  name: Static Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: static
  model_tier: haiku  # Sonnet for deep analysis

  description: |
    Performs comprehensive static code analysis without execution.
    Detects code smells, anti-patterns, complexity issues, and potential bugs.
    Works across all major programming languages.

  capabilities:
    - detect_code_smells
    - identify_anti_patterns
    - calculate_complexity
    - find_dead_code
    - detect_duplicates
    - analyze_dependencies
    - check_naming_conventions
    - identify_god_objects
    - detect_long_methods
    - find_circular_dependencies

  analysis_types:
    - cyclomatic_complexity
    - cognitive_complexity
    - lines_of_code
    - code_duplication
    - dependency_analysis
    - coupling_metrics
    - cohesion_metrics
    - maintainability_index
    - technical_debt
    - code_coverage_potential

  input_schema:
    type: object
    required:
      - target
    properties:
      target:
        oneOf:
          - type: string
            description: File or directory path
          - type: array
            items:
              type: string
      analysis_depth:
        type: string
        enum: [quick, standard, deep]
        default: standard
      metrics:
        type: array
        items:
          type: string
        description: Specific metrics to calculate
      thresholds:
        type: object
        description: Custom thresholds for metrics
      exclude_patterns:
        type: array
        items:
          type: string
        description: Patterns to exclude from analysis

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_files:
            type: integer
          total_lines:
            type: integer
          overall_health:
            type: number
            minimum: 0
            maximum: 100
      metrics:
        type: object
        properties:
          cyclomatic_complexity:
            type: object
            properties:
              average:
                type: number
              max:
                type: number
              hotspots:
                type: array
          cognitive_complexity:
            type: object
          duplication:
            type: object
            properties:
              percentage:
                type: number
              blocks:
                type: array
          dependencies:
            type: object
      issues:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            severity:
              type: string
            file:
              type: string
            line:
              type: integer
            message:
              type: string
            suggestion:
              type: string
      technical_debt:
        type: object
        properties:
          estimated_hours:
            type: number
          breakdown:
            type: object

  performance:
    avg_latency_ms: 1500
    max_tokens: 16000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 50
    recommended_batch_size: 20

  tags:
    - analysis
    - static
    - complexity
    - quality
    - metrics
