# Universal Agent Framework - Impact Analyzer
# Category: Analyzers | Tier: Sonnet | Parallelization: 30+

agent:
  id: analyzer_impact
  name: Impact Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: impact
  model_tier: sonnet

  description: |
    Analyzes the impact of code changes across the codebase.
    Identifies affected components, breaking changes, and ripple effects.
    Helps prioritize testing and review efforts.

  capabilities:
    - analyze_change_impact
    - identify_affected_components
    - detect_breaking_changes
    - calculate_blast_radius
    - identify_required_tests
    - detect_api_changes
    - analyze_schema_impact
    - identify_deployment_risks
    - calculate_review_priority
    - predict_failure_points

  impact_categories:
    - direct_dependencies
    - indirect_dependencies
    - api_consumers
    - database_schema
    - configuration
    - environment
    - downstream_services
    - ui_components
    - test_coverage
    - documentation

  input_schema:
    type: object
    required:
      - changes
    properties:
      changes:
        oneOf:
          - type: string
            description: Git diff or patch file
          - type: array
            items:
              type: object
              properties:
                file:
                  type: string
                type:
                  type: string
                  enum: [added, modified, deleted]
      codebase_root:
        type: string
        description: Root of codebase for full analysis
      depth:
        type: string
        enum: [direct, transitive, full]
        default: transitive
      include_tests:
        type: boolean
        default: true

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          files_changed:
            type: integer
          components_affected:
            type: integer
          risk_level:
            type: string
            enum: [low, medium, high, critical]
          review_priority:
            type: integer
            minimum: 1
            maximum: 10
      affected_components:
        type: array
        items:
          type: object
          properties:
            path:
              type: string
            type:
              type: string
            impact_type:
              type: string
              enum: [direct, indirect, potential]
            reason:
              type: string
      breaking_changes:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            location:
              type: string
            description:
              type: string
            affected_consumers:
              type: array
      required_tests:
        type: array
        items:
          type: object
          properties:
            test_file:
              type: string
            reason:
              type: string
            priority:
              type: string
      deployment_risks:
        type: array
        items:
          type: object
          properties:
            risk:
              type: string
            severity:
              type: string
            mitigation:
              type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 24000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 10

  tags:
    - analysis
    - impact
    - changes
    - risk
    - testing
