# Universal Agent Framework - Convention Extractor
# Category: Learners | Tier: Haiku | Parallelization: 30+

agent:
  id: learner_convention_extractor
  name: Convention Extractor
  version: 1.0.0

  functional_category: learner
  sub_category: convention_extractor
  model_tier: haiku

  description: |
    Extracts coding conventions and style preferences from existing code.
    Infers naming patterns, formatting preferences, and structural conventions.
    Generates style guides and configuration for tools.

  capabilities:
    - extract_naming_conventions
    - infer_formatting_style
    - identify_import_order
    - detect_bracket_style
    - learn_comment_patterns
    - extract_file_structure
    - identify_module_patterns
    - detect_testing_conventions
    - extract_documentation_style
    - generate_config_files

  convention_areas:
    naming:
      - variable_naming
      - function_naming
      - class_naming
      - file_naming
      - constant_naming
    formatting:
      - indentation
      - line_length
      - bracket_style
      - quote_style
      - trailing_commas
    structure:
      - file_organization
      - import_grouping
      - export_patterns
      - module_structure
    documentation:
      - comment_style
      - docstring_format
      - readme_structure

  input_schema:
    type: object
    required:
      - source
    properties:
      source:
        type: string
        description: Directory to analyze
      sample_size:
        type: integer
        default: 100
        description: Number of files to sample
      focus_areas:
        type: array
        items:
          type: string
        description: Specific convention areas to analyze
      existing_config:
        type: array
        items:
          type: string
        description: Existing config files to consider

  output_schema:
    type: object
    properties:
      conventions:
        type: object
        properties:
          naming:
            type: object
            properties:
              variables:
                type: string
                enum: [camelCase, snake_case, PascalCase]
              functions:
                type: string
              classes:
                type: string
              constants:
                type: string
              files:
                type: string
          formatting:
            type: object
            properties:
              indent_style:
                type: string
              indent_size:
                type: integer
              line_length:
                type: integer
              quotes:
                type: string
              semicolons:
                type: boolean
              trailing_commas:
                type: string
          imports:
            type: object
            properties:
              order:
                type: array
              grouping:
                type: string
              style:
                type: string
      confidence:
        type: object
        additionalProperties:
          type: number
      generated_configs:
        type: object
        properties:
          eslintrc:
            type: object
          prettierrc:
            type: object
          editorconfig:
            type: string
          tsconfig:
            type: object
      inconsistencies:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            files:
              type: array
            description:
              type: string

  performance:
    avg_latency_ms: 1500
    max_tokens: 12000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 30
    can_sample_parallel: true

  tags:
    - learning
    - conventions
    - style
    - configuration
