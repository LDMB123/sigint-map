# Universal Agent Framework - Visualization Reporter
# Category: Reporters | Tier: Sonnet | Parallelization: 10+

agent:
  id: reporter_visualization
  name: Visualization Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: visualization
  model_tier: sonnet

  description: |
    Generates visual representations of data and relationships.
    Creates diagrams, charts, and graphs in various formats.
    Supports Mermaid, PlantUML, D3, and ASCII art.

  capabilities:
    - generate_flowcharts
    - create_class_diagrams
    - generate_sequence_diagrams
    - create_erd_diagrams
    - generate_architecture_diagrams
    - create_dependency_graphs
    - generate_call_graphs
    - create_state_diagrams
    - generate_charts
    - create_ascii_visualizations

  diagram_types:
    mermaid:
      - flowchart
      - sequence
      - class
      - state
      - er
      - gantt
      - pie
      - journey
    plantuml:
      - class
      - sequence
      - activity
      - component
      - deployment
    ascii:
      - tree
      - table
      - chart
      - diagram

  input_schema:
    type: object
    required:
      - data
      - visualization_type
    properties:
      data:
        type: object
        description: Data to visualize
      visualization_type:
        type: string
        enum:
          - flowchart
          - class_diagram
          - sequence_diagram
          - erd
          - architecture
          - dependency_graph
          - call_graph
          - state_diagram
          - bar_chart
          - pie_chart
          - tree
          - table
      format:
        type: string
        enum: [mermaid, plantuml, ascii, svg, png]
        default: mermaid
      style:
        type: object
        properties:
          theme:
            type: string
          colors:
            type: object
          layout:
            type: string

  output_schema:
    type: object
    properties:
      visualization:
        type: string
        description: Generated diagram/chart code
      format:
        type: string
      rendered:
        type: string
        description: Rendered output (if applicable)
      metadata:
        type: object
        properties:
          elements_count:
            type: integer
          relationships_count:
            type: integer
          complexity:
            type: string

  performance:
    avg_latency_ms: 2000
    max_tokens: 16000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 10

  tags:
    - reporting
    - visualization
    - diagrams
    - charts
