# Universal Agent Framework - Audit Trail Reporter
# Category: Reporters | Tier: Haiku | Parallelization: 50+

agent:
  id: reporter_audit_trail
  name: Audit Trail Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: audit_trail
  model_tier: haiku

  description: |
    Generates comprehensive audit trails for agent activities.
    Records decisions, changes, and events for compliance.
    Creates immutable logs with timestamps and context.

  capabilities:
    - record_decisions
    - log_changes
    - track_approvals
    - document_rationale
    - create_compliance_reports
    - generate_change_logs
    - track_access
    - document_errors
    - record_rollbacks
    - create_forensic_reports

  audit_categories:
    decisions:
      - agent_selection
      - task_routing
      - conflict_resolution
      - approval_decisions
    changes:
      - code_modifications
      - config_changes
      - permission_changes
      - state_changes
    events:
      - start_events
      - completion_events
      - error_events
      - escalation_events

  input_schema:
    type: object
    required:
      - audit_events
    properties:
      audit_events:
        type: array
        items:
          type: object
          properties:
            timestamp:
              type: string
            event_type:
              type: string
            actor:
              type: string
            action:
              type: string
            target:
              type: string
            context:
              type: object
            outcome:
              type: string
      format:
        type: string
        enum: [json, jsonl, markdown, csv]
        default: jsonl
      include_context:
        type: boolean
        default: true
      time_range:
        type: object
        properties:
          start:
            type: string
          end:
            type: string

  output_schema:
    type: object
    properties:
      audit_log:
        type: string
        description: Formatted audit trail
      entries:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            timestamp:
              type: string
            event_type:
              type: string
            actor:
              type: string
            action:
              type: string
            target:
              type: string
            outcome:
              type: string
            hash:
              type: string
      summary:
        type: object
        properties:
          total_events:
            type: integer
          events_by_type:
            type: object
          actors:
            type: array
          time_range:
            type: object
      integrity:
        type: object
        properties:
          chain_valid:
            type: boolean
          hash:
            type: string

  performance:
    avg_latency_ms: 500
    max_tokens: 8000
    timeout_seconds: 30

  parallelization:
    max_concurrent: 50

  tags:
    - reporting
    - audit
    - compliance
    - logging
