# Universal Agent Framework - Performance Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 5+

agent:
  id: debugger_performance
  name: Performance Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: performance
  model_tier: sonnet

  description: |
    Debugs performance issues using profiling data and metrics.
    Identifies bottlenecks, memory leaks, and inefficient code paths.
    Provides optimization recommendations with benchmarks.

  capabilities:
    - analyze_profiles
    - identify_bottlenecks
    - detect_memory_leaks
    - trace_slow_paths
    - analyze_flame_graphs
    - identify_n_plus_one
    - detect_blocking_calls
    - analyze_cache_misses
    - identify_gc_issues
    - correlate_metrics

  performance_issues:
    cpu:
      - hot_functions
      - inefficient_algorithms
      - excessive_computation
      - synchronous_blocking
    memory:
      - memory_leaks
      - excessive_allocations
      - gc_pressure
      - cache_thrashing
    io:
      - slow_queries
      - network_latency
      - disk_bottleneck
      - connection_pool_exhaustion
    concurrency:
      - lock_contention
      - deadlocks
      - thread_starvation
      - race_conditions

  input_schema:
    type: object
    required:
      - issue_description
    properties:
      issue_description:
        type: string
        description: What performance problem is observed
      profile_data:
        oneOf:
          - type: string
            description: Path to profile file
          - type: object
            description: Inline profile data
      metrics:
        type: object
        properties:
          latency_p50:
            type: number
          latency_p99:
            type: number
          throughput:
            type: number
          memory_usage:
            type: number
          cpu_usage:
            type: number
      source_files:
        type: array
        items:
          type: string
      baseline_metrics:
        type: object
        description: Previous good metrics for comparison
      time_range:
        type: object
        properties:
          start:
            type: string
          end:
            type: string

  output_schema:
    type: object
    properties:
      diagnosis:
        type: object
        properties:
          issue_type:
            type: string
          root_cause:
            type: string
          severity:
            type: string
          impact:
            type: string
      bottlenecks:
        type: array
        items:
          type: object
          properties:
            location:
              type: object
            type:
              type: string
            impact_percentage:
              type: number
            description:
              type: string
      optimizations:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            expected_improvement:
              type: string
            implementation:
              type: object
            risk:
              type: string
            effort:
              type: string
      benchmarks:
        type: object
        properties:
          current:
            type: object
          expected_after_fix:
            type: object
      monitoring_recommendations:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 5000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 5

  tags:
    - debugging
    - performance
    - profiling
    - optimization
