# Universal Agent Framework - Consensus Orchestrator
# Category: Orchestrators | Tier: Opus | Parallelization: 1

agent:
  id: orchestrator_consensus
  name: Consensus Orchestrator
  version: 1.0.0

  functional_category: orchestrator
  sub_category: consensus
  model_tier: opus

  description: |
    Orchestrates consensus-building workflows for important decisions.
    Generates diverse proposals, facilitates evaluation, and makes final decisions.
    Ensures high-quality outcomes through multi-perspective analysis.

  capabilities:
    - generate_proposals
    - facilitate_evaluation
    - aggregate_scores
    - resolve_conflicts
    - make_final_decision
    - document_rationale
    - handle_ties
    - weight_opinions
    - track_dissent
    - create_decision_record

  consensus_methods:
    majority_vote:
      description: Simple majority wins
      use_when: "Low-stakes decisions"

    weighted_score:
      description: Weighted average of criteria scores
      use_when: "Multi-criteria decisions"

    unanimous:
      description: All parties must agree
      use_when: "Critical decisions"

    supermajority:
      description: 2/3 or 3/4 must agree
      use_when: "Important but not critical"

    ranked_choice:
      description: Iterative elimination until majority
      use_when: "Many alternatives"

    delphi:
      description: Iterative anonymous feedback
      use_when: "Complex, uncertain decisions"

  input_schema:
    type: object
    required:
      - decision_topic
    properties:
      decision_topic:
        type: string
        description: What decision needs to be made
      context:
        type: object
        description: Background information
      constraints:
        type: array
        items:
          type: string
        description: Hard constraints on solutions
      evaluation_criteria:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            weight:
              type: number
            description:
              type: string
      proposer_agents:
        type: array
        items:
          type: string
        description: Agents to generate proposals
      evaluator_agents:
        type: array
        items:
          type: string
        description: Agents to evaluate proposals
      consensus_method:
        type: string
        default: weighted_score
      min_proposals:
        type: integer
        default: 3
      max_iterations:
        type: integer
        default: 3

  output_schema:
    type: object
    properties:
      decision:
        type: object
        description: The final decision
      confidence:
        type: number
        minimum: 0
        maximum: 1
      proposals:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            proposer:
              type: string
            summary:
              type: string
            details:
              type: object
            scores:
              type: object
            final_score:
              type: number
      evaluation_matrix:
        type: object
        description: Full scoring breakdown
      decision_rationale:
        type: string
      dissenting_opinions:
        type: array
        items:
          type: object
          properties:
            agent:
              type: string
            opinion:
              type: string
            weight:
              type: number
      adr:
        type: object
        description: Architecture Decision Record
        properties:
          title:
            type: string
          status:
            type: string
          context:
            type: string
          decision:
            type: string
          consequences:
            type: array

  performance:
    avg_latency_ms: 30000
    max_tokens: 100000
    timeout_seconds: 600

  parallelization:
    max_concurrent: 1
    can_parallelize_proposals: true
    can_parallelize_evaluations: true

  tags:
    - orchestration
    - consensus
    - decisions
    - governance
