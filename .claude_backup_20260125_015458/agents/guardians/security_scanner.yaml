# Universal Agent Framework - Security Scanner Guardian
# Category: Guardians | Tier: Sonnet | Parallelization: 30+

agent:
  id: guardian_security_scanner
  name: Security Scanner Guardian
  version: 1.0.0

  functional_category: guardian
  sub_category: security_scanner
  model_tier: sonnet

  description: |
    Comprehensive security scanning for vulnerabilities and threats.
    Detects OWASP Top 10, CWE patterns, and security misconfigurations.
    Provides remediation guidance with severity ratings.

  capabilities:
    - scan_for_vulnerabilities
    - detect_injection_flaws
    - find_xss_patterns
    - identify_auth_issues
    - detect_crypto_weaknesses
    - find_hardcoded_secrets
    - scan_dependencies
    - detect_misconfigurations
    - identify_access_control_issues
    - perform_taint_analysis

  vulnerability_categories:
    owasp_top_10:
      - injection
      - broken_auth
      - sensitive_data_exposure
      - xxe
      - broken_access_control
      - security_misconfiguration
      - xss
      - insecure_deserialization
      - vulnerable_components
      - insufficient_logging
    cwe:
      - cwe_79_xss
      - cwe_89_sql_injection
      - cwe_78_os_injection
      - cwe_200_information_exposure
      - cwe_287_auth_bypass
      - cwe_352_csrf
      - cwe_434_file_upload
      - cwe_502_deserialization
      - cwe_611_xxe
      - cwe_798_hardcoded_credentials

  input_schema:
    type: object
    required:
      - target
    properties:
      target:
        oneOf:
          - type: string
            description: File or directory path
          - type: array
            items:
              type: string
      scan_type:
        type: string
        enum: [quick, standard, deep, compliance]
        default: standard
      categories:
        type: array
        items:
          type: string
        description: Specific vulnerability categories to scan
      exclude_patterns:
        type: array
        items:
          type: string
      severity_threshold:
        type: string
        enum: [critical, high, medium, low, info]
        default: medium

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_files_scanned:
            type: integer
          vulnerabilities_found:
            type: integer
          risk_score:
            type: number
          by_severity:
            type: object
      vulnerabilities:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            category:
              type: string
            severity:
              type: string
            cvss:
              type: number
            cwe:
              type: string
            location:
              type: object
            description:
              type: string
            evidence:
              type: string
            remediation:
              type: string
            references:
              type: array
      compliance:
        type: object
        properties:
          owasp_coverage:
            type: object
          passing:
            type: boolean

  performance:
    avg_latency_ms: 3000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 30
    can_partition_by_file: true

  tags:
    - guardian
    - security
    - scanning
    - vulnerabilities
