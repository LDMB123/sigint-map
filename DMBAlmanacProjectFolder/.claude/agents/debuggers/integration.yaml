# Universal Agent Framework - Integration Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 10+

agent:
  id: debugger_integration
  name: Integration Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: integration
  model_tier: sonnet

  description: |
    Debugs issues in system integrations, APIs, and service communication.
    Analyzes request/response flows, protocol issues, and configuration problems.
    Supports REST, GraphQL, gRPC, WebSocket, and message queue debugging.

  capabilities:
    - trace_request_flow
    - analyze_api_responses
    - debug_authentication
    - identify_protocol_issues
    - trace_message_queues
    - debug_websocket_issues
    - analyze_retry_behavior
    - identify_timeout_causes
    - debug_serialization
    - trace_distributed_calls

  integration_types:
    - rest_api
    - graphql
    - grpc
    - websocket
    - message_queue
    - database
    - cache
    - file_system
    - external_service
    - microservice

  input_schema:
    type: object
    required:
      - issue_description
    properties:
      issue_description:
        type: string
      request:
        type: object
        properties:
          method:
            type: string
          url:
            type: string
          headers:
            type: object
          body:
            type: object
      response:
        type: object
        properties:
          status:
            type: integer
          headers:
            type: object
          body:
            type: object
          latency_ms:
            type: integer
      logs:
        type: string
        description: Relevant log output
      config:
        type: object
        description: Integration configuration
      network_trace:
        type: string
        description: HAR file or network trace

  output_schema:
    type: object
    properties:
      diagnosis:
        type: object
        properties:
          issue_type:
            type: string
          root_cause:
            type: string
          component:
            type: string
          confidence:
            type: number
      request_analysis:
        type: object
        properties:
          valid:
            type: boolean
          issues:
            type: array
      response_analysis:
        type: object
        properties:
          expected:
            type: object
          actual:
            type: object
          discrepancies:
            type: array
      trace:
        type: array
        items:
          type: object
          properties:
            step:
              type: string
            service:
              type: string
            status:
              type: string
            latency_ms:
              type: integer
      fixes:
        type: array
        items:
          type: object
          properties:
            component:
              type: string
            fix:
              type: string
            config_changes:
              type: object
      debugging_commands:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 24000
    timeout_seconds: 150

  parallelization:
    max_concurrent: 10

  tags:
    - debugging
    - integration
    - api
    - networking
