# Universal Agent Framework - Secret Detector Guardian
# Category: Guardians | Tier: Haiku | Parallelization: 100+

agent:
  id: guardian_secret_detector
  name: Secret Detector Guardian
  version: 1.0.0

  functional_category: guardian
  sub_category: secret_detector
  model_tier: haiku

  description: |
    Detects exposed secrets, credentials, and sensitive data.
    Scans code, configs, and git history for leaked secrets.
    Supports pre-commit hooks and CI integration.

  capabilities:
    - detect_api_keys
    - find_passwords
    - identify_tokens
    - detect_private_keys
    - find_connection_strings
    - scan_env_files
    - check_git_history
    - detect_encoded_secrets
    - find_certificates
    - scan_config_files

  secret_types:
    api_keys:
      - aws_access_key
      - gcp_api_key
      - azure_key
      - stripe_key
      - github_token
      - slack_token
      - sendgrid_key
      - twilio_key
    credentials:
      - password
      - secret
      - private_key
      - ssh_key
      - jwt_secret
      - encryption_key
    connection_strings:
      - database_url
      - redis_url
      - mongodb_uri
      - smtp_credentials
    certificates:
      - ssl_certificate
      - ssl_key
      - pfx_file
      - pem_file

  input_schema:
    type: object
    required:
      - target
    properties:
      target:
        type: string
        description: File or directory to scan
      scan_git_history:
        type: boolean
        default: false
      include_patterns:
        type: array
        items:
          type: string
      exclude_patterns:
        type: array
        items:
          type: string
        default: ["node_modules/**", ".git/**"]
      entropy_threshold:
        type: number
        default: 4.5
        description: Entropy threshold for detecting random strings

  output_schema:
    type: object
    properties:
      secrets_found:
        type: boolean
      findings:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            file:
              type: string
            line:
              type: integer
            column:
              type: integer
            match:
              type: string
              description: Redacted match
            entropy:
              type: number
            confidence:
              type: number
            commit:
              type: string
              description: Git commit (if history scan)
      summary:
        type: object
        properties:
          files_scanned:
            type: integer
          secrets_found:
            type: integer
          by_type:
            type: object
      recommendations:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 300
    max_tokens: 4000
    timeout_seconds: 30

  parallelization:
    max_concurrent: 100
    can_stream: true

  tags:
    - guardian
    - secrets
    - credentials
    - detection
