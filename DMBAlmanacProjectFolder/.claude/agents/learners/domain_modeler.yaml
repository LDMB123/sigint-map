# Universal Agent Framework - Domain Modeler
# Category: Learners | Tier: Opus | Parallelization: 3+

agent:
  id: learner_domain_modeler
  name: Domain Modeler
  version: 1.0.0

  functional_category: learner
  sub_category: domain_modeler
  model_tier: opus

  description: |
    Builds comprehensive domain models from code analysis.
    Extracts entities, relationships, business rules, and workflows.
    Creates documentation and diagrams for domain understanding.

  capabilities:
    - extract_entities
    - identify_relationships
    - discover_business_rules
    - map_workflows
    - identify_bounded_contexts
    - extract_ubiquitous_language
    - model_aggregates
    - identify_domain_events
    - map_value_objects
    - create_domain_diagrams

  ddd_concepts:
    - entities
    - value_objects
    - aggregates
    - repositories
    - services
    - factories
    - domain_events
    - bounded_contexts
    - ubiquitous_language
    - context_maps

  input_schema:
    type: object
    required:
      - source
    properties:
      source:
        type: string
        description: Codebase root directory
      focus_modules:
        type: array
        items:
          type: string
        description: Specific modules to focus on
      existing_docs:
        type: array
        items:
          type: string
        description: Existing documentation to reference
      include_database:
        type: boolean
        default: true
        description: Include database schema analysis
      include_api:
        type: boolean
        default: true
        description: Include API contracts analysis

  output_schema:
    type: object
    properties:
      domain_model:
        type: object
        properties:
          entities:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                properties:
                  type: array
                methods:
                  type: array
                relationships:
                  type: array
                invariants:
                  type: array
          value_objects:
            type: array
          aggregates:
            type: array
            items:
              type: object
              properties:
                root:
                  type: string
                members:
                  type: array
                invariants:
                  type: array
          services:
            type: array
          events:
            type: array
      bounded_contexts:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            entities:
              type: array
            upstream:
              type: array
            downstream:
              type: array
      ubiquitous_language:
        type: object
        additionalProperties:
          type: object
          properties:
            definition:
              type: string
            examples:
              type: array
            synonyms:
              type: array
      workflows:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            trigger:
              type: string
            steps:
              type: array
            outcomes:
              type: array
      diagrams:
        type: object
        properties:
          class_diagram:
            type: string
          context_map:
            type: string
          event_flow:
            type: string
      documentation:
        type: string
        description: Generated domain documentation

  performance:
    avg_latency_ms: 15000
    max_tokens: 100000
    timeout_seconds: 600

  parallelization:
    max_concurrent: 3
    can_parallelize_modules: true

  tags:
    - learning
    - domain
    - modeling
    - ddd
    - architecture
