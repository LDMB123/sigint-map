# Universal Agent Framework - Self-Healing Swarm Pattern
# Pattern: Autonomous Recovery | Uptime: 99%+ | Response: < 5min

swarm_pattern:
  id: self_healing
  name: Self-Healing Loop
  version: 1.0.0

  description: |
    Automatic detection, diagnosis, and recovery from failures.
    Monitors for issues, identifies root cause, applies fix, verifies.

    Ideal for: CI/CD pipelines, automated testing, deployment recovery,
    runtime error handling, quality gate recovery.

  architecture:
    monitor:
      tier: haiku
      role: Continuous monitoring for issues
      count: 1
      always_active: true

    diagnostician:
      tier: sonnet
      role: Root cause analysis
      count: 1-3

    healer:
      tier: sonnet
      role: Apply fixes
      count: 1

    verifier:
      tier: haiku
      role: Verify fix success
      count: 1

  workflow:
    phase_1_detection:
      name: Issue Detection
      agent: reporter_notification
      tier: haiku
      mode: continuous
      actions:
        - Monitor for failures
        - Detect anomalies
        - Classify severity
        - Trigger diagnosis
      trigger_conditions:
        - test_failure
        - build_failure
        - runtime_error
        - performance_degradation
        - security_alert
      output: detected_issue
      timeout_seconds: 10

    phase_2_triage:
      name: Issue Triage
      agent: debugger_error_diagnosis
      tier: sonnet
      actions:
        - Classify issue type
        - Determine severity
        - Check if auto-recoverable
        - Route to appropriate handler
      output: triage_result
      timeout_seconds: 30

    phase_3_diagnosis:
      name: Root Cause Analysis
      agent: debugger_*
      tier: sonnet
      parallelization:
        strategy: hypothesis_exploration
        max_concurrent: 3
      actions:
        - Explore multiple hypotheses
        - Gather evidence
        - Identify root cause
        - Determine fix approach
      output: diagnosis
      timeout_seconds: 120

    phase_4_healing:
      name: Apply Fix
      agent: transformer_*
      tier: sonnet
      actions:
        - Generate fix
        - Apply changes
        - Run quick validation
      output: fix_applied
      timeout_seconds: 180
      rollback_on_failure: true

    phase_5_verification:
      name: Verify Recovery
      agent: validator_test
      tier: haiku
      actions:
        - Run affected tests
        - Verify fix success
        - Check for regressions
      output: verification_result
      timeout_seconds: 60

    phase_6_escalation:
      name: Human Escalation
      condition: verification_failed OR max_attempts_exceeded
      agent: reporter_notification
      tier: haiku
      actions:
        - Generate incident report
        - Notify responsible parties
        - Provide diagnosis details
      output: escalation_notice

  configuration:
    recovery_attempts:
      max_per_issue: 3
      cooldown_seconds: 60
      escalate_after: 2

    auto_recoverable_issues:
      - test_flakiness
      - dependency_conflict
      - type_error
      - lint_violation
      - build_cache_corruption
      - transient_network_failure

    requires_human:
      - security_vulnerability
      - data_corruption
      - production_incident
      - breaking_change
      - unknown_error_type

    monitoring:
      poll_interval_seconds: 30
      alert_channels: [slack, email]
      severity_routing:
        critical: [pagerduty, sms]
        high: [slack, email]
        medium: [slack]
        low: [log_only]

    rollback:
      enabled: true
      strategy: git_revert
      preserve_diagnostics: true

  input_schema:
    type: object
    required:
      - issue
    properties:
      issue:
        type: object
        properties:
          type:
            type: string
          severity:
            type: string
          source:
            type: string
          details:
            type: object
          logs:
            type: string
      context:
        type: object
        properties:
          recent_changes:
            type: string
          affected_components:
            type: array
      recovery_preferences:
        type: object
        properties:
          auto_fix:
            type: boolean
            default: true
          notify_on_recovery:
            type: boolean
            default: true

  output_schema:
    type: object
    properties:
      recovered:
        type: boolean
      recovery_method:
        type: string
      diagnosis:
        type: object
        properties:
          root_cause:
            type: string
          confidence:
            type: number
          evidence:
            type: array
      fix:
        type: object
        properties:
          description:
            type: string
          changes:
            type: array
          verification:
            type: object
      metrics:
        type: object
        properties:
          detection_time_ms:
            type: integer
          diagnosis_time_ms:
            type: integer
          recovery_time_ms:
            type: integer
          total_time_ms:
            type: integer
      escalated:
        type: boolean
      escalation_reason:
        type: string

  cost_model:
    detection_haiku: 0.00025
    triage_sonnet: 0.003
    diagnosis_sonnet_x3: 0.009
    healing_sonnet: 0.003
    verification_haiku: 0.00025

    per_recovery_attempt: 0.015
    typical_recovery: 0.030  # ~2 attempts average

  examples:
    - name: Recover from flaky test
      trigger:
        type: test_failure
        test: "integration/auth.test.ts"
      expected:
        recovery_time_seconds: 45
        fix_type: retry_or_fix_timing
        cost: 0.015

    - name: Fix type error after dependency update
      trigger:
        type: build_failure
        error: "Type 'string' is not assignable to..."
      expected:
        recovery_time_seconds: 120
        fix_type: type_adjustment
        cost: 0.030

  best_practices:
    - Define clear auto-recoverable vs human-required issues
    - Keep recovery attempts bounded
    - Always preserve diagnostic information
    - Monitor recovery success rate
    - Review and improve recovery patterns periodically
