# Universal Agent Framework - Semantic Caching Configuration
# Implements 3-tier caching for 50-90% cost reduction

caching:
  enabled: true
  version: "1.0.0"

  # L1 Cache: Routing and Agent Selection (Fast, Small)
  l1_routing_cache:
    enabled: true
    type: in_memory
    max_size_mb: 50
    ttl_seconds: 1800  # 30 minutes
    eviction_policy: lru

    # What to cache
    cached_items:
      - agent_selection_decisions
      - tier_routing_choices
      - delegation_path_resolutions
      - swarm_pattern_matches

    # Cache keys
    key_components:
      - task_description_hash
      - user_intent_embedding
      - available_agents
      - tier_constraints

  # L2 Cache: Project Context (Medium, Persistent)
  l2_context_cache:
    enabled: true
    type: sqlite
    path: /Users/louisherman/.claude/cache/l2_context.db
    max_size_mb: 500
    ttl_seconds: 86400  # 24 hours
    eviction_policy: lru

    # What to cache
    cached_items:
      - project_conventions
      - dependency_graph
      - file_structure_index
      - symbol_tables
      - test_patterns
      - code_patterns
      - architecture_overview

    # Cache warming
    warming:
      enabled: true
      on_project_open: true
      warm_items:
        - dependency_graph
        - file_structure_index
        - project_conventions

    # Invalidation rules
    invalidation:
      on_file_change: true
      on_dependency_update: true
      on_git_commit: false  # Keep across commits
      watch_patterns:
        - "package.json"
        - "package-lock.json"
        - "tsconfig.json"
        - ".eslintrc*"

  # L3 Cache: Semantic Results (Large, Long-lived)
  l3_semantic_cache:
    enabled: true
    type: sqlite
    path: /Users/louisherman/.claude/cache/l3_semantic.db
    max_size_mb: 1000
    ttl_seconds: 604800  # 7 days
    eviction_policy: lru

    # Semantic similarity matching
    similarity:
      enabled: true
      algorithm: cosine_similarity
      embedding_model: text-embedding-3-small
      threshold: 0.85  # 85% similarity = cache hit
      max_candidates: 100

    # What to cache
    cached_items:
      - code_analysis_results
      - validation_outputs
      - test_generation_results
      - refactoring_suggestions
      - documentation_generation
      - pattern_mining_results

    # Cache key components
    key_components:
      - query_embedding
      - file_hash
      - agent_id
      - input_schema_version

  # CDN/Edge Caching (Static Analysis Results)
  edge_cache:
    enabled: false  # Enable when deploying to cloud
    provider: cloudflare
    regions:
      - us-west-1
      - us-east-1
    ttl_seconds: 3600
    cache_control: public, max-age=3600

# Cache Storage Backend
storage:
  sqlite:
    journals:
      - /Users/louisherman/.claude/cache/l1_routing.db
      - /Users/louisherman/.claude/cache/l2_context.db
      - /Users/louisherman/.claude/cache/l3_semantic.db

    connection_pool:
      max_connections: 50  # INCREASED from 10 to handle 150 concurrent agents
      idle_timeout_seconds: 300
      wait_timeout_seconds: 30  # P1: Explicit timeout to prevent indefinite waits
      wait_timeout_behavior: fail  # P1: Fail explicitly when timeout exceeded instead of undefined behavior
      connection_retry_limit: 0  # P1: No retries on connection timeout to prevent cascading waits

    pragmas:
      - journal_mode=WAL
      - synchronous=NORMAL
      - cache_size=10000
      - temp_store=MEMORY

  # Backup and maintenance
  maintenance:
    vacuum_interval_hours: 168  # Weekly
    analyze_interval_hours: 24
    backup_enabled: true
    backup_path: /Users/louisherman/.claude/cache/backups/
    retention_days: 7

# Cache Performance Monitoring
monitoring:
  enabled: true
  metrics:
    - cache_hit_rate
    - cache_miss_rate
    - avg_lookup_time_ms
    - eviction_rate
    - storage_size_mb
    - invalidation_count

  alerts:
    - name: low_hit_rate
      condition: hit_rate < 0.60  # Below 60%
      severity: warning

    - name: high_latency
      condition: avg_lookup_time_ms > 100
      severity: warning

    - name: storage_full
      condition: storage_size_mb > max_size_mb * 0.90
      severity: critical

# Cache Warming Strategies
warming:
  # On project open
  project_open:
    enabled: true
    items:
      - dependency_graph
      - file_structure_index
      - project_conventions
      - common_patterns

  # Predictive warming
  predictive:
    enabled: true
    based_on:
      - recent_queries
      - user_patterns
      - time_of_day
      - project_type

  # Scheduled warming
  scheduled:
    enabled: false
    cron: "0 8 * * *"  # Daily at 8 AM
    items:
      - all_project_contexts

# Cache Invalidation Strategies
invalidation:
  # File-based invalidation
  file_watcher:
    enabled: true
    debounce_ms: 500
    patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "package.json"
      - "tsconfig.json"

  # Time-based invalidation
  ttl:
    enabled: true
    check_interval_seconds: 300

  # Manual invalidation
  manual:
    enabled: true
    clear_all_command: cache:clear
    clear_l1_command: cache:clear:l1
    clear_l2_command: cache:clear:l2
    clear_l3_command: cache:clear:l3

  # Smart invalidation
  smart:
    enabled: true
    # Only invalidate affected entries, not entire cache
    granular: true
    # Use dependency graph to invalidate transitively
    transitive: true

# Request Deduplication (Related to Caching)
deduplication:
  enabled: true
  window_seconds: 300  # 5 minutes
  similarity_threshold: 0.95  # 95% similar = duplicate

  # What to deduplicate
  deduplicate:
    - identical_queries
    - semantic_similar_queries
    - concurrent_requests

  # How to handle duplicates
  strategy: queue_and_reuse  # vs reject_duplicate

  # Storage
  pending_requests:
    max_size: 1000
    storage: in_memory

# Cache Statistics Export
statistics:
  enabled: true
  export_interval_seconds: 300
  export_path: /Users/louisherman/.claude/cache/stats.json

  metrics:
    - hit_rate_by_cache_layer
    - hit_rate_by_agent
    - avg_lookup_time_by_layer
    - storage_size_by_layer
    - eviction_count_by_layer
    - invalidation_count_by_reason
    - deduplication_savings_tokens
    - deduplication_savings_usd

# Integration with Telemetry
telemetry_integration:
  enabled: true
  report_to_telemetry_collector: true
  metrics_to_report:
    - cache_hit_rate
    - cache_miss_rate
    - deduplication_rate
    - tokens_saved
    - cost_saved_usd

# Cost Savings Calculation
cost_savings:
  enabled: true

  # Model costs (per 1M tokens)
  model_costs:
    haiku_input: 0.25
    haiku_output: 1.25
    sonnet_input: 3.00
    sonnet_output: 15.00
    opus_input: 15.00
    opus_output: 75.00

  # Estimate savings
  calculate:
    tokens_saved_per_cache_hit: true
    cost_saved_per_cache_hit: true
    total_monthly_savings: true

