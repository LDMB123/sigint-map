# Universal Agent Framework - Parallelization Configuration
# Controls for concurrent execution and resource management

parallelization:
  global:
    # Maximum concurrent agents across all tiers (haiku:100 + sonnet:45 + opus:5)
    max_total_concurrent: 150
    # Allow burst up to (haiku:150 + sonnet:50 + opus:5)
    burst_max_total_concurrent: 205

    # Maximum concurrent API calls
    max_api_calls_per_second: 50

    # Queue configuration
    max_queue_depth: 1000
    queue_timeout_seconds: 300

  by_tier:
    haiku:
      max_concurrent: 100
      burst_max_concurrent: 150  # Allow burst for high-volume periods
      recommended_batch_size: 50  # Reduced for better stability
      min_batch_size: 20
      max_batch_size: 75

    sonnet:
      max_concurrent: 45  # INCREASED from 25 for +35% throughput
      burst_max_concurrent: 50  # INCREASED from 30
      recommended_batch_size: 15  # Reduced for quality control
      min_batch_size: 10
      max_batch_size: 30

    opus:
      max_concurrent: 5
      recommended_batch_size: 1
      min_batch_size: 1
      max_batch_size: 3

  by_swarm_pattern:
    fan_out_validation:
      max_workers: 200
      partitioning: by_file
      aggregation: merge_all

    hierarchical_delegation:
      max_level_2_coordinators: 10  # REDUCED from 20 to prevent deadlock
      max_level_3_workers_per_coordinator: 15  # REDUCED from 50
      max_total_workers: 150  # REDUCED from 500 (10 coord × 15 workers = 150)
      slot_reservation: true  # Reserve slots before spawning coordinators
      reservation_timeout_seconds: 30
      fail_fast_if_insufficient_slots: true

      # CRITICAL FIX: Prevent deadlock when circuit opens during spawn
      coordinator_spawn_timeout_seconds: 60  # Coordinators timeout after 60s waiting
      cleanup_on_circuit_open: true  # Kill coordinators if circuit opens mid-spawn
      circuit_aware_spawn: true  # Check circuit state before spawning workers

    consensus_building:
      max_proposers: 5
      max_evaluators_per_proposal: 5
      total_evaluations: 25

    progressive_refinement:
      max_parallel_reviewers: 5
      sequential_polish: true

    self_healing:
      max_parallel_hypotheses: 3
      sequential_fix: true

# Load balancing (Sonnet-First Strategy for Claude Max)
load_balancing:
  strategy: quality_first_weighted

  weights:
    sonnet: 10  # PRIMARY TIER - Prioritize Sonnet for quality
    haiku: 3    # SPECIALIZED - Only for routing/aggregation/extreme volume
    opus: 1     # STRATEGIC - Complex orchestration only

  health_check:
    enabled: true
    interval_seconds: 30
    failure_threshold: 3
    recovery_threshold: 2

# Backpressure handling
backpressure:
  enabled: true

  thresholds:
    warning: 0.7  # 70% capacity
    critical: 0.9  # 90% capacity

  actions:
    warning:
      - reduce_batch_size
      - increase_delays

    critical:
      - reject_new_requests
      - prioritize_existing
      - alert_operators

# Circuit Breaker (CRITICAL: Prevents queue overflow)
circuit_breaker:
  enabled: true

  # Failure thresholds
  thresholds:
    error_rate_percent: 50  # Open circuit if >50% errors
    consecutive_failures: 5  # Or 5 consecutive failures
    timeout_rate_percent: 30  # Or >30% timeouts
    measurement_window_seconds: 60

  # State transitions
  states:
    closed:  # Normal operation
      allow_requests: true
      track_failures: true

    open:  # Circuit tripped - reject new requests
      allow_requests: false
      duration_seconds: 30  # Stay open for 30s
      fail_fast: true  # Immediately reject without trying

    half_open:  # Testing if service recovered
      allow_requests: true
      max_test_requests: 5
      success_threshold: 3  # Need 3/5 to close circuit

  # Recovery
  recovery:
    backoff_strategy: exponential
    initial_open_duration_seconds: 30
    max_open_duration_seconds: 300
    success_threshold_to_close: 3

  # Per-tier circuit breakers
  per_tier:
    haiku:
      enabled: true
      error_rate_threshold: 60  # More tolerant
    sonnet:
      enabled: true
      error_rate_threshold: 50
    opus:
      enabled: true
      error_rate_threshold: 40  # Less tolerant for expensive tier

# Adaptive throttling
adaptive_throttling:
  enabled: true

  thresholds:
    warning: 0.7   # 70% capacity - start gentle throttling
    critical: 0.85 # 85% capacity - aggressive throttling
    emergency: 0.95 # 95% capacity - emergency mode

  actions:
    warning:
      - reduce_batch_size_by_percent: 20
      - increase_inter_request_delay_ms: 100

    critical:
      - reduce_batch_size_by_percent: 40
      - increase_inter_request_delay_ms: 300
      - disable_burst_mode: true
      - prioritize_high_value_tasks: true

    emergency:
      - reduce_batch_size_by_percent: 60
      - increase_inter_request_delay_ms: 1000
      - reject_low_priority_requests: true
      - enable_exponential_backoff: true
      - alert_operators: true

  measurement:
    window_seconds: 60
    check_interval_seconds: 5
    metrics:
      - active_concurrent_agents
      - queue_depth
      - error_rate
      - average_response_time

  recovery:
    cooldown_seconds: 120
    gradual_recovery: true
    recovery_step_percent: 10
    recovery_interval_seconds: 30

# Rate limiting
rate_limiting:
  enabled: true

  limits:
    requests_per_second: 50
    requests_per_minute: 2000
    requests_per_hour: 50000

  per_user:
    requests_per_minute: 100
    concurrent_tasks: 10

  burst:
    enabled: true
    max_burst: 100
    refill_rate: 10  # per second

# Retry configuration
retry:
  default:
    max_attempts: 3
    initial_delay_ms: 1000
    max_delay_ms: 30000
    backoff_multiplier: 2.0

  # CRITICAL: Total retry budget across all tiers (prevents infinite loops)
  global:
    max_total_attempts_across_tiers: 7  # Max retries including escalations
    track_escalation_chain: true

  # ADD JITTER to prevent thundering herd
  jitter:
    enabled: true
    type: full_jitter  # Randomize delay between 0 and calculated backoff
    max_jitter_ms: 5000

  by_tier:
    haiku:
      max_attempts: 2
      initial_delay_ms: 500

    sonnet:
      max_attempts: 3
      initial_delay_ms: 1000

    opus:
      max_attempts: 2
      initial_delay_ms: 2000

  retryable_errors:
    - rate_limit_exceeded
    - timeout
    - temporary_failure
    - overloaded

  non_retryable_errors:
    - invalid_request
    - authentication_failed
    - quota_exceeded

# Timeout configuration
timeouts:
  default:
    request_timeout_ms: 60000
    connection_timeout_ms: 5000

  by_tier:
    haiku:
      request_timeout_ms: 30000

    sonnet:
      request_timeout_ms: 120000

    opus:
      request_timeout_ms: 300000

  by_task_type:
    validation:
      timeout_ms: 30000

    generation:
      timeout_ms: 180000

    analysis:
      timeout_ms: 120000

    orchestration:
      timeout_ms: 600000

# Resource pools
resource_pools:
  haiku_pool:
    min_size: 10
    max_size: 100
    burst_max_size: 150
    idle_timeout_seconds: 60

  sonnet_pool:
    min_size: 5
    max_size: 45  # INCREASED from 25
    burst_max_size: 50  # INCREASED from 30
    idle_timeout_seconds: 120

  opus_pool:
    min_size: 1
    max_size: 5
    idle_timeout_seconds: 300

# Monitoring
monitoring:
  metrics:
    - active_agents_by_tier
    - queue_depth
    - request_latency_p50
    - request_latency_p95
    - request_latency_p99
    - error_rate
    - throughput_per_second
    - cost_per_minute

  alerts:
    high_latency:
      threshold_ms: 10000
      channels: [log, slack]

    high_error_rate:
      threshold_percent: 5
      channels: [log, slack]

    queue_backup:
      threshold_depth: 500
      channels: [log, slack]
