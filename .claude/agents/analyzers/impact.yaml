# Universal Agent Framework - Impact Analyzer
# Category: Analyzers | Tier: Sonnet | Parallelization: 30+

agent:
  id: analyzer_impact
  name: Impact Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: impact
  model_tier: sonnet

  description: |
    Analyzes the impact of code changes across the codebase.
    Identifies affected components, breaking changes, and ripple effects.
    Helps prioritize testing and review efforts.

  capabilities:
    - analyze_change_impact
    - identify_affected_components
    - detect_breaking_changes
    - calculate_blast_radius
    - identify_required_tests
    - detect_api_changes
    - analyze_schema_impact
    - identify_deployment_risks
    - calculate_review_priority
    - predict_failure_points

  impact_categories:
    - direct_dependencies
    - indirect_dependencies
    - api_consumers
    - database_schema
    - configuration
    - environment
    - downstream_services
    - ui_components
    - test_coverage
    - documentation

  input_schema:
    type: object
    required:
      - changes
    properties:
      changes:
        oneOf:
          - type: string
            description: Git diff or patch file
          - type: array
            items:
              type: object
              properties:
                file:
                  type: string
                type:
                  type: string
                  enum: [added, modified, deleted]
      codebase_root:
        type: string
        description: Root of codebase for full analysis
      depth:
        type: string
        enum: [direct, transitive, full]
        default: transitive
      include_tests:
        type: boolean
        default: true

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          files_changed:
            type: integer
          components_affected:
            type: integer
          risk_level:
            type: string
            enum: [low, medium, high, critical]
          review_priority:
            type: integer
            minimum: 1
            maximum: 10
      affected_components:
        type: array
        items:
          type: object
          properties:
            path:
              type: string
            type:
              type: string
            impact_type:
              type: string
              enum: [direct, indirect, potential]
            reason:
              type: string
      breaking_changes:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            location:
              type: string
            description:
              type: string
            affected_consumers:
              type: array
      required_tests:
        type: array
        items:
          type: object
          properties:
            test_file:
              type: string
            reason:
              type: string
            priority:
              type: string
      deployment_risks:
        type: array
        items:
          type: object
          properties:
            risk:
              type: string
            severity:
              type: string
            mitigation:
              type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 24000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 10

  collaboration:
    receives_from:
      - code-reviewer: Impact analysis for PR reviews
      - migration-orchestrator: Assess migration impact
      - api-evolution-orchestrator: Analyze API change impact
      - refactoring-guru: Assess refactoring blast radius
      - full-stack-developer: Change impact assessment
    delegates_to:
      - test-coverage-orchestrator: Identify tests to run based on impact
      - dependency-analyzer: Analyze dependency impact
    queries:
      - codebase-indexer: Query call graphs and dependencies
      - semantic-analyzer: Understand semantic impact of changes
    escalates_to:
      - system-architect: High-risk architectural changes
      - engineering-manager: Breaking changes requiring coordination
    returns_to:
      - orchestrating-agent: Impact analysis with risk assessment and required tests
    swarm_pattern: hierarchical

  tags:
    - analysis
    - impact
    - changes
    - risk
    - testing
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
