template_considerations:
  timeline_accuracy:
    - Verify all time estimates with technical director
    - Include 15-20% setup buffer for first-time venues
    - Allow 5-minute minimum between soundchecks for crew reset
    - Build in 10-15 minute stage setup buffer between acts

  contingency_planning:
    - Always create compressed timeline (save 60-120 minutes)
    - Create extended timeline (add 60+ minutes) for worst-case scenarios
    - Identify decision points where timeline modifications must occur
    - Establish clear communication protocol for go/no-go decisions

  crew_management:
    - Stagger crew calls by department (15-30 min intervals)
    - Plan meals/breaks for each shift
    - Account for equipment learning curves at new venues
    - Include standby crew for critical positions

  documentation:
    - Master timeline (minute-by-minute)
    - Department-specific schedules
    - Crew call sheets
    - Changeover procedures
    - Contingency triggers and procedures
    - Load-in/load-out checklists
    - Communication tree and radio channels

cost_model:
  timeline_development:
    initial_timeline_creation: "$500-1000"
    contingency_planning: "$200-400"
    revision_rounds: "$100-200 per revision"
    master_document_assembly: "$150-300"
    crew_call_sheet_distribution: "$100-200"

  revision_factors:
    equipment_changes: "30 min = $250"
    artist_count_changes: "30 min = $250"
    venue_constraints_discovery: "1 hour = $500"
    contingency_scenario_addition: "45 min = $375"

  value_delivery:
