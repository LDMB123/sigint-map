# Universal Agent Framework - Swarm Orchestrator
# Category: Orchestrators | Tier: Opus | Parallelization: 1-2

agent:
  id: orchestrator_swarm
  name: Swarm Orchestrator
  version: 1.0.0

  functional_category: orchestrator
  sub_category: swarm
  model_tier: opus

  description: |
    Coordinates massive parallel swarms of agents (50-500+).
    Manages resource allocation, load balancing, and failure recovery.
    Optimizes for throughput while maintaining quality.

  capabilities:
    - spawn_agent_swarms
    - manage_resource_pools
    - balance_load
    - handle_backpressure
    - recover_from_failures
    - aggregate_swarm_results
    - optimize_parallelism
    - monitor_swarm_health
    - scale_dynamically
    - coordinate_checkpoints

  swarm_patterns:
    fan_out_validation:
      description: "1 coordinator → N validators"
      typical_size: 50-200
      use_case: "Validate many files in parallel"

    hierarchical_delegation:
      description: "Opus → Sonnet → Haiku cascade"
      typical_size: 10-100
      use_case: "Large-scale transformations"

    consensus_building:
      description: "Multiple proposals → voting → selection"
      typical_size: 5-15
      use_case: "Architecture decisions"

    streaming_pipeline:
      description: "Stage 1 → Stage 2 → Stage N"
      typical_size: 20-50
      use_case: "Data processing"

    self_healing:
      description: "Monitor → Diagnose → Fix → Verify"
      typical_size: 10-30
      use_case: "Automatic error recovery"

  input_schema:
    type: object
    required:
      - swarm_type
      - tasks
    properties:
      swarm_type:
        type: string
        enum:
          - fan_out_validation
          - hierarchical_delegation
          - consensus_building
          - streaming_pipeline
          - self_healing
          - custom
      tasks:
        type: array
        items:
          type: object
        description: Tasks to distribute across swarm
      config:
        type: object
        properties:
          max_concurrent_agents:
            type: integer
            default: 100
          batch_size:
            type: integer
            default: 20
          timeout_per_task_ms:
            type: integer
            default: 30000
          retry_policy:
            type: object
            properties:
              max_retries:
                type: integer
                default: 2
              backoff_ms:
                type: integer
                default: 1000
          checkpoint_frequency:
            type: integer
            description: Save state every N tasks
          quality_threshold:
            type: number
            default: 0.95

  output_schema:
    type: object
    properties:
      success:
        type: boolean
      results:
        type: array
        description: Results from all swarm agents
      swarm_metrics:
        type: object
        properties:
          total_tasks:
            type: integer
          completed_tasks:
            type: integer
          failed_tasks:
            type: integer
          retried_tasks:
            type: integer
          agents_spawned:
            type: integer
          peak_concurrency:
            type: integer
          total_duration_ms:
            type: integer
          throughput_per_second:
            type: number
          cost_total:
            type: number
          cost_per_task:
            type: number
      failures:
        type: array
        items:
          type: object
          properties:
            task_id:
              type: string
            error:
              type: string
            attempts:
              type: integer
      checkpoints:
        type: array
        items:
          type: object
          properties:
            checkpoint_id:
              type: string
            tasks_completed:
              type: integer
            timestamp:
              type: string

  performance:
    avg_latency_ms: 5000  # Coordination overhead
    max_tokens: 50000
    timeout_seconds: 3600  # 1 hour max for large swarms

  parallelization:
    max_concurrent: 2
    can_spawn_sub_swarms: true
    max_agent_pool_size: 500

  collaboration:
    receives_from:
      - workflow-orchestrator: Massive parallelization requests for large task sets
      - migration-orchestrator: Swarm-based migration of 100+ files
      - test-coverage-orchestrator: Parallel test validation across entire codebase
      - performance-optimization-orchestrator: Parallel performance profiling
    delegates_to:
      - syntax-validator: Fan-out validation of file syntax
      - style-validator: Fan-out style checking
      - test-validator: Fan-out test quality validation
      - format-transformer: Fan-out formatting operations
      - security-scanner: Parallel security scanning
    escalates_to:
      - workflow-orchestrator: Swarm failures or resource exhaustion
      - engineering-manager: Budget overruns or systematic failures
    returns_to:
      - requesting-orchestrator: Aggregated swarm results with metrics and failure reports
    swarm_pattern: coordinator
    coordinates_with:
      - metrics-reporter: Track swarm performance metrics

  tags:
    - orchestration
    - swarm
    - parallel
    - scalable
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: opus
  per_execution_estimate: 0.15
  typical_range: [0.10, 0.30]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
