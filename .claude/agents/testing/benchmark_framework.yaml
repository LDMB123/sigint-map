## Benchmark Suite Structure

```yaml
benchmark_suites:
  # Code-level benchmarks
  micro_benchmarks:
    - name: string_concatenation
      iterations: 10000
      code: |
        let result = '';
        for (let i = 0; i < 1000; i++) {
          result += 'test';
        }

    - name: array_iteration
      iterations: 10000
      code: |
        const arr = Array.from({length: 1000}, (_, i) => i);
        arr.forEach(x => x * 2);

  # Database benchmarks
  database_benchmarks:
    - name: simple_query
      iterations: 100
      setup: |
        await db.seed();
      code: |
        await db.query('SELECT * FROM users WHERE id = ?', [1]);

    - name: complex_join
      iterations: 50
      code: |
        await db.query(`
          SELECT u.*, p.* FROM users u
          JOIN posts p ON u.id = p.user_id
          WHERE u.active = true
        `);

  # API benchmarks
  api_benchmarks:
    - name: get_endpoint
      iterations: 100
      code: |
        await fetch('/api/data');

    - name: post_endpoint
      iterations: 50
      code: |
        await fetch('/api/data', {
          method: 'POST',
          body: JSON.stringify({data: 'test'})
        });

  # React component benchmarks
  component_benchmarks:
    - name: component_render
      iterations: 100
      code: |
        render(<MyComponent data={testData} />);

    - name: component_update
      iterations: 100
      setup: |
        const {rerender} = render(<MyComponent data={data1} />);
      code: |
        rerender(<MyComponent data={data2} />);
```

## Regression Detection Algorithm

```python
def detect_regressions(baseline, current, threshold_percent=10):
    regressions = []
    improvements = []

    for benchmark in baseline.benchmarks:
        baseline_mean = benchmark.mean_ms
        current_benchmark = find_benchmark(current, benchmark.name)
        current_mean = current_benchmark.mean_ms

        # Calculate percent change
        percent_change = ((current_mean - baseline_mean) / baseline_mean) * 100

        # Statistical significance test (t-test)
        p_value = t_test(baseline.samples, current_benchmark.samples)
        is_significant = p_value < 0.05

        # Regression if significant slowdown above threshold
        if percent_change > threshold_percent and is_significant:
            regressions.append({
                'benchmark_name': benchmark.name,
                'baseline_mean_ms': baseline_mean,
                'current_mean_ms': current_mean,
                'percent_change': percent_change,
                'is_significant': is_significant,
                'p_value': p_value
            })

        # Improvement if significant speedup above threshold
        elif percent_change < -threshold_percent and is_significant:
            improvements.append({
                'benchmark_name': benchmark.name,
                'baseline_mean_ms': baseline_mean,
                'current_mean_ms': current_mean,
                'percent_change': percent_change,
                'is_significant': is_significant,
                'p_value': p_value
            })

    return {
        'regressions': regressions,
        'improvements': improvements,
        'regressions_detected': len(regressions),
        'improvements_detected': len(improvements)
    }
```

## CI/CD Integration

### GitHub Actions Workflow

```yaml
name: Performance Benchmarks

on:
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          npm install
          npm run build

      - name: Run Benchmarks
        run: |
          claude-code invoke benchmark-framework \
            --action run_benchmarks \
            --suite micro_benchmarks \
            --iterations 1000

      - name: Download Baseline
        run: |
          # Download baseline from main branch
          gh api repos/${{ github.repository }}/contents/benchmarks/baseline.json \
            --jq .content | base64 -d > baseline.json

      - name: Compare Results
        id: compare
        run: |
          claude-code invoke benchmark-framework \
            --action compare_results \
            --baseline baseline.json \
            --current results.json \
            --regression_threshold 10

      - name: Comment on PR
        if: steps.compare.outputs.regressions_detected > 0
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Performance regressions detected! See benchmark report.'
            })

      - name: Fail on Regression
        if: steps.compare.outputs.regressions_detected > 0
        run: exit 1
```

