agent:
  id: dmb_bustout_predictor
  name: DMB Bustout Prediction Agent
  version: 1.0.0
  functional_category: dmb
  sub_category: bustout_predictor
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    ML-powered predictor for Dave Matthews Band song bustouts (songs not played in 50+ shows).
    Uses historical analysis, touring patterns, venue correlations, and special occasion detection
    to forecast which songs are due for a return. Analyzes 2,800+ documented shows to identify
    predictive patterns and generate probabilistic bustout forecasts with supporting evidence.

capabilities:
  - bustout_prediction: Predict likelihood of song bustouts using ML features
  - pattern_analysis: Historical bust patterns (anniversaries, venues, tours)
  - urgency_scoring: Calculate "days since last played" with decay curves
  - touring_patterns: Identify song preferences on specific tour legs
  - seasonal_recognition: Month and season-based pattern detection
  - venue_correlation: Correlate songs with venue history and geography
  - special_occasion: Predict bustouts around band milestones and holidays

collaboration:
  receives_from:
    - dmb-expert: Song catalog, historical context, band facts
    - setlist-pattern-analyzer: Recent setlist trends, rotation patterns
    - user: Specific tour dates, venues, special events for prediction

  delegates_to:
    - dmb-show-analyzer: Historical show data retrieval (2,800+ shows)
    - data-scientist: ML model training, validation, feature engineering

  provides_to:
    - dmb-expert: Bustout predictions for setlist commentary
    - user: Predictions with confidence scores and reasoning

data_sources:
  - historical_shows: 2,800+ documented DMB shows (1991-present)
  - song_statistics: Song play frequency, last played dates, venue history
  - tour_information: Tour legs, dates, venues, special shows
  - setlist_data: Complete setlist history with song details
  - band_milestones: Anniversaries, member birthdays, special occasions

input_schema:
  type: object
  properties:
    tour_date:
      type: string
      format: ISO 8601 date
      description: Target show date for prediction
      example: "2026-06-15"

    venue:
      type: object
      properties:
        name:
          type: string
          example: "Red Rocks Amphitheatre"
        city:
          type: string
          example: "Denver, CO"
        capacity:
          type: integer
          example: 9525
        history_with_dmb:
          type: array
          items:
            type: string
            format: ISO 8601 date
          description: Previous DMB shows at this venue
      required:
        - name
        - city

    recent_setlists:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: ISO 8601 date
          songs:
            type: array
            items: string
      minItems: 5
      maxItems: 20
      description: Last 5-20 setlists for pattern analysis

    special_occasions:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
            enum:
              - band_anniversary
              - member_birthday
              - venue_anniversary
              - tour_opener
              - tour_closer
              - multi_night_run
          description:
            type: string
            date:
              type: string
              format: ISO 8601 date
      description: Special events that might trigger bustouts

    tour_context:
      type: object
      properties:
        tour_name:
          type: string
          example: "Summer 2026 Tour"
        tour_leg:
          type: string
          enum: [opener, early, mid, late, closer]
          description: Position of this show in broader tour schedule
        shows_into_tour:
          type: integer
          description: Number of shows played so far in this tour
        cities_visited:
          type: array
          items: string
          description: Cities visited in current tour leg
      description: Context about the current touring schedule

output_schema:
  type: object
  properties:
    prediction_timestamp:
      type: string
      format: ISO 8601 datetime
      description: When prediction was generated

    target_show:
      type: object
      properties:
        date:
          type: string
          format: ISO 8601 date
        venue:
          type: string
        tour_context:
          type: string

    bustout_predictions:
      type: array
      items:
        type: object
        properties:
          song:
            type: string
            example: "Pig"
          probability:
            type: number
            minimum: 0
            maximum: 1
            description: Predicted probability of song being in setlist

          confidence_interval:
            type: object
            properties:
              lower:
                type: number
              upper:
                type: number
            description: 95% confidence interval for probability

          days_since_last_played:
            type: integer
            example: 347

          urgency_score:
            type: number
            minimum: 0
            maximum: 100
            description: |
              Higher score = more likely to bustout soon. Combines days since
              played with exponential decay function and venue history.

          feature_contributions:
            type: object
            properties:
              days_since_played:
                type: number
                description: Feature importance weight (-100 to +100)
              venue_history:
                type: number
              season_pattern:
                type: number
              tour_leg_pattern:
                type: number
              anniversary_effect:
                type: number
              recent_setlist_pattern:
                type: number
              set_position_likelihood:
                type: object
                properties:
                  opener:
                    type: number
                  mid_set:
                    type: number
                  encore:
                    type: number
            description: Individual feature contributions to prediction

          historical_evidence:
            type: object
            properties:
              last_played:
                type: string
                format: ISO 8601 date
                example: "2025-06-14"

              times_played_at_venue:
                type: integer
                example: 3

              last_played_at_venue:
                type: string
                format: ISO 8601 date

              times_played_same_month:
                type: integer
                description: Times played in this calendar month across history

              tour_leg_appearances:
                type: object
                properties:
                  opener_leg:
                    type: integer
                  early_leg:
                    type: integer
                  mid_leg:
                    type: integer
                  late_leg:
                    type: integer
                  closer_leg:
                    type: integer

              venue_city_correlation:
                type: object
                properties:
                  city:
                    type: string
                  times_played_in_city:
                    type: integer
                  avg_plays_per_visit:
                    type: number

              gap_statistics:
                type: object
                properties:
                  largest_gap_days:
                    type: integer
                  average_gap_days:
                    type: integer
                  gap_count:
                    type: integer

          supporting_narrative:
            type: string
            description: |
              Human-readable explanation of prediction combining multiple
              factors. Example: "Pig hasn't been played in 347 days and has
              historically been more common at summer venues in June. This is
              the band's 5th show in Colorado where Pig was played 3 times
              previously. Predicted as mid-set appearance."

          alternative_names:
            type: array
            items: string
            description: Known alternate names/mashups for the song
            example: ["Pig (The Squeal)", "Pig Jam"]

          rank:
            type: integer
            description: Ranking among all predicted bustouts (1 = most likely)
      minItems: 10
      maxItems: 100
      description: Top bustout predictions ranked by probability

    ensemble_metrics:
      type: object
      properties:
        model_agreement:
          type: number
          description: |
            Consistency across ensemble models (0-100). Higher = models agree
            on predictions. Indicates confidence in results.

        prediction_uncertainty:
          type: number
          description: |
            Spread of predictions across ensemble (0-100). Lower = more
            confident predictions.

        data_recency:
          type: object
          properties:
            latest_show_in_data:
              type: string
              format: ISO 8601 date
            days_since_update:
              type: integer

        feature_quality_score:
          type: number
          minimum: 0
          maximum: 100
          description: |
            Score assessing quality of input features. Lower scores indicate
            missing context or edge cases that reduce prediction reliability.

    top_5_bustouts:
      type: array
      items:
        type: object
        properties:
          rank:
            type: integer
          song:
            type: string
          probability:
            type: number
          days_since_played:
            type: integer
          key_reason:
            type: string
            example: "Long gap (347 days) + summer venue history"
      maxItems: 5
      description: Summarized top 5 predictions for quick reference

    notable_patterns:
      type: object
      properties:
        tour_leg_insights:
          type: string
          description: Patterns specific to this tour leg position

        venue_specific_patterns:
          type: string
          description: Songs commonly played at this venue

        seasonal_trends:
          type: string
          description: June-specific trends in band's setlists

        gap_trends:
          type: string
          description: Overall gap statistics and their implications

        recent_rotation_changes:
          type: string
          description: Changes in song rotation from recent tours

    prediction_methodology:
      type: object
      properties:
        model_type:
          type: string
          enum:
            - gradient_boosting_ensemble
            - neural_network_hybrid
            - bayesian_probabilistic

        features_used:
          type: integer
          description: Number of engineered features in prediction

        training_data_shows:
          type: integer
          example: 2400

        model_version:
          type: string
          example: "v2.1.0"

        last_retrained:
          type: string
          format: ISO 8601 date

ml_architecture:
  overview: |
    Multi-model ensemble combining gradient boosting (XGBoost), neural networks,
    and Bayesian probabilistic models to predict DMB bustouts. Each model
    captures different aspects of the prediction problem:

    - XGBoost: Non-linear relationships between features
    - Neural Network: Complex feature interactions and deep patterns
    - Bayesian: Principled uncertainty quantification

    Ensemble combines predictions via weighted voting, with weights learned
    from validation performance.

  training_data:
    description: |
      Historical dataset containing 2,400+ complete show records from 1991-2025

      Features per show:
      - Show metadata (date, venue, city, capacity, geography)
      - Setlist details (songs played, set positions, gaps)
      - Preceding 50 shows (recently played songs, rotation patterns)
      - Venue history (previous shows, song correlations)
      - Band context (tour leg, tour age, special occasions)
      - Season/month indicators
      - Days since each song was last played
      - Geographic features (region, distance from previous venue)

      Target: Whether each song in catalog was played at show

    sampling_strategy: |
      - Stratified by tour year to capture era-specific patterns
      - Balanced representation across venue types
      - Oversampled rare bustouts (appeared in <5% of shows)
      - Time-aware split: training on older shows, validation/test on recent

    size: "2,400 shows × 500+ features"

  feature_engineering:
    days_since_last_played:
      description: |
        Days elapsed since song's last performance. Critical feature capturing
        "due for rotation" dynamics.

      engineering: |
        - Raw days since last played
        - Log transformation (captures diminishing urgency)
        - Exponential decay curve (f(d) = e^(-d/365) for annual decay)
        - Percentile rank (vs all other songs)
        - Indicator for 50+ day gap (classic bustout threshold)

      rationale: |
        DMB rotates songs, and tracks absence duration. Exponential decay
        prevents extreme values for very long gaps while preserving the
        fundamental "songs get due" principle.

    venue_features:
      description: Venue-specific song correlations and history

      engineering: |
        - Times song played at this specific venue
        - Days since song played at this venue
        - Song's frequency at venue vs overall frequency (correlation ratio)
        - Venue capacity category (affecting setlist length)
        - Geographic region features
        - Distance from previous venue (touring pattern)
        - Venue "specialness" indicator (famous/unique venues)

      rationale: |
        Certain songs become associated with venues (e.g., "Rapunzel" at
        outdoor amphitheaters). Also, touring patterns mean geographic
        proximity affects setlist.

    tour_leg_features:
      description: Position in tour structure and tour-specific patterns

      engineering: |
        - Tour position: opener/early/mid/late/closer
        - Shows into current tour
        - Tour age (days since tour started)
        - Average setlist length trend on this tour
        - Songs played in opening shows of this tour
        - Tour-specific rotation patterns (some tours favor certain songs)
        - Multi-night run indicators (2+ shows same venue)

      rationale: |
        Band's setlist strategy changes by tour phase. Opening shows often
        feature setlist resets. Multi-night runs enable rare song pairs.

    season_and_time_features:
      description: Month, season, and time-based patterns

      engineering: |
        - Month indicator (1-12)
        - Season (spring/summer/fall/winter)
        - Day of week
        - Times song played in this calendar month historically
        - Average frequency by month for this song
        - Seasonal deviation (does this song prefer certain seasons)
        - Anniversary effect: is this the Nth anniversary of song release?

      rationale: |
        Setlists have seasonal variation. Summer festivals favor certain songs.
        Holiday shows have different patterns. Anniversaries drive bustouts.

    recent_pattern_features:
      description: Recent setlist trends and rotation dynamics

      engineering: |
        - Songs played in last N shows (last 5, 10, 20)
        - Recent frequency trend (increasing/decreasing/stable)
        - Gap trajectory (is gap growing or shrinking?)
        - Recent song introduction rate (new debut indicators)
        - Average gap size in last tour vs historical
        - Songs that co-appear with target song frequently

      rationale: |
        Recent trends are predictive. If a song is being teased or songs in
        its "family" are appearing, it might be next.

    set_position_features:
      description: Which position in setlist (opener, mid-set, encore)

      engineering: |
        - Song's typical position distribution (% as opener, % as mid-set)
        - Position preference by venue type
        - Position preference by tour leg
        - Position preference by season
        - Gap distribution by position (openers vs encores have different gaps)

      rationale: |
        Some songs are openers (fast, energetic), others are mid-set (building),
        some are encores (emotional). Position prediction helps with setlist
        structure modeling.

    special_occasion_features:
      description: Band milestones and special event indicators

      engineering: |
        - Is today a band member's birthday?
        - Days until/since band founding anniversary
        - Days until/since song's release anniversary
        - Venue anniversary (years since first DMB show there)
        - Tour milestone (50th show, etc.)
        - Special event indicator (festival, charity show, etc.)
        - Anniversary bustout history (songs that appeared on past anniversaries)

      rationale: |
        Band strategically plays songs at meaningful milestones. Anniversary
        bustouts are highly predictable.

  model_components:
    xgboost_component:
      architecture: |
        - Gradient Boosting ensemble of decision trees
        - 200 trees with max depth 8
        - Learning rate 0.1, subsample 0.8
        - L1/L2 regularization to prevent overfitting

      strengths: |
        - Captures non-linear relationships between features
        - Feature importance rankings identify key drivers
        - Fast inference for real-time predictions
        - Handles mixed feature types well

      role_in_ensemble: |
        Primary workhorse model. Provides baseline probability estimates
        and feature importance guidance.

      training_parameters:
        n_estimators: 200
        max_depth: 8
        learning_rate: 0.1
        subsample: 0.8
        colsample_bytree: 0.9
        early_stopping_rounds: 25
        objective: "binary:logistic"
        eval_metric: "logloss"

    neural_network_component:
      architecture: |
        - 4-layer feed-forward network
        - Input: 500+ features
        - Hidden layers: 256 → 128 → 64 → 32 neurons
        - Activation: ReLU with batch normalization
        - Output: Single sigmoid neuron (probability)
        - Dropout (0.2) for regularization

      strengths: |
        - Learns complex feature interactions automatically
        - Can capture non-obvious patterns in high-dimensional space
        - Well-suited for ensemble averaging (reduces variance)

      role_in_ensemble: |
        Captures complex interactions that tree-based models miss.
        Particularly useful for detecting rare bustout patterns.

      training_parameters:
        optimizer: "adam"
        learning_rate: 0.001
        batch_size: 32
        epochs: 100
        validation_split: 0.2
        early_stopping: true
        loss: "binary_crossentropy"

    bayesian_component:
      architecture: |
        - Bayesian Logistic Regression using variational inference
        - Prior: Normal(0, 1) on coefficients
        - Variational approximation for posterior
        - Uncertainty quantification via posterior samples

      strengths: |
        - Principled uncertainty quantification
        - Confidence intervals from posterior distribution
        - Interpretable coefficient effects
        - Guards against overconfident predictions

      role_in_ensemble: |
        Provides uncertainty estimates and confidence bounds. Identifies
        when predictions are unreliable (high uncertainty).

      training_parameters:
        prior_stddev: 1.0
        optimization_steps: 5000
        samples_for_uncertainty: 1000

    ensemble_combination:
      method: |
        Weighted average of three models' probability predictions:
        P_ensemble = w_xgb * P_xgb + w_nn * P_nn + w_bayes * P_bayes

        Weights learned from validation set performance using logistic regression
        to maximize ensemble AUC.

      confidence_calculation: |
        - Point estimate: Ensemble probability
        - Lower CI: 2.5th percentile of bayesian posterior samples
        - Upper CI: 97.5th percentile of bayesian posterior samples
        - Model agreement: Correlation of predictions across 3 models

      diversity_principle: |
        Each model approaches problem differently:
        - XGBoost: Feature-based, explicit relationships
        - Neural Net: Pattern-based, implicit feature learning
        - Bayesian: Probability-based, uncertainty-focused

        Combining different perspectives reduces systematic bias.

  validation_strategy:
    time_based_split:
      description: |
        Training and test sets split by time to avoid data leakage and
        simulate real prediction scenario (predict future based on past)

      split:
        - Training: Shows 1991-2023 (2,200 shows)
        - Validation: Shows 2024 Q1-Q2 (100 shows)
        - Test: Shows 2024 Q3-Q4 (100 shows)

    cross_validation:
      method: |
        5-fold time series cross-validation:
        - Fold 1: Train on 1991-2001, validate on 2002-2004
        - Fold 2: Train on 1991-2004, validate on 2005-2007
        - Fold 3: Train on 1991-2007, validate on 2008-2010
        - Fold 4: Train on 1991-2010, validate on 2011-2013
        - Fold 5: Train on 1991-2013, validate on 2014-2016

        Report mean and std of metrics across folds.

    metrics:
      primary:
        - AUC-ROC (discrimination ability: 0-1 scale)
        - Logloss (calibration: how well probabilities match true rates)

      secondary:
        - Precision@K (top K predictions are actually played)
        - Recall@K (captures most of the actually played songs)
        - F1 score (balance of precision and recall)
        - Top-5 Accuracy (was correct song in top 5 predictions?)

      interpretation:
        - AUC > 0.75: Model significantly better than random (50%)
        - AUC > 0.85: Good discrimination ability
        - Logloss < 0.4: Well-calibrated probabilities
        - Precision@10 > 0.3: 30% of top 10 predictions correct

    class_imbalance_handling:
      description: |
        Each show has ~20 songs out of 500 catalog (4% positive class).
        This extreme imbalance requires careful handling.

      approach: |
        - SMOTE oversampling of positive class in training
        - Class weight adjustment in tree-based models
        - Stratified sampling maintains positive rate in splits
        - Evaluation metrics chosen for imbalanced data (AUC, not accuracy)

      threshold_optimization:
        - Default threshold: 0.5
        - Tuned threshold: Optimize for F1 on validation set
        - Conservative approach: Lower threshold (higher recall) for top predictions

prediction_algorithm:
  input_processing:
    step1: |
      Parse and validate input JSON against input_schema. Extract:
      - Target show date, venue, geography
      - Recent setlists (last 5-20 shows)
      - Tour context (leg, position in tour)
      - Special occasions (anniversaries, holidays)

  feature_calculation:
    step2_historical_data_retrieval: |
      Query historical data source (dmb-show-analyzer) for:
      - All prior shows at this venue
      - All plays of each song in catalog
      - Gap (days since) for each song
      - Setlist frequencies by venue, by month, by tour
      - Geographic data

    step3_feature_engineering: |
      Compute 500+ engineered features for input show:

      For each song in 500-song catalog:
        - Calculate days since last played
        - Lookup times played at target venue
        - Calculate tour leg statistics
        - Compute month/season effects
        - Extract recent pattern features
        - Determine set position likelihood
        - Encode special occasion features

      Result: Feature vector [song_1_features, song_2_features, ..., song_500_features]

  model_inference:
    step4_model_predictions: |
      Pass feature vectors through trained models:

      XGBoost:
        - Forward pass through 200 decision trees
        - Output: P_xgb for each song (probability)

      Neural Network:
        - Forward pass through 4-layer network
        - Input normalization using training set statistics
        - Output: P_nn for each song

      Bayesian Model:
        - Draw 1,000 samples from posterior distribution
        - Compute posterior mean and credible intervals
        - Output: P_bayes, lower_ci, upper_ci for each song

    step5_ensemble_combination: |
      Combine model predictions:

      P_ensemble = w_xgb * P_xgb + w_nn * P_nn + w_bayes * P_bayes

      Where weights [w_xgb, w_nn, w_bayes] learned on validation set
      (typical: [0.5, 0.3, 0.2] based on individual model performance)

      Confidence intervals from bayesian credible interval bounds

    step6_ranking_and_filtering: |
      - Rank all songs by P_ensemble (descending)
      - Filter to top 50 candidates
      - Remove songs in last 5 setlists (already recent)
      - Calculate urgency scores for each song

  output_generation:
    step7_explanation_generation: |
      For each top song, generate supporting_narrative:

      Template:
      "{Song} hasn't been played in {X} days {gap_context}. {venue_context}
       {pattern_context}. {position_prediction}. {ensemble_confidence}."

      Example:
      "Pig hasn't been played in 347 days and typically appears at summer
       venues. This is the band's 5th show in Colorado where Pig has been
       played 3 times. Expected as mid-set appearance (72% likelihood).
       Strong ensemble agreement (0.82)."

    step8_metric_calculation: |
      - Model agreement: Correlation between model predictions
      - Prediction uncertainty: Std dev of ensemble across models
      - Data recency: Latest show date in training data
      - Feature quality: Check for missing/edge-case features

    step9_output_formatting: |
      Construct JSON response with:
      - Top bustout_predictions (top 50 songs)
      - Top 5 summary for quick reference
      - ensemble_metrics for confidence assessment
      - notable_patterns derived from data
      - prediction_methodology metadata

  computation_complexity:
    time_complexity: |
      - Feature engineering: O(S × H) where S = 500 songs, H = 2000+ historical shows
      - XGBoost inference: O(S × T × D) where T = 200 trees, D = 8 depth
      - NN inference: O(S × n_neurons)
      - Bayesian sampling: O(S × 1000 samples)

      Total: ~2-5 seconds for full prediction on modern hardware

    space_complexity: |
      - Training data: ~50MB (2,400 shows × 500 features × 4 bytes float)
      - Model weights: ~20MB (XGBoost trees + NN parameters)
      - Feature cache: ~10MB (pre-computed venue/tour statistics)
      - Total: ~80MB in-memory footprint

examples:
  - title: "Summer 2026 Amphitheater - Red Rocks (June 15, 2026)"
    context: |
      Tour: Summer 2026 leg, show #24 of 50-show tour
      Recent context: Last 10 shows have favored jammy songs
      Special occasion: None
      Venue: Red Rocks Amphitheatre (Denver, CO) - 9,525 capacity outdoor
      Last DMB show at Red Rocks: June 2024
      Setlists: Last 10 shows played 16-20 songs per show

    top_5_predictions:
      - rank: 1
        song: "Pig"
        probability: 0.87
        confidence_interval:
          lower: 0.79
          upper: 0.94
        days_since_last_played: 347
        urgency_score: 89

        feature_contributions:
          days_since_played: 42
          venue_history: 18
          season_pattern: 15
          tour_leg_pattern: 8
          recent_setlist_pattern: 4
          set_position_likelihood:
            opener: 0.05
            mid_set: 0.72
            encore: 0.23

        historical_evidence:
          last_played: "2025-06-14"
          times_played_at_venue: 3
          last_played_at_venue: "2024-06-10"
          times_played_same_month: 47
          tour_leg_appearances:
            opener_leg: 8
            early_leg: 12
            mid_leg: 24
            late_leg: 31
            closer_leg: 15
          venue_city_correlation:
            city: "Denver, CO"
            times_played_in_city: 12
            avg_plays_per_visit: 2.4
          gap_statistics:
            largest_gap_days: 402
            average_gap_days: 156
            gap_count: 23

        supporting_narrative: |
          Pig is one of the longest absent songs from 2025-2026 setlists (347
          days since June 14, 2025). This is historically above the 156-day
          average gap, crossing the 300+ day threshold where bustouts become
          very likely. Red Rocks has hosted Pig 3 times, and historically Pig
          appears frequently in Colorado (12 times across Denver shows). June
          is a strong month for Pig (47 appearances historically). Expected as
          mid-set appearance (72% probability) rather than opener. Strong
          ensemble agreement (0.87 across all models). This is genuinely "due."

        alternative_names:
          - "Pig (The Squeal)"
          - "Pig Jam"

        rank: 1

      - rank: 2
        song: "Pantala Naga Pampa"
        probability: 0.84
        days_since_last_played: 289
        urgency_score: 78
        key_reason: "Long gap (289 days) + outdoor venue preference"

      - rank: 3
        song: "The Best of What's Around"
        probability: 0.81
        days_since_last_played: 201
        urgency_score: 71
        key_reason: "Tour opener pattern + mid-leg timing"

      - rank: 4
        song: "Rapunzel"
        probability: 0.78
        days_since_last_played: 156
        urgency_score: 68
        key_reason: "Outdoor amphitheater specialty (played 8/12 times at Red Rocks)"

      - rank: 5
        song: "Ants Marching"
        probability: 0.76
        days_since_last_played: 98
        urgency_score: 55
        key_reason: "Summer tour rotation + classic opener eligibility"

    ensemble_metrics:
      model_agreement: 0.87
      prediction_uncertainty: 0.08
      data_recency:
        latest_show_in_data: "2026-01-20"
        days_since_update: 26
      feature_quality_score: 94

    notable_patterns:
      tour_leg_insights: |
