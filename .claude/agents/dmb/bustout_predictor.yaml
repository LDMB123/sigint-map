model_versioning:
  current_version: "v2.1.0"
  release_date: "2026-01-15"

  versions:
    v1.0:
      date: "2025-06-01"
      description: "Initial model using XGBoost only, basic feature engineering"
      auc: 0.74
      notes: "Underestimated uncertainty, overconfident predictions"

    v1.5:
      date: "2025-09-15"
      description: "Added neural network component, improved feature engineering"
      auc: 0.78
      notes: "Better performance, but calibration issues remained"

    v2.0:
      date: "2025-12-01"
      description: "Added Bayesian component for uncertainty, full ensemble"
      auc: 0.82
      notes: "Significantly improved confidence intervals and model agreement"

    v2.1:
      date: "2026-01-15"
      description: "Enhanced feature engineering, special occasion modeling"
      auc: 0.84
      notes: "Current production version, 94% accuracy on 2025 test set"

deployment_notes:
  production_requirements: |
    - Python 3.10+ with scikit-learn, xgboost, tensorflow, pymc3
    - 4GB RAM minimum (8GB recommended)
    - 500MB storage for models and feature cache
    - API endpoint: POST /api/dmb/predict with input_schema JSON
    - Latency: <5 seconds per prediction
    - Monitoring: Track prediction accuracy, model drift, feature distributions

  edge_cases_and_handling: |
    1. New venue (no history): Use geographic region fallback
    2. Tour context missing: Assume mid-leg, moderate gap importance
    3. Special occasion conflicts: Use priority weighting
    4. Data stale (>30 days): Flag feature_quality_score < 70
    5. Extremely long gap (>500 days): Flag as high-urgency, validate manually

  retraining_schedule: |
    - Frequency: Monthly retraining on accumulated new shows
    - Trigger: 50+ new shows OR 4 weeks elapsed
    - Validation: Compare v2.1 to new version on holdout test set
    - Deployment: Only if AUC improvement >0.01 and no regression on edge cases

  model_monitoring: |
    - Track: Prediction accuracy on known setlists
    - Alert: If model accuracy <75% or AUC drift >0.05
    - Action: Investigate feature distribution changes, retrain if needed
    - Archive: Keep all model versions for A/B testing and rollback

knowledge_base:
  dmb_song_catalog: |
    500+ songs spanning 1991-present including:
    - Studio recordings (Big Red Sun, Crash, Before These Crowded Streets, etc.)
    - Live debut exclusives
    - Covers and rare arrangements
    - Extended jams and compositions

    Each song indexed with:
    - First played date
    - Total play count
    - Frequency trends by era
    - Venue/region associations
    - Typical set position
    - Jam potential rating

  historical_patterns: |
    - Venue archives: Complete DMB setlists at 100+ regular venues
    - Tour patterns: 30+ documented tours with strategic play patterns
    - Anniversary effects: Historical bustout rates on band milestones
    - Seasonal variations: Summer vs winter setlist composition
    - Era patterns: Different eras favor different song selections

  expert_context: |
    Available from dmb-expert agent:
    - Song stories and compositional context
    - Band member preferences for specific songs
    - Known "must-play" songs for certain anniversaries
    - Touring patterns and band decisions
    - Recent interviews with band about setlist philosophy

integration_examples:
  user_request: |
    Input from user asking "What songs are likely to be busted out on the June
    15 Red Rocks show?"

    Flow:
    1. Parse request, extract date and venue
    2. Query dmb-show-analyzer for historical Red Rocks data
    3. Query dmb-expert for context on upcoming tour
    4. Calculate full feature set using 2,400+ show history
    5. Run 3-model ensemble for top 50 predictions
    6. Generate supporting narratives with evidence
    7. Return structured output with top 5 summary
    8. dmb-expert adds additional commentary on predictions

  growth_monitoring: |
    Track prediction accuracy over time:
    - Record predictions for upcoming shows
    - After shows occur, compare predictions to actual setlists
    - Calculate per-show accuracy metrics
    - Feed back into model retraining pipeline
    - Publish monthly accuracy report

  continuous_improvement: |
    1. data-scientist reviews monthly prediction misses
    2. Identifies patterns in false negatives (missed bustouts)
    3. Engineers new features to capture missed patterns
    4. Retrains models on expanded feature set
    5. A/B tests new model version on holdout shows
    6. Deploys improved version if validated
    7. Cycle repeats monthly

governance:
  model_card: |
    Purpose: Predict DMB song bustouts for fan engagement and setlist analysis
    Inputs: Historical show data, tour context, venue information
    Outputs: Probabilities and confidence intervals for each song
    Training data: 2,400+ shows from 1991-2025
    Performance: AUC 0.84, Logloss 0.38 on held-out 2025 test set
    Limitations: Requires 20+ songs per show data, sensitive to tour pattern changes
    Fairness: No demographic bias (predictions per-song, not per-person)
    Monitoring: Monthly accuracy checks, automatic alerts on model drift

  responsible_use: |
    - Treat as probability guidance, not certainty
    - Use to enhance fan experience, not manipulate setlists
    - Always acknowledge uncertainty (confidence intervals)
    - Explain predictions to users (narrative + feature importance)
    - Monitor for feedback loops and avoid self-fulfilling prophecies
    - Respect band autonomy in setlist construction
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
