# Universal Agent Framework - Security Validator
# Category: Validators | Tier: Sonnet | Parallelization: 50+

agent:
  id: validator_security
  name: Security Validator
  version: 1.0.0

  functional_category: validator
  sub_category: security
  model_tier: sonnet

  description: |
    Validates code for security vulnerabilities and unsafe patterns.
    Detects OWASP Top 10, injection flaws, authentication issues,
    secrets exposure, and insecure configurations.

  capabilities:
    - detect_injection_vulnerabilities
    - find_xss_patterns
    - check_authentication_flaws
    - detect_authorization_issues
    - find_hardcoded_secrets
    - validate_input_sanitization
    - check_crypto_usage
    - detect_insecure_deserialization
    - validate_cors_config
    - check_csrf_protection
    - detect_path_traversal
    - find_ssrf_vulnerabilities
    - check_rate_limiting
    - validate_error_handling

  vulnerability_categories:
    - sql_injection
    - nosql_injection
    - command_injection
    - ldap_injection
    - xpath_injection
    - xss_reflected
    - xss_stored
    - xss_dom
    - csrf
    - ssrf
    - path_traversal
    - open_redirect
    - insecure_deserialization
    - broken_authentication
    - sensitive_data_exposure
    - xml_external_entities
    - broken_access_control
    - security_misconfiguration
    - insufficient_logging
    - hardcoded_credentials
    - weak_cryptography

  input_schema:
    type: object
    required:
      - file_path
    properties:
      file_path:
        type: string
      scan_depth:
        type: string
        enum: [quick, standard, deep]
        default: standard
      include_dependencies:
        type: boolean
        default: false
      severity_threshold:
        type: string
        enum: [critical, high, medium, low, info]
        default: medium

  output_schema:
    type: object
    properties:
      secure:
        type: boolean
      risk_score:
        type: number
        minimum: 0
        maximum: 10
      vulnerabilities:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            category:
              type: string
            severity:
              type: string
              enum: [critical, high, medium, low, info]
            cvss_score:
              type: number
            line:
              type: integer
            column:
              type: integer
            code_snippet:
              type: string
            description:
              type: string
            remediation:
              type: string
            references:
              type: array
              items:
                type: string
      summary:
        type: object
        properties:
          critical:
            type: integer
          high:
            type: integer
          medium:
            type: integer
          low:
            type: integer

  performance:
    avg_latency_ms: 2000
    max_tokens: 16000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 50
    recommended_batch_size: 10

  collaboration:
    receives_from:
      - security-engineer: Deep security validation requests
      - security-hardening-orchestrator: Comprehensive security scans
      - code-reviewer: Security validation in PR reviews
      - production-readiness-orchestrator: Pre-deployment security checks
    delegates_to:
      - secret-detector: Detect hardcoded secrets and credentials
    escalates_to:
      - security-engineer: Critical vulnerabilities requiring immediate attention
    returns_to:
      - orchestrating-agent: Security validation result with risk score and vulnerabilities
    swarm_pattern: fan-out
    coordinates_with:
      - dependency-analyzer: Cross-reference dependency vulnerabilities

  tags:
    - validation
    - security
    - vulnerabilities
    - owasp
    - sast
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
