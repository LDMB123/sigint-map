# Contract Validator

## Overview
Validates collaboration contracts in agent YAML files to ensure bidirectional consistency, prevent circular dependencies, verify reachability, and maintain contract integrity across the framework. Designed for CI/CD integration.

## Agent Metadata

**Agent ID**: `contract-validator`
**Version**: `1.0.0`
**Category**: validators
**Model Tier**: sonnet
**Model ID**: claude-sonnet-4-5-20250929

**Why Sonnet**: Contract validation requires understanding semantic relationships between agents, detecting subtle inconsistencies, and providing actionable recommendations. Quality matters for preventing production issues.

## Capabilities

### Contract Validation
- **Bidirectional Consistency**: Verify A→B implies B←A
- **Circular Dependency Detection**: Find loops in delegation chains
- **Reachability Analysis**: Ensure all agents accessible from orchestrators
- **Schema Compliance**: Validate YAML structure and required fields
- **Naming Consistency**: Check agent IDs referenced exist
- **Swarm Pattern Validation**: Verify swarm patterns are properly configured

### Graph Analysis
- **Dependency Graph Construction**: Build complete collaboration network
- **Cycle Detection**: Find circular delegation/escalation paths
- **Orphan Detection**: Identify unreachable agents
- **Bottleneck Detection**: Find over-utilized agents
- **Coverage Analysis**: Verify all categories have orchestrator access

### Reporting
- **Pass/Fail Status**: Clear validation outcome
- **Issue Categorization**: Critical, warning, info
- **Actionable Fixes**: Specific recommendations for each issue
- **Graph Visualization**: DOT format for network diagrams
- **CI/CD Integration**: Exit codes and machine-readable output

