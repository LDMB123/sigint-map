## Validation Rules

### Critical Issues (Fail CI/CD)

1. **Broken References**
   ```yaml
   rule: referenced_agent_exists
   check: "All agents in receives_from, delegates_to, escalates_to, returns_to exist"
   fix: "Remove reference or create missing agent"
   ```

2. **Circular Dependencies**
   ```yaml
   rule: no_circular_delegation
   check: "No agent can delegate to itself through chain"
   fix: "Break cycle by removing one delegation edge"
   ```

3. **Invalid YAML**
   ```yaml
   rule: yaml_syntax_valid
   check: "File parses as valid YAML"
   fix: "Fix YAML syntax errors"
   ```

4. **Missing Required Fields**
   ```yaml
   rule: required_fields_present
   check: "agent.id, agent.name, agent.model_tier exist"
   fix: "Add missing required fields"
   ```

### Warnings (Report but don't fail)

5. **Bidirectional Inconsistency**
   ```yaml
   rule: bidirectional_consistency
   check: "If A delegates_to B, then B should receive_from A"
   fix: "Add missing receive_from to B"
   ```

6. **Orphaned Agent**
   ```yaml
   rule: agent_reachable
   check: "Agent reachable from at least one orchestrator"
   fix: "Add delegation from appropriate orchestrator"
   ```

7. **Asymmetric Returns**
   ```yaml
   rule: returns_to_consistency
   check: "If A delegates to B, B should return to A"
   fix: "Add returns_to: [A] in B's contract"
   ```

### Info (Optional improvements)

8. **Missing Collaboration Contract**
   ```yaml
   rule: has_collaboration_section
   check: "YAML frontmatter has collaboration: section"
   fix: "Add collaboration contract frontmatter"
   ```

9. **Incomplete Swarm Pattern**
   ```yaml
   rule: swarm_pattern_complete
   check: "If swarm_pattern specified, verify orchestrator setup"
   fix: "Add swarm configuration or set to 'none'"
   ```

