## Implementation

### Validation Algorithm

```python
def validate_contracts(agent_directory):
    # 1. Load all agent files
    agents = load_all_agents(agent_directory)

    # 2. Build collaboration graph
    graph = build_graph(agents)

    # 3. Run validation checks
    issues = []

    # Critical checks
    issues.extend(check_broken_references(graph))
    issues.extend(check_circular_dependencies(graph))
    issues.extend(check_yaml_syntax(agents))
    issues.extend(check_required_fields(agents))

    # Warning checks
    issues.extend(check_bidirectional_consistency(graph))
    issues.extend(check_orphans(graph))
    issues.extend(check_returns_consistency(graph))

    # Info checks
    issues.extend(check_missing_contracts(agents))
    issues.extend(check_swarm_patterns(agents))

    # 4. Generate report
    return generate_report(issues)
```

### Circular Dependency Detection

```python
def detect_cycles(graph):
    visited = set()
    rec_stack = set()
    cycles = []

    def dfs(node, path):
        visited.add(node)
        rec_stack.add(node)
        path.append(node)

        for neighbor in graph[node].delegates_to:
            if neighbor not in visited:
                if dfs(neighbor, path.copy()):
                    return True
            elif neighbor in rec_stack:
                # Cycle found
                cycle_start = path.index(neighbor)
                cycles.append(path[cycle_start:] + [neighbor])
                return True

        rec_stack.remove(node)
        return False

    for node in graph:
        if node not in visited:
            dfs(node, [])

    return cycles
```

### Orphan Detection

```python
def detect_orphans(graph, orchestrators):
    reachable = set()

    def dfs(node):
        reachable.add(node)
        for neighbor in graph[node].delegates_to:
            if neighbor not in reachable:
                dfs(neighbor)

    # Start from all orchestrators
    for orchestrator in orchestrators:
        dfs(orchestrator)

    # Orphans are agents not reachable
    all_agents = set(graph.keys())
    orphans = all_agents - reachable

    return list(orphans)
```

## CI/CD Integration

### GitHub Actions Workflow

```yaml
name: Validate Agent Contracts

on:
  pull_request:
    paths:
      - '.claude/agents/**/*.yaml'
      - '.claude/agents/**/*.md'

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate Contracts
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '.claude/agents/')

          # Run validation
          claude-code invoke contract-validator \
            --action validate_changes \
            --changed_files "$CHANGED_FILES" \
            --output_format junit \
            --fail_on_warnings false

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: contract-validation-results
          path: validation-results.xml
```

### Pre-commit Hook

```bash
#!/bin/bash
# .git/hooks/pre-commit

# Find staged agent files
STAGED_AGENTS=$(git diff --cached --name-only --diff-filter=ACM | grep '.claude/agents/.*\.yaml$')

if [ -n "$STAGED_AGENTS" ]; then
    echo "Validating agent contracts..."

    claude-code invoke contract-validator \
        --action validate_changes \
        --changed_files "$STAGED_AGENTS" \
        --fail_on_warnings false

    if [ $? -ne 0 ]; then
        echo "❌ Contract validation failed. Fix issues before committing."
        exit 1
    fi

    echo "✅ Contract validation passed"
fi
```

