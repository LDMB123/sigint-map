# Universal Agent Framework - Inventory Sync Agent
# Category: E-commerce Operations | Tier: Sonnet | Parallelization: 12+

agent:
  id: ecommerce_inventory_sync
  name: Inventory Sync Agent
  version: 1.0.0

  functional_category: ecommerce
  sub_category: inventory_operations
  model_tier: sonnet

  description: |
    Real-time inventory synchronization across multiple marketplaces and sales channels.
    Monitors stock levels, prevents overselling, manages SKU mapping, and supports
    multi-warehouse operations. Provides intelligent restock alerts and inventory
    forecasting to optimize stock management.

  capabilities:
    - sync_inventory_realtime
    - monitor_stock_levels
    - generate_restock_alerts
    - map_sku_variants
    - manage_multi_warehouse
    - prevent_overselling
    - batch_inventory_updates
    - inventory_reconciliation
    - stock_transfer_tracking
    - low_stock_notifications
    - safety_stock_management
    - inventory_forecasting

  marketplace_support:
    - amazon_seller_central
    - shopify
    - etsy
    - ebay
    - walmart_marketplace
    - woocommerce
    - bigcommerce
    - magento
    - custom_api

  warehouse_features:
    - multi_location_sync
    - location_prioritization
    - auto_allocation
    - stock_transfers
    - bin_location_mapping
    - inventory_reservations

  input_schema:
    type: object
    required:
      - operation
    properties:
      operation:
        type: string
        enum: [sync_all, sync_marketplace, update_stock, restock_alert, sku_mapping, reconcile]
        description: Type of inventory operation to perform
      marketplaces:
        type: array
        items:
          type: object
          properties:
            platform:
              type: string
              enum: [amazon, shopify, etsy, ebay, walmart, woocommerce, custom]
            credentials:
              type: object
              description: API credentials for marketplace
            warehouse_mapping:
              type: object
              description: Map warehouses to marketplace fulfillment centers
        description: Target marketplaces for sync operation
      inventory_data:
        type: object
        properties:
          sku:
            type: string
            description: Product SKU identifier
          quantity:
            type: integer
            description: Available quantity
          warehouse_id:
            type: string
          reserved_quantity:
            type: integer
            default: 0
          safety_stock:
            type: integer
            default: 0
          reorder_point:
            type: integer
            description: Trigger restock alert when stock falls below this
      sync_options:
        type: object
        properties:
          sync_frequency:
            type: string
            enum: [realtime, hourly, daily, manual]
            default: hourly
          conflict_resolution:
            type: string
            enum: [marketplace_wins, warehouse_wins, manual_review, last_update_wins]
            default: warehouse_wins
          buffer_stock:
            type: integer
            default: 0
            description: Reserve buffer to prevent overselling
          enable_backorders:
            type: boolean
            default: false
          batch_size:
            type: integer
            default: 100
            description: Number of SKUs to sync per batch

  output_schema:
    type: object
    properties:
      sync_result:
        type: object
        properties:
          status:
            type: string
            enum: [success, partial, failed]
          synced_count:
            type: integer
          failed_count:
            type: integer
          timestamp:
            type: string
            format: date-time
          duration_ms:
            type: integer
      inventory_status:
        type: array
        items:
          type: object
          properties:
            sku:
              type: string
            marketplace:
              type: string
            current_stock:
              type: integer
            synced_stock:
              type: integer
            status:
              type: string
              enum: [synced, pending, error, out_of_sync]
            last_sync:
              type: string
              format: date-time
            error_message:
              type: string
      alerts:
        type: array
        items:
          type: object
          properties:
            alert_type:
              type: string
              enum: [low_stock, out_of_stock, oversold, sync_failed, restock_needed]
            sku:
              type: string
            marketplace:
              type: string
            current_quantity:
              type: integer
            threshold:
              type: integer
            recommended_action:
              type: string
            priority:
              type: string
              enum: [critical, high, medium, low]
      sku_mappings:
        type: array
        items:
          type: object
          properties:
            master_sku:
              type: string
            marketplace_skus:
              type: object
              description: SKU mappings per marketplace
            variant_attributes:
              type: object
      reconciliation_report:
        type: object
        properties:
          discrepancies:
            type: array
          total_checked:
            type: integer
          issues_found:
            type: integer
          auto_resolved:
            type: integer
          manual_review_needed:
            type: integer

  performance:
    avg_latency_ms: 3500
    max_tokens: 32000
    timeout_seconds: 180
    throughput_per_hour: 50000

  parallelization:
    max_concurrent: 12
    supports_batch: true
    batch_size: 100

  cost_model:
    base_cost_per_sync: 0.002
    per_sku_cost: 0.0001
    per_marketplace_cost: 0.001
    realtime_sync_multiplier: 1.5
    estimated_monthly_cost:
      small_operation: 15  # <1000 SKUs, 2-3 marketplaces
      medium_operation: 75  # 1000-10000 SKUs, 3-5 marketplaces
      large_operation: 250  # >10000 SKUs, 5+ marketplaces

  collaboration:
    receives_from:
      - inventory-manager: Inventory update commands and stock level adjustments
      - warehouse-management-system: Stock movements and warehouse transfers
      - order-fulfillment-agent: Inventory reservations and order allocations
      - e-commerce-orchestrator: Sync scheduling and marketplace coordination
      - product-catalog-manager: New product SKU mappings
    delegates_to:
      - amazon-seller-specialist: Amazon-specific inventory sync operations
      - shopify-specialist: Shopify inventory API integration
      - etsy-specialist: Etsy listing quantity updates
      - ebay-integration: eBay inventory management
      - api-client-integrator: Generate marketplace API clients
      - database-integrator: Store inventory sync history and mappings
      - monitoring-reporter: Track sync performance and failures
    queries:
      - analytics-reporter: Inventory turnover and stock health metrics
      - pattern-miner: Identify stock level patterns and seasonality
    escalates_to:
      - e-commerce-orchestrator: Critical sync failures across multiple marketplaces
      - devops-engineer: API rate limiting or connectivity issues
      - system-architect: Multi-warehouse synchronization architecture decisions
    returns_to:
      - requesting-agent: Sync results, inventory status, and alerts
    swarm_pattern: pipeline_with_parallel_execution

  error_handling:
    retry_strategy:
      max_retries: 3
      backoff_type: exponential
      initial_delay_ms: 1000
      max_delay_ms: 30000
    fallback_behavior:
      on_marketplace_unavailable: queue_for_retry
      on_sync_conflict: apply_conflict_resolution_strategy
      on_api_rate_limit: implement_backoff_and_queue
    monitoring:
      track_sync_success_rate: true
      alert_on_failure_threshold: 0.95
      log_all_discrepancies: true

  examples:
    - name: Sync All Marketplaces
      description: Synchronize inventory across all connected marketplaces
      input:
        operation: sync_all
        marketplaces:
          - platform: amazon
            credentials:
              seller_id: "AXXXXXXXXXXXXX"
              api_key: "${AMAZON_API_KEY}"
            warehouse_mapping:
              warehouse_1: "FBA_US_EAST"
          - platform: shopify
            credentials:
              shop_url: "mystore.myshopify.com"
              access_token: "${SHOPIFY_TOKEN}"
          - platform: etsy
            credentials:
              shop_id: "12345678"
              api_key: "${ETSY_API_KEY}"
        sync_options:
          sync_frequency: hourly
          conflict_resolution: warehouse_wins
          buffer_stock: 2
          batch_size: 50
      output:
        sync_result:
          status: success
          synced_count: 147
          failed_count: 3
          timestamp: "2026-01-24T10:30:00Z"
          duration_ms: 8750
        alerts:
          - alert_type: low_stock
            sku: "WIDGET-001"
            marketplace: amazon
            current_quantity: 5
            threshold: 10
            recommended_action: "Reorder 100 units within 7 days"
            priority: high

    - name: Update Single SKU Stock
      description: Update stock level for a specific SKU across all marketplaces
      input:
        operation: update_stock
        inventory_data:
          sku: "GADGET-XL-BLU"
          quantity: 250
          warehouse_id: "WH-CENTRAL"
          reserved_quantity: 15
          safety_stock: 20
          reorder_point: 50
        sync_options:
          sync_frequency: realtime
          buffer_stock: 5
      output:
        sync_result:
          status: success
          synced_count: 3
          failed_count: 0
          timestamp: "2026-01-24T10:35:22Z"
          duration_ms: 2100
        inventory_status:
          - sku: "GADGET-XL-BLU"
            marketplace: amazon
            current_stock: 245
            synced_stock: 230
            status: synced
            last_sync: "2026-01-24T10:35:22Z"
          - sku: "GADGET-XL-BLU"
            marketplace: shopify
            current_stock: 245
            synced_stock: 230
            status: synced
            last_sync: "2026-01-24T10:35:22Z"

    - name: SKU Mapping for Variants
      description: Map master SKU to marketplace-specific SKU variants
      input:
        operation: sku_mapping
        inventory_data:
          sku: "TSHIRT-M"
        marketplaces:
          - platform: amazon
          - platform: shopify
          - platform: etsy
      output:
        sku_mappings:
          - master_sku: "TSHIRT-M"
            marketplace_skus:
              amazon: "B08X1Y2Z3A"
              shopify: "6789012345"
              etsy: "TSHIRT-MEDIUM-001"
            variant_attributes:
              size: "M"
              color: "Blue"
              material: "Cotton"

    - name: Inventory Reconciliation
      description: Identify and resolve inventory discrepancies across platforms
      input:
        operation: reconcile
        marketplaces:
          - platform: amazon
          - platform: shopify
        sync_options:
          conflict_resolution: manual_review
      output:
        reconciliation_report:
          discrepancies:
            - sku: "WIDGET-PRO"
              warehouse_stock: 100
              amazon_stock: 95
              shopify_stock: 100
              discrepancy_type: "undersold_on_amazon"
              recommended_action: "sync_from_warehouse"
          total_checked: 450
          issues_found: 8
          auto_resolved: 6
          manual_review_needed: 2

  best_practices:
    - "Always maintain a safety stock buffer to prevent overselling during sync delays"
    - "Use warehouse_wins conflict resolution to ensure inventory accuracy"
    - "Implement realtime sync for high-velocity SKUs, hourly for standard items"
    - "Set reorder points at 2x average weekly sales velocity plus safety stock"
    - "Monitor sync success rate and investigate failures immediately"
    - "Use batch operations during off-peak hours to avoid rate limiting"
    - "Map SKUs consistently across marketplaces to prevent confusion"
    - "Reserve inventory for pending orders to avoid overselling"
    - "Regularly reconcile inventory to catch drift and discrepancies"
    - "Implement graduated buffer stock: higher for faster-selling items"

  security:
    - Store marketplace API credentials in secure vault
    - Use read-write scoped tokens with minimal permissions
    - Log all inventory modifications with user attribution
    - Implement IP whitelisting for API access
    - Encrypt inventory data in transit and at rest
    - Rotate API keys quarterly
    - Audit inventory sync logs for suspicious patterns

  monitoring:
    metrics:
      - sync_success_rate
      - avg_sync_duration
      - marketplace_availability
      - inventory_accuracy_score
      - oversell_incidents
      - stock_out_rate
      - sync_conflicts_per_day
    alerts:
      - critical: overselling detected
      - high: sync failure rate >5%
      - medium: low stock for high-velocity SKU
      - low: sync duration increase >50%

  tags:
    - ecommerce
    - inventory
    - synchronization
    - multi-channel
    - stock-management
    - marketplace
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
