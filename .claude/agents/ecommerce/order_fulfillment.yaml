# Universal Agent Framework - Order Fulfillment Agent
# Category: E-commerce Operations | Tier: Sonnet | Parallelization: 15+

agent:
  id: ecommerce_order_fulfillment
  name: Order Fulfillment Agent
  version: 1.0.0

  functional_category: ecommerce
  sub_category: order_operations
  model_tier: sonnet

  description: |
    Automated order processing and fulfillment across multiple sales channels.
    Generates shipping labels, updates tracking information, monitors fulfillment
    status, and consolidates multi-channel orders. Integrates with major shipping
    carriers and warehouse management systems for end-to-end order orchestration.

  capabilities:
    - process_orders_automated
    - generate_shipping_labels
    - update_tracking_numbers
    - monitor_fulfillment_status
    - consolidate_multichannel_orders
    - batch_order_processing
    - carrier_rate_shopping
    - address_validation
    - customs_documentation
    - split_shipment_handling
    - backorder_management
    - fulfillment_routing
    - print_queue_management
    - order_prioritization

  channel_support:
    - amazon_fba
    - amazon_fbm
    - shopify
    - etsy
    - ebay
    - walmart
    - woocommerce
    - bigcommerce
    - direct_website
    - pos_systems

  carrier_integrations:
    domestic:
      - usps
      - ups
      - fedex
      - dhl
      - amazon_shipping
    international:
      - dhl_express
      - fedex_international
      - ups_worldwide
      - usps_international
    regional:
      - ontrac
      - lasership
      - canada_post
      - royal_mail

  input_schema:
    type: object
    required:
      - operation
    properties:
      operation:
        type: string
        enum: [process_order, batch_process, generate_label, update_tracking, check_status, rate_shop, consolidate]
        description: Type of fulfillment operation to perform
      orders:
        type: array
        items:
          type: object
          properties:
            order_id:
              type: string
            channel:
              type: string
              enum: [amazon, shopify, etsy, ebay, walmart, website, pos]
            customer:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
            shipping_address:
              type: object
              properties:
                line1:
                  type: string
                line2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                postal_code:
                  type: string
                country:
                  type: string
                  default: "US"
            items:
              type: array
              items:
                type: object
                properties:
                  sku:
                    type: string
                  quantity:
                    type: integer
                  warehouse_location:
                    type: string
            shipping_method:
              type: string
              enum: [standard, expedited, overnight, international]
            order_value:
              type: number
            order_date:
              type: string
              format: date-time
      fulfillment_options:
        type: object
        properties:
          carrier_preference:
            type: array
            items:
              type: string
            description: Preferred carriers in priority order
          rate_shop:
            type: boolean
            default: true
            description: Compare rates across carriers
          insurance_threshold:
            type: number
            default: 100
            description: Order value requiring shipping insurance
          signature_threshold:
            type: number
            default: 500
            description: Order value requiring signature confirmation
          auto_confirm:
            type: boolean
            default: true
            description: Automatically confirm shipment to marketplace
          label_format:
            type: string
            enum: [pdf, zpl, png]
            default: pdf
          batch_size:
            type: integer
            default: 50
          priority_rules:
            type: object
            properties:
              same_day_cutoff:
                type: string
                format: time
                default: "14:00"
              expedited_first:
                type: boolean
                default: true
              high_value_priority:
                type: number
                default: 1000

  output_schema:
    type: object
    properties:
      fulfillment_result:
        type: object
        properties:
          status:
            type: string
            enum: [success, partial, failed]
          processed_count:
            type: integer
          failed_count:
            type: integer
          total_shipping_cost:
            type: number
          timestamp:
            type: string
            format: date-time
      shipments:
        type: array
        items:
          type: object
          properties:
            order_id:
              type: string
            shipment_id:
              type: string
            carrier:
              type: string
            service_level:
              type: string
            tracking_number:
              type: string
            label_url:
              type: string
            shipping_cost:
              type: number
            estimated_delivery:
              type: string
              format: date
            status:
              type: string
              enum: [label_created, picked, packed, shipped, in_transit, delivered, exception]
            label_generated:
              type: boolean
            marketplace_notified:
              type: boolean
      batch_summary:
        type: object
        properties:
          total_orders:
            type: integer
          total_items:
            type: integer
          carriers_used:
            type: object
            description: Count per carrier
          shipping_methods:
            type: object
            description: Count per method
          total_weight:
            type: number
          total_value:
            type: number
          avg_cost_per_order:
            type: number
      errors:
        type: array
        items:
          type: object
          properties:
            order_id:
              type: string
            error_type:
              type: string
              enum: [address_invalid, sku_not_found, carrier_error, rate_error, inventory_unavailable]
            error_message:
              type: string
            suggested_action:
              type: string
            requires_manual_review:
              type: boolean
      rate_comparison:
        type: array
        items:
          type: object
          properties:
            carrier:
              type: string
            service:
              type: string
            cost:
              type: number
            delivery_days:
              type: integer
            recommended:
              type: boolean

  performance:
    avg_latency_ms: 2800
    max_tokens: 32000
    timeout_seconds: 150
    throughput_per_hour: 10000

  parallelization:
    max_concurrent: 15
    supports_batch: true
    batch_size: 50

  cost_model:
    base_cost_per_order: 0.005
    label_generation_cost: 0.002
    rate_shopping_cost: 0.001
    tracking_update_cost: 0.0005
    estimated_monthly_cost:
      small_operation: 25   # <500 orders/month
      medium_operation: 150  # 500-5000 orders/month
      large_operation: 600   # >5000 orders/month

  collaboration:
    receives_from:
      - e-commerce-orchestrator: Order fulfillment orchestration and routing
      - order-management-system: New orders requiring fulfillment
      - inventory-sync-agent: Inventory reservations and availability
      - customer-service-agent: Rush orders and special handling requests
      - returns-management-agent: Return shipment label generation
    delegates_to:
      - usps-integration: USPS label generation and tracking
      - ups-integration: UPS shipping services
      - fedex-integration: FedEx shipping services
      - amazon-seller-specialist: FBA order confirmation and FBM shipping
      - shopify-specialist: Shopify order fulfillment updates
      - warehouse-management-system: Pick, pack, and ship instructions
      - address-validator: Validate and standardize shipping addresses
      - notification-reporter: Send shipping confirmations to customers
      - database-integrator: Store shipment records and tracking history
    queries:
      - analytics-reporter: Fulfillment metrics and carrier performance
      - cost-analyzer: Shipping cost optimization recommendations
    escalates_to:
      - customer-service-agent: Address issues requiring customer contact
      - warehouse-manager: Inventory discrepancies or picking issues
      - devops-engineer: Carrier API outages or integration failures
    returns_to:
      - requesting-agent: Fulfillment results, labels, and tracking information
    swarm_pattern: parallel_pipeline

  error_handling:
    retry_strategy:
      max_retries: 3
      backoff_type: exponential
      initial_delay_ms: 500
      max_delay_ms: 10000
    fallback_behavior:
      on_carrier_unavailable: switch_to_backup_carrier
      on_invalid_address: flag_for_manual_review
      on_rate_limit: queue_and_throttle
      on_label_generation_failed: retry_with_alternative_format
    validation:
      validate_address_before_label: true
      verify_inventory_before_processing: true
      check_carrier_service_availability: true

  examples:
    - name: Process Single Order
      description: Process and generate shipping label for a single order
      input:
        operation: process_order
        orders:
          - order_id: "ORD-12345"
            channel: shopify
            customer:
              name: "John Doe"
              email: "john@example.com"
              phone: "+1-555-0123"
            shipping_address:
              line1: "123 Main St"
              line2: "Apt 4B"
              city: "Portland"
              state: "OR"
              postal_code: "97201"
              country: "US"
            items:
              - sku: "WIDGET-001"
                quantity: 2
                warehouse_location: "A-12-3"
              - sku: "GADGET-XL"
                quantity: 1
                warehouse_location: "B-08-1"
            shipping_method: standard
            order_value: 89.99
            order_date: "2026-01-24T09:15:00Z"
        fulfillment_options:
          carrier_preference: ["usps", "ups"]
          rate_shop: true
          auto_confirm: true
          label_format: pdf
      output:
        fulfillment_result:
          status: success
          processed_count: 1
          failed_count: 0
          total_shipping_cost: 8.45
          timestamp: "2026-01-24T10:20:00Z"
        shipments:
          - order_id: "ORD-12345"
            shipment_id: "SHP-987654"
            carrier: "usps"
            service_level: "Priority Mail"
            tracking_number: "9400111699000123456789"
            label_url: "https://labels.example.com/ORD-12345.pdf"
            shipping_cost: 8.45
            estimated_delivery: "2026-01-27"
            status: label_created
            label_generated: true
            marketplace_notified: true

    - name: Batch Process Orders
      description: Process multiple orders in a single batch with rate shopping
      input:
        operation: batch_process
        orders:
          - order_id: "ORD-12346"
            channel: amazon
            shipping_method: expedited
            order_value: 249.99
          - order_id: "ORD-12347"
            channel: etsy
            shipping_method: standard
            order_value: 45.00
          - order_id: "ORD-12348"
            channel: shopify
            shipping_method: overnight
            order_value: 599.99
        fulfillment_options:
          rate_shop: true
          insurance_threshold: 100
          signature_threshold: 500
          batch_size: 50
          priority_rules:
            same_day_cutoff: "14:00"
            expedited_first: true
            high_value_priority: 500
      output:
        fulfillment_result:
          status: success
          processed_count: 3
          failed_count: 0
          total_shipping_cost: 67.85
          timestamp: "2026-01-24T11:45:00Z"
        batch_summary:
          total_orders: 3
          total_items: 8
          carriers_used:
            usps: 1
            ups: 1
            fedex: 1
          shipping_methods:
            standard: 1
            expedited: 1
            overnight: 1
          total_weight: 12.5
          total_value: 894.98
          avg_cost_per_order: 22.62

    - name: Rate Shop Carriers
      description: Compare shipping rates across carriers for best price
      input:
        operation: rate_shop
        orders:
          - order_id: "ORD-12349"
            shipping_address:
              postal_code: "90210"
              country: "US"
            items:
              - sku: "PRODUCT-A"
                quantity: 1
            shipping_method: standard
        fulfillment_options:
          carrier_preference: ["usps", "ups", "fedex"]
      output:
        rate_comparison:
          - carrier: "usps"
            service: "Priority Mail"
            cost: 8.45
            delivery_days: 3
            recommended: true
          - carrier: "ups"
            service: "Ground"
            cost: 11.20
            delivery_days: 4
            recommended: false
          - carrier: "fedex"
            service: "Home Delivery"
            cost: 10.95
            delivery_days: 5
            recommended: false

    - name: Update Tracking Status
      description: Update marketplace with tracking information
      input:
        operation: update_tracking
        orders:
          - order_id: "ORD-12345"
            channel: shopify
        fulfillment_options:
          auto_confirm: true
      output:
        shipments:
          - order_id: "ORD-12345"
            tracking_number: "9400111699000123456789"
            carrier: "usps"
            status: in_transit
            marketplace_notified: true

  best_practices:
    - "Process expedited and high-value orders first in batch operations"
    - "Always rate shop unless time-critical to minimize shipping costs"
    - "Validate addresses before generating labels to reduce carrier rejections"
    - "Set same-day cutoff time to manage customer expectations"
    - "Use signature confirmation for orders over $500 to prevent fraud"
    - "Automatically purchase insurance for orders over threshold value"
    - "Batch process during off-peak hours to optimize carrier API usage"
    - "Update marketplaces immediately after label generation"
    - "Monitor carrier performance and adjust preferences accordingly"
    - "Implement split shipment logic for partial inventory availability"

  security:
    - Store carrier API credentials in secure vault
    - Encrypt customer address data in transit and at rest
    - Mask tracking numbers in logs and non-secure communications
    - Implement role-based access for fulfillment operations
    - Audit all label generation with timestamp and user attribution
    - Comply with PCI DSS for payment card data handling
    - Redact sensitive customer information in error logs

  monitoring:
    metrics:
      - fulfillment_success_rate
      - avg_processing_time
      - carrier_performance_score
      - shipping_cost_per_order
      - on_time_delivery_rate
      - label_generation_errors
      - address_validation_failures
    alerts:
      - critical: carrier API outage
      - high: fulfillment failure rate >2%
      - medium: shipping cost variance >20%
      - low: processing time increase >30%

  tags:
    - ecommerce
    - fulfillment
    - shipping
    - logistics
    - order-processing
    - multi-channel
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
