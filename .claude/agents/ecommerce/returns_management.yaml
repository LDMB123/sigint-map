# Universal Agent Framework - Returns Management Agent
# Category: E-commerce Operations | Tier: Sonnet | Parallelization: 10+

agent:
  id: ecommerce_returns_management
  name: Returns Management Agent
  version: 1.0.0

  functional_category: ecommerce
  sub_category: returns_operations
  model_tier: sonnet

  description: |
    Automated returns and refunds processing across multiple sales channels.
    Handles return authorization, refund processing, restocking workflows, and
    customer communication. Provides return analytics, fraud detection, and
    integrates with payment processors and inventory systems for seamless
    reverse logistics management.

  capabilities:
    - process_return_requests
    - automate_refund_processing
    - generate_return_labels
    - manage_restocking_workflow
    - track_return_shipments
    - analyze_return_patterns
    - detect_return_fraud
    - calculate_restocking_fees
    - manage_exchanges
    - process_partial_returns
    - handle_warranty_claims
    - customer_communication
    - return_disposition
    - refund_reconciliation

  channel_support:
    - amazon_returns
    - shopify
    - etsy
    - ebay
    - walmart
    - woocommerce
    - bigcommerce
    - direct_website
    - pos_returns

  return_reasons:
    - wrong_item_received
    - defective_damaged
    - not_as_described
    - changed_mind
    - wrong_size_color
    - arrived_too_late
    - no_longer_needed
    - better_price_found
    - duplicate_order
    - unauthorized_purchase

  input_schema:
    type: object
    required:
      - operation
    properties:
      operation:
        type: string
        enum: [process_return, approve_refund, generate_label, restock_item, analyze_returns, detect_fraud, process_exchange]
        description: Type of returns operation to perform
      return_request:
        type: object
        properties:
          return_id:
            type: string
          order_id:
            type: string
          channel:
            type: string
            enum: [amazon, shopify, etsy, ebay, walmart, website, pos]
          customer:
            type: object
            properties:
              customer_id:
                type: string
              name:
                type: string
              email:
                type: string
              return_history:
                type: object
                properties:
                  total_returns:
                    type: integer
                  return_rate:
                    type: number
                  fraud_score:
                    type: number
          items:
            type: array
            items:
              type: object
              properties:
                sku:
                  type: string
                quantity:
                  type: integer
                purchase_price:
                  type: number
                condition:
                  type: string
                  enum: [unopened, opened_unused, used_good, damaged, defective]
                return_reason:
                  type: string
                customer_notes:
                  type: string
          return_method:
            type: string
            enum: [ship_back, drop_off, pickup, in_store]
          original_order_date:
            type: string
            format: date-time
          request_date:
            type: string
            format: date-time
      return_policy:
        type: object
        properties:
          return_window_days:
            type: integer
            default: 30
          restocking_fee_percent:
            type: number
            default: 0
          free_return_shipping:
            type: boolean
            default: false
          refund_method:
            type: string
            enum: [original_payment, store_credit, exchange_only]
            default: original_payment
          conditions_accepted:
            type: array
            items:
              type: string
              enum: [unopened, opened_unused, used_good]
          auto_approve_threshold:
            type: number
            default: 50
            description: Auto-approve returns under this value
      processing_options:
        type: object
        properties:
          auto_approve:
            type: boolean
            default: false
          require_images:
            type: boolean
            default: true
          fraud_check:
            type: boolean
            default: true
          immediate_refund:
            type: boolean
            default: false
            description: Refund before receiving return
          quality_inspection:
            type: boolean
            default: true
          generate_prepaid_label:
            type: boolean
            default: true

  output_schema:
    type: object
    properties:
      return_result:
        type: object
        properties:
          return_id:
            type: string
          status:
            type: string
            enum: [approved, rejected, pending_review, awaiting_return, received, refunded, restocked, completed]
          approval_decision:
            type: object
            properties:
              approved:
                type: boolean
              approval_type:
                type: string
                enum: [auto, manual, conditional]
              rejection_reason:
                type: string
              conditions:
                type: array
                items:
                  type: string
          refund_details:
            type: object
            properties:
              refund_amount:
                type: number
              restocking_fee:
                type: number
              shipping_refund:
                type: number
              total_refund:
                type: number
              refund_method:
                type: string
              refund_id:
                type: string
              refund_status:
                type: string
                enum: [pending, processing, completed, failed]
              estimated_processing_days:
                type: integer
          return_label:
            type: object
            properties:
              label_url:
                type: string
              tracking_number:
                type: string
              carrier:
                type: string
              cost:
                type: number
              expires:
                type: string
                format: date-time
          restocking_info:
            type: object
            properties:
              restockable:
                type: boolean
              disposition:
                type: string
                enum: [restock, liquidate, dispose, refurbish, warranty_claim]
              warehouse_location:
                type: string
              quality_grade:
                type: string
                enum: [A_new, B_like_new, C_good, D_fair, F_defective]
              inventory_updated:
                type: boolean
          fraud_assessment:
            type: object
            properties:
              fraud_score:
                type: number
                description: 0-100, higher is more suspicious
              risk_level:
                type: string
                enum: [low, medium, high, critical]
              risk_factors:
                type: array
                items:
                  type: string
              recommended_action:
                type: string
          customer_communication:
            type: object
            properties:
              email_sent:
                type: boolean
              sms_sent:
                type: boolean
              message_type:
                type: string
                enum: [approval, rejection, label_sent, refund_processed, received_confirmation]
              message_content:
                type: string
      analytics:
        type: object
        properties:
          return_rate:
            type: number
            description: Percentage of orders returned
          top_return_reasons:
            type: array
            items:
              type: object
              properties:
                reason:
                  type: string
                count:
                  type: integer
                percentage:
                  type: number
          return_costs:
            type: object
            properties:
              total_refunded:
                type: number
              shipping_costs:
                type: number
              restocking_costs:
                type: number
              lost_inventory_value:
                type: number
          avg_processing_time_days:
            type: number
          restocking_rate:
            type: number
            description: Percentage of returns restocked vs disposed

  performance:
    avg_latency_ms: 3200
    max_tokens: 32000
    timeout_seconds: 120
    throughput_per_hour: 5000

  parallelization:
    max_concurrent: 10
    supports_batch: true
    batch_size: 25

  cost_model:
    base_cost_per_return: 0.008
    refund_processing_cost: 0.003
    fraud_check_cost: 0.002
    label_generation_cost: 0.002
    analytics_cost: 0.001
    estimated_monthly_cost:
      small_operation: 20    # <100 returns/month
      medium_operation: 120  # 100-1000 returns/month
      large_operation: 500   # >1000 returns/month

  collaboration:
    receives_from:
      - customer-service-agent: Return requests and customer inquiries
      - e-commerce-orchestrator: Returns workflow orchestration
      - order-fulfillment-agent: Original order details and shipping info
      - fraud-detection-system: Customer fraud scores and risk assessments
    delegates_to:
      - payment-processor-integration: Process refunds to original payment method
      - shopify-specialist: Update Shopify return status
      - amazon-seller-specialist: Amazon return authorization and processing
      - order-fulfillment-agent: Generate prepaid return shipping labels
      - inventory-sync-agent: Update inventory after restocking
      - warehouse-management-system: Return receiving and quality inspection
      - notification-reporter: Send return status emails and SMS
      - analytics-reporter: Generate return analytics and insights
      - database-integrator: Store return records and customer history
    queries:
      - pattern-miner: Identify return fraud patterns and product quality issues
      - cost-analyzer: Calculate true cost of returns and optimization opportunities
      - customer-segmentation: Customer return behavior analysis
    escalates_to:
      - customer-service-manager: High-value returns or customer disputes
      - fraud-investigator: Suspected return fraud cases
      - product-manager: Products with high return rates
      - legal-compliance: Return policy compliance issues
    returns_to:
      - requesting-agent: Return processing results and refund confirmation
    swarm_pattern: sequential_pipeline

  error_handling:
    retry_strategy:
      max_retries: 3
      backoff_type: exponential
      initial_delay_ms: 1000
      max_delay_ms: 20000
    fallback_behavior:
      on_payment_processor_unavailable: queue_refund_for_retry
      on_fraud_check_timeout: proceed_with_manual_review
      on_label_generation_failed: provide_manual_return_instructions
      on_inventory_update_failed: flag_for_manual_reconciliation
    validation:
      verify_return_window: true
      check_fraud_score: true
      validate_restocking_condition: true

  examples:
    - name: Process Standard Return
      description: Process a return request with auto-approval and refund
      input:
        operation: process_return
        return_request:
          return_id: "RET-98765"
          order_id: "ORD-12345"
          channel: shopify
          customer:
            customer_id: "CUST-001"
            name: "Jane Smith"
            email: "jane@example.com"
            return_history:
              total_returns: 2
              return_rate: 0.05
              fraud_score: 15
          items:
            - sku: "WIDGET-001"
              quantity: 1
              purchase_price: 49.99
              condition: unopened
              return_reason: wrong_size_color
              customer_notes: "Ordered Medium, need Large"
          return_method: ship_back
          original_order_date: "2026-01-10T14:30:00Z"
          request_date: "2026-01-20T09:15:00Z"
        return_policy:
          return_window_days: 30
          restocking_fee_percent: 0
          free_return_shipping: true
          refund_method: original_payment
          auto_approve_threshold: 100
        processing_options:
          auto_approve: true
          fraud_check: true
          generate_prepaid_label: true
      output:
        return_result:
          return_id: "RET-98765"
          status: approved
          approval_decision:
            approved: true
            approval_type: auto
          refund_details:
            refund_amount: 49.99
            restocking_fee: 0.00
            shipping_refund: 0.00
            total_refund: 49.99
            refund_method: "visa_ending_1234"
            refund_id: "REF-789456"
            refund_status: pending
            estimated_processing_days: 5
          return_label:
            label_url: "https://labels.example.com/RET-98765.pdf"
            tracking_number: "9400111699000987654321"
            carrier: "usps"
            cost: 0.00
            expires: "2026-02-20T23:59:59Z"
          fraud_assessment:
            fraud_score: 15
            risk_level: low
            risk_factors: []
            recommended_action: auto_approve
          customer_communication:
            email_sent: true
            message_type: approval
            message_content: "Your return has been approved. Please use the attached prepaid label to ship your item back."

    - name: Detect Return Fraud
      description: Analyze return request for potential fraud
      input:
        operation: detect_fraud
        return_request:
          return_id: "RET-98766"
          order_id: "ORD-12350"
          customer:
            customer_id: "CUST-999"
            return_history:
              total_returns: 15
              return_rate: 0.75
              fraud_score: 85
          items:
            - sku: "ELECTRONICS-PRO"
              quantity: 1
              purchase_price: 899.99
              condition: defective
              return_reason: defective_damaged
          original_order_date: "2026-01-22T18:00:00Z"
          request_date: "2026-01-24T10:00:00Z"
        processing_options:
          fraud_check: true
          require_images: true
      output:
        return_result:
          return_id: "RET-98766"
          status: pending_review
          approval_decision:
            approved: false
            approval_type: manual
            rejection_reason: "High fraud risk - requires manual review"
          fraud_assessment:
            fraud_score: 85
            risk_level: high
            risk_factors:
              - "Customer return rate 75% (threshold: 20%)"
              - "Return requested 2 days after delivery"
              - "High-value electronics item"
              - "Pattern matches known fraud behavior"
              - "No images provided"
            recommended_action: "Manual review required. Request proof of defect with photos/video."

    - name: Process Exchange
      description: Handle product exchange instead of refund
      input:
        operation: process_exchange
        return_request:
          return_id: "RET-98767"
          order_id: "ORD-12351"
          items:
            - sku: "TSHIRT-M-BLU"
              quantity: 1
              purchase_price: 29.99
              return_reason: wrong_size_color
          exchange_item:
            sku: "TSHIRT-L-BLU"
            quantity: 1
        processing_options:
          generate_prepaid_label: true
      output:
        return_result:
          return_id: "RET-98767"
          status: approved
          refund_details:
            refund_amount: 0.00
            exchange_order_id: "ORD-12399"
            exchange_status: processing
          return_label:
            label_url: "https://labels.example.com/RET-98767.pdf"
            tracking_number: "9400111699000111222333"
            carrier: "usps"
            cost: 0.00

    - name: Return Analytics Dashboard
      description: Generate return analytics for operational insights
      input:
        operation: analyze_returns
        date_range:
          start: "2026-01-01"
          end: "2026-01-31"
      output:
        analytics:
          return_rate: 0.12
          top_return_reasons:
            - reason: wrong_size_color
              count: 145
              percentage: 35
            - reason: not_as_described
              count: 98
              percentage: 24
            - reason: defective_damaged
              count: 76
              percentage: 18
          return_costs:
            total_refunded: 15247.85
            shipping_costs: 2340.50
            restocking_costs: 890.00
            lost_inventory_value: 4200.00
          avg_processing_time_days: 4.2
          restocking_rate: 0.78

  best_practices:
    - "Auto-approve low-value returns from trusted customers to reduce overhead"
    - "Always check fraud score before processing high-value returns"
    - "Require photos for damaged/defective claims to reduce fraud"
    - "Offer exchanges over refunds to retain revenue when possible"
    - "Track return reasons to identify product quality issues"
    - "Set return window between 30-60 days based on product category"
    - "Communicate clearly about restocking fees before purchase"
    - "Process refunds promptly after receiving returned items"
    - "Grade returned items immediately for accurate restocking decisions"
    - "Monitor serial return offenders and flag for review"

  security:
    - Store customer return history securely with encryption
    - Implement fraud detection algorithms to identify patterns
    - Verify customer identity for high-value returns
    - Log all refund transactions with audit trail
    - Protect payment data during refund processing
    - Restrict access to refund operations to authorized personnel
    - Monitor for refund abuse and coordinate with payment processors

  monitoring:
    metrics:
      - return_rate_by_product
      - return_processing_time
      - fraud_detection_accuracy
      - refund_success_rate
      - restocking_rate
      - return_shipping_costs
      - customer_satisfaction_post_return
    alerts:
      - critical: fraud score >90
      - high: product return rate >25%
      - medium: refund processing failures
      - low: return processing time >7 days

  tags:
    - ecommerce
    - returns
    - refunds
    - reverse-logistics
    - customer-service
    - fraud-detection
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
