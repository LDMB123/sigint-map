# Universal Agent Framework - Convention Extractor
# Category: Learners | Tier: Sonnet | Parallelization: 30

agent:
  id: learner_convention_extractor
  name: Convention Extractor
  version: 1.0.0

  functional_category: learner
  sub_category: convention_extractor
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Extracts coding conventions and style preferences from existing code.
    Infers naming patterns, formatting preferences, and structural conventions.
    Generates style guides and configuration for tools.

  capabilities:
    - extract_naming_conventions
    - infer_formatting_style
    - identify_import_order
    - detect_bracket_style
    - learn_comment_patterns
    - extract_file_structure
    - identify_module_patterns
    - detect_testing_conventions
    - extract_documentation_style
    - generate_config_files

  convention_areas:
    naming:
      - variable_naming
      - function_naming
      - class_naming
      - file_naming
      - constant_naming
    formatting:
      - indentation
      - line_length
      - bracket_style
      - quote_style
      - trailing_commas
    structure:
      - file_organization
      - import_grouping
      - export_patterns
      - module_structure
    documentation:
      - comment_style
      - docstring_format
      - readme_structure

  input_schema:
    type: object
    required:
      - source
    properties:
      source:
        type: string
        description: Directory to analyze
      sample_size:
        type: integer
        default: 100
        description: Number of files to sample
      focus_areas:
        type: array
        items:
          type: string
        description: Specific convention areas to analyze
      existing_config:
        type: array
        items:
          type: string
        description: Existing config files to consider

  output_schema:
    type: object
    properties:
      conventions:
        type: object
        properties:
          naming:
            type: object
            properties:
              variables:
                type: string
                enum: [camelCase, snake_case, PascalCase]
              functions:
                type: string
              classes:
                type: string
              constants:
                type: string
              files:
                type: string
          formatting:
            type: object
            properties:
              indent_style:
                type: string
              indent_size:
                type: integer
              line_length:
                type: integer
              quotes:
                type: string
              semicolons:
                type: boolean
              trailing_commas:
                type: string
          imports:
            type: object
            properties:
              order:
                type: array
              grouping:
                type: string
              style:
                type: string
      confidence:
        type: object
        additionalProperties:
          type: number
      generated_configs:
        type: object
        properties:
          eslintrc:
            type: object
          prettierrc:
            type: object
          editorconfig:
            type: string
          tsconfig:
            type: object
      inconsistencies:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            files:
              type: array
            description:
              type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 12000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 30
    can_sample_parallel: true

  collaboration:
    receives_from:
      - codebase-indexer: Trigger after codebase is indexed
      - full-stack-developer: Extract conventions for new projects
      - code-reviewer: Identify style inconsistencies to extract conventions
      - technical-debt-coordinator: Standardization initiatives
    delegates_to:
      - configuration-generator: Generate linter/formatter configs from conventions
      - codebase-indexer: Index files for pattern sampling
    provides_context_to:
      - code-generator: Use extracted conventions for new code
      - code-reviewer: Use conventions for style validation
      - batch-formatter: Apply formatting based on conventions
    returns_to:
      - orchestrating-agent: Extracted conventions with confidence scores and generated configs
    swarm_pattern: fan-out
    coordinates_with:
      - style-validator: Cross-reference extracted conventions with existing rules

  tags:
    - learning
    - conventions
    - style
    - configuration
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
