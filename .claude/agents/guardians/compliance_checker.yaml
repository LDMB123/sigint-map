# Universal Agent Framework - Compliance Checker Guardian
# Category: Guardians | Tier: Sonnet | Parallelization: 20+

agent:
  id: guardian_compliance_checker
  name: Compliance Checker Guardian
  version: 1.0.0

  functional_category: guardian
  sub_category: compliance_checker
  model_tier: sonnet

  description: |
    Checks code and infrastructure for compliance with standards.
    Supports SOC 2, HIPAA, GDPR, PCI-DSS, and custom policies.
    Generates compliance reports and remediation plans.

  capabilities:
    - check_soc2_compliance
    - verify_hipaa_requirements
    - check_gdpr_compliance
    - verify_pci_dss
    - check_iso27001
    - verify_custom_policies
    - audit_access_controls
    - check_encryption_requirements
    - verify_logging_requirements
    - audit_data_handling

  compliance_frameworks:
    - soc2_type2
    - hipaa
    - gdpr
    - pci_dss_v4
    - iso_27001
    - nist_csf
    - cis_benchmarks
    - fedramp
    - ccpa
    - sox

  input_schema:
    type: object
    required:
      - target
      - framework
    properties:
      target:
        type: string
        description: Codebase or infrastructure to check
      framework:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: Compliance framework(s) to check against
      scope:
        type: object
        properties:
          include_infrastructure:
            type: boolean
            default: true
          include_code:
            type: boolean
            default: true
          include_policies:
            type: boolean
            default: true
      custom_policies:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            rule:
              type: string
            severity:
              type: string

  output_schema:
    type: object
    properties:
      compliant:
        type: boolean
      score:
        type: number
        minimum: 0
        maximum: 100
      by_framework:
        type: object
        additionalProperties:
          type: object
          properties:
            compliant:
              type: boolean
            score:
              type: number
            controls_passed:
              type: integer
            controls_failed:
              type: integer
      findings:
        type: array
        items:
          type: object
          properties:
            framework:
              type: string
            control:
              type: string
            status:
              type: string
              enum: [passed, failed, partial, na]
            severity:
              type: string
            description:
              type: string
            evidence:
              type: string
            remediation:
              type: string
      report:
        type: string
        description: Full compliance report
      remediation_plan:
        type: array
        items:
          type: object
          properties:
            finding:
              type: string
            priority:
              type: integer
            effort:
              type: string
            steps:
              type: array

  performance:
    avg_latency_ms: 5000
    max_tokens: 32000
    timeout_seconds: 300

  parallelization:
    max_concurrent: 20

  collaboration:
    receives_from:
      - security-hardening-orchestrator: Compliance validation requests
      - production-readiness-orchestrator: Pre-deployment compliance checks
      - code-reviewer: Compliance review in PRs
      - engineering-manager: Compliance audit requests
    delegates_to:
      - privacy-validator: Privacy regulation compliance
      - security-scanner: Security compliance scanning
      - dependency-analyzer: License compliance checking
    escalates_to:
      - compliance-officer: Compliance violations requiring remediation
      - legal-counsel: Legal compliance issues
    returns_to:
      - requesting-agent: Compliance report with findings and remediation plan
    swarm_pattern: fan-out
    coordinates_with:
      - audit-trail-reporter: Document compliance checks

  tags:
    - guardian
    - compliance
    - audit
    - regulations
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
