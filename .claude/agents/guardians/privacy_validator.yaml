# Universal Agent Framework - Privacy Validator Guardian
# Category: Guardians | Tier: Sonnet | Parallelization: 20+

agent:
  id: guardian_privacy_validator
  name: Privacy Validator Guardian
  version: 1.0.0

  functional_category: guardian
  sub_category: privacy_validator
  model_tier: sonnet

  description: |
    Validates code for privacy compliance and data protection.
    Detects PII handling issues, consent violations, and data leaks.
    Ensures GDPR, CCPA, and other privacy regulation compliance.

  capabilities:
    - detect_pii_handling
    - validate_consent_flows
    - check_data_retention
    - verify_right_to_deletion
    - audit_data_sharing
    - detect_tracking_issues
    - validate_anonymization
    - check_encryption_at_rest
    - verify_data_minimization
    - audit_third_party_sharing

  privacy_concerns:
    pii_types:
      - name
      - email
      - phone
      - address
      - ssn
      - credit_card
      - ip_address
      - device_id
      - location
      - biometric
    privacy_issues:
      - unencrypted_pii
      - excessive_collection
      - missing_consent
      - improper_retention
      - unauthorized_sharing
      - missing_anonymization
      - tracking_without_consent
      - cross_border_transfer

  input_schema:
    type: object
    required:
      - target
    properties:
      target:
        type: string
        description: Codebase to validate
      regulations:
        type: array
        items:
          type: string
          enum: [gdpr, ccpa, hipaa, coppa, lgpd]
        default: [gdpr]
      pii_types:
        type: array
        items:
          type: string
        description: Specific PII types to check for
      include_third_party:
        type: boolean
        default: true
        description: Include third-party service analysis

  output_schema:
    type: object
    properties:
      privacy_compliant:
        type: boolean
      risk_level:
        type: string
        enum: [low, medium, high, critical]
      pii_findings:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            location:
              type: object
            handling:
              type: string
            issues:
              type: array
            recommendations:
              type: array
      consent_analysis:
        type: object
        properties:
          consent_collected:
            type: boolean
          consent_types:
            type: array
          issues:
            type: array
      data_flow:
        type: object
        properties:
          collection_points:
            type: array
          storage_locations:
            type: array
          sharing_destinations:
            type: array
      recommendations:
        type: array
        items:
          type: object
          properties:
            issue:
              type: string
            regulation:
              type: string
            recommendation:
              type: string
            priority:
              type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 20

  collaboration:
    receives_from:
      - compliance-checker: Privacy compliance delegation
      - security-hardening-orchestrator: Privacy validation requests
      - code-reviewer: Privacy review in PRs
      - data-engineer: Data handling privacy validation
    delegates_to:
      - secret-detector: PII pattern detection
      - static-analyzer: Data flow analysis for PII
    escalates_to:
      - compliance-officer: Privacy regulation violations
      - data-protection-officer: GDPR compliance issues
    returns_to:
      - requesting-agent: Privacy validation report with recommendations
    swarm_pattern: fan-out
    coordinates_with:
      - audit-trail-reporter: Document privacy validations

  tags:
    - guardian
    - privacy
    - pii
    - gdpr
    - compliance
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
