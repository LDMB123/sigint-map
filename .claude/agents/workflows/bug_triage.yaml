# Universal Agent Framework - Bug Triage Workflow
# Category: Workflows | Tier: Sonnet | Parallelization: 15+

agent:
  id: workflow_bug_triage
  name: Bug Triage Workflow
  version: 1.0.0

  functional_category: workflow
  sub_category: bug_triage
  model_tier: sonnet

  description: |
    Intelligent bug triage workflow that automatically classifies, prioritizes, and routes bug reports.
    Uses semantic analysis for duplicate detection, stack trace parsing for component assignment,
    and historical data for fix suggestions. Calculates priority based on severity × frequency × impact.

    Triage Algorithm:
    1. Parse & Extract: Stack traces, error messages, reproduction steps, environment
    2. Classify Severity: Critical/High/Medium/Low based on impact + affected users + data loss
    3. Detect Duplicates: Semantic similarity (>85%) + stack trace matching + error pattern matching
    4. Assign Component: Stack trace analysis + file path mapping + team ownership matrix
    5. Score Reproduction: Completeness of steps + environment specificity + consistency
    6. Calculate Priority: (Severity × Frequency × User Impact) / Time to Fix Estimate
    7. Find Similar Bugs: Semantic search + error pattern matching (last 90 days)
    8. Suggest Fixes: Match against past fixes with similar stack traces and patterns
    9. Route: Create/update issue, assign team, set labels, link similar bugs

  capabilities:
    - classify_severity
    - detect_duplicate_bugs
    - assign_component_ownership
    - score_reproduction_likelihood
    - calculate_priority
    - analyze_stack_traces
    - extract_error_patterns
    - find_similar_bugs
    - suggest_fixes_from_history
    - identify_regression_candidates
    - estimate_time_to_fix
    - assess_user_impact
    - determine_affected_versions
    - create_issue_tickets
    - assign_to_teams
    - link_related_issues
    - generate_triage_summary

  severity_classification:
    critical:
      triggers:
        - Data loss or corruption
        - Security vulnerability (CVE)
        - Complete service outage
        - Payment processing failure
        - Authentication system down
      impact: Production system unusable
      sla_hours: 4
      auto_escalate: true

    high:
      triggers:
        - Major feature broken
        - Performance degradation >50%
        - Affects >25% of users
        - Workaround complex/costly
        - API breaking change
      impact: Core functionality impaired
      sla_hours: 24
      auto_escalate: false

    medium:
      triggers:
        - Minor feature broken
        - Affects 5-25% of users
        - Workaround available
        - UI/UX issues
        - Non-critical performance issues
      impact: Partial functionality affected
      sla_hours: 72
      auto_escalate: false

    low:
      triggers:
        - Cosmetic issues
        - Edge case scenarios
        - Affects <5% of users
        - Documentation errors
        - Nice-to-have features
      impact: Minimal user impact
      sla_hours: 168
      auto_escalate: false

  priority_calculation:
    formula: "(severity_weight × frequency_score × impact_score) / time_estimate"
    weights:
      severity:
        critical: 10
        high: 7
        medium: 4
        low: 1
      frequency:
        constant: 10
        frequent: 7
        occasional: 4
        rare: 1
      impact:
        all_users: 10
        most_users: 7
        some_users: 4
        few_users: 1
    time_estimates:
      based_on:
        - Similar past bugs
        - Component complexity
        - Fix confidence from history
      default_hours: 8

  duplicate_detection:
    methods:
      semantic_similarity:
        threshold: 0.85
        uses: Title + description embeddings
        algorithm: Cosine similarity
      stack_trace_matching:
        threshold: 0.70
        uses: Normalized stack traces (top 10 frames)
        algorithm: Levenshtein distance
      error_pattern_matching:
        threshold: 0.80
        uses: Error message templates
        algorithm: Template pattern matching
    time_window_days: 180
    status_filter: [open, in_progress, recently_closed]

  component_assignment:
    strategies:
      - stack_trace_analysis:
          weight: 0.50
          method: Map file paths to component ownership
      - keywords_in_description:
          weight: 0.20
          method: Match domain-specific keywords
      - historical_patterns:
          weight: 0.20
          method: Similar bugs assigned to which team
      - affected_file_ownership:
          weight: 0.10
          method: Git blame + CODEOWNERS mapping
    fallback: triage-team
    confidence_threshold: 0.60

  reproduction_scoring:
    factors:
      steps_provided:
        weight: 0.35
        scoring:
          detailed_steps: 1.0
          partial_steps: 0.6
          no_steps: 0.0
      environment_specified:
        weight: 0.25
        scoring:
          full_env: 1.0
          partial_env: 0.5
          no_env: 0.0
      consistency:
        weight: 0.20
        scoring:
          always_reproduces: 1.0
          sometimes: 0.5
          random: 0.2
      logs_stack_trace:
        weight: 0.20
        scoring:
          both: 1.0
          one: 0.6
          neither: 0.0
    score_ranges:
      high: 0.75-1.0
      medium: 0.50-0.74
      low: 0.25-0.49
      very_low: 0.0-0.24

  input_schema:
    type: object
    required:
      - title
      - description
    properties:
      title:
        type: string
        description: Bug title/summary
        example: "API returns 500 error on user profile update"
      description:
        type: string
        description: Detailed bug description
        example: "When updating user profile with special characters in bio field..."
      stack_trace:
        type: string
        description: Full stack trace if available
      error_message:
        type: string
        description: Error message shown to user or in logs
      steps_to_reproduce:
        type: array
        items:
          type: string
        description: Ordered list of reproduction steps
      expected_behavior:
        type: string
        description: What should happen
      actual_behavior:
        type: string
        description: What actually happens
      environment:
        type: object
        properties:
          platform:
            type: string
            enum: [web, ios, android, desktop, server]
          os:
            type: string
            example: "macOS 14.1"
          browser:
            type: string
            example: "Chrome 120.0"
          app_version:
            type: string
            example: "v2.4.1"
          environment_type:
            type: string
            enum: [production, staging, development, local]
      frequency:
        type: string
        enum: [constant, frequent, occasional, rare]
        description: How often the bug occurs
      affected_users:
        oneOf:
          - type: integer
            description: Number of affected users
          - type: string
            enum: [all, most, some, few]
      logs:
        type: string
        description: Relevant log entries
      screenshots:
        type: array
        items:
          type: string
        description: URLs or paths to screenshots
      reported_by:
        type: object
        properties:
          name:
            type: string
          email:
            type: string
          user_type:
            type: string
            enum: [customer, internal, qa, developer]
      additional_context:
        type: object
        description: Any other relevant information

  output_schema:
    type: object
    properties:
      triage_summary:
        type: object
        properties:
          bug_id:
            type: string
            description: Generated or assigned bug ID
          severity:
            type: string
            enum: [critical, high, medium, low]
          priority:
            type: integer
            minimum: 1
            maximum: 100
          priority_justification:
            type: string
          assigned_component:
            type: string
          assigned_team:
            type: string
          assignment_confidence:
            type: number
            minimum: 0
            maximum: 1
          reproduction_score:
            type: number
            minimum: 0
            maximum: 1
          estimated_time_to_fix_hours:
            type: number
          sla_deadline:
            type: string
            format: date-time

      classification:
        type: object
        properties:
          severity_analysis:
            type: object
            properties:
              level:
                type: string
              reasoning:
                type: array
                items:
                  type: string
              triggers_matched:
                type: array
                items:
                  type: string
              user_impact_assessment:
                type: string
          error_category:
            type: string
            example: "database_query_error"
          bug_type:
            type: string
            enum: [functional, performance, security, ui, data, integration, regression]
          affected_features:
            type: array
            items:
              type: string

      duplicate_analysis:
        type: object
        properties:
          is_duplicate:
            type: boolean
          duplicate_of:
            type: string
            description: Bug ID of original issue
          similarity_score:
            type: number
            minimum: 0
            maximum: 1
          matching_method:
            type: string
            enum: [semantic, stack_trace, error_pattern, manual]
          confidence:
            type: number
            minimum: 0
            maximum: 1

      similar_bugs:
        type: array
        items:
          type: object
          properties:
            bug_id:
              type: string
            title:
              type: string
            similarity_score:
              type: number
            status:
              type: string
            resolution:
              type: string
            time_to_fix_hours:
              type: number
            similar_because:
              type: string
        description: Similar bugs for context (not exact duplicates)

      stack_trace_analysis:
        type: object
        properties:
          parsed:
            type: boolean
          root_cause_location:
            type: object
            properties:
              file:
                type: string
              line:
                type: integer
              function:
                type: string
              component:
                type: string
          call_stack:
            type: array
            items:
              type: object
              properties:
                file:
                  type: string
                line:
                  type: integer
                function:
                  type: string
          affected_modules:
            type: array
            items:
              type: string
          external_dependencies_involved:
            type: array
            items:
              type: string

      reproduction_analysis:
        type: object
        properties:
          score:
            type: number
            minimum: 0
            maximum: 1
          score_level:
            type: string
            enum: [high, medium, low, very_low]
          missing_information:
            type: array
            items:
              type: string
          reproduction_confidence:
            type: string
          generated_test_case:
            type: string
            description: Auto-generated test case if steps are clear

      suggested_fixes:
        type: array
        items:
          type: object
          properties:
            description:
              type: string
            similar_bug_id:
              type: string
            fix_applied:
              type: string
            confidence:
              type: number
            files_to_check:
              type: array
              items:
                type: string
            fix_type:
              type: string
              enum: [code_change, config_change, schema_change, dependency_update]
            estimated_effort:
              type: string
              enum: [quick_fix, normal, complex]

      routing:
        type: object
        properties:
          issue_created:
            type: boolean
          issue_url:
            type: string
          assigned_to:
            type: array
            items:
              type: string
          labels:
            type: array
            items:
              type: string
          linked_issues:
            type: array
            items:
              type: string
          notifications_sent:
            type: array
            items:
              type: object
              properties:
                recipient:
                  type: string
                channel:
                  type: string
                  enum: [slack, email, pagerduty]

      escalation:
        type: object
        properties:
          should_escalate:
            type: boolean
          escalate_to:
            type: string
            enum: [engineering-manager, incident-responder, security-team, executive]
          reason:
            type: string
          urgency:
            type: string
            enum: [immediate, within_1_hour, within_4_hours, standard]

      metadata:
        type: object
        properties:
          triage_timestamp:
            type: string
            format: date-time
          triage_duration_ms:
            type: integer
          confidence_scores:
            type: object
            properties:
              severity:
                type: number
              component_assignment:
                type: number
              duplicate_detection:
                type: number
              fix_suggestions:
                type: number
          automated_actions_taken:
            type: array
            items:
              type: string

  performance:
    avg_latency_ms: 5000
    max_tokens: 32000
    timeout_seconds: 120
    cache_similar_bugs: true
    cache_ttl_seconds: 3600

  parallelization:
    max_concurrent: 15
    parallel_tasks:
      - duplicate_detection
      - similar_bug_search
      - stack_trace_analysis
      - fix_suggestion_lookup
    recommended_batch_size: 5

  cost_model:
    input_tokens_per_bug: 2000
    output_tokens_per_bug: 3000
    cost_per_1m_input_tokens: 3.00
    cost_per_1m_output_tokens: 15.00
    estimated_cost_per_bug: 0.051
    notes: |
      - Simple bugs (no stack trace): ~1500 input, ~2000 output = $0.033
      - Complex bugs (stack trace + logs): ~3000 input, ~4000 output = $0.069
      - Batch processing 100 bugs: ~$5.10 (with parallelization)
      - Additional costs for codebase indexing (one-time): ~$2-5 depending on size

  collaboration:
    receives_from:
      - user: Manual bug reports
      - qa-engineer: QA test failure reports
      - error-tracking-systems: Automated error reports (Sentry, Rollbar, etc)
      - issue-tracker-integration: Imported bugs from Jira, Linear, GitHub Issues
      - customer-support: Customer-reported issues
      - monitoring-systems: Alert-triggered bugs

    delegates_to:
      - code-reviewer: Impact analysis for severity assessment
      - codebase-indexer: Find relevant code and historical fixes
      - github-integration: Create/update issues and link related bugs
      - semantic-analyzer: Deep semantic similarity for duplicate detection
      - error-diagnosis-debugger: Complex root cause analysis

    queries:
      - pattern-miner: Identify known error patterns
      - dependency-analyzer: Check if bug is dependency-related
      - codebase-indexer: Query bug history and fix patterns

    escalates_to:
      - engineering-manager: Critical bugs requiring immediate attention
      - incident-responder: Production outages and P0 incidents
      - security-engineer: Security vulnerabilities (CVE, data breach)
      - system-architect: Architectural issues requiring design changes

    returns_to:
      - requesting-source: Triage results with priority and assignment

    swarm_pattern: scatter-gather

    coordinates_with:
      - notification-reporter: Send triage summaries to stakeholders
      - metrics-reporter: Track triage metrics (time, accuracy, SLA compliance)

  algorithm_details:
    severity_classification_algorithm: |
      1. Extract keywords from title + description (data loss, crash, security, etc)
      2. Parse stack trace for error type (NPE, timeout, auth failure, etc)
      3. Calculate affected user percentage or count
      4. Identify affected environment (production = higher severity)
      5. Check for data integrity impact
      6. Match against severity trigger patterns
      7. Apply severity rules with confidence scoring
      8. Return highest matched severity level with justification

    duplicate_detection_algorithm: |
      1. Generate embedding for title + description (semantic)
      2. Normalize stack trace (remove line numbers, local paths)
      3. Extract error pattern template from error message
      4. Query similar bugs from last 180 days (open + recently closed)
      5. Calculate semantic similarity (cosine distance)
      6. Calculate stack trace similarity (Levenshtein distance)
      7. Calculate error pattern match score
      8. Combine scores: 0.4 × semantic + 0.4 × stack + 0.2 × pattern
      9. If combined score > 0.85 AND manual review confidence > 0.7: mark duplicate
      10. Return top 5 candidates for manual review if < threshold

    component_assignment_algorithm: |
      1. Parse stack trace for file paths
      2. Map file paths to components using ownership matrix
      3. Extract domain keywords (auth, payment, api, database, etc)
      4. Query historical bugs with similar patterns
      5. Find most common component for similar bugs
      6. Apply git blame + CODEOWNERS for fine-grained ownership
      7. Calculate weighted confidence score
      8. If confidence > 0.6: auto-assign
      9. If confidence < 0.6: assign to triage-team for manual routing

    priority_calculation_algorithm: |
      1. Map severity to weight (critical=10, high=7, medium=4, low=1)
      2. Map frequency to score (constant=10, frequent=7, occasional=4, rare=1)
      3. Map affected users to impact (all=10, most=7, some=4, few=1)
      4. Estimate time to fix from similar bugs (default=8 hours)
      5. Calculate: priority = (severity × frequency × impact) / time_estimate
      6. Normalize to 1-100 scale
      7. Apply boosters: production=1.5×, regression=1.3×, security=2.0×
      8. Return priority score with justification

    fix_suggestion_algorithm: |
      1. Find similar bugs (same component, similar stack trace)
      2. Filter for resolved bugs with linked commits/PRs
      3. Extract fix patterns (files changed, code patterns)
      4. Calculate fix similarity score
      5. Rank by: similarity × fix success rate × recency
      6. Return top 3 suggestions with confidence scores
      7. Generate fix hypothesis based on error type + past patterns

  examples:
    - name: "Critical Production Database Deadlock"
      input:
        title: "Payment processing fails with database deadlock"
        description: |
          Production payment processing is failing intermittently with database deadlock errors.
          Affects all users attempting to make purchases. Started 30 minutes ago.
        stack_trace: |
          ERROR: deadlock detected
          DETAIL: Process 12345 waits for ShareLock on transaction 67890
          CONTEXT: while updating table "payments"
          at com.app.PaymentService.processPayment(PaymentService.java:145)
          at com.app.CheckoutController.handleCheckout(CheckoutController.java:89)
        steps_to_reproduce:
          - Go to checkout page
          - Add payment information
          - Click "Complete Purchase"
          - Error appears after 5-10 seconds
        environment:
          platform: web
          environment_type: production
          app_version: v2.4.1
        frequency: frequent
        affected_users: all
      output:
        triage_summary:
          severity: critical
          priority: 98
          priority_justification: "Critical severity (10) × frequent occurrence (7) × all users affected (10) / estimated 4h fix = 175, boosted by production environment (1.5×) = 262, normalized to 98/100"
          assigned_component: payment-service
          assigned_team: backend-payments
          assignment_confidence: 0.95
          reproduction_score: 0.85
          estimated_time_to_fix_hours: 4
          sla_deadline: "2026-01-24T18:00:00Z"
        classification:
          severity_analysis:
            level: critical
            reasoning:
              - "Production system impacted"
              - "Payment processing (revenue critical) is broken"
              - "Affects all users (100%)"
              - "No workaround available"
            triggers_matched:
              - "Payment processing failure"
              - "Complete service outage for critical feature"
            user_impact_assessment: "All users unable to complete purchases, direct revenue impact"
          error_category: database_deadlock
          bug_type: functional
          affected_features:
            - payment-processing
            - checkout-flow
        duplicate_analysis:
          is_duplicate: false
          similarity_score: 0.32
          confidence: 0.95
        similar_bugs:
          - bug_id: BUG-1234
            title: "Database timeout in payment processing"
            similarity_score: 0.72
            status: closed
            resolution: "Added database connection pooling"
            time_to_fix_hours: 6
            similar_because: "Same component, similar database issue"
        stack_trace_analysis:
          parsed: true
          root_cause_location:
            file: "PaymentService.java"
            line: 145
            function: "processPayment"
            component: payment-service
          affected_modules:
            - payment-service
            - database-layer
        suggested_fixes:
          - description: "Review transaction isolation levels and add optimistic locking"
            similar_bug_id: "BUG-1234"
            confidence: 0.75
            files_to_check:
              - "PaymentService.java"
              - "payment-schema.sql"
            fix_type: code_change
            estimated_effort: normal
        escalation:
          should_escalate: true
          escalate_to: incident-responder
          reason: "Critical production issue affecting revenue"
          urgency: immediate

    - name: "Medium Priority UI Rendering Bug"
      input:
        title: "Profile avatar not displaying on mobile Safari"
        description: |
          User profile avatars show as broken image icon on mobile Safari.
          Works fine on Chrome mobile and desktop browsers.
          Started after v2.4.0 deployment.
        steps_to_reproduce:
          - Open app on iPhone with Safari
          - Navigate to any user profile
          - Avatar shows broken image icon
        expected_behavior: "Avatar image should display correctly"
        actual_behavior: "Broken image icon appears"
        environment:
          platform: ios
          os: "iOS 17.2"
          browser: "Safari 17.2"
          app_version: v2.4.0
        frequency: constant
        affected_users: some
        screenshots:
          - "https://example.com/screenshot1.png"
      output:
        triage_summary:
          severity: medium
          priority: 42
          priority_justification: "Medium severity (4) × constant occurrence (10) × some users affected (4) / estimated 2h fix = 80, normalized to 42/100"
          assigned_component: frontend-profile
          assigned_team: frontend-web
          assignment_confidence: 0.88
          reproduction_score: 0.90
          estimated_time_to_fix_hours: 2
          sla_deadline: "2026-01-27T14:00:00Z"
        classification:
          severity_analysis:
            level: medium
            reasoning:
              - "UI rendering issue"
              - "Affects specific browser/platform combination"
              - "Functionality not broken, just visual"
              - "Some users affected (iOS Safari users)"
            triggers_matched:
              - "UI/UX issues"
              - "Affects 5-25% of users"
            user_impact_assessment: "Visual issue affecting iOS Safari users, but profile functionality still works"
          error_category: ui_rendering
          bug_type: ui
          affected_features:
            - user-profile
            - avatar-display
        duplicate_analysis:
          is_duplicate: false
          similarity_score: 0.45
        similar_bugs:
          - bug_id: BUG-2345
            title: "Images not loading on Safari 16"
            similarity_score: 0.68
            status: closed
            resolution: "Updated image CDN headers for Safari compatibility"
            time_to_fix_hours: 3
            similar_because: "Safari-specific rendering issue"
        reproduction_analysis:
          score: 0.90
          score_level: high
          missing_information: []
          reproduction_confidence: "High - clear steps and specific environment"
        suggested_fixes:
          - description: "Check Content-Security-Policy headers for Safari compatibility"
            similar_bug_id: "BUG-2345"
            confidence: 0.70
            files_to_check:
              - "ProfileAvatar.tsx"
              - "middleware/headers.ts"
            fix_type: config_change
            estimated_effort: quick_fix
          - description: "Update image URL format for Safari WebKit compatibility"
            confidence: 0.65
            files_to_check:
              - "ProfileAvatar.tsx"
              - "utils/imageUrl.ts"
            fix_type: code_change
            estimated_effort: quick_fix
        escalation:
          should_escalate: false

    - name: "Duplicate Bug Detection Example"
      input:
        title: "API timeout when fetching user data"
        description: |
          Getting timeout errors when loading user dashboard.
          Request to /api/users/me takes over 30 seconds and times out.
        stack_trace: |
          TimeoutError: Request timed out after 30000ms
          at fetchUserData (api.ts:234)
          at UserDashboard.componentDidMount (UserDashboard.tsx:45)
        environment:
          platform: web
          environment_type: production
        frequency: occasional
        affected_users: few
      output:
        triage_summary:
          severity: high
          priority: 35
          assigned_component: backend-api
          assigned_team: backend-core
          reproduction_score: 0.65
        duplicate_analysis:
          is_duplicate: true
          duplicate_of: "BUG-3456"
          similarity_score: 0.91
          matching_method: semantic
          confidence: 0.93
        similar_bugs:
          - bug_id: BUG-3456
            title: "Timeout loading user dashboard - API performance issue"
            similarity_score: 0.91
            status: in_progress
            similar_because: "Exact same API endpoint, same error type, same timeout duration"
        routing:
          issue_created: false
          issue_url: "https://github.com/org/repo/issues/3456"
          labels:
            - duplicate
            - linked-to-3456
          notifications_sent:
            - recipient: reporter
              channel: email
        metadata:
          automated_actions_taken:
            - "Marked as duplicate of BUG-3456"
            - "Added comment linking to original bug"
            - "Notified reporter with link to original issue"
            - "Added vote/affected user count to original bug"

  edge_cases:
    - case: "Incomplete bug report"
      handling: "Assign low priority, request more info from reporter, score reproduction as very_low"
    - case: "No stack trace available"
      handling: "Use keyword analysis and historical patterns for component assignment"
    - case: "Multiple components involved"
      handling: "Assign to primary component, add labels for secondary components"
    - case: "Conflicting severity indicators"
      handling: "Default to higher severity, flag for manual review"
    - case: "Cannot determine duplicate status"
      handling: "Return similar bugs for manual review, do not auto-close"
    - case: "Component assignment confidence < 0.6"
      handling: "Assign to triage-team for manual routing"
    - case: "Security vulnerability detected"
      handling: "Auto-escalate to security-engineer, limit issue visibility, mark as confidential"

  quality_metrics:
    tracks:
      - triage_accuracy: "% of bugs correctly classified"
      - duplicate_detection_precision: "% of duplicate flags that are actual duplicates"
      - duplicate_detection_recall: "% of actual duplicates detected"
      - component_assignment_accuracy: "% of auto-assignments that are correct"
      - sla_compliance: "% of bugs triaged within SLA"
      - time_to_triage: "Average time from bug report to triage completion"
      - auto_assignment_rate: "% of bugs auto-assigned vs manual triage"
      - escalation_rate: "% of bugs that require escalation"
    targets:
      triage_accuracy: ">90%"
      duplicate_detection_precision: ">95%"
      component_assignment_accuracy: ">85%"
      sla_compliance: ">95%"
      time_to_triage: "<5 minutes"

  tags:
    - workflow
    - bug-triage
    - classification
    - prioritization
    - duplicate-detection
    - automation
    - issue-management
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
