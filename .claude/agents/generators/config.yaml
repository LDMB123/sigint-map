# Universal Agent Framework - Configuration Generator
# Category: Generators | Tier: Sonnet | Parallelization: 30

agent:
  id: generator_config
  name: Configuration Generator
  version: 1.0.0

  functional_category: generator
  sub_category: config
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Generates configuration files for various tools and platforms.
    Creates CI/CD configs, build configs, linter configs, and deployment manifests.
    Supports all major configuration formats and platforms.

  capabilities:
    - generate_ci_config
    - create_build_config
    - generate_linter_config
    - create_deployment_manifest
    - generate_docker_config
    - create_k8s_manifests
    - generate_terraform_config
    - create_env_files
    - generate_package_json
    - create_tsconfig

  supported_platforms:
    - github_actions
    - gitlab_ci
    - circleci
    - jenkins
    - azure_devops
    - aws_codebuild
    - docker
    - docker_compose
    - kubernetes
    - helm
    - terraform
    - pulumi
    - cloudformation
    - ansible

  config_types:
    - ci_cd
    - build
    - lint
    - test
    - deploy
    - container
    - orchestration
    - infrastructure
    - development
    - runtime

  input_schema:
    type: object
    required:
      - config_type
    properties:
      config_type:
        type: string
      platform:
        type: string
      project_context:
        type: object
        properties:
          language:
            type: string
          framework:
            type: string
          dependencies:
            type: array
            items:
              type: string
      requirements:
        type: object
        description: Specific requirements for the config
      template:
        type: string
        description: Base template to customize
      environment:
        type: string
        enum: [development, staging, production]
        default: development

  output_schema:
    type: object
    properties:
      config_file:
        type: string
        description: Generated config content
      filename:
        type: string
        description: Recommended filename
      format:
        type: string
        enum: [yaml, json, toml, ini, hcl, xml]
      validation_status:
        type: boolean
      warnings:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 8000
    timeout_seconds: 30

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 30

  collaboration:
    receives_from:
      - devops-engineer: CI/CD and infrastructure config generation
      - production-readiness-orchestrator: Deployment configuration generation
      - convention-extractor: Generate linter/formatter configs from conventions
      - build-debugger: Fix broken configurations
      - full-stack-developer: Project setup configuration
    delegates_to:
      - syntax-validator: Validate generated config syntax
      - schema-validator: Validate config against schemas
    queries:
      - codebase-indexer: Query project structure for config generation
      - dependency-analyzer: Query dependencies for config requirements
    returns_to:
      - orchestrating-agent: Generated configuration with validation status
    swarm_pattern: pipeline
    coordinates_with:
      - documentation-generator: Document configuration options

  tags:
    - generation
    - configuration
    - ci_cd
    - infrastructure
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
