# Universal Agent Framework - Summary Reporter
# Category: Reporters | Tier: Sonnet | Parallelization: 30

agent:
  id: reporter_summary
  name: Summary Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: summary
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Generates concise summaries of agent results and workflows.
    Creates executive summaries, changelogs, and status reports.
    Adapts output format and detail level to audience.

  capabilities:
    - summarize_results
    - generate_changelog
    - create_status_report
    - summarize_analysis
    - create_executive_summary
    - generate_diff_summary
    - summarize_errors
    - create_progress_report
    - generate_release_notes
    - summarize_metrics

  report_types:
    executive_summary:
      audience: leadership
      detail_level: high_level
      format: prose

    technical_summary:
      audience: developers
      detail_level: detailed
      format: structured

    changelog:
      audience: users
      detail_level: medium
      format: list

    status_report:
      audience: team
      detail_level: medium
      format: structured

  input_schema:
    type: object
    required:
      - data
    properties:
      data:
        type: object
        description: Data to summarize
      report_type:
        type: string
        enum:
          - executive_summary
          - technical_summary
          - changelog
          - status_report
          - release_notes
          - error_report
        default: technical_summary
      audience:
        type: string
        enum: [leadership, developers, users, team]
      max_length:
        type: integer
        description: Maximum summary length in words
      format:
        type: string
        enum: [markdown, html, plain, json]
        default: markdown
      include_metrics:
        type: boolean
        default: true
      include_recommendations:
        type: boolean
        default: true

  output_schema:
    type: object
    properties:
      summary:
        type: string
      sections:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            content:
              type: string
            priority:
              type: string
      highlights:
        type: array
        items:
          type: string
      metrics:
        type: object
      recommendations:
        type: array
        items:
          type: string
      metadata:
        type: object
        properties:
          word_count:
            type: integer
          generated_at:
            type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 8000
    timeout_seconds: 30

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 20

  collaboration:
    receives_from:
      - migration-orchestrator: Summarize migration results for stakeholders
      - performance-optimization-orchestrator: Create performance improvement summaries
      - security-hardening-orchestrator: Generate security audit summaries
      - test-coverage-orchestrator: Summarize test coverage reports
      - incident-postmortem-conductor: Create incident summaries
      - engineering-manager: Generate team status reports
    queries:
      - metrics-reporter: Query metrics for summary inclusion
      - audit-trail-reporter: Query audit events for summaries
    returns_to:
      - orchestrating-agent: Formatted summary report tailored to audience
    swarm_pattern: pipeline
    coordinates_with:
      - notification-reporter: Distribute summaries to stakeholders
      - visualization-reporter: Create visual summaries

  tags:
    - reporting
    - summary
    - documentation
    - communication
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
