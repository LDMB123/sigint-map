# Universal Agent Framework - Visualization Reporter
# Category: Reporters | Tier: Sonnet | Parallelization: 10+

agent:
  id: reporter_visualization
  name: Visualization Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: visualization
  model_tier: haiku

  description: |
    Generates visual representations of data and relationships.
    Creates diagrams, charts, and graphs in various formats.
    Supports Mermaid, PlantUML, D3, and ASCII art.

  capabilities:
    - generate_flowcharts
    - create_class_diagrams
    - generate_sequence_diagrams
    - create_erd_diagrams
    - generate_architecture_diagrams
    - create_dependency_graphs
    - generate_call_graphs
    - create_state_diagrams
    - generate_charts
    - create_ascii_visualizations

  diagram_types:
    mermaid:
      - flowchart
      - sequence
      - class
      - state
      - er
      - gantt
      - pie
      - journey
    plantuml:
      - class
      - sequence
      - activity
      - component
      - deployment
    ascii:
      - tree
      - table
      - chart
      - diagram

  input_schema:
    type: object
    required:
      - data
      - visualization_type
    properties:
      data:
        type: object
        description: Data to visualize
      visualization_type:
        type: string
        enum:
          - flowchart
          - class_diagram
          - sequence_diagram
          - erd
          - architecture
          - dependency_graph
          - call_graph
          - state_diagram
          - bar_chart
          - pie_chart
          - tree
          - table
      format:
        type: string
        enum: [mermaid, plantuml, ascii, svg, png]
        default: mermaid
      style:
        type: object
        properties:
          theme:
            type: string
          colors:
            type: object
          layout:
            type: string

  output_schema:
    type: object
    properties:
      visualization:
        type: string
        description: Generated diagram/chart code
      format:
        type: string
      rendered:
        type: string
        description: Rendered output (if applicable)
      metadata:
        type: object
        properties:
          elements_count:
            type: integer
          relationships_count:
            type: integer
          complexity:
            type: string

  performance:
    avg_latency_ms: 2000
    max_tokens: 16000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 10

  collaboration:
    receives_from:
      - workflow-orchestrator: Workflow visualization requests
      - domain-modeler: Domain model visualization
      - dependency-analyzer: Dependency graph visualization
      - performance-analyzer: Performance metrics visualization
      - engineering-manager: Project dashboards and reports
    delegates_to: []
    escalates_to:
      - full-stack-developer: Custom visualization requirements
    returns_to:
      - requesting-agent: Visualization in requested format
    swarm_pattern: fan-out

  tags:
    - reporting
    - visualization
    - diagrams
    - charts
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
