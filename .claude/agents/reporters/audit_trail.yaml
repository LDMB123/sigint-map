# Universal Agent Framework - Audit Trail Reporter
# Category: Reporters | Tier: Haiku | Parallelization: 50+

agent:
  id: reporter_audit_trail
  name: Audit Trail Reporter
  version: 1.0.0

  functional_category: reporter
  sub_category: audit_trail
  model_tier: haiku

  description: |
    Generates comprehensive audit trails for agent activities.
    Records decisions, changes, and events for compliance.
    Creates immutable logs with timestamps and context.

  capabilities:
    - record_decisions
    - log_changes
    - track_approvals
    - document_rationale
    - create_compliance_reports
    - generate_change_logs
    - track_access
    - document_errors
    - record_rollbacks
    - create_forensic_reports

  audit_categories:
    decisions:
      - agent_selection
      - task_routing
      - conflict_resolution
      - approval_decisions
    changes:
      - code_modifications
      - config_changes
      - permission_changes
      - state_changes
    events:
      - start_events
      - completion_events
      - error_events
      - escalation_events

  input_schema:
    type: object
    required:
      - audit_events
    properties:
      audit_events:
        type: array
        items:
          type: object
          properties:
            timestamp:
              type: string
            event_type:
              type: string
            actor:
              type: string
            action:
              type: string
            target:
              type: string
            context:
              type: object
            outcome:
              type: string
      format:
        type: string
        enum: [json, jsonl, markdown, csv]
        default: jsonl
      include_context:
        type: boolean
        default: true
      time_range:
        type: object
        properties:
          start:
            type: string
          end:
            type: string

  output_schema:
    type: object
    properties:
      audit_log:
        type: string
        description: Formatted audit trail
      entries:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            timestamp:
              type: string
            event_type:
              type: string
            actor:
              type: string
            action:
              type: string
            target:
              type: string
            outcome:
              type: string
            hash:
              type: string
      summary:
        type: object
        properties:
          total_events:
            type: integer
          events_by_type:
            type: object
          actors:
            type: array
          time_range:
            type: object
      integrity:
        type: object
        properties:
          chain_valid:
            type: boolean
          hash:
            type: string

  performance:
    avg_latency_ms: 500
    max_tokens: 8000
    timeout_seconds: 30

  parallelization:
    max_concurrent: 50

  collaboration:
    receives_from:
      - workflow-orchestrator: Workflow execution audit trails
      - consensus-orchestrator: Decision audit trails
      - security-hardening-orchestrator: Security audit events
      - compliance-checker: Compliance audit events
      - all-orchestrators: General audit event recording
    delegates_to:
      - database-integrator: Persist audit events to database
    escalates_to:
      - compliance-officer: Audit integrity issues
    returns_to:
      - requesting-agent: Audit trail with integrity verification
    swarm_pattern: sequential

  tags:
    - reporting
    - audit
    - compliance
    - logging
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: haiku
  per_execution_estimate: 0.005
  typical_range: [0.001, 0.01]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
