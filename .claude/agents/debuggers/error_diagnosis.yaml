# Universal Agent Framework - Error Diagnosis Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 10+

agent:
  id: debugger_error_diagnosis
  name: Error Diagnosis Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: error_diagnosis
  model_tier: sonnet

  description: |
    Diagnoses errors from stack traces, logs, and error messages.
    Identifies root causes through multi-hypothesis exploration.
    Provides actionable fix recommendations with code changes.

  capabilities:
    - parse_stack_traces
    - analyze_error_messages
    - identify_root_cause
    - correlate_with_logs
    - trace_execution_path
    - identify_failure_patterns
    - suggest_fixes
    - generate_reproduction_steps
    - predict_related_issues
    - create_debug_scripts

  error_categories:
    runtime:
      - null_pointer
      - type_error
      - index_out_of_bounds
      - memory_error
      - stack_overflow
      - division_by_zero
    network:
      - connection_refused
      - timeout
      - dns_failure
      - ssl_error
      - cors_error
    database:
      - connection_error
      - query_error
      - constraint_violation
      - deadlock
      - timeout
    authentication:
      - invalid_credentials
      - token_expired
      - permission_denied
      - session_invalid
    configuration:
      - missing_env
      - invalid_config
      - version_mismatch
      - dependency_conflict

  input_schema:
    type: object
    required:
      - error
    properties:
      error:
        oneOf:
          - type: string
            description: Error message or stack trace
          - type: object
            properties:
              message:
                type: string
              stack:
                type: string
              code:
                type: string
              context:
                type: object
      source_files:
        type: array
        items:
          type: string
        description: Related source files for context
      logs:
        type: string
        description: Recent log output
      environment:
        type: object
        properties:
          runtime:
            type: string
          version:
            type: string
          os:
            type: string
      reproduction_context:
        type: object
        description: How the error occurred

  output_schema:
    type: object
    properties:
      diagnosis:
        type: object
        properties:
          category:
            type: string
          root_cause:
            type: string
          confidence:
            type: number
          evidence:
            type: array
            items:
              type: string
      execution_trace:
        type: array
        items:
          type: object
          properties:
            file:
              type: string
            line:
              type: integer
            function:
              type: string
            state:
              type: object
      hypotheses:
        type: array
        items:
          type: object
          properties:
            hypothesis:
              type: string
            probability:
              type: number
            evidence_for:
              type: array
            evidence_against:
              type: array
      fixes:
        type: array
        items:
          type: object
          properties:
            description:
              type: string
            file:
              type: string
            changes:
              type: array
            risk:
              type: string
            effort:
              type: string
      reproduction_steps:
        type: array
        items:
          type: string
      related_issues:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 180

  parallelization:
    max_concurrent: 10
    can_explore_hypotheses_parallel: true

  collaboration:
    receives_from:
      - runtime-error-diagnostician: Runtime error investigation delegation
      - full-stack-developer: Error diagnosis requests
      - qa-engineer: Production error analysis
      - test-failure-debugger: Complex test failure analysis
    delegates_to:
      - static-analyzer: Analyze code for potential issues
      - dependency-analyzer: Check for dependency conflicts
      - security-scanner: Verify if error is security-related
    queries:
      - codebase-indexer: Search for similar error patterns
      - pattern-miner: Identify known error patterns
    escalates_to:
      - full-stack-developer: Cannot determine root cause, requires human expertise
      - system-architect: Architectural issues causing errors
    returns_to:
      - requesting-agent: Diagnosis with fixes and reproduction steps
    swarm_pattern: hypothesis-exploration

  tags:
    - debugging
    - errors
    - diagnosis
    - root_cause
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
