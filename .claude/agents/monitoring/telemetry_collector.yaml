## Implementation Details

### Database Operations

**Schema**: Uses SQLite database at `/Users/louisherman/.claude/telemetry/metrics.db`

**Core Tables**:
- `agent_invocations`: Every agent call
- `collaboration_events`: Delegation/escalation tracking
- `cache_events`: Cache performance
- `cost_rollups`: Aggregated cost data
- `alerts`: Triggered alerts

**Materialized Views**:
- `v_agent_usage_summary`: Per-agent statistics
- `v_tier_distribution`: Sonnet-first compliance
- `v_hourly_cost_trend`: Cost trends
- `v_collaboration_network`: Delegation graph

### Collection Process

```
1. Agent executes → emits telemetry event
2. Collector receives event asynchronously
3. Validate and enrich event data
4. Insert into appropriate table(s)
5. Update rollup aggregations
6. Check alert thresholds
7. Return confirmation
```

### Alerting Logic

```yaml
alert_rules:
  - name: high_error_rate
    condition: "error_rate > 0.05"  # 5%
    severity: critical
    action: "Log + notify"

  - name: cost_spike
    condition: "hourly_cost > $5.00"
    severity: warning
    action: "Log warning"

  - name: sonnet_first_violation
    condition: "sonnet_percentage < 0.65"  # Below 65% (target: 75-80%)
    severity: info
    action: "Flag for review"

  - name: low_cache_hit_rate
    condition: "cache_hit_rate < 0.80"
    severity: info
    action: "Investigate cache config"
```

