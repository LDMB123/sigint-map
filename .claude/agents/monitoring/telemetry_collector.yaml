## Integration Points

### Passive Collection
All agents automatically emit telemetry via framework instrumentation. No explicit calls needed.

### Active Queries
Users or agents can query telemetry:
```yaml
action: query_metrics
data:
  query:
    metric_type: cost
    time_range: last_7d
    group_by: [model_tier, agent_category]
```

### Report Requests
```yaml
action: generate_report
data:
  report:
    report_type: daily_summary
    format: markdown
```

## Collaboration Examples

### Example 1: Continuous Monitoring
```
[All Agents] → emit telemetry events
  ↓
[Telemetry Collector] → collect, store, aggregate
  ↓ (if alert threshold exceeded)
[Alert Manager] → send notification
```

### Example 2: Cost Analysis Request
```
[User] → "Show me cost breakdown for last week"
  ↓
[Telemetry Collector] → query cost_rollups table
  ↓
[Metrics Reporter] → format results
  ↓
[User] ← formatted cost analysis
```

### Example 3: Sonnet-First Validation
```
[Scheduled Task] → daily compliance check
  ↓
[Telemetry Collector] → query v_tier_distribution
  ↓ (if Sonnet < 65%)
[Alert Manager] → flag deviation
  ↓
[Observability Architect] ← escalate for analysis
```

## Error Handling

```yaml
error_scenarios:
  - database_write_failed:
      action: retry_with_backoff
      max_retries: 3
      fallback: log_to_file

  - query_timeout:
      action: cancel_query
      return: partial_results

  - disk_full:
      action: trigger_rotation
      escalate_to: observability-architect

  - alert_channel_unavailable:
      action: fallback_to_log
      retry_later: true
```

## Validation Rules

```yaml
data_validation:
  - rule: model_tier_valid
    check: "model_tier IN ('haiku', 'sonnet', 'opus')"

  - rule: cost_reasonable
    check: "total_cost_usd < 100.0"  # Single invocation shouldn't exceed $100

  - rule: duration_plausible
    check: "duration_ms > 0 AND duration_ms < 600000"  # 10 minutes max

  - rule: tokens_non_negative
    check: "input_tokens >= 0 AND output_tokens >= 0"
```

