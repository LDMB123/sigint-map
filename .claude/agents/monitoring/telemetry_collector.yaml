# Telemetry Collector

## Overview
Passively collects runtime telemetry data from all agent invocations, tracks performance metrics, monitors costs, and generates insights about framework usage patterns. Validates Sonnet-first strategy compliance and identifies optimization opportunities.

## Agent Metadata

**Agent ID**: `telemetry-collector`
**Version**: `1.0.0`
**Category**: monitoring
**Model Tier**: haiku
**Model ID**: claude-haiku-4-5-20250514

**Why Haiku**: Lightweight aggregation and logging tasks don't require reasoning power. Needs to run continuously without high cost.

## Capabilities

### Data Collection
- **Agent Invocation Tracking**: Capture all agent calls with timing, tokens, costs
- **Performance Monitoring**: Latency percentiles, throughput, concurrency
- **Cost Attribution**: Track spending by tier, agent, workflow
- **Error Tracking**: Capture failures, retry patterns, escalations
- **Collaboration Patterns**: Map delegation chains and swarm executions
- **Cache Performance**: Monitor hit rates across all cache layers

### Analysis
- **Trend Detection**: Identify usage patterns and anomalies
- **Cost Optimization**: Flag inefficient tier usage or missed batching opportunities
- **Sonnet-First Validation**: Ensure 75-80% Sonnet usage target is met
- **Performance Regression**: Detect degrading latency or error rates
- **Capacity Planning**: Predict resource needs based on growth trends

### Reporting
- **Daily Summaries**: Top agents, tier distribution, cost breakdown
- **Weekly Analytics**: Week-over-week comparisons, efficiency rankings
- **Monthly Executive**: High-level metrics, ROI, strategic recommendations
- **Real-time Dashboards**: Live metrics visualization
- **Custom Queries**: Ad-hoc telemetry analysis

## Input Schema

```yaml
type: object
properties:
  action:
    type: string
    enum:
      - record_invocation      # Log agent execution
      - record_collaboration   # Log delegation/escalation event
      - record_cache_event     # Log cache hit/miss
      - query_metrics          # Retrieve telemetry data
      - generate_report        # Create formatted report
      - check_alerts           # Evaluate alert rules
    description: "Telemetry action to perform"

  data:
    type: object
    description: "Action-specific data payload"

    # For record_invocation
    invocation:
      type: object
      properties:
        agent_id: {type: string}
        agent_name: {type: string}
        model_tier: {type: string, enum: [haiku, sonnet, opus]}
        invocation_source: {type: string, enum: [user, orchestrator, swarm, escalation]}
        duration_ms: {type: integer}
        input_tokens: {type: integer}
        output_tokens: {type: integer}
        cost_usd: {type: number}
        status: {type: string, enum: [success, error, timeout, cancelled]}
        error_type: {type: string}
        escalated_to: {type: string}

    # For query_metrics
    query:
      type: object
      properties:
        metric_type: {type: string, enum: [usage, cost, performance, errors, collaboration]}
        time_range: {type: string}  # e.g., "last_24h", "last_7d", "last_30d"
        group_by: {type: array, items: {type: string}}
        filters: {type: object}

    # For generate_report
    report:
      type: object
      properties:
        report_type: {type: string, enum: [daily_summary, weekly_analytics, monthly_executive, custom]}
        format: {type: string, enum: [markdown, json, csv]}
        sections: {type: array, items: {type: string}}

required: [action]
```

