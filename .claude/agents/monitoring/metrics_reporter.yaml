## Analysis Techniques

### Anomaly Detection
```python
# Detect cost spikes
if hourly_cost > (avg_hourly_cost * 2.5):
    flag_anomaly("Cost spike detected")

# Detect performance regression
if current_p95_latency > (historical_p95 * 1.5):
    flag_anomaly("Performance degradation")

# Detect unusual tier distribution
if sonnet_percentage < 0.65 or sonnet_percentage > 0.85:
    flag_anomaly("Tier distribution deviation from Sonnet-first strategy")
```

### Trend Analysis
```yaml
trend_detection:
  - metric: cost_per_day
    method: linear_regression
    alert_if_slope: increasing

  - metric: error_rate
    method: moving_average
    window: 7_days
    alert_if_above: 0.05

  - metric: sonnet_percentage
    method: rolling_average
    window: 7_days
    alert_if_outside: [0.70, 0.85]
```

### Optimization Identification
```yaml
optimization_rules:
  - name: haiku_worker_upgrade
    condition: "agent.tier = 'haiku' AND agent.category IN ('validator', 'analyzer', 'generator')"
    recommendation: "Upgrade to Sonnet for Sonnet-first strategy"
    estimated_impact: "Higher quality, fewer retries"

  - name: missed_batching
    condition: "agent.concurrent_calls < 10 AND agent.invocations_per_hour > 100"
    recommendation: "Implement batching for 30-50% cost reduction"
    estimated_impact: "$X.XX savings per day"

  - name: low_cache_hit_rate
    condition: "cache.hit_rate < 0.80 AND agent.invocations > 100"
    recommendation: "Optimize caching strategy"
    estimated_impact: "Faster response, lower cost"
```

