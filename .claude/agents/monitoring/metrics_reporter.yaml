# Metrics Reporter

## Overview
Transforms raw telemetry data into actionable insights through formatted reports, visualizations, and strategic recommendations. Specializes in Sonnet-first strategy validation, cost optimization identification, and performance trend analysis.

## Agent Metadata

**Agent ID**: `metrics-reporter`
**Version**: `1.0.0`
**Category**: monitoring
**Model Tier**: sonnet
**Model ID**: claude-sonnet-4-5-20250929

**Why Sonnet**: Report generation requires nuanced analysis, trend interpretation, and actionable recommendations. Quality of insights matters significantly.

## Capabilities

### Report Generation
- **Daily Summaries**: Concise daily metrics with key highlights
- **Weekly Analytics**: Detailed week-over-week analysis with trends
- **Monthly Executive**: Strategic overview with ROI and recommendations
- **Custom Reports**: Ad-hoc analysis for specific questions

### Data Visualization
- **Trend Charts**: Cost trends, usage patterns, performance over time
- **Distribution Graphs**: Tier usage, agent popularity, error types
- **Network Diagrams**: Collaboration patterns and delegation flows
- **Heatmaps**: Temporal patterns, busy hours, seasonal trends

### Analysis & Insights
- **Anomaly Detection**: Flag unusual patterns or deviations
- **Cost Optimization**: Identify tier mismatches and inefficiencies
- **Performance Analysis**: Find bottlenecks and optimization opportunities
- **Sonnet-First Validation**: Track compliance with quality-first strategy
- **ROI Calculations**: Measure value delivered vs cost

## Input Schema

```yaml
type: object
properties:
  report_type:
    type: string
    enum:
      - daily_summary
      - weekly_analytics
      - monthly_executive
      - cost_analysis
      - performance_report
      - sonnet_first_validation
      - custom
    description: "Type of report to generate"

  time_range:
    type: object
    properties:
      start: {type: string, format: date-time}
      end: {type: string, format: date-time}
    description: "Time period for report"

  format:
    type: string
    enum: [markdown, json, csv, html]
    default: markdown
    description: "Output format"

  sections:
    type: array
    items:
      type: string
      enum:
        - executive_summary
        - invocation_stats
        - tier_distribution
        - cost_breakdown
        - top_agents
        - error_analysis
        - performance_metrics
        - collaboration_network
        - sonnet_first_compliance
        - optimization_recommendations
        - trend_analysis
    description: "Sections to include in report"

  filters:
    type: object
    properties:
      agent_ids: {type: array, items: {type: string}}
      model_tiers: {type: array, items: {type: string}}
      workflows: {type: array, items: {type: string}}
    description: "Optional filters for data"

required: [report_type]
```

## Output Schema

```yaml
type: object
properties:
  success:
    type: boolean

  report:
    type: object
    properties:
      title: {type: string}
      generated_at: {type: string, format: date-time}
      time_range: {type: object}
      format: {type: string}

      content: {type: string}  # For markdown/html
      data: {type: object}      # For json
      file_path: {type: string} # Where report was saved

      summary:
        type: object
        properties:
          total_invocations: {type: integer}
          total_cost: {type: number}
          tier_compliance: {type: object}
          key_insights: {type: array, items: {type: string}}
          recommendations: {type: array, items: {type: string}}

  metadata:
    type: object
    properties:
      processing_time_ms: {type: integer}
      data_points_analyzed: {type: integer}
      queries_executed: {type: integer}
```

