# PDF Tools Integration

Comprehensive PDF processing including form filling, data extraction, and batch operations.

## When to Use

Use PDF Tools when you need to:
- Extract text and data from PDFs
- Fill PDF forms programmatically
- Process PDFs in batch
- Export PDF form data to CSV
- Validate PDF structure

## Core Workflows

### Workflow 1: Extract Data from PDF

```
1. read_pdf_content(path) - Extract all text and metadata
2. read_pdf_fields(path) - Get form field values
3. extract_to_csv(pdf_path, csv_path) - Export to CSV
```

### Workflow 2: Fill PDF Forms

**One-time Fill:**
```
1. read_pdf_fields(template_path) - See available fields
2. fill_pdf(template_path, output_path, field_values)
```

**Reusable Profile:**
```
1. read_pdf_fields(template_path)
2. save_profile(profile_name, field_mapping)
3. fill_with_profile(template_path, output_path, profile_name, values)
```

### Workflow 3: Batch Processing

```
1. list_pdfs(directory) - Find all PDFs
2. bulk_fill_from_csv(template_path, csv_path, output_dir)
```

## Tool Reference

### Reading & Analysis (3 tools)
- `read_pdf_content` - Extract text, metadata, structure
- `read_pdf_fields` - Get form field names and types
- `validate_pdf` - Check PDF structure and validity

### Form Filling (2 tools)
- `fill_pdf` - One-time form filling
- `fill_with_profile` - Fill using saved profile

### Profiles (3 tools)
- `save_profile` - Save field mapping for reuse
- `load_profile` - Load saved profile
- `list_profiles` - Show all saved profiles

### Batch Operations (2 tools)
- `extract_to_csv` - Export form data to CSV
- `bulk_fill_from_csv` - Fill multiple PDFs from CSV

### Utilities (2 tools)
- `list_pdfs` - List PDFs in directory
- `get_pdf_resource_uri` - Get MCP resource URIs

## Pre-configured Prompts

The extension provides 10 ready-to-use prompts:

1. **Extract text from PDF** - Get all text content
2. **Read form fields** - List available form fields
3. **Fill PDF form** - Complete PDF form
4. **Create reusable profile** - Save field mapping
5. **Use saved profile** - Fill using profile
6. **List available profiles** - Show all profiles
7. **Extract data to CSV** - Export form data
8. **Batch fill from CSV** - Process multiple PDFs
9. **Validate PDF structure** - Check PDF validity
10. **Compare PDFs** - Compare two PDF files

## Common Use Cases

### Use Case 1: Government Form Processing

```typescript
// Step 1: Analyze form structure
const fields = await read_pdf_fields('/path/to/form.pdf');

// Step 2: Create reusable profile
await save_profile('tax-form-2024', {
  'full_name': 'Full Name',
  'ssn': 'Social Security',
  'address': 'Mailing Address'
});

// Step 3: Fill for multiple people
const people = loadFromCSV('people.csv');
for (const person of people) {
  await fill_with_profile(
    '/path/to/form.pdf',
    `/output/${person.id}.pdf`,
    'tax-form-2024',
    person
  );
}
```

### Use Case 2: Contract Processing

```typescript
// Extract signed contract data
const content = await read_pdf_content('/contracts/signed.pdf');
const data = await read_pdf_fields('/contracts/signed.pdf');

// Export to database-friendly format
await extract_to_csv(
  '/contracts/signed.pdf',
  '/data/contracts.csv'
);
```

### Use Case 3: Batch Invoice Generation

```typescript
// List all invoice templates
const templates = await list_pdfs('/templates');

// Process from CSV
await bulk_fill_from_csv(
  '/templates/invoice-template.pdf',
  '/data/invoices-2024.csv',
  '/output/invoices'
);
```

## Field Mapping Best Practices

### 1. Discover Field Names First
```typescript
const fields = await read_pdf_fields('template.pdf');
// Returns: { field_name: { type, value, options } }
```

### 2. Create Descriptive Profiles
```typescript
await save_profile('client-intake-form', {
  'client_name': 'Full Name',
  'client_email': 'Email Address',
  'service_date': 'Date of Service',
  'amount_due': 'Total Amount'
});
```

### 3. Use Consistent Naming
- Profile names: lowercase-with-hyphens
- Field mappings: exact matches to PDF field names
- CSV columns: match field mapping keys

## Data Types & Validation

**Supported Field Types:**
- Text fields
- Checkboxes
- Radio buttons
- Dropdown menus
- Date fields
- Signature fields (placeholder only)

**Validation:**
```typescript
// Always validate before bulk operations
const isValid = await validate_pdf('template.pdf');
if (!isValid) {
  throw new Error('Invalid PDF structure');
}
```

## CSV Format for Batch Operations

### Export Format (extract_to_csv)
```csv
field_name_1,field_name_2,field_name_3
value_1,value_2,value_3
```

### Import Format (bulk_fill_from_csv)
```csv
output_filename,field_name_1,field_name_2
invoice_001.pdf,John Doe,12345
invoice_002.pdf,Jane Smith,67890
```

## Error Handling

**Common Errors:**
1. **Field Not Found** - Check field names with `read_pdf_fields`
2. **Invalid PDF** - Validate with `validate_pdf` first
3. **Profile Not Found** - List profiles with `list_profiles`
4. **CSV Mismatch** - Ensure CSV columns match field names

**Error Recovery:**
```typescript
try {
  await fill_pdf(template, output, values);
} catch (error) {
  // Fallback: validate and retry
  const isValid = await validate_pdf(template);
  if (isValid) {
    const fields = await read_pdf_fields(template);
    // Fix field mapping based on actual fields
  }
}
```

## Performance Optimization

### Batch Operations
- Use `bulk_fill_from_csv` instead of loops (faster)
- Process in chunks for large datasets (100-500 PDFs)
- Cache field mappings in profiles

### Resource Management
- List PDFs before processing (`list_pdfs`)
- Validate templates once, fill many times
- Reuse profiles across operations

## Integration with Other Tools

**Complements:**
- Desktop Commander (for file management)
- Filesystem (for directory operations)

**Workflow Example:**
```typescript
// 1. Find PDFs with Desktop Commander
const files = await list_directory('/pdfs');

// 2. Process with PDF Tools
for (const file of files.filter(f => f.endsWith('.pdf'))) {
  const content = await read_pdf_content(file);
  // Process content
}
```

## Security Considerations

- PDF Tools operates on files only (no network access)
- Profiles stored locally (no cloud sync)
- No executable content processing (forms only)
- Safe for automated workflows

## Limitations

- Cannot edit PDF content (forms and metadata only)
- No OCR capabilities (text must be machine-readable)
- Signature fields create placeholders, not cryptographic signatures
- Complex PDF features may not be fully supported

