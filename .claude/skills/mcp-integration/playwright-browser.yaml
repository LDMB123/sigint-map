console.log('Network requests:', requests);

const console_logs = await browser_console_messages();
console.log('Browser console:', console_logs);
```

### Visual Debugging
```typescript
// Take screenshots at each step
await browser_navigate(url);
await browser_take_screenshot('step1-navigate.png');

await browser_click(selector);
await browser_take_screenshot('step2-click.png');
```

## Limitations

- Cannot bypass CAPTCHAs (intentional security feature)
- Some sites detect and block automation
- JavaScript-heavy SPAs may require complex waits
- File downloads require special handling
- Browser must be installed on system

## Best Practices

1. **Always close browser** when done
2. **Use specific selectors** (IDs over classes)
3. **Wait for conditions** (not fixed timeouts)
4. **Handle errors gracefully**
5. **Test selectors** before full automation
6. **Respect site ToS** and robots.txt
7. **Add user-agent** for identification
8. **Use headless mode** for production
9. **Clear state** between sessions
10. **Monitor for changes** (sites update frequently)

