# macOS Automation Integration

Comprehensive macOS automation using AppleScript, iMessage, and Apple Notes.

## Security Warning

⚠️ **HIGH RISK TOOLS** - These tools have system-level access:
- `osascript`: Can control ANY Mac application
- `send_imessage`: Can send messages to contacts
- `update_note_content`: Can modify note data

**ALWAYS review commands before execution and get user approval for system-level operations.**

## osascript (AppleScript Execution)

### When to Use

Use osascript when you need to:
- Control Mac applications (Finder, Safari, Mail, etc.)
- Automate UI interactions
- System configuration changes
- App-to-app integration

### AppleScript Patterns

#### Pattern 1: Application Control

```applescript
-- Open application
tell application "Safari"
    activate
    open location "https://example.com"
end tell

-- Control Finder
tell application "Finder"
    set theFolder to (path to desktop folder)
    open theFolder
end tell

-- Quit application
tell application "Safari"
    quit
end tell
```

#### Pattern 2: System Preferences

```applescript
-- Set volume
set volume output volume 50

-- Enable/disable WiFi
tell application "System Events"
    tell network preferences
        set WiFiService to service "Wi-Fi"
        set AirPortPower of WiFiService to true
    end tell
end tell

-- Display dialog
display dialog "Task completed" buttons {"OK"} default button 1
```

#### Pattern 3: File Operations

```applescript
-- Move file
tell application "Finder"
    move file "Macintosh HD:Users:username:file.txt" to folder "Macintosh HD:Users:username:Documents"
end tell

-- Get file info
tell application "Finder"
    set fileSize to size of file "Macintosh HD:Users:username:file.txt"
end tell
```

### Safety Guidelines

1. **Never execute untrusted AppleScript** - Always review before running
2. **Test on non-critical data** first
3. **Use tell...end tell blocks** for proper scoping
4. **Handle errors gracefully**:
```applescript
try
    -- risky operation
on error errMsg
    display dialog "Error: " & errMsg
end try
```

4. **Get user confirmation** for destructive operations:
```applescript
set userResponse to button returned of (display dialog "Continue?" buttons {"Cancel", "OK"})
if userResponse is "OK" then
    -- proceed
end if
```

## iMessage Automation

### Tools

- `send_imessage` - Send messages
- `search_contacts` - Find contacts
- `read_imessages` - Read message history
- `get_unread_imessages` - Get unread messages

### macOS Permissions Required

1. Full Disk Access for Claude
2. Contacts access
3. Messages app must be configured

### Workflows

#### Workflow 1: Send Message

```typescript
// Step 1: Find contact
const contacts = await search_contacts('John');

// Step 2: Send message
await send_imessage(
  recipient: 'john@example.com', // or phone number
  message: 'Hello from automation!'
);
```

#### Workflow 2: Read Messages

```typescript
// Get unread messages
const unread = await get_unread_imessages();

// Read specific conversation
const messages = await read_imessages(
  contact: 'john@example.com',
  limit: 50
);
```

### Use Cases

- **Meeting reminders** - Send automated reminders
- **Status updates** - Notify about process completion
- **Message monitoring** - Track unread messages
- **Contact lookup** - Find contact information

### Best Practices

1. **Verify recipient** before sending
2. **Limit message frequency** (avoid spam)
3. **Handle unread messages** in batches
4. **Test with your own number** first

## Apple Notes Integration

### Tools

- `list_notes` - List all notes
- `get_note_content` - Read note content
- `add_note` - Create new notes
- `update_note_content` - Update existing notes

### Workflows

#### Workflow 1: Knowledge Base

```typescript
// Create organized notes
await add_note(
  folder: 'Work',
  title: 'Project Ideas',
  content: '## Ideas\n- Idea 1\n- Idea 2'
);

// Search notes
const notes = await list_notes(folder: 'Work', limit: 100);
const relevant = notes.filter(n => n.title.includes('Project'));

// Read and process
for (const note of relevant) {
  const content = await get_note_content(note.id);
  // Process content
}
```

#### Workflow 2: Meeting Notes Automation

```typescript
// Create meeting note template
const noteId = await add_note(
  folder: 'Meetings',
  title: `Meeting - ${new Date().toLocaleDateString()}`,
  content: '## Attendees\n\n## Agenda\n\n## Notes\n\n## Action Items'
);

// Update during meeting
await update_note_content(
  noteId,
  content: '## Attendees\n- Person 1\n- Person 2\n\n## Agenda\n- Topic 1\n- Topic 2'
);
```

### Note Organization

**Folder Structure:**
```
Personal/
  Daily Notes/
  Ideas/
Work/
  Meetings/
  Projects/
Research/
  Articles/
  References/
```

**Naming Conventions:**
- Date-based: `2024-01-30 - Meeting Notes`
- Category-based: `[Project] Feature Planning`
- Tag-based: `#important Meeting Notes`

### Best Practices

1. **Use folders** for organization
2. **Markdown formatting** for structure
3. **Batch operations** when listing many notes
4. **Version control** - Keep note history externally for critical notes
5. **Regular cleanup** - Archive old notes

## Combined Workflows

### Workflow: Automated Morning Routine

```typescript
// 1. Open apps with osascript
await osascript(`
  tell application "Safari" to activate
  tell application "Mail" to activate
`);

// 2. Check messages
const unread = await get_unread_imessages();
if (unread.length > 0) {
  // Process urgent messages
}

// 3. Create daily note
await add_note(
  folder: 'Daily',
  title: `Daily Note - ${new Date().toLocaleDateString()}`,
  content: '## Tasks\n\n## Notes\n\n## Follow-ups'
);
```

### Workflow: Project Status Updates

```typescript
// 1. Generate status report (from other tools)
const status = await generateProjectStatus();

// 2. Save to notes
await add_note(
  folder: 'Work/Projects',
  title: `${project.name} Status - ${date}`,
  content: status
);

// 3. Send to team
await send_imessage(
  recipient: 'team@example.com',
  message: `Project status updated. See Notes for details.`
);

// 4. Set reminder with osascript
await osascript(`
  tell application "Reminders"
    make new reminder with properties {name:"Review project status", due date:date "tomorrow"}
  end tell
`);
```

## Error Handling

### osascript Errors
```typescript
try {
  await osascript(script);
} catch (error) {
  if (error.message.includes('Application isn\'t running')) {
    // Launch app first
  } else if (error.message.includes('permission')) {
    // Request permissions
  }
}
```

### iMessage Errors
- **Recipient not found** - Verify contact exists
- **Permission denied** - Check macOS permissions
- **Messages not configured** - User must set up iMessage

### Notes Errors
- **Note not found** - List notes first
- **Folder not found** - Create folder in Notes app
- **Permission denied** - Check macOS permissions

## Security Best Practices

1. **Audit all AppleScript** before execution
2. **Never run scripts from untrusted sources**
3. **Limit osascript to necessary apps** only
4. **Review iMessage recipients** before sending
5. **Don't store sensitive data** in unencrypted notes
6. **Monitor automation activity** regularly

## Limitations

### osascript
- Requires macOS permissions
- Some apps don't support AppleScript
- UI automation can be fragile
- System dialogs may interrupt scripts

### iMessage
- Requires Messages app running
- Rate limiting on message sending
- Group message limitations
- No media attachments via MCP

### Apple Notes
- No OCR for images
- Limited search capabilities
- No cross-device sync control
- Folder structure must exist

