# Desktop Commander Integration

Desktop Commander is the most comprehensive MCP extension providing 24 tools for file operations, terminal processes, and system monitoring.

## When to Use

Use Desktop Commander when you need to:
- Analyze local files (CSV, JSON, logs, databases)
- Execute terminal commands and manage processes
- Perform batch file operations
- Monitor system processes
- Search file contents across directories

## Critical Rule

**ALWAYS use Desktop Commander for local file analysis. NEVER use browser-based analysis tools for local files - they WILL FAIL.**

## Workflow Patterns

### Pattern 1: Local File Analysis (CSV/JSON/Logs)

```
1. start_process("python3 -i") - Start Python REPL
2. interact_with_process(pid, "import pandas as pd, numpy as np")
3. interact_with_process(pid, "df = pd.read_csv('/absolute/path/file.csv')")
4. interact_with_process(pid, "print(df.describe())")
5. Continue analysis with pandas, matplotlib, seaborn
```

**Alternative:** Use Node.js REPL if Python unavailable

```
1. start_process("node -i")
2. interact_with_process(pid, "import fs from 'fs'")
3. interact_with_process(pid, "const data = JSON.parse(fs.readFileSync('/path/file.json', 'utf8'))")
```

### Pattern 2: File Operations

```
1. read_file(path) - Read file contents
2. write_file(path, content) - Create/update files
3. list_directory(path) - List directory contents
4. read_multiple_files([paths]) - Batch file reading
5. move_file(src, dest) - Move/rename files
```

### Pattern 3: Terminal Automation

```
1. start_process("command") - Start process with intelligent state detection
2. read_process_output(pid) - Get output
3. interact_with_process(pid, "input") - Send commands to REPL
4. kill_process(pid) - Clean termination
```

### Pattern 4: File Content Search

```
1. start_search(pattern, directory) - Start async search
2. list_searches() - Check active searches
3. get_more_search_results(searchId) - Paginate results
4. stop_search(searchId) - Cancel if needed
```

## Tool Reference

### File Operations (6 tools)
- `read_file` - Read with line offsets (limit: 1000 lines)
- `write_file` - Write (limit: 50 lines per call)
- `list_directory` - List with metadata
- `create_directory` - Create dirs
- `move_file` - Move/rename
- `get_file_info` - Metadata

### Process Management (6 tools)
- `start_process` - Start with state detection
- `interact_with_process` - Send input to running process
- `read_process_output` - Get output
- `list_processes` - List running processes
- `kill_process` - Terminate gracefully
- `force_terminate` - Force kill

### Search (4 tools)
- `start_search` - Start async content search
- `list_searches` - List active searches
- `get_more_search_results` - Paginate
- `stop_search` - Cancel search

### Advanced (8 tools)
- `read_multiple_files` - Batch reading
- `get_config` - Server configuration
- `get_prompts` - Available prompts
- `get_recent_tool_calls` - Usage history
- `get_usage_stats` - Statistics
- `list_sessions` - Session history
- `write_pdf` - PDF generation
- `give_feedback_to_desktop_commander` - Submit feedback

## Configuration

```json
{
  "allowedDirectories": ["$HOME"],  // Set actual path in ~/.claude.json
  "fileReadLineLimit": 1000,
  "fileWriteLineLimit": 50,
  "defaultShell": "zsh",
  "blockedCommands": []
}
```

## Best Practices

1. **Always use absolute paths** for reliability
2. **Prefer Desktop Commander over Filesystem extension** (more comprehensive)
3. **Use Python REPL for data analysis** (preferred over shell commands)
4. **Start processes with verbose_timing: true** for debugging
5. **Monitor process state** - early exit detection available

## Common Use Cases

### Data Analysis
```
# CSV Analysis
start_process("python3 -i")
interact: "import pandas as pd"
interact: "df = pd.read_csv('/path/data.csv')"
interact: "df.describe()"
```

### File Processing
```
# Batch file operations
read_multiple_files([paths])
# Process results
write_file(output_path, processed_content)
```

### System Monitoring
```
# Process management
list_processes()
# Terminal execution
start_process("command")
read_process_output(pid)
```

## Security Notes

- Desktop Commander has access to entire home directory
- Consider restricting `allowedDirectories` to specific projects
- Review all terminal commands before execution
- File size limits prevent memory exhaustion

## Integration with Other Tools

**Complements:**
- PDF Tools (for PDF-specific operations)
- Playwright (for browser automation)

**Replaces:**
- Filesystem extension (redundant - Desktop Commander provides all features)

## Error Handling

Desktop Commander provides intelligent state detection:
- REPL prompt detection (>>>, >, $)
- Process completion vs timeout
- Early exit on pattern match

Use `verbose_timing: true` to debug detection.

