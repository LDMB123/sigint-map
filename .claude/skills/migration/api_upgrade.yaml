# Universal Agent Framework - API Upgrade Skill
# Category: Migration | Swarm: Hierarchical Delegation | Scale: Large

skill:
  id: skill_api_upgrade
  name: API Version Upgrade
  version: 1.0.0
  category: migration

  description: |
    Upgrades API calls to newer versions across codebase.
    Uses hierarchical delegation for large-scale migrations.
    Handles breaking changes and deprecations.

  invocation:
    command: /api-upgrade
    aliases: [upgrade-api, au]

  parameters:
    - name: library
      type: string
      required: true
      description: Library or API to upgrade
      examples:
        - "react"
        - "@tanstack/react-query"
        - "prisma"

    - name: from_version
      type: string
      required: true
      description: Current version

    - name: to_version
      type: string
      required: true
      description: Target version

    - name: scope
      type: string
      default: "**/*"
      description: Files to upgrade (glob pattern)

    - name: dry_run
      type: boolean
      default: true
      description: Preview changes without applying

  workflow:
    swarm_pattern: hierarchical_delegation

    phases:
      - name: Migration Analysis
        agent: analyzer_dependency
        tier: sonnet
        actions:
          - Identify breaking changes
          - Find deprecated APIs
          - Build migration map
        output: migration_plan

      - name: File Discovery
        agent: learner_codebase_indexer
        tier: haiku
        actions:
          - Find files using the library
          - Partition by module
        output: affected_files

      - name: Module Coordination
        agent: orchestrator_delegation
        tier: sonnet
        parallel: true
        per_module: true
        actions:
          - Coordinate file migrations
          - Resolve module-level conflicts
        output: module_results

      - name: File Migration
        agent: transformer_migrate
        tier: haiku
        parallel: true
        per_file: true
        actions:
          - Apply migration transforms
          - Update imports
          - Fix breaking changes
        output: migrated_files

      - name: Validation
        agent: validator_syntax
        tier: haiku
        parallel: true
        per_file: true
        actions:
          - Verify syntax valid
          - Check types compile
        output: validation_results

      - name: Test Execution
        agent: validator_test
        tier: sonnet
        actions:
          - Run affected tests
          - Identify regressions
        output: test_results

  outputs:
    - name: migration_report
      type: object
      schema:
        files_migrated: integer
        changes_applied: integer
        breaking_changes_resolved: integer
        manual_interventions: array

    - name: diff
      type: string
      description: Git-style diff of all changes

  cost_model:
    small_codebase:  # < 50 files
      opus_calls: 0
      sonnet_calls: 5
      haiku_calls: 100
      estimated_cost: 0.04

    large_codebase:  # 500+ files
      opus_calls: 2
      sonnet_calls: 20
      haiku_calls: 1000
      estimated_cost: 0.34

  examples:
    - name: Upgrade React Query
      invocation: /api-upgrade @tanstack/react-query --from 4.0 --to 5.0
      expected:
        files_affected: 50
        changes: 200
        duration_minutes: 5
        cost: 0.04

    - name: Major framework migration
      invocation: /api-upgrade next --from 13.0 --to 14.0 --dry_run false
      expected:
        files_affected: 200
        changes: 500
        duration_minutes: 15
        cost: 0.15

  tags:
    - migration
    - upgrade
    - api
    - breaking_changes
