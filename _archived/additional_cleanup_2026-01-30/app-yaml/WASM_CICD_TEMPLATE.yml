name: WASM Build, Test & Optimization

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'wasm/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/wasm-*.yml'
  pull_request:
    paths:
      - 'wasm/**'
      - 'package.json'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Stage 1: Build WASM modules
  # ============================================================================
  build:
    name: Build WASM Modules
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm

      - name: Check Rust version
        run: rustc --version && cargo --version

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Verify wasm-pack
        run: wasm-pack --version

      - name: Check for WASM target
        run: rustup target list --installed | grep wasm32-unknown-unknown

      - name: Build all WASM modules
        run: bash wasm/build-all.sh all
        env:
          CARGO_BUILD_JOBS: 4

      - name: Generate build summary
        if: always()
        run: |
          echo "## WASM Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Module Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh wasm/*/pkg/*_bg.wasm 2>/dev/null | awk '{print $5 "\t" $9}' | column -t >> $GITHUB_STEP_SUMMARY || echo "No WASM files found"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total size:" >> $GITHUB_STEP_SUMMARY
          du -sh wasm/*/pkg/*_bg.wasm 2>/dev/null | tail -1 >> $GITHUB_STEP_SUMMARY || echo "0 KB"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: wasm-builds-uncompressed
          path: wasm/*/pkg/
          retention-days: 5

  # ============================================================================
  # Stage 2: Validate WASM modules
  # ============================================================================
  validate:
    name: Validate WASM Modules
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v3
        with:
          name: wasm-builds-uncompressed
          path: wasm/

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: Validate WASM modules
        run: |
          echo "Validating WASM modules..."
          for wasm_file in wasm/*/pkg/*_bg.wasm; do
            if [ -f "$wasm_file" ]; then
              echo "Validating: $wasm_file"
              wasm-tools validate "$wasm_file" || exit 1
            fi
          done
          echo "✓ All WASM modules validated successfully"

      - name: Check WASM module info
        run: |
          echo "Module Information:" >> $GITHUB_STEP_SUMMARY
          for wasm_file in wasm/*/pkg/*_bg.wasm; do
            if [ -f "$wasm_file" ]; then
              echo "- $(basename $wasm_file)" >> $GITHUB_STEP_SUMMARY
              wasm-tools print "$wasm_file" | head -20 >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ============================================================================
  # Stage 3: Compress WASM artifacts
  # ============================================================================
  compress:
    name: Compress WASM Artifacts
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v3
        with:
          name: wasm-builds-uncompressed
          path: wasm/

      - name: Install compression tools
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli

      - name: Compress WASM with Brotli
        run: |
          echo "Compressing WASM modules with Brotli..."
          for wasm_file in wasm/*/pkg/*_bg.wasm; do
            if [ -f "$wasm_file" ]; then
              echo "Compressing: $wasm_file"
              brotli -j -11 "$wasm_file" -o "$wasm_file.br"
              gzip -9 "$wasm_file" -c > "$wasm_file.gz"
            fi
          done
          echo "✓ Compression complete"

      - name: Generate compression report
        run: |
          echo "## Compression Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Uncompressed | Brotli | Savings |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          
          for wasm_file in wasm/*/pkg/*_bg.wasm; do
            if [ -f "$wasm_file" ]; then
              module_name=$(basename $(dirname $(dirname "$wasm_file")))
              orig_size=$(stat -f%z "$wasm_file" 2>/dev/null || stat -c%s "$wasm_file")
              br_size=$(stat -f%z "$wasm_file.br" 2>/dev/null || stat -c%s "$wasm_file.br")
              savings=$(( 100 - (br_size * 100 / orig_size) ))
              
              echo "| $module_name | $(numfmt --to=iec $orig_size 2>/dev/null || echo $((orig_size/1024))KB) | $(numfmt --to=iec $br_size 2>/dev/null || echo $((br_size/1024))KB) | ${savings}% |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload compressed artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: wasm-builds-compressed
          path: wasm/*/pkg/
          retention-days: 30

  # ============================================================================
  # Stage 4: Report build metrics
  # ============================================================================
  metrics:
    name: Build Metrics & Reporting
    runs-on: ubuntu-latest
    needs: compress
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        if: always()

      - name: Calculate metrics
        run: |
          echo "## Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Uncompressed total
          if [ -d "wasm-builds-uncompressed" ]; then
            total_uc=$(find wasm-builds-uncompressed -name "*_bg.wasm" -exec du -b {} + | awk '{s+=$1} END {print s}')
            echo "**Total Uncompressed**: $(numfmt --to=iec $total_uc 2>/dev/null || echo $((total_uc/1024))KB)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Compressed total
          if [ -d "wasm-builds-compressed" ]; then
            total_br=$(find wasm-builds-compressed -name "*_bg.wasm.br" -exec du -b {} + | awk '{s+=$1} END {print s}')
            echo "**Total Compressed (Brotli)**: $(numfmt --to=iec $total_br 2>/dev/null || echo $((total_br/1024))KB)" >> $GITHUB_STEP_SUMMARY
            
            if [ -n "$total_uc" ]; then
              ratio=$(( 100 - (total_br * 100 / total_uc) ))
              echo "**Compression Ratio**: ${ratio}%" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const artifacts = fs.readdirSync('wasm-builds-compressed', { recursive: true });
            const wasmFiles = artifacts.filter(f => f.endsWith('_bg.wasm.br'));
            
            let comment = '## WASM Build Report\n\n';
            comment += '### Artifacts\n';
            wasmFiles.forEach(f => {
              const size = fs.statSync(f).size;
              comment += `- ${f}: ${(size/1024).toFixed(1)}KB\n`;
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================================
  # Stage 5: Size regression detection (optional)
  # ============================================================================
  regression-check:
    name: Size Regression Detection
    runs-on: ubuntu-latest
    needs: compress
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download current artifacts
        uses: actions/download-artifact@v3
        with:
          name: wasm-builds-compressed
          path: wasm-builds-current/

      - name: Checkout main branch
        run: |
          git fetch origin main:main
          git show main:wasm/Cargo.lock > /tmp/main.lock || true

      - name: Check for size increase
        run: |
          echo "## Size Regression Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "wasm-builds-current" ]; then
            current_size=$(find wasm-builds-current -name "*_bg.wasm.br" -exec du -b {} + | awk '{s+=$1} END {print s}')
            echo "**Current PR Size**: $((current_size/1024))KB" >> $GITHUB_STEP_SUMMARY
            
            # This is a simplified check - in production you'd compare to baseline
            if [ "$current_size" -gt "600000" ]; then
              echo "⚠️ **WARNING**: Total compressed WASM >600KB" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **OK**: Compressed WASM within acceptable range" >> $GITHUB_STEP_SUMMARY
            fi
          fi

# ============================================================================
# Summary
# ============================================================================
# This workflow:
# 1. Builds all 7 WASM modules using wasm-pack
# 2. Validates each module using wasm-tools
# 3. Compresses with Brotli-11 (75% reduction target)
# 4. Reports metrics to GitHub Summary and PR comments
# 5. Detects size regressions in PR reviews
#
# Triggers on:
# - Push to main/develop (when wasm/ changes)
# - Pull requests (when wasm/ changes)
# - Manual trigger (workflow_dispatch)
#
# Artifacts:
# - wasm-builds-uncompressed (5 days)
# - wasm-builds-compressed (30 days)
#
# Time: ~20 minutes total
# Cost: Minimal (standard GitHub hosted runner)
# ============================================================================
