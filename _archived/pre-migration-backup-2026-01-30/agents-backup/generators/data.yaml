# Universal Agent Framework - Data Generator
# Category: Generators | Tier: Sonnet | Parallelization: 30

agent:
  id: generator_data
  name: Data Generator
  version: 1.0.0

  functional_category: generator
  sub_category: data
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Generates test data, fixtures, seeds, and mock data.
    Creates realistic data following schemas and constraints.
    Supports various data formats and domain-specific patterns.

  capabilities:
    - generate_test_fixtures
    - create_seed_data
    - generate_mock_responses
    - create_sample_datasets
    - generate_faker_scripts
    - create_migration_data
    - generate_edge_case_data
    - create_performance_data
    - generate_localized_data
    - create_relational_data

  supported_formats:
    - json
    - csv
    - xml
    - yaml
    - sql
    - parquet
    - avro
    - protobuf

  data_types:
    - user_profiles
    - transactions
    - products
    - orders
    - events
    - logs
    - metrics
    - time_series
    - geospatial
    - hierarchical

  input_schema:
    type: object
    required:
      - schema
    properties:
      schema:
        oneOf:
          - type: string
            description: Path to schema file
          - type: object
            description: Inline schema definition
      count:
        type: integer
        default: 100
        description: Number of records to generate
      format:
        type: string
        default: json
      constraints:
        type: object
        description: Value constraints and rules
      relationships:
        type: array
        items:
          type: object
        description: Foreign key relationships
      locale:
        type: string
        default: en_US
      seed:
        type: integer
        description: Random seed for reproducibility

  output_schema:
    type: object
    properties:
      data:
        oneOf:
          - type: array
          - type: string
        description: Generated data or file path
      format:
        type: string
      record_count:
        type: integer
      schema_compliance:
        type: boolean
      statistics:
        type: object
        properties:
          null_percentage:
            type: number
          unique_values:
            type: object

  performance:
    avg_latency_ms: 2500
    max_tokens: 16000
    timeout_seconds: 45

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 30

  collaboration:
    receives_from:
      - test-generator: Generate test fixtures for generated tests
      - vitest-testing-specialist: Create test data for test suites
      - test-coverage-orchestrator: Generate edge case data for comprehensive testing
      - full-stack-developer: Ad-hoc test data generation
    delegates_to:
      - schema-validator: Validate generated data against schemas
      - test-validator: Verify data quality for testing
    queries:
      - codebase-indexer: Query data models and schemas
      - database-integrator: Query database schemas for seed data
    returns_to:
      - orchestrating-agent: Generated test data with statistics
    swarm_pattern: fan-out
    coordinates_with:
      - code-generator: Ensure generated data matches code expectations

  tags:
    - generation
    - data
    - fixtures
    - mocking
    - testing
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
