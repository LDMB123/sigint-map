agent:
  id: technical_rider_analyzer
  name: Technical Rider Analyzer
  version: 1.0.0
  functional_category: events
  sub_category: technical_rider
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Analyzes technical riders and venue capabilities to determine event feasibility,
    matches equipment requirements to venue infrastructure, calculates power requirements,
    analyzes stage plots, assesses rigging points, and produces comprehensive feasibility
    scoring. Identifies gaps between artist requirements and venue capabilities, recommends
    equipment additions or substitutions, and provides risk assessment for technical execution.

purpose: |
  The Technical Rider Analyzer bridges the gap between artist/production technical
  requirements and venue capabilities. It provides detailed feasibility analysis,
  identifies technical risks, quantifies equipment needs and gaps, and ensures all
  stakeholders understand the technical scope, constraints, and requirements before
  production begins.

capabilities:
  - name: Technical Rider Parsing
    description: Extract structured data from technical riders and artist requirements
    includes:
      - audio_requirements_extraction
      - lighting_fixtures_and_specifications
      - video_and_led_requirements
      - staging_and_risers
      - rigging_and_motor_requirements
      - power_specifications
      - network_and_connectivity_needs
      - special_effects_requirements

  - name: Venue Capability Matching
    description: Compare venue infrastructure against technical requirements
    includes:
      - power_distribution_assessment
      - rigging_point_inventory
      - stage_load_capacity
      - ceiling_height_verification
      - existing_equipment_inventory
      - backup_power_availability
      - network_infrastructure

  - name: Equipment Requirement Extraction
    description: Quantify all equipment needs from riders
    includes:
      - equipment_list_compilation
      - rental_versus_included_equipment
      - backline_instrument_requirements
      - monitoring_and_iem_systems
      - wireless_microphone_frequency_coordination
      - cable_and_connectivity_specifications
      - vendor_preferences_identification

  - name: Power Calculation
    description: Calculate precise power requirements and distribution
    includes:
      - per_department_power_consumption
      - peak_load_calculation
      - distribution_panel_requirements
      - generator_sizing_recommendations
      - backup_power_verification
      - phase_balancing
      - cable_gauge_and_length_assessment

  - name: Stage Plot Analysis
    description: Evaluate stage plots for physical feasibility
    includes:
      - stage_dimension_verification
      - equipment_placement_feasibility
      - access_and_egress_routes
      - monitor_wedge_positioning
      - drum_riser_clearance
      - cable_run_planning
      - safety_rail_requirements

  - name: Rigging Point Assessment
    description: Inventory and evaluate rigging infrastructure
    includes:
      - available_rigging_points
      - weight_capacity_per_point
      - load_distribution_analysis
      - motor_and_hoist_verification
      - steel_structure_integrity
      - safety_margin_calculation
      - point_utilization_planning

  - name: Feasibility Scoring
    description: Generate comprehensive feasibility scores for technical execution
    includes:
      - overall_feasibility_rating
      - risk_identification
      - gap_analysis
      - contingency_requirements
      - cost_impact_assessment
      - timeline_impact_factors

collaboration:
  receives_from:
    - agent: tour-manager
      input_schema:
        - artist_technical_rider: document
        - artist_equipment_list: array
        - artist_stage_plot: document
        - power_requirements: object
        - special_requirements: object
        - technical_contact_info: object
        - previous_venue_experience: array

    - agent: venue-operations
      input_schema:
        - venue_name: string
        - venue_capacity: integer
        - stage_dimensions: object
        - available_power: object
        - rigging_infrastructure: object
        - existing_equipment_inventory: array
        - venue_technical_capabilities: object
        - previous_technical_issues: array

  delegates_to:
    - agent: technical-director
      output_schema:
        - feasibility_report: object
        - equipment_requirements: array
        - power_specifications: object
        - stage_setup_requirements: object
        - rigging_requirements: object
        - risk_assessment: object
        - contingency_equipment_list: array

  returns_to:
    - agent: tour-manager
      output_schema:
        - feasibility_score: number
        - critical_requirements_met: boolean
        - gap_list: array
        - additional_equipment_needed: array
        - cost_implications: object
        - risk_factors: array

    - agent: venue-operations
      output_schema:
        - venue_capability_report: object
        - equipment_rental_requirements: array
        - power_requirements: object
        - setup_timeline_factors: array
        - safety_considerations: array

input_schema:
  type: object
  required:
    - event_name
    - artist_name
    - venue_name
    - technical_rider_content
    - venue_specifications
  properties:
    event_name:
      type: string
      description: Official event name
      example: "Summer Tour 2026 - Boston"

    artist_name:
      type: string
      description: Performing artist/band name
      example: "The Midnight Hour"

    venue_name:
      type: string
      description: Venue name and capacity
      example: "Paradise Rock Club (1,000 capacity)"

    technical_rider_content:
      type: string
      description: Full text of technical rider document
      example: "See rider excerpt below"

    stage_plot:
      type: string
      description: ASCII or description of stage plot from rider
      example: "Drum kit stage right, bass stage left..."

    audio_rider:
      type: object
      description: Audio system requirements from rider
      properties:
        pa_system_preferred:
          type: string
          example: "L-Acoustics K2"

        console_required:
          type: string
          example: "Yamaha PM10 or Allen & Heath SQ7"

        monitor_system:
          type: string
          example: "12x Shure PSM1000 wireless IEM"

        microphones_required:
          type: array
          items:
            type: string
          example:
            - "3x Shure SM7B vocal mics"
            - "1x Kick drum mic"

        wireless_frequencies:
          type: integer
          description: Number of wireless channels needed
          example: 6

    lighting_rider:
      type: object
      description: Lighting requirements from rider
      properties:
        console_required:
          type: string
          example: "grandMA3 full size console"

        fixtures_required:
          type: array
          items:
            type: object
            properties:
              fixture_type:
                type: string
              quantity:
                type: integer
              purpose:
                type: string
          example:
            - fixture_type: "Robe BMFL Spot"
              quantity: 12
              purpose: "stage wash"

        truss_requirements:
          type: object
          properties:
            downstage_span:
              type: string
              example: "40 feet"

            upstage_span:
              type: string
              example: "40 feet"

    video_rider:
      type: object
      description: Video and LED requirements
      properties:
        led_wall_required:
          type: boolean
          example: true

        led_specifications:
          type: object
          properties:
            width_feet:
              type: number
              example: 32

            height_feet:
              type: number
              example: 18

            pixel_pitch:
              type: string
              example: "2.8mm"

        cameras_required:
          type: integer
          example: 3

        video_switcher_required:
          type: string
          example: "Ross Carbonite or Blackmagic Atem"

    staging_rider:
      type: object
      description: Stage setup requirements
      properties:
        stage_size_required:
          type: string
          example: "40 x 32 feet minimum"

        stage_load_capacity_required:
          type: string
          example: "150 lbs per sq ft minimum"

        risers_required:
          type: object
          properties:
            drum_riser:
              type: string
              example: "8' x 8' x 24 inches"

            band_riser:
              type: string
              example: "40' x 4' x 12 inches"

        deck_type:
          type: string
          example: "Hardwood preferred, grip tape acceptable"

    rigging_rider:
      type: object
      description: Rigging and suspension requirements
      properties:
        rigging_points_required:
          type: integer
          example: 8

        point_weight_capacity_required:
          type: string
          example: "3000 lbs per point minimum"

        motors_required:
          type: integer
          example: 4

        truss_weight_estimate:
          type: string
          example: "12,000 lbs total"

    power_requirements:
      type: object
      description: Power specifications
      properties:
        audio_amperage:
          type: string
          example: "400A 3-phase"

        lighting_amperage:
          type: string
          example: "600A 3-phase"

        video_amperage:
          type: string
          example: "200A 3-phase"

        total_estimated_load:
          type: string
          example: "125 kW peak demand"

        generator_backup_required:
          type: boolean
          example: true

    special_requirements:
      type: object
      description: Other technical requirements
      properties:
        wireless_coordination:
          type: string
          example: "Will provide wireless frequency chart"

        video_playback:
          type: boolean
          example: true

        pyrotechnics:
          type: boolean
          example: false

        special_effects:
          type: string
          example: "Confetti cannons, haze, CO2 jets"

    venue_specifications:
      type: object
      description: Venue capabilities and constraints
      properties:
        venue_name:
          type: string

        stage_dimensions:
          type: object
          properties:
            width_feet:
              type: number
              example: 45

            depth_feet:
              type: number
              example: 35

            height_feet:
              type: number
              example: 28

        stage_load_capacity:
          type: string
          example: "150 lbs per sq ft"

        available_power:
          type: object
          properties:
            available_amperage:
              type: string
              example: "400A per phase"

            panel_location:
              type: string
              example: "Stage left, 80 feet from main stage"

            generator_available:
              type: boolean
              example: true

            generator_capacity:
              type: string
              example: "300 kW"

        rigging_infrastructure:
          type: object
          properties:
            rigging_points_available:
              type: integer
              example: 12

            point_weight_capacity:
              type: string
              example: "2000 lbs per point"

            motor_availability:
              type: integer
              example: 4

            truss_available:
              type: string
              example: "60 feet 12-inch box truss"

        ceiling_height:
          type: number
          description: Height from stage to ceiling in feet
          example: 35

        existing_equipment:
          type: array
          items:
            type: string
          example:
            - "Yamaha PM10 console"
            - "24x EV SB28 subwoofers"

        network_connectivity:
          type: string
          example: "Gigabit ethernet available at stage"

        backup_systems:
          type: object
          properties:
            backup_generator:
              type: boolean
              example: true

            backup_audio_console:
              type: boolean
              example: false

            backup_lighting_console:
              type: boolean
              example: true

output_schema:
  type: object
  properties:
    feasibility_analysis:
      type: object
      description: Overall feasibility assessment
      properties:
        overall_feasibility_score:
          type: number
          minimum: 0
          maximum: 100
          description: Composite feasibility rating
          example: 87

        feasibility_rating:
          type: string
          enum: [fully_feasible, feasible_with_modifications, marginal_feasibility, not_feasible]
          example: "feasible_with_modifications"

        critical_path_items:
          type: array
          items:
            type: string
          description: Items blocking or delaying production
          example:
            - "Power distribution insufficient - requires generator"
            - "Stage load capacity at limit with full rig"

        go_no_go_recommendation:
          type: string
          enum: [go, go_with_conditions, reconsider, no_go]
          example: "go_with_conditions"

    rider_summary:
      type: object
      description: Structured data extracted from technical rider
      properties:
        audio_system:
          type: object
          properties:
            pa_system:
              type: string
            console:
              type: string
            monitor_system:
              type: string
            wireless_channels:
              type: integer
            microphones:
              type: array
              items:
                type: string

        lighting_system:
          type: object
          properties:
            console:
              type: string
            total_fixtures:
              type: integer
            fixture_breakdown:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  quantity:
                    type: integer
                  purpose:
                    type: string

        video_system:
          type: object
          properties:
            led_wall_required:
              type: boolean
            led_dimensions:
              type: string
            cameras:
              type: integer
            video_switcher:
              type: string

        staging:
          type: object
          properties:
            stage_size_required:
              type: string
            stage_load_required:
              type: string
            risers_required:
              type: array
              items:
                type: string

        rigging:
          type: object
          properties:
            rigging_points_required:
              type: integer
            point_weight_capacity_required:
              type: string
            motors_required:
              type: integer
            estimated_weight:
              type: string

    venue_capability_assessment:
      type: object
      description: Venue capability analysis
      properties:
        stage_assessment:
          type: object
          properties:
            stage_size_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient]
              example: "meets_requirement"

            load_capacity_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient]
              example: "marginal"

            load_capacity_details:
              type: string
              example: "Venue rated 150 lbs/sq ft, show requires 140 lbs/sq ft at peak (92.4% utilization)"

        power_assessment:
          type: object
          properties:
            available_power:
              type: string
              example: "400A per phase, 3-phase service"

            required_power:
              type: string
              example: "600A estimated peak demand"

            power_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient, requires_generator]
              example: "requires_generator"

            generator_recommendation:
              type: string
              example: "300kW 3-phase backup required"

        rigging_assessment:
          type: object
          properties:
            points_available:
              type: integer
              example: 12

            points_required:
              type: integer
              example: 8

            points_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient]
              example: "meets_requirement"

            weight_capacity_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient]
              example: "meets_requirement"

            capacity_details:
              type: string
              example: "12 points @ 2000 lbs = 24,000 lbs total capacity, show requires ~18,000 lbs (75% utilization)"

        ceiling_height_assessment:
          type: object
          properties:
            available_height:
              type: number
              example: 35

            clearance_required:
              type: number
              example: 28

            height_verdict:
              type: string
              enum: [exceeds_requirement, meets_requirement, marginal, insufficient]
              example: "meets_requirement"

            notes:
              type: string
              example: "7 feet clearance above max rig height provides adequate working room"

        existing_equipment_assessment:
          type: object
          properties:
            equipment_available:
              type: array
              items:
                type: string
              example:
                - "Yamaha PM10 console (required)"
                - "24x EV SB28 subs (required)"

            equipment_gaps:
              type: array
              items:
                type: string
              example:
                - "grandMA3 console not available (required for lighting)"
                - "Wireless IEM system needs upgrade to PSM1000"

    equipment_gap_analysis:
      type: object
      description: Equipment requirements and gaps
      properties:
        critical_equipment_required:
          type: array
          items:
            type: object
            properties:
              equipment:
                type: string
              quantity:
                type: integer
              availability:
                type: string
                enum: [available_at_venue, must_rent, must_purchase, unavailable]
              notes:
                type: string
          example:
            - equipment: "grandMA3 Lighting Console"
              quantity: 1
              availability: "must_rent"
              notes: "Venue standard is Eos, rider requires MA3 for cue complexity"

        rental_equipment_summary:
          type: object
          properties:
            total_rental_items:
              type: integer
              example: 24

            estimated_rental_cost:
              type: string
              example: "$8,500-12,000"

            primary_rental_vendors:
              type: array
              items:
                type: string
              example:
                - "System One Audio"
                - "Production Resource Group (PRG)"

        equipment_substitution_possibilities:
          type: array
          items:
            type: object
            properties:
              required_equipment:
                type: string
              acceptable_substitute:
                type: string
              impact_assessment:
                type: string
          example:
            - required_equipment: "L-Acoustics K2 PA System"
              acceptable_substitute: "Yamaha PM1D + powered cabinets"
              impact_assessment: "Acceptable - comparable SPL, slightly different tonal character"

    power_analysis:
      type: object
      description: Detailed power requirement calculations
      properties:
        audio_power_requirements:
          type: object
          properties:
            equipment:
              type: array
              items:
                type: object
                properties:
                  item:
                    type: string
                  quantity:
                    type: integer
                  watts_per_unit:
                    type: number
                  total_watts:
                    type: number
              example:
                - item: "Powered subwoofers"
                  quantity: 12
                  watts_per_unit: 2400
                  total_watts: 28800

            subtotal_watts:
              type: number
              example: 42000

            amperage_at_120v:
              type: string
              example: "350A single phase"

            amperage_at_208v_3phase:
              type: string
              example: "117A per phase"

        lighting_power_requirements:
          type: object
          properties:
            equipment:
              type: array
              items:
                type: object
                properties:
                  item:
                    type: string
                  quantity:
                    type: integer
                  watts_per_unit:
                    type: number
                  total_watts:
                    type: number

            subtotal_watts:
              type: number
              example: 68000

            amperage_at_120v:
              type: string
              example: "567A single phase"

            amperage_at_208v_3phase:
              type: string
              example: "189A per phase"

        video_power_requirements:
          type: object
          properties:
            subtotal_watts:
              type: number
              example: 12000

            amperage_at_208v_3phase:
              type: string
              example: "40A per phase"

        total_power_analysis:
          type: object
          properties:
            total_demand_watts:
              type: number
              example: 122000

            peak_demand_watts:
              type: number
              description: Peak load including startup inrush
              example: 145000

            total_amperage_required_3phase:
              type: object
              properties:
                per_phase_amps:
                  type: number
                  example: 250

                total_service_amps:
                  type: number
                  example: 750

            venue_power_available:
              type: string
              example: "400A 3-phase"

            power_shortfall:
              type: string
              example: "Yes - requires 250A per phase, venue provides 133A per phase"

            generator_sizing_recommendation:
              type: string
              example: "Minimum 150 kW 3-phase generator, recommend 200 kW for safety margin"

        distribution_requirements:
          type: object
          properties:
            main_distro_box:
              type: string
              example: "200A Socapex 5-pin x2 or equivalent"

            subfeeds:
              type: array
              items:
                type: string
              example:
                - "Audio distro: 400A 3-phase sub-panel"
                - "Lighting distro: 600A 3-phase sub-panel"
                - "Video distro: 100A 3-phase sub-panel"

            cable_requirements:
              type: array
              items:
                type: string
              example:
                - "250 feet 4/0 3-phase feeder cable (25-50 feet from generator to main distro)"
                - "150 feet 2/0 3-phase to audio sub-panel"

    stage_plot_analysis:
      type: object
      description: Stage layout and feasibility assessment
      properties:
        stage_plot_summary:
          type: string
          description: Text summary of stage plot requirements
          example: "Drum kit stage right on 8x8 riser, bass stage left on 4x2 riser..."

        physical_feasibility:
          type: object
          properties:
            stage_dimensions_fit:
              type: string
              enum: [exceeds, fits_comfortably, fits_with_modification, insufficient_space]
              example: "fits_comfortably"

            monitor_wedge_placement:
              type: string
              enum: [optimal, acceptable, marginal, requires_wireless_only]
              example: "acceptable"

            cable_routing_feasibility:
              type: string
              enum: [straightforward, manageable, challenging, very_difficult]
              example: "manageable"

            access_egress_assessment:
              type: string
              enum: [excellent, good, adequate, problematic]
              example: "good"

        stage_plot_details:
          type: array
          items:
            type: object
            properties:
              position:
                type: string
                example: "Stage Right"

              equipment:
                type: string
                example: "Drum kit on 8x8x24 riser"

              clearance_required:
                type: string
                example: "10 feet width, 8 feet depth"

              feasibility:
                type: string
                example: "Fits within stage bounds with 2 feet side clearance"

        risers_and_platforms:
          type: array
          items:
            type: object
            properties:
              riser_description:
                type: string
                example: "8x8x24 inch drum riser"

              quantity:
                type: integer
                example: 1

              total_weight:
                type: number
                example: 1200

              stage_placement:
                type: string
                example: "Stage right, 8 feet from stage edge"

              load_capacity_verdict:
                type: string
                example: "Adequate - 150 lbs/sq ft stage rating, riser load ~7.3 lbs/sq ft"

        critical_spacing_notes:
          type: array
          items:
            type: string
          example:
            - "Monitor wedges must be positioned outside drum riser perimeter"
            - "Cable runs from stage left monitor console to stage right positions require 60 feet cable length"
            - "Drum kit microphone placement requires 6-foot overhead clearance for drum mic stands"

    rigging_analysis:
      type: object
      description: Rigging and suspension requirements assessment
      properties:
        rigging_requirements_summary:
          type: object
          properties:
            total_rigging_points_needed:
              type: integer
              example: 8

            points_available:
              type: integer
              example: 12

            utilization_percentage:
              type: number
              example: 66.7

            points_verdict:
              type: string
              enum: [excellent, good, adequate, marginal, insufficient]
              example: "good"

        load_distribution_analysis:
          type: object
          properties:
            total_suspended_load:
              type: string
              example: "18,500 lbs"

            load_distribution:
              type: array
              items:
                type: object
                properties:
                  component:
                    type: string
                    example: "Main truss assembly"

                  weight:
                    type: string
                    example: "12,000 lbs"

                  distribution_points:
                    type: integer
                    example: 4

                  weight_per_point:
                    type: string
                    example: "3,000 lbs per point"

                  point_capacity:
                    type: string
                    example: "3,000 lbs"

                  utilization:
                    type: string
                    example: "100% (at capacity)"

            total_capacity_available:
              type: string
              example: "24,000 lbs (12 points x 2000 lbs)"

            safety_margin:
              type: string
              example: "77% (6,500 lbs reserve capacity)"

        rigging_point_inventory:
          type: array
          items:
            type: object
            properties:
              point_number:
                type: integer
                example: 1

              location:
                type: string
                example: "Downstage left, 15 feet from stage edge"

              capacity_rating:
                type: string
                example: "2,000 lbs"

              structure_type:
                type: string
                example: "Welded steel truss attachment point"

              condition_assessment:
                type: string
                example: "Good - recently inspected, no damage noted"

              assigned_load:
                type: string
                example: "Main truss hanging point (3,000 lbs)"

              verdict:
                type: string
                example: "At capacity - no safety margin"

        motor_and_hoist_requirements:
          type: object
          properties:
            motors_required:
              type: integer
              example: 4

            motors_available:
              type: integer
              example: 4

            motor_verdict:
              type: string
              example: "Adequate but no spares - recommend backup motor on-site"

            hoist_specifications:
              type: array
              items:
                type: string
              example:
                - "4x 1-ton chain hoists minimum"
                - "Require variable speed control for precision rigging"

        rigging_safety_assessment:
          type: object
          properties:
            structural_integrity:
              type: string
              enum: [excellent, good, adequate, compromised, unknown]
              example: "good"

            inspection_status:
              type: string
              example: "Last inspected 2025-11-20, current certification valid"

            safety_concerns:
              type: array
              items:
                type: string
              example:
                - "Four rigging points operating at 100% capacity - minimal safety margin"
                - "No backup rigging option if primary point fails"

            safety_recommendations:
              type: array
              items:
                type: string
              example:
                - "Install backup rigging points for critical loads"
                - "Conduct pre-show rigging integrity inspection"
                - "Station trained rigger on platform during rigging phase"
                - "Have backup rigging equipment and materials on standby"

    feasibility_scoring:
      type: object
      description: Composite feasibility metrics
      properties:
        stage_readiness_score:
          type: number
          minimum: 0
          maximum: 100
          example: 88

        power_readiness_score:
          type: number
          minimum: 0
          maximum: 100
          example: 72

        rigging_readiness_score:
          type: number
          minimum: 0
          maximum: 100
          example: 82

        equipment_availability_score:
          type: number
          minimum: 0
          maximum: 100
          example: 79

        overall_feasibility_score:
          type: number
          minimum: 0
          maximum: 100
          example: 80

        scoring_methodology:
          type: string
          example: "Weighted average: Stage 25%, Power 25%, Rigging 20%, Equipment 30%"

    risk_assessment:
      type: object
      description: Identified risks and mitigation strategies
      properties:
        critical_risks:
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
                example: "Insufficient power distribution"

              severity:
                type: string
                enum: [critical, high, moderate, low]
                example: "critical"

              probability:
                type: string
                enum: [certain, likely, possible, unlikely]
                example: "certain"

              impact:
                type: string
                example: "Show cannot proceed at full specification without generator"

              mitigation:
                type: string
                example: "Secure 150+ kW generator, confirm fuel supply 48 hours before event"

        high_risks:
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
              severity:
                type: string
              mitigation:
                type: string

        contingency_requirements:
          type: array
          items:
            type: string
          example:
            - "Backup generator on standby"
            - "Emergency lighting console available"
            - "Spare wireless channels pre-programmed"
            - "Cable repair kit and replacement fixtures staged"

    recommendations:
      type: object
      description: Actionable recommendations for production team
      properties:
        must_have_items:
          type: array
          items:
            type: string
          description: Non-negotiable requirements
          example:
            - "Generator for 250A 3-phase power (150+ kW)"
            - "grandMA3 console for lighting control"
            - "Wireless IEM system upgrade to PSM1000 standard"

        strongly_recommended_items:
          type: array
          items:
            type: string
          description: Items significantly improving feasibility
          example:
            - "Backup rigging points installation"
            - "Wireless uplink for remote camera operation"
            - "Additional hoist/motor for faster rigging"

        nice_to_have_items:
          type: array
          items:
            type: string
          description: Optional enhancements
          example:
            - "Video playback server with redundant backup"
            - "Premium wireless frequency coordination service"

        timeline_implications:
          type: array
          items:
            type: string
          example:
            - "Generator placement requires 30+ minutes setup time"
            - "Rigging at 100% capacity adds 60+ minutes for safety checks"
            - "Wireless coordination meeting required 48 hours pre-event"

        cost_impact_summary:
          type: object
          properties:
            generator_rental:
              type: string
              example: "$2,500-4,000 for 150+ kW 3-phase unit"

            equipment_rental:
              type: string
              example: "$8,500-12,000 for lighting console + console operator"

            additional_labor:
              type: string
              example: "$1,500-2,500 for additional rigging and safety personnel"

            total_estimated_additional_cost:
              type: string
              example: "$12,500-18,500"

examples:
  - title: "Major Artist Tour - Mid-Size Venue"
    scenario: |
      Professional touring act with full technical requirements arriving at
      1,200-capacity mid-market venue. Complex rider with full PA, lighting,
      video, and rigging requirements. Venue is well-equipped but will
      require some equipment additions and generator backup.

    input:
      event_name: "Summer Tour 2026 - Boston Stop"
      artist_name: "The Midnight Hour"
      venue_name: "Paradise Rock Club (1,200 capacity)"
      technical_rider_content: |
        TECHNICAL RIDER
        The Midnight Hour

        AUDIO REQUIREMENTS:
        - PA System: L-Acoustics K2 or equivalent (min 2x K2 hangs per side)
        - Subs: 12x SB28 subwoofers minimum
        - Console: Yamaha PM10 or Allen & Heath SQ7
        - Monitor System: 12x channels wireless IEM (Shure PSM1000 preferred)
        - Microphones: 4x SM7B vocals, 1x kick drum, 1x snare, 2x overheads

        LIGHTING REQUIREMENTS:
        - Console: grandMA3 full size (operator provided)
        - Moving Lights: 12x Robe BMFL Spot or equivalent
        - Wash Fixtures: 24x Chauvet Colorado or equivalent
        - Truss: 40-foot downstage span, 30-foot midstage span

        VIDEO REQUIREMENTS:
        - LED Wall: 24' x 14' minimum (2.8mm or finer pixel pitch)
        - Cameras: 3x broadcast cameras + handheld
        - Video Switcher: Ross Carbonite or Blackmagic Atem

        STAGING:
        - Stage Size: 40' x 30' minimum
        - Stage Load: 150 lbs/sq ft minimum
        - Drum Riser: 8' x 8' x 24"
        - Floor: Hardwood preferred, grip tape acceptable

        RIGGING:
        - Rigging Points: 8 minimum @ 3,000 lbs per point
        - Total Rig Weight: ~16,000 lbs
        - Motors: 4x 1-ton hoists minimum
        - Ceiling Height: 28 feet minimum from stage

      stage_plot: |
        STAGE PLOT - THE MIDNIGHT HOUR

        Stage Left: Bass player + bass rig
        Center: Drummer on 8x8x24 riser + drum rig
        Stage Right: Lead vocalist
        Monitor Console: Downstage center

        Monitor Wedges: 3x stage left, 3x center, 2x stage right
        IEM Base Stations: Stage left and stage right

      audio_rider:
        pa_system_preferred: "L-Acoustics K2"
        console_required: "Yamaha PM10 or Allen & Heath SQ7"
        monitor_system: "12x Shure PSM1000 wireless IEM"
        wireless_frequencies: 12
        microphones_required:
          - "4x Shure SM7B"
          - "1x Audiotechnica AE3000 kick"
          - "1x Shure SM57 snare"
          - "2x Neumann KM141 overheads"

      lighting_rider:
        console_required: "grandMA3 full size"
        fixtures_required:
          - fixture_type: "Robe BMFL Spot"
            quantity: 12
            purpose: "stage spots"
          - fixture_type: "Chauvet Colorado"
            quantity: 24
            purpose: "stage wash"

      video_rider:
        led_wall_required: true
        led_specifications:
          width_feet: 24
          height_feet: 14
          pixel_pitch: "2.8mm"
        cameras_required: 4
        video_switcher_required: "Ross Carbonite"

      staging_rider:
        stage_size_required: "40' x 30'"
        stage_load_required: "150 lbs/sq ft"
        risers_required:
          - "8' x 8' x 24\" drum riser"

      rigging_rider:
        rigging_points_required: 8
        point_weight_capacity_required: "3,000 lbs per point"
        motors_required: 4
        truss_weight_estimate: "16,000 lbs"

      power_requirements:
        audio_amperage: "400A 3-phase"
        lighting_amperage: "600A 3-phase"
        video_amperage: "150A 3-phase"
        total_estimated_load: "110 kW peak"
        generator_backup_required: true

      special_requirements:
        wireless_coordination: "Will provide frequency coordination chart"
        video_playback: true
        pyrotechnics: false
        special_effects: "Haze, confetti cannons"

      venue_specifications:
        stage_dimensions:
          width_feet: 45
          depth_feet: 32
          height_feet: 30
        stage_load_capacity: "150 lbs/sq ft"
        available_power:
          available_amperage: "400A 3-phase"
          generator_available: false
          panel_location: "Stage left, 60 feet from stage"
        rigging_infrastructure:
          rigging_points_available: 10
          point_weight_capacity: "2,000 lbs per point"
          motor_availability: 2
          ceiling_height: 32
        existing_equipment:
          - "Yamaha PM10 console (available)"
          - "24x EV SB28 subwoofers (available)"
          - "Basic lighting console (inadequate for grandMA3 requirements)"
        network_connectivity: "Gigabit ethernet to stage"

    output:
      feasibility_analysis:
        overall_feasibility_score: 78
        feasibility_rating: "feasible_with_modifications"
        critical_path_items:
          - "Generator placement and power distribution setup"
          - "Rigging points at 80% capacity - requires reinforcement"
          - "Lighting console upgrade required"
        go_no_go_recommendation: "go_with_conditions"

      venue_capability_assessment:
        power_assessment:
          available_power: "400A 3-phase"
          required_power: "~250A per phase (750A total)"
          power_verdict: "requires_generator"
          generator_recommendation: "150 kW 3-phase minimum"

        rigging_assessment:
          points_available: 10
          points_required: 8
          points_verdict: "meets_requirement"
          weight_capacity_verdict: "marginal"
          capacity_details: "10 points @ 2,000 lbs = 20,000 lbs capacity, show requires 16,000 lbs (80% utilization) - at maximum safe operating capacity"

        existing_equipment_assessment:
          equipment_available:
            - "Yamaha PM10 console (matches rider requirement)"
            - "24x EV SB28 subs (meets quantity requirement)"
          equipment_gaps:
            - "grandMA3 console not available - requires rental"
            - "L-Acoustics K2 not available - must rent or substitute with available system"

      equipment_gap_analysis:
        critical_equipment_required:
          - equipment: "grandMA3 Lighting Console"
            quantity: 1
            availability: "must_rent"
            notes: "Venue standard console insufficient for rider complexity"

          - equipment: "L-Acoustics K2 PA System"
            quantity: 2
            availability: "must_rent"
            notes: "Venue has EV system but rider specifies L-Acoustics"

          - equipment: "Wireless IEM System"
            quantity: 12
            availability: "must_rent"
            notes: "Venue lacks modern wireless system - PSM1000 standard required"

          - equipment: "Generator"
            quantity: 1
            availability: "must_rent"
            notes: "Critical - insufficient venue power distribution"

        estimated_rental_cost: "$12,000-16,000"

      power_analysis:
        total_power_analysis:
          total_demand_watts: 110000
          peak_demand_watts: 132000
          total_amperage_required_3phase:
            per_phase_amps: 250
            total_service_amps: 750
          venue_power_available: "400A 3-phase (133A per phase)"
          power_shortfall: "Yes - requires 250A per phase, venue provides 133A per phase"
          generator_sizing_recommendation: "150 kW 3-phase generator (200 kW with 25% safety margin recommended)"

      rigging_analysis:
        rigging_requirements_summary:
          total_rigging_points_needed: 8
          points_available: 10
          utilization_percentage: 80
          points_verdict: "marginal"

        load_distribution_analysis:
          total_suspended_load: "16,000 lbs"
          safety_margin: "20% (4,000 lbs reserve capacity)"

        rigging_safety_assessment:
          safety_concerns:
            - "80% capacity utilization leaves minimal safety margin"
            - "No redundancy if single rigging point fails"
            - "Only 2 hoists available vs. 4 required"
          safety_recommendations:
            - "Confirm venue rigging point load ratings in writing"
            - "Conduct pre-show rigging inspection"
            - "Rent additional hoists to meet 4-hoist requirement"
            - "Have backup rigging equipment on-site"

      feasibility_scoring:
        stage_readiness_score: 88
        power_readiness_score: 60
        rigging_readiness_score: 75
        equipment_availability_score: 70
        overall_feasibility_score: 78

      risk_assessment:
        critical_risks:
          - risk: "Insufficient power distribution"
            severity: "critical"
            probability: "certain"
            impact: "Show cannot proceed at full specification without generator"
            mitigation: "Secure 150+ kW generator, confirm fuel supply 48 hours before event"

          - risk: "Rigging capacity at 80% utilization"
            severity: "high"
            probability: "likely"
            impact: "Safety margin insufficient for emergency procedures"
            mitigation: "Add backup rigging points or reduce rig weight by 2,000 lbs"

        high_risks:
          - risk: "Missing lighting console"
            severity: "high"
            probability: "certain"
            impact: "Cannot execute lighting design without grandMA3"
            mitigation: "Secure grandMA3 rental + experienced operator by contract signing"

      recommendations:
        must_have_items:
          - "150+ kW 3-phase generator"
          - "grandMA3 console rental + experienced operator"
          - "L-Acoustics K2 PA system or approved equivalent"
          - "12x Shure PSM1000 wireless IEM system"
          - "4x 1-ton chain hoists (in addition to venue's 2 hoists)"

        strongly_recommended_items:
          - "Backup rigging points installation or rig weight reduction"
          - "Wireless frequency coordination service"
          - "Additional rigging crew for safety oversight"

        cost_impact_summary:
          generator_rental: "$3,000-4,500"
          equipment_rental: "$10,000-14,000 (console, PA, wireless)"
          additional_labor: "$1,500-2,000"
          total_estimated_additional_cost: "$14,500-20,500"

  - title: "Corporate Event - Ballroom with Limited Technical Infrastructure"
    scenario: |
      Corporate gala in downtown ballroom, 300 guests, requiring professional
      audio/visual presentation, minimal technical infrastructure, tight
      technical constraints due to building age and limitations.

    input:
      event_name: "Annual Awards Gala 2026"
      artist_name: "N/A - Corporate Event"
      venue_name: "The Grand Ballroom Downtown (300 capacity)"
      technical_rider_content: |
        CORPORATE EVENT TECHNICAL REQUIREMENTS

        AUDIO:
        - Microphone system for MC/speakers (4 channels wireless required)
        - PA system for ballroom (minimum 2,000W amplified speakers)
        - Background music playback (USB/wireless connection)

        LIGHTING:
        - Uplighting for ballroom pillars (programmable color wash)
        - Stage lighting for podium area
        - Video screen illumination

        VIDEO:
        - 2x 10-foot video screens for sponsor recognition
        - Video playback capability (MP4, Keynote, PowerPoint)
        - 2x cameras for live streaming

        STAGING:
        - Podium with microphone stand and notes monitor
        - Screen mounting on ballroom walls
        - Speaker areas clearly illuminated

      stage_plot: |
        Podium center stage (elevated platform 12" high)
        Screen 1: Left wall (20' wide x 12' high)
        Screen 2: Right wall (20' wide x 12' high)
        Speaker table: Stage left
        Video camera positions: House left and house right

      audio_rider:
        pa_system_preferred: "Self-powered speakers minimum 500W each"
        console_required: "Simple 4-channel mixer (no complex routing needed)"
        monitor_system: "None required"
        wireless_frequencies: 4
        microphones_required:
          - "2x handheld wireless microphones"
          - "2x lavalier wireless microphones"

      lighting_rider:
        console_required: "DMX controller minimum (can be software-based)"
        fixtures_required:
          - fixture_type: "LED color wash fixtures"
            quantity: 8
            purpose: "ambient ballroom uplighting"

      video_rider:
        led_wall_required: false
        screens_required:
          - size_feet: "20 x 12"
            quantity: 2
            purpose: "presentation display"
        cameras_required: 2
        video_switcher_required: "None - single output to screens"

      staging_rider:
        stage_size_required: "16' x 12' minimum for podium area"
        stage_load_required: "50 lbs/sq ft (minimal requirements)"
        risers_required:
          - "12\" elevated podium platform"

      power_requirements:
        audio_amperage: "30A standard circuit"
        lighting_amperage: "20A standard circuit"
        video_amperage: "20A standard circuit"
        total_estimated_load: "15 kW"
        generator_backup_required: false

      special_requirements:
        wireless_coordination: "Corporate venue - no external interference expected"
        video_playback: true
        pyrotechnics: false
        special_effects: "None"

      venue_specifications:
        stage_dimensions:
          width_feet: 30
          depth_feet: 20
          height_feet: 12
        stage_load_capacity: "50 lbs/sq ft"
        available_power:
          available_amperage: "120A 20-amp circuits (standard hotel ballroom wiring)"
          generator_available: false
          panel_location: "Behind stage area, basement electrical room"
        ceiling_height: 14
        existing_equipment:
          - "None - blank slate ballroom"
        network_connectivity: "WiFi available but unreliable in ballroom"

    output:
      feasibility_analysis:
        overall_feasibility_score: 92
        feasibility_rating: "fully_feasible"
        critical_path_items:
          - "Power distribution from basement panel to ballroom (electrical work required)"
          - "Screen mounting on historic ballroom walls (venue approval needed)"
        go_no_go_recommendation: "go"

      venue_capability_assessment:
        power_assessment:
          available_power: "120A total from standard hotel circuits"
          required_power: "~15 kW (estimated 60A at 120V single phase)"
          power_verdict: "marginal"
          notes: "Tight but workable with proper distribution planning"

        existing_equipment_assessment:
          equipment_available: []
          equipment_gaps:
            - "All technical equipment must be rented/provided"

      equipment_gap_analysis:
        critical_equipment_required:
          - equipment: "4-Channel Wireless Microphone System"
            quantity: 1
            availability: "must_rent"
            notes: "Standard corporate event package"

          - equipment: "Powered PA Speakers"
            quantity: 2
            availability: "must_rent"
            notes: "1,000W combined minimum for ballroom coverage"

          - equipment: "2x 20' Video Screens"
            quantity: 2
            availability: "must_rent"
            notes: "Projection alternative acceptable if wall mounting unavailable"

          - equipment: "LED Color Wash Fixtures"
            quantity: 8
            availability: "must_rent"
            notes: "Minimal lighting for ambient effect"

        estimated_rental_cost: "$4,000-6,000"

      power_analysis:
        total_demand_watts: 15000
        total_amperage_required: "60A at 120V"
        venue_power_available: "120A total (standard hotel circuits)"
        power_verdict: "adequate with distribution planning"

      recommendations:
        must_have_items:
          - "4-Channel wireless microphone system"
          - "2x 500W+ powered PA speakers"
          - "2x 20-foot video screens with mounting hardware"
          - "8x Programmable LED color wash fixtures"
          - "Qualified technical operator for full event duration"

        timeline_implications:
          - "Electrical cord runs from basement to ballroom require advance venue approval"
          - "Setup time: 3-4 hours"
          - "Testing: 1 hour before event"

        cost_impact_summary:
          equipment_rental: "$4,500-6,500"
          labor: "$800-1,200 (operator + setup crew)"
          total_estimated_cost: "$5,300-7,700"

template_considerations:
  rider_analysis_best_practices:
    - Always verify rider requirements directly with artist/manager
    - Cross-reference equipment models for actual specifications
    - Request venue site survey data before analysis
    - Identify venue equipment that can substitute for rider items
    - Calculate power requirements conservatively (add 20-30% safety margin)
    - Assess rigging points in writing with venue engineer

  feasibility_scoring_methodology:
    - Stage readiness: 25% (dimensions, load capacity, setup space)
    - Power readiness: 25% (available amperage vs. required)
    - Rigging readiness: 20% (rigging points, weight capacity, safety margin)
    - Equipment availability: 30% (rentals, substitutions, lead times)
    - Individual scores: 0-100, composite is weighted average

  risk_mitigation_strategy:
    - Categorize risks as critical, high, moderate, low
    - Provide specific, actionable mitigation for each risk
    - Identify contingency equipment requirements
    - Create backup plans for single-point-of-failure items
    - Establish escalation procedures for critical decisions

cost_model:
  rider_analysis_development:
    basic_feasibility_report: "$400-800"
    comprehensive_analysis: "$1,000-1,500"
    contingency_planning: "$500-800"
    equipment_gap_research: "$200-400"
    power_calculation_analysis: "$300-500"

  revision_factors:
    rider_modifications: "30 min = $250"
    venue_constraint_changes: "45 min = $375"
    equipment_substitution_analysis: "30 min = $250"
    power_requirement_recalculation: "30 min = $250"

  value_delivery:
    risk_identification: "$5,000-15,000 in avoided equipment failures"
    power_planning: "$2,000-10,000 in avoided circuit overloads"
    rigging_safety: "$10,000-50,000 in avoided rigging incidents"
    feasibility_accuracy: "$3,000-8,000 in improved decision-making"
    timeline_optimization: "$1,500-5,000 in reduced setup time"
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
