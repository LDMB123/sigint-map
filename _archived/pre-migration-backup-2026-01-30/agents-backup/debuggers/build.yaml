# Universal Agent Framework - Build Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 20

agent:
  id: debugger_build
  name: Build Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: build
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Debugs build failures across various build systems.
    Analyzes compilation errors, dependency issues, and configuration problems.
    Supports webpack, vite, cargo, go, maven, gradle, and more.

  capabilities:
    - parse_build_output
    - identify_compilation_errors
    - resolve_dependency_issues
    - fix_configuration_problems
    - debug_bundler_issues
    - resolve_type_errors
    - fix_import_issues
    - debug_linker_errors
    - resolve_version_conflicts
    - fix_path_issues

  build_systems:
    - webpack
    - vite
    - rollup
    - esbuild
    - parcel
    - cargo
    - go_build
    - maven
    - gradle
    - npm
    - yarn
    - pnpm
    - pip
    - poetry
    - cmake
    - make
    - bazel
    - turbo

  input_schema:
    type: object
    required:
      - build_output
    properties:
      build_output:
        type: string
        description: Full build output including errors
      build_system:
        type: string
        description: Override auto-detected build system
      config_files:
        type: array
        items:
          type: string
        description: Build configuration files
      recent_changes:
        type: string
        description: Recent code changes

  output_schema:
    type: object
    properties:
      errors:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            file:
              type: string
            line:
              type: integer
            message:
              type: string
            suggestion:
              type: string
      root_causes:
        type: array
        items:
          type: object
          properties:
            cause:
              type: string
            confidence:
              type: number
      fixes:
        type: array
        items:
          type: object
          properties:
            description:
              type: string
            file:
              type: string
            changes:
              type: array
            commands:
              type: array
      dependency_issues:
        type: array
        items:
          type: object
          properties:
            package:
              type: string
            issue:
              type: string
            fix:
              type: string

  performance:
    avg_latency_ms: 2500
    max_tokens: 16000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 20

  collaboration:
    receives_from:
      - full-stack-developer: Build failure debugging requests
      - devops-engineer: CI/CD build failures
      - production-readiness-orchestrator: Pre-deployment build validation
      - feature-delivery-orchestrator: Build issues blocking feature delivery
    delegates_to:
      - dependency-analyzer: Resolve dependency conflict issues
      - static-analyzer: Check for code issues causing build failures
      - configuration-generator: Fix configuration file issues
    escalates_to:
      - devops-engineer: Infrastructure or toolchain issues
      - system-architect: Architectural changes needed to fix build
    returns_to:
      - orchestrating-agent: Root cause analysis and fix recommendations
    swarm_pattern: hierarchical
    coordinates_with:
      - error-diagnosis-debugger: Cross-reference with runtime errors

  tags:
    - debugging
    - build
    - compilation
    - bundling
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
