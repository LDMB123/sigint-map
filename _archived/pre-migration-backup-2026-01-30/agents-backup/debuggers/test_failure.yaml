# Universal Agent Framework - Test Failure Debugger
# Category: Debuggers | Tier: Sonnet | Parallelization: 20+

agent:
  id: debugger_test_failure
  name: Test Failure Debugger
  version: 1.0.0

  functional_category: debugger
  sub_category: test_failure
  model_tier: sonnet

  description: |
    Debugs failing tests to identify the cause and suggest fixes.
    Analyzes test output, assertions, and code changes.
    Distinguishes between test bugs and code bugs.

  capabilities:
    - analyze_test_output
    - identify_failing_assertions
    - trace_test_execution
    - compare_expected_vs_actual
    - detect_flaky_tests
    - identify_setup_issues
    - analyze_mock_failures
    - correlate_with_changes
    - suggest_test_fixes
    - suggest_code_fixes

  failure_categories:
    assertion_failures:
      - value_mismatch
      - type_mismatch
      - missing_property
      - extra_property
      - order_mismatch
    setup_failures:
      - fixture_error
      - mock_configuration
      - database_state
      - environment_issue
    timing_failures:
      - async_timeout
      - race_condition
      - order_dependency
    integration_failures:
      - api_change
      - schema_change
      - service_unavailable

  input_schema:
    type: object
    required:
      - test_output
    properties:
      test_output:
        type: string
        description: Full test output including failures
      test_file:
        type: string
      source_file:
        type: string
        description: File being tested
      recent_changes:
        type: string
        description: Git diff of recent changes
      test_history:
        type: array
        items:
          type: object
          properties:
            run_id:
              type: string
            passed:
              type: boolean
            timestamp:
              type: string
        description: Recent test run history

  output_schema:
    type: object
    properties:
      failing_tests:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            file:
              type: string
            line:
              type: integer
            failure_type:
              type: string
            message:
              type: string
            expected:
              type: string
            actual:
              type: string
      diagnosis:
        type: object
        properties:
          is_flaky:
            type: boolean
          is_test_bug:
            type: boolean
          is_code_bug:
            type: boolean
          root_cause:
            type: string
          confidence:
            type: number
      fixes:
        type: object
        properties:
          test_fixes:
            type: array
            items:
              type: object
              properties:
                test:
                  type: string
                fix:
                  type: string
                diff:
                  type: string
          code_fixes:
            type: array
            items:
              type: object
              properties:
                file:
                  type: string
                fix:
                  type: string
                diff:
                  type: string
      recommendations:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 3000
    max_tokens: 24000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 20
    recommended_batch_size: 10

  collaboration:
    receives_from:
      - test-coverage-orchestrator: Test failure investigation
      - vitest-testing-specialist: Vitest-specific test failures
      - qa-engineer: Flaky test analysis
      - full-stack-developer: Test debugging requests
    delegates_to:
      - error-diagnosis-debugger: Complex error analysis
      - test-validator: Validate test quality
      - code-generator: Generate test fixes
    queries:
      - codebase-indexer: Find related test patterns
      - pattern-miner: Identify test anti-patterns
    escalates_to:
      - vitest-testing-specialist: Framework-specific test issues
      - qa-engineer: Systematic test quality issues
    returns_to:
      - requesting-agent: Failure diagnosis with fix recommendations
    swarm_pattern: fan-out

  tags:
    - debugging
    - testing
    - failures
    - assertions
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
