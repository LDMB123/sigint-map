# Universal Agent Framework - Dependency Analyzer
# Category: Analyzers | Tier: Haiku | Parallelization: 30

agent:
  id: analyzer_dependency
  name: Dependency Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: dependency
  model_tier: haiku
  model_id: claude-sonnet-4-5-20250929

  description: |
    Analyzes project dependencies for issues, vulnerabilities, and optimization.
    Detects outdated packages, security vulnerabilities, license issues, and bloat.
    Supports all major package managers and ecosystems.

  capabilities:
    - detect_outdated_packages
    - find_security_vulnerabilities
    - analyze_license_compliance
    - identify_unused_dependencies
    - detect_duplicate_dependencies
    - analyze_dependency_tree
    - find_circular_dependencies
    - calculate_bundle_impact
    - identify_alternatives
    - check_peer_dependencies

  supported_ecosystems:
    - npm
    - yarn
    - pnpm
    - pip
    - poetry
    - cargo
    - go_modules
    - maven
    - gradle
    - nuget
    - bundler
    - composer
    - cocoapods
    - swift_pm

  input_schema:
    type: object
    required:
      - manifest_path
    properties:
      manifest_path:
        type: string
        description: Path to package manifest (package.json, Cargo.toml, etc.)
      lockfile_path:
        type: string
        description: Path to lockfile
      analysis_type:
        type: array
        items:
          type: string
          enum:
            - outdated
            - vulnerabilities
            - licenses
            - unused
            - duplicates
            - size
        default: [outdated, vulnerabilities]
      allowed_licenses:
        type: array
        items:
          type: string
        description: List of allowed license types
      severity_threshold:
        type: string
        enum: [critical, high, medium, low]
        default: high

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_dependencies:
            type: integer
          direct_dependencies:
            type: integer
          transitive_dependencies:
            type: integer
          health_score:
            type: number
      outdated:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            current:
              type: string
            latest:
              type: string
            type:
              type: string
              enum: [major, minor, patch]
      vulnerabilities:
        type: array
        items:
          type: object
          properties:
            package:
              type: string
            severity:
              type: string
            cve:
              type: string
            description:
              type: string
            fix_version:
              type: string
      license_issues:
        type: array
        items:
          type: object
          properties:
            package:
              type: string
            license:
              type: string
            issue:
              type: string
      unused:
        type: array
        items:
          type: string
      size_analysis:
        type: object
        properties:
          total_size:
            type: string
          largest_packages:
            type: array

  performance:
    avg_latency_ms: 2500
    max_tokens: 12000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 10

  collaboration:
    receives_from:
      - migration-orchestrator: Dependency analysis for framework migrations
      - security-hardening-orchestrator: Vulnerability and license audits
      - performance-optimization-orchestrator: Bundle size and dependency bloat analysis
      - code-reviewer: Dependency review in PRs
      - full-stack-developer: Ad-hoc dependency analysis
    delegates_to:
      - security-scanner: Deep vulnerability scanning for identified issues
      - bundle-size-analyzer: Detailed bundle impact analysis
    escalates_to:
      - security-engineer: Critical vulnerabilities requiring immediate attention
      - engineering-manager: License compliance violations
    returns_to:
      - orchestrating-agent: Comprehensive dependency health report with recommendations
    swarm_pattern: fan-out

  tags:
    - analysis
    - dependencies
    - security
    - licenses
    - packages
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: haiku
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
