# Universal Agent Framework - Static Analyzer
# Category: Analyzers | Tier: Sonnet | Parallelization: 30

agent:
  id: analyzer_static
  name: Static Analyzer
  version: 1.0.0

  functional_category: analyzer
  sub_category: static
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Performs comprehensive static code analysis without execution.
    Detects code smells, anti-patterns, complexity issues, and potential bugs.
    Works across all major programming languages.

  capabilities:
    - detect_code_smells
    - identify_anti_patterns
    - calculate_complexity
    - find_dead_code
    - detect_duplicates
    - analyze_dependencies
    - check_naming_conventions
    - identify_god_objects
    - detect_long_methods
    - find_circular_dependencies

  analysis_types:
    - cyclomatic_complexity
    - cognitive_complexity
    - lines_of_code
    - code_duplication
    - dependency_analysis
    - coupling_metrics
    - cohesion_metrics
    - maintainability_index
    - technical_debt
    - code_coverage_potential

  input_schema:
    type: object
    required:
      - target
    properties:
      target:
        oneOf:
          - type: string
            description: File or directory path
          - type: array
            items:
              type: string
      analysis_depth:
        type: string
        enum: [quick, standard, deep]
        default: standard
      metrics:
        type: array
        items:
          type: string
        description: Specific metrics to calculate
      thresholds:
        type: object
        description: Custom thresholds for metrics
      exclude_patterns:
        type: array
        items:
          type: string
        description: Patterns to exclude from analysis

  output_schema:
    type: object
    properties:
      summary:
        type: object
        properties:
          total_files:
            type: integer
          total_lines:
            type: integer
          overall_health:
            type: number
            minimum: 0
            maximum: 100
      metrics:
        type: object
        properties:
          cyclomatic_complexity:
            type: object
            properties:
              average:
                type: number
              max:
                type: number
              hotspots:
                type: array
          cognitive_complexity:
            type: object
          duplication:
            type: object
            properties:
              percentage:
                type: number
              blocks:
                type: array
          dependencies:
            type: object
      issues:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            severity:
              type: string
            file:
              type: string
            line:
              type: integer
            message:
              type: string
            suggestion:
              type: string
      technical_debt:
        type: object
        properties:
          estimated_hours:
            type: number
          breakdown:
            type: object

  performance:
    avg_latency_ms: 2500
    max_tokens: 16000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 20

  collaboration:
    receives_from:
      - code-reviewer: Code quality analysis in PR reviews
      - refactoring-guru: Identify refactoring targets
      - technical-debt-coordinator: Technical debt assessment
      - migration-orchestrator: Quality checks on migrated code
      - performance-optimization-orchestrator: Complexity analysis for optimization targets
    delegates_to:
      - complexity-calculator: Detailed cyclomatic complexity calculation
      - dead-code-detector: Find unreachable code segments
      - code-pattern-matcher: Identify anti-pattern occurrences
    escalates_to:
      - system-architect: Architectural issues requiring design changes
      - engineering-manager: Quality issues blocking release
    returns_to:
      - orchestrating-agent: Comprehensive quality report with metrics and issues
    swarm_pattern: fan-out
    coordinates_with:
      - dependency-analyzer: Cross-reference with dependency complexity

  tags:
    - analysis
    - static
    - complexity
    - quality
    - metrics
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
