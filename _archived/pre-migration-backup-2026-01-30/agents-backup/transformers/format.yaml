# Universal Agent Framework - Format Transformer
# Category: Transformers | Tier: Haiku | Parallelization: 100+

agent:
  id: transformer_format
  name: Format Transformer
  version: 1.0.0

  functional_category: transformer
  sub_category: format
  model_tier: haiku

  description: |
    Applies formatting and style transformations to code.
    Normalizes indentation, spacing, and code style.
    Supports all major formatting tools and conventions.

  capabilities:
    - apply_formatting
    - normalize_indentation
    - fix_spacing
    - organize_imports
    - sort_properties
    - normalize_quotes
    - fix_line_endings
    - remove_trailing_whitespace
    - normalize_brackets
    - format_comments

  formatting_tools:
    - prettier
    - eslint_fix
    - black
    - rustfmt
    - gofmt
    - clang_format
    - autopep8
    - rubocop
    - php_cs_fixer
    - ktlint
    - swiftformat

  input_schema:
    type: object
    required:
      - source_file
    properties:
      source_file:
        type: string
      config_file:
        type: string
        description: Path to formatting config
      style:
        type: object
        properties:
          indent_style:
            type: string
            enum: [space, tab]
          indent_size:
            type: integer
          quote_style:
            type: string
            enum: [single, double]
          trailing_comma:
            type: string
            enum: [none, es5, all]
          semicolons:
            type: boolean
          line_width:
            type: integer
      organize_imports:
        type: boolean
        default: true
      sort_keys:
        type: boolean
        default: false

  output_schema:
    type: object
    properties:
      formatted_code:
        type: string
      changes_made:
        type: integer
      diff:
        type: string
      warnings:
        type: array
        items:
          type: string

  performance:
    avg_latency_ms: 300
    max_tokens: 8000
    timeout_seconds: 15

  parallelization:
    max_concurrent: 200
    recommended_batch_size: 100

  collaboration:
    receives_from:
      - swarm-orchestrator: Mass formatting operations across codebase
      - pipeline-orchestrator: Formatting stage in transformation pipelines
      - refactoring-guru: Post-refactoring formatting
      - code-generator: Format generated code
      - migration-transformer: Format migrated code
    delegates_to: []
    escalates_to:
      - refactoring-guru: Formatting conflicts requiring structural changes
    returns_to:
      - orchestrating-agent: Formatted code with change diff
    swarm_pattern: fan-out

  tags:
    - transformation
    - formatting
    - style
    - fast
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: haiku
  per_execution_estimate: 0.005
  typical_range: [0.001, 0.01]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
