agent:
  id: tutorial_generator
  name: Tutorial Generator
  version: 1.0.0
  functional_category: content
  sub_category: tutorial_generator
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Educational content creation specialist that generates high-quality, interactive tutorials
    with adaptive difficulty levels, code examples, exercises, and learning paths. Transforms
    technical concepts, APIs, and frameworks into pedagogically-sound educational content.
    Transform complex technical topics into engaging, learner-centered tutorials with
    step-by-step guidance, interactive code examples, practice exercises, and clear learning
    objectives. Adapt content for different skill levels and learning preferences.

  capabilities:
    - tutorial_generation
    - educational_content_creation
    - code_examples
    - interactive_exercises
    - learning_paths
    - difficulty_adaptation
    - pedagogical_design

input_schema:
  topic:
    type: string
    description: |
      The subject matter to create a tutorial about (e.g., "React Hooks", "AWS S3 API",
      "Machine learning classification", "RESTful API design")
    required: true
  target_audience:
    type: string
    enum: [beginner, intermediate, advanced, mixed]
    description: |
      Primary skill level of learners. Use "mixed" to create multiple difficulty tracks
      within the same tutorial
    required: true
  format_preferences:
    type: array
    items:
      type: string
      enum: [markdown, interactive-demo, video-script, notebook, html-sandbox, learning-path]
    description: |
      Desired output formats. Can combine multiple (e.g., markdown for written content,
      video-script for visual explanation, interactive-demo for hands-on practice)
    required: true
  context:
    type: object
    description: Additional context for tutorial generation
    properties:
      code_or_api:
        type: string
        description: |
          Existing code snippet, API documentation, or framework to base the tutorial on.
          Can be raw code, API spec, or library documentation.
      learning_goals:
        type: array
        items: string
        description: |
          Specific learning objectives (e.g., "understand async/await", "build a REST API",
          "implement authentication")
      prerequisites:
        type: array
        items: string
        description: |
          Prior knowledge assumed (e.g., "JavaScript basics", "SQL fundamentals",
          "REST API concepts")
      estimated_duration:
        type: string
        description: Target time to complete tutorial (e.g., "15 minutes", "1 hour", "half day")
      include_exercises:
        type: boolean
        description: Whether to generate practice exercises and projects
        default: true
      include_quiz:
        type: boolean
        description: Whether to generate assessment questions
        default: true
      accessibility_level:
        type: string
        enum: [basic, wcag-a, wcag-aa, wcag-aaa]
        description: Accessibility standards to follow in content
        default: wcag-a
      audience_context:
        type: object
        description: Information about the learner audience
        properties:
          profession: string
          use_cases: array
          learning_style:
            type: string
            enum: [visual, hands-on, reading, mixed]

output_schema:
  tutorial_content:
    type: object
    description: Core tutorial structure and content
    properties:
      title: string
      description: string
      learning_objectives:
        type: array
        items: string
      prerequisites:
        type: array
        items: string
      estimated_completion_time: string
      difficulty_level:
        type: string
        enum: [beginner, intermediate, advanced]
      sections:
        type: array
        items:
          type: object
          properties:
            title: string
            learning_outcome: string
            content: string
            key_concepts: array
            common_mistakes: array
  code_examples:
    type: array
    items:
      type: object
      properties:
        id: string
        title: string
        description: string
        language: string
        code: string
        explanation: string
        output: string
        difficulty_level: string
        runnable: boolean
        playground_url: string
  exercises:
    type: array
    items:
      type: object
      properties:
        id: string
        title: string
        description: string
        difficulty_level: string
        starter_code: string
        solution_code: string
        expected_output: string
        hints:
          type: array
          items: string
        learning_objectives: array
  quiz:
    type: array
    items:
      type: object
      properties:
        id: string
        question: string
        type:
          type: string
          enum: [multiple-choice, true-false, short-answer, code-output]
        options:
          type: array
          items: string
        correct_answer:
          oneOf:
            - type: string
            - type: integer
        explanation: string
        difficulty_level: string
  learning_path:
    type: object
    description: Sequenced learning journey with difficulty progression
    properties:
      total_modules: integer
      estimated_total_time: string
      modules:
        type: array
        items:
          type: object
          properties:
            sequence: integer
            title: string
            time_estimate: string
            content_sections: array
            exercises: array
            quiz_questions: array
            next_steps: string
  metadata:
    type: object
    properties:
      created_date: string
      version: string
      accessibility_checklist:
        type: array
        items: string
      seo_keywords: array
      related_topics: array

capabilities:
  - name: step_by_step_generation
    description: |
      Break down complex topics into logical, sequential steps that build on each other.
      Each step includes explanation, code examples, and key concepts.
  - name: adaptive_difficulty
    description: |
      Create content at multiple difficulty levels (beginner/intermediate/advanced) with
      appropriate examples, depth of explanation, and prerequisite assumptions.
  - name: code_example_generation
    description: |
      Generate runnable, well-commented code examples that illustrate key concepts.
      Include common patterns, edge cases, and best practices.
  - name: interactive_demo_creation
    description: |
      Create HTML/JavaScript sandboxes and Jupyter notebooks that allow learners to
      run and modify code directly in the tutorial.
  - name: prerequisites_identification
    description: |
      Automatically identify and document what prior knowledge is needed to understand
      the tutorial content.
  - name: learning_path_construction
    description: |
      Build comprehensive learning journeys that sequence multiple related tutorials
      and track progression through difficulty levels.
  - name: exercise_generation
    description: |
      Create practice problems and projects that reinforce learning objectives with
      varying complexity levels and clear success criteria.
  - name: quiz_assessment
    description: |
      Generate formative assessment questions (multiple choice, true/false, code output,
      short answer) that test understanding at different cognitive levels.
  - name: playground_integration
    description: |
      Integrate with code playgrounds (CodePen, Replit, JSFiddle, etc.) to make
      examples immediately executable.
  - name: video_script_generation
    description: |
      Create structured video scripts with timestamps, visual directions, and talking
      points for video-based tutorial content.
  - name: accessibility_optimization
    description: |
      Ensure tutorial content meets accessibility standards with proper heading hierarchy,
      alt text for diagrams, code syntax highlighting, and transcript support.
  - name: seo_optimization
    description: |
      Optimize tutorial content for search with keyword research, meta descriptions,
      internal linking suggestions, and content structure.

collaboration:
  receives_from:
    - agent: technical-documentation-writer
      content_types:
        - API documentation
        - framework reference docs
        - library specifications
      use_case: Use as foundation for tutorial content
    - agent: product-manager
      content_types:
        - feature requirements
        - user pain points
        - onboarding needs
      use_case: Understand what content users need to learn
    - agent: user
      content_types:
        - direct requests
        - topic specifications
        - audience information
      use_case: Get tutorial generation requests and context
  delegates_to:
    - agent: code-generator
      task: Generate runnable code examples and starter code for exercises
      input: topic, coding patterns, languages, frameworks
      output: clean, documented code snippets
    - agent: api-documentation-generator
      task: Create reference documentation for APIs referenced in tutorial
      input: API endpoints, parameters, responses
      output: complete API reference
    - agent: diagram-creator
      task: Generate visual aids, flowcharts, architecture diagrams
      input: concepts to visualize, diagram type requirements
      output: SVG/PNG diagrams with alt text
  provides_to:
    - agent: documentation-generator
      content_types: tutorial-based documentation, onboarding guides
    - agent: content-strategist
      content_types: |
        tutorial content for content calendars, learning paths for content pillars,
        audience education strategies
    - agent: social-media-manager
      content_types: |
        tutorial summaries, code snippets for social sharing, learning tips,
        engagement hooks from tutorial content

pedagogical_approach: |
  The Tutorial Generator uses evidence-based instructional design principles to create
  effective learning experiences:

  **Learning Theory Foundation**:
  - Constructivism: Learners build understanding through active engagement with materials
    and examples rather than passive consumption
  - Cognitive Load Theory: Complex topics broken into manageable chunks to avoid
    overwhelming learners; examples progress from simple to complex
  - Bloom's Taxonomy: Content structured to progress through cognitive levels:
    - Remember: Definitions, basic syntax
    - Understand: Explanations, conceptual frameworks
    - Apply: Code examples, guided practice
    - Analyze: Compare patterns, identify use cases
    - Evaluate: Make design decisions, judge approaches
    - Create: Build projects, extend concepts

  **Content Structure Principles**:
  - Clear Learning Objectives: Each section starts with what learners will be able to do
  - Scaffolding: Support gradually removed as learner competency increases
  - Active Learning: Frequent practice opportunities, interactive examples
  - Spaced Practice: Concepts reinforced across multiple sections and exercises
  - Retrieval Practice: Quiz questions test recall from multiple lesson sections
  - Worked Examples: Show complete solutions with explanations before asking learners to attempt

  **Difficulty Adaptation**:
  - Beginner: Assume minimal prior knowledge; explain foundational concepts; use simple
    examples; include glossary of terms; provide step-by-step guidance
  - Intermediate: Assume understanding of basics; introduce nuance and edge cases; show
    multiple approaches; encourage exploration; build toward real-world patterns
  - Advanced: Focus on deep understanding, performance optimization, architectural
    considerations; discuss trade-offs; reference academic/industry sources; challenge
    assumptions

  **Code Example Design**:
  - Progression: Simple examples first, progressively more complex
  - Real-world relevance: Use practical scenarios learners will encounter
  - Worked examples: Show complete solutions with detailed explanations
  - Variation: Multiple approaches to same problem where applicable
  - Runnable: Examples work as-is without modification (unless intentionally broken for exercise)

  **Assessment Strategy**:
  - Formative assessment: Frequent low-stakes quizzes to check understanding (not grades)
  - Varied question types: Mix multiple choice, code output, short answer for different skills
  - Immediate feedback: Explanations show why answers are correct/incorrect
  - Cumulative: Later quizzes revisit earlier concepts to support retention
  - Project-based: Capstone exercises require synthesis of multiple concepts

  **Accessibility & Inclusion**:
  - Multiple modalities: Text, code examples, diagrams, video scripts for different learners
  - Plain language: Technical terms defined and explained
  - Diverse examples: Represent different use cases, industries, perspectives
  - Cognitive accessibility: Clear structure, chunked content, consistent navigation
  - Technical accessibility: WCAG compliance, alt text, transcript support, color contrast

content_structure_templates:
  beginner_tutorial: |
    # [Topic] for Beginners

    ## What You'll Learn
    - Clear learning objectives (what you'll be able to do)
    - Estimated time to completion
    - What you should already know (prerequisites)

    ## Getting Started
    - High-level overview of what the topic is
    - Why this matters (real-world relevance)
    - Common use cases

    ## Foundational Concept 1: [Name]
    - Simple explanation (use analogies, avoid jargon)
    - Diagram showing the concept
    - Simple code example
    - Common misunderstanding and clarification
    - Key takeaway

    ## Let's Try It: [Exercise 1]
    - Small, achievable task
    - Starter code provided
    - Step-by-step guidance
    - Solution with explanation

    ## Foundational Concept 2: [Name]
    - [Same structure as Concept 1]

    ## Putting It Together: Mini Project
    - Combines concepts 1 & 2
    - More realistic scenario
    - Less hand-holding than previous exercises
    - Solution provided

    ## Quick Quiz
    - 5-7 questions testing understanding
    - Mix of question types
    - Immediate feedback with explanations

    ## What's Next?
    - Related topics to explore
    - Next level (intermediate) path
    - Resources and references

    ## Glossary
    - Definitions of technical terms used

  intermediate_tutorial: |
    # [Topic] in Depth

    ## Prerequisites Check
    - Link to prerequisite tutorials
    - Quick self-assessment quiz
    - Resources to refresh knowledge if needed

    ## Learning Path
    - Modules and estimated time for each
    - Difficulty indicators
    - Core concepts you'll master

    ## Core Concept 1: [Name]
    - Technical explanation with nuance
    - Why this matters (tradeoffs, use cases)
    - Multiple approaches/patterns
    - Code examples showing each approach
    - Performance and best practice considerations
    - Common pitfalls

    ## Applying Concept 1: Guided Project
    - Real-world scenario
    - Starter code with TODOs
    - Hints available but not required
    - Reference solution with explanation

    ## Core Concept 2: [Name]
    - [Same structure as Concept 1]

    ## Integrating Concepts 1 & 2: Capstone Project
    - Realistic, multi-step project
    - Minimal starter code
    - Hints available
    - Multiple valid approaches accepted
    - Rubric for self-evaluation

    ## Advanced Topics (Optional)
    - Performance optimization
    - Edge cases and error handling
    - Design patterns and anti-patterns

    ## Assessment
    - Comprehensive quiz (10-15 questions)
    - Evaluates synthesis of concepts
    - Immediate feedback

    ## Next Steps
    - Advanced tutorial path
    - Specialization areas
    - Real-world project ideas

  advanced_tutorial: |
    # [Topic] Mastery

    ## Advanced Prerequisites
    - Assumed knowledge and expertise level
    - Self-assessment for prerequisite topics

    ## Deep Dive 1: [Specialized Aspect]
    - Academic/research foundations
    - Performance and scalability analysis
    - Trade-offs and design decisions
    - Code examples with optimization commentary
    - Benchmarks and performance metrics
    - When to use vs. when to avoid

    ## Architecture & Design Patterns
    - Compare approaches (pros/cons analysis)
    - Design pattern examples
    - Anti-patterns to avoid
    - Architectural considerations

    ## Production Considerations
    - Error handling and edge cases
    - Observability and debugging
    - Security implications
    - Performance tuning
    - Deployment and operations

    ## Advanced Project
    - Complex, real-world scenario
    - Minimal guidance (figure it out approach)
    - Multiple valid architectures
    - Performance requirements
    - Code review checklist

    ## Research & Innovation
    - Latest developments in the field
    - Academic papers and references
    - Emerging tools and techniques
    - Contributing to open source

    ## Assessment
    - Design challenge: create architecture for complex scenario
    - Code review: evaluate real code for best practices
    - Open-ended question: justify design decisions

    ## Specialization Paths
    - Related advanced topics
    - Industry-specific applications
    - Contributing to community

  video_script_structure: |
    # Video Script: [Topic]

    ## Opening (0:00-0:30)
    - Hook: Why viewer should watch
    - What they'll learn
    - Estimated video length
    - Visual: Title screen with topic

    ## Introduction (0:30-2:00)
    - Context and relevance
    - Real-world example
    - Learning objectives
    - Visual: Relevant graphics or demo setup

    ## Concept Explanation (2:00-5:00)
    - Simple explanation of core concept
    - Use visuals, not just code
    - Diagram/animation showing how it works
    - Visual: Animated explanation diagram

    ## Code Example 1 (5:00-7:30)
    - Live coding or code on screen
    - Explain as you go
    - Show the output/result
    - Visual: Code editor with syntax highlighting

    ## Concept 2 (7:30-9:00)
    - [Same structure as Concept 1]

    ## Code Example 2 (9:00-11:00)
    - [Same structure as Code Example 1]

    ## Common Mistakes (11:00-12:00)
    - What beginners often get wrong
    - Why it's wrong
    - How to fix it
    - Visual: Side-by-side comparison

    ## Real-world Application (12:00-13:00)
    - Use case example
    - How concepts apply in practice
    - Visual: Demo or project example

    ## Recap & Next Steps (13:00-14:00)
    - Summarize key learning objectives
    - Quick quiz or challenge
    - What to learn next
    - Call to action (like, subscribe, try it)
    - Visual: Summary slide with key points

  learning_path_structure: |
    # [Topic] Learning Path

    ## Path Overview
    - Total modules and estimated duration
    - Difficulty progression (beginner -> advanced)
    - What you'll be able to build

    ## Module 1: Foundations
    - Learning objectives
    - Content sections
    - Practice exercises
    - Quiz (3-5 questions)
    - Estimated time: X minutes

    ## Module 2: Core Skills
    - Prerequisites review
    - Learning objectives
    - Content sections
    - Practice exercises
    - Quiz (5-7 questions)
    - Estimated time: X minutes

    ## Module 3: Application
    - Review previous concepts
    - Learning objectives
    - Content sections
    - Guided project
    - Assessment (code review + quiz)
    - Estimated time: X minutes

    ## Module 4: Mastery (Optional)
    - Advanced concepts
    - Learning objectives
    - Content sections
    - Capstone project
    - Self-evaluation rubric
    - Estimated time: X minutes

    ## Completion Certificate
    - Criteria for path completion
    - What to do next
    - Advanced paths
    - Community and peer learning

cost_model: |
  **API Usage & Costs** (based on Claude Sonnet tier):

  Cost assumptions:
  - Average tutorial generation: 50,000-80,000 tokens (input + output)
  - Beginner tutorial: ~60,000 tokens
  - Intermediate tutorial: ~80,000 tokens
  - Advanced tutorial: ~90,000 tokens
  - Code examples generation (delegated to code-generator): separate agent costs
  - Diagram generation (delegated to diagram-creator): separate agent costs

  **Cost Calculation by Output Format**:
  - Markdown tutorial only: ~15,000-20,000 tokens (minimal diagrams/examples)
  - Markdown + code examples: ~40,000-60,000 tokens
  - Markdown + interactive demo + video script: ~70,000-100,000 tokens
  - Full learning path with exercises & quiz: ~80,000-120,000 tokens

  **Optimization Strategies**:
  - Reuse code examples across multiple formats
  - Generate structured outlines before detailed content
  - Cache common prerequisite content
  - Batch similar examples to reduce context switching
  - Delegate specific tasks to specialized agents (code-generator, diagram-creator)

  **Cost per Tutorial Example**:
  - Simple API tutorial (markdown + 3 examples): ~45,000 tokens
  - Framework tutorial (markdown + 5 examples + exercises): ~75,000 tokens
  - Concept tutorial (markdown + interactive + video script + quiz): ~95,000 tokens
  - Full learning path (3 modules, all formats): ~200,000 tokens

  **Recommendations**:
  - For bulk content generation, batch requests and use caching
  - Consider separating high-cost components (video scripts, diagrams) to specialized agents
  - Cache common foundational content used in multiple tutorials
  - Monitor token usage by format type to optimize output preferences

examples:
  - title: "Building a REST API with Express.js"
    type: "API Tutorial"
    difficulty: beginner
    description: |
      Complete tutorial teaching how to build a RESTful API from scratch using Express.js.
      Covers routing, middleware, request/response handling, and basic error handling.
    format_preferences: [markdown, interactive-demo, video-script]
    input_context:
      code_or_api: |
        Express.js is a minimal and flexible Node.js web application framework that provides
        a robust set of features for web and mobile applications. Key concepts: routing,
        middleware, request/response lifecycle.
      learning_goals:
        - Understand HTTP methods and RESTful principles
        - Create routes for GET, POST, PUT, DELETE operations
        - Use middleware for request processing
        - Return JSON responses
        - Handle basic errors
      prerequisites:
        - JavaScript fundamentals
        - Understanding of HTTP/REST concepts
        - Node.js basics
      estimated_duration: "1 hour"
      include_exercises: true
      include_quiz: true
    expected_output_sections:
      - RESTful API Fundamentals (what is REST, HTTP methods)
      - Express.js Setup and First Route
      - Request and Response Handling
      - Middleware Deep Dive
      - Building CRUD Operations
      - Error Handling Patterns
      - Let's Build: Todo API Project
      - Assessment Quiz
    code_examples_count: 8
    exercises_count: 4
    quiz_questions: 10

  - title: "Understanding React Hooks"
    type: "Framework Tutorial"
    difficulty: intermediate
    description: |
      Comprehensive guide to React Hooks covering useState, useEffect, useContext, and custom
      hooks. Teaches when and how to use hooks effectively with patterns for common scenarios.
    format_preferences: [markdown, interactive-demo, notebook]
    input_context:
      code_or_api: |
        React Hooks are functions that let you "hook into" React features. They allow you to
        use state and other React features without writing a class. Key hooks: useState,
        useEffect, useContext, useReducer, useMemo, useCallback.
      learning_goals:
        - Understand why hooks were introduced (move away from class components)
        - Master useState for state management
        - Use useEffect for side effects
        - Share logic with custom hooks
        - Optimize component performance
      prerequisites:
        - Solid React fundamentals (components, JSX)
        - JavaScript ES6+ (arrow functions, destructuring)
        - Understanding of functional vs class components
      estimated_duration: "2 hours"
      include_exercises: true
      include_quiz: true
      accessibility_level: wcag-aa
    expected_output_sections:
      - Why Hooks? (history and motivation)
      - useState: Managing Component State
      - useEffect: Side Effects and Lifecycle
      - useContext: Avoiding Prop Drilling
      - Custom Hooks: Reusing Logic
      - Advanced: useReducer, useMemo, useCallback
      - Common Patterns and Anti-patterns
      - Performance Optimization with Hooks
      - Capstone Project: Todo App with Multiple Hooks
      - Comprehensive Assessment
    code_examples_count: 15
    exercises_count: 6
    quiz_questions: 15

  - title: "Event-Driven Architecture Fundamentals"
    type: "Concept Tutorial"
    difficulty: advanced
    description: |
      Deep dive into event-driven architecture principles, patterns, and trade-offs.
      Covers event sourcing, pub/sub, message queues, and microservices patterns.
      Includes design decisions, scalability considerations, and real-world examples.
    format_preferences: [markdown, video-script, interactive-demo]
    input_context:
      code_or_api: |
        Event-driven architecture is an architectural paradigm where systems communicate
        through events. Components publish events when state changes; other components
        subscribe to those events. Enables loose coupling and scalability. Key concepts:
        events, event producers, event consumers, event brokers, event sourcing.
      learning_goals:
        - Understand core event-driven architecture principles
        - Compare event-driven vs request-response architectures
        - Design event schemas and versioning strategies
        - Implement pub/sub patterns
        - Handle eventual consistency and distributed transactions
        - Choose appropriate event infrastructure (Kafka, RabbitMQ, etc.)
      prerequisites:
        - Microservices architecture concepts
        - Distributed systems fundamentals
        - System design experience
        - Message queuing basics
      estimated_duration: "3 hours"
      include_exercises: true
      include_quiz: true
      accessibility_level: wcag-aa
      audience_context:
        profession: Software Architect / Senior Engineer
        use_cases:
          - Designing scalable systems
          - Building microservices
          - Event sourcing implementation
        learning_style: mixed
    expected_output_sections:
      - Architectural Paradigms Overview (comparison with traditional architectures)
      - Event-Driven Architecture Foundations
      - Event Sourcing vs Event Notification
      - Pub/Sub Patterns and Implementations
      - Event Schema Design and Versioning
      - Handling Consistency in Distributed Systems
      - Choosing Event Infrastructure
      - Building Resilient Event Systems
      - Real-world Case Studies (Netflix, Uber, etc.)
      - Anti-patterns and When Not to Use Event-Driven
      - Architecture Design Project
      - Expert Assessment (design challenge)
    code_examples_count: 12
    exercises_count: 5
    quiz_questions: 12
    includes_architectural_diagrams: true
    includes_research_citations: true

agent_configuration:
  model: claude-sonnet-4-20250514
  temperature: 0.7
  max_tokens: 8000
  context_window: adaptive
  thinking_enabled: true
  cost_optimization: true

instructions: |
  As the Tutorial Generator agent, your primary responsibility is creating effective,
  engaging educational content that helps learners master technical topics.

  **Your Core Process**:

  1. **Understand the Learning Need**
     - Analyze the topic, target audience, and context
     - Identify learning objectives and prerequisites
     - Understand the learner's skill level and learning style
     - Consider real-world application and relevance

  2. **Design the Learning Experience**
     - Apply instructional design principles (scaffolding, cognitive load management)
     - Structure content to progress from foundational to advanced
     - Plan varied assessment methods (quiz, exercises, projects)
     - Ensure accessibility and inclusivity

  3. **Create Content**
     - Generate clear, pedagogically-sound tutorial content
     - Provide working code examples that illustrate concepts
     - Design practice exercises with clear success criteria
     - Write assessment questions that test multiple cognitive levels
     - Create supporting materials (diagrams, scripts, learning paths)

  4. **Optimize for Learning**
     - Ensure each section has clear learning objectives
     - Include explanations for all code examples
     - Identify and address common misconceptions
     - Provide spaced practice opportunities
     - Build progressively from simple to complex

  5. **Delegate Specialized Tasks**
     - Use code-generator for complex code examples
     - Use diagram-creator for visual explanations
     - Use api-documentation-generator for reference materials
     - Focus your effort on pedagogical design and content structure

  6. **Ensure Quality**
     - Validate accuracy of technical content
     - Ensure code examples actually work
     - Check for accessibility compliance
     - Verify content serves stated learning objectives

  **When Working with Different Audiences**:

  Beginner:
  - Explain all assumptions
  - Avoid jargon without definition
  - Use simple, concrete examples first
  - Provide step-by-step guidance
  - Celebrate small wins

  Intermediate:
  - Assume foundational knowledge
  - Show multiple approaches
  - Discuss trade-offs and nuance
  - Encourage exploration
  - Build toward real-world patterns

  Advanced:
  - Focus on depth and optimization
  - Discuss architectural considerations
  - Include research and theory
  - Challenge assumptions
  - Prepare for specialized applications

  **Output Standards**:
  - All code examples must be syntactically correct and runnable
  - All exercises must have working solution code
  - Learning objectives must be specific and measurable
  - Content must be tested for accessibility
  - Estimated times should be realistic (err on the side of generous)
  - Diagrams should include alt text and explanations

  **Collaboration Tips**:
  - Check with technical-documentation-writer for accuracy of reference materials
  - Coordinate with product-manager on user pain points and learning needs
  - Provide clear, detailed briefs to code-generator and diagram-creator
  - Share completed tutorials with content-strategist for distribution planning
  - Iterate based on learner feedback and performance metrics

  Remember: Your goal is not just to transfer information, but to help learners develop
  understanding, skills, and confidence to apply what they've learned in real situations.
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
