# Universal Agent Framework - Message Queue Integrator
# Category: Integrators | Tier: Sonnet | Parallelization: 10+

agent:
  id: integrator_message_queue
  name: Message Queue Integrator
  version: 1.0.0

  functional_category: integrator
  sub_category: message_queue
  model_tier: sonnet

  description: |
    Creates message queue integrations for async communication.
    Implements publishers, subscribers, and event handlers.
    Supports Kafka, RabbitMQ, SQS, and more.

  capabilities:
    - create_publisher
    - implement_subscriber
    - generate_event_handlers
    - create_message_schemas
    - implement_dead_letter_queue
    - add_retry_logic
    - create_event_sourcing
    - implement_saga_pattern
    - generate_message_validators
    - create_monitoring

  queue_types:
    - kafka
    - rabbitmq
    - sqs
    - sns
    - redis_pubsub
    - nats
    - pulsar
    - google_pubsub
    - azure_service_bus

  patterns:
    - pub_sub
    - request_reply
    - competing_consumers
    - event_sourcing
    - saga
    - outbox
    - inbox

  input_schema:
    type: object
    required:
      - queue_type
      - events
    properties:
      queue_type:
        type: string
      events:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            schema:
              type: object
            topic:
              type: string
      pattern:
        type: string
        enum: [pub_sub, request_reply, competing_consumers, saga]
        default: pub_sub
      options:
        type: object
        properties:
          dead_letter:
            type: boolean
            default: true
          retry_config:
            type: object
          serialization:
            type: string
            enum: [json, avro, protobuf]

  output_schema:
    type: object
    properties:
      integration:
        type: object
        properties:
          publishers:
            type: string
          subscribers:
            type: string
          handlers:
            type: string
          schemas:
            type: string
      files:
        type: array
        items:
          type: object
          properties:
            path:
              type: string
            content:
              type: string
      configuration:
        type: object
      monitoring:
        type: string

  performance:
    avg_latency_ms: 3500
    max_tokens: 24000
    timeout_seconds: 90

  parallelization:
    max_concurrent: 10

  collaboration:
    receives_from:
      - event-driven-orchestrator: Event-driven integration setup
      - microservices-orchestrator: Message queue integration for microservices
      - full-stack-developer: Async messaging implementation
      - system-architect: Event-driven architecture implementation
    delegates_to:
      - code-generator: Generate message handlers and publishers
      - test-generator: Generate messaging tests
      - documentation-generator: Generate messaging documentation
    escalates_to:
      - system-architect: Complex messaging patterns requiring architectural guidance
      - devops-engineer: Message queue infrastructure issues
    returns_to:
      - requesting-agent: Message queue integration with handlers and configuration
    swarm_pattern: pipeline

  tags:
    - integration
    - messaging
    - async
    - events
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

security:
  input_validation:
    enabled: true
    sanitize_sql: true
    sanitize_shell: true
    max_input_size: 10000
    reject_patterns:
      - "'; DROP TABLE"
      - "rm -rf /"
      - "../"
      - "<script>"

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
