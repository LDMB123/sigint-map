# Universal Agent Framework - Database Integrator
# Category: Integrators | Tier: Sonnet | Parallelization: 10+

agent:
  id: integrator_database
  name: Database Integrator
  version: 1.0.0

  functional_category: integrator
  sub_category: database
  model_tier: sonnet

  description: |
    Creates database integrations and data access layers.
    Generates repositories, queries, and migrations.
    Supports SQL, NoSQL, and graph databases.

  capabilities:
    - generate_repository
    - create_data_access_layer
    - generate_migrations
    - create_query_builders
    - implement_connection_pool
    - generate_orm_models
    - create_seed_scripts
    - implement_transactions
    - generate_indexes
    - create_backup_scripts

  database_types:
    sql:
      - postgresql
      - mysql
      - sqlite
      - mssql
      - oracle
    nosql:
      - mongodb
      - redis
      - cassandra
      - dynamodb
      - couchdb
    graph:
      - neo4j
      - neptune
      - tigergraph
    search:
      - elasticsearch
      - opensearch
      - meilisearch

  input_schema:
    type: object
    required:
      - schema
      - database_type
    properties:
      schema:
        oneOf:
          - type: string
            description: Path to schema file
          - type: object
            description: Inline schema definition
      database_type:
        type: string
      target_language:
        type: string
        default: typescript
      orm:
        type: string
        enum: [prisma, drizzle, typeorm, sequelize, mongoose, raw]
        default: prisma
      options:
        type: object
        properties:
          generate_migrations:
            type: boolean
            default: true
          generate_seeds:
            type: boolean
            default: false
          connection_pooling:
            type: boolean
            default: true
          transactions:
            type: boolean
            default: true

  output_schema:
    type: object
    properties:
      data_layer:
        type: object
        properties:
          models:
            type: string
          repositories:
            type: string
          queries:
            type: string
          migrations:
            type: array
      files:
        type: array
        items:
          type: object
          properties:
            path:
              type: string
            content:
              type: string
      connection_config:
        type: object
      seeds:
        type: string
      indexes:
        type: array

  performance:
    avg_latency_ms: 4000
    max_tokens: 32000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 10

  collaboration:
    receives_from:
      - data-integration-orchestrator: Database integration tasks
      - migration-orchestrator: Database migration integration
      - audit-trail-reporter: Persist audit events
      - full-stack-developer: Database layer implementation
    delegates_to:
      - code-generator: Generate ORM models and queries
      - schema-validator: Validate database schemas
      - test-generator: Generate database tests
    escalates_to:
      - database-architect: Complex database design issues
      - devops-engineer: Database infrastructure issues
    returns_to:
      - requesting-agent: Database integration with models and migrations
    swarm_pattern: pipeline

  tags:
    - integration
    - database
    - orm
    - data_layer
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

security:
  input_validation:
    enabled: true
    sanitize_sql: true
    sanitize_shell: true
    max_input_size: 10000
    reject_patterns:
      - "'; DROP TABLE"
      - "rm -rf /"
      - "../"
      - "<script>"

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
