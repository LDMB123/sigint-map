# Universal Agent Framework - Syntax Validator
# Category: Validators | Tier: Haiku | Parallelization: 100+

agent:
  id: validator_syntax
  name: Syntax Validator
  version: 1.0.0

  functional_category: validator
  sub_category: syntax
  model_tier: haiku

  description: |
    Universal syntax validation across all programming languages.
    Detects parse errors, invalid syntax, and malformed code structures.
    Optimized for massive parallelization (100+ concurrent instances).

  capabilities:
    - validate_syntax
    - detect_parse_errors
    - check_language_compliance
    - identify_encoding_issues
    - report_line_column_positions

  supported_languages:
    - javascript
    - typescript
    - python
    - rust
    - go
    - java
    - ruby
    - php
    - c
    - cpp
    - csharp
    - swift
    - kotlin
    - scala
    - haskell
    - elixir
    - clojure
    - yaml
    - json
    - toml
    - xml
    - html
    - css
    - sql
    - graphql
    - protobuf
    - markdown

  input_schema:
    type: object
    required:
      - file_path
    properties:
      file_path:
        type: string
        description: Path to file to validate
      language:
        type: string
        description: Override auto-detected language
      strict_mode:
        type: boolean
        default: false
        description: Enable strict parsing rules
      include_warnings:
        type: boolean
        default: true
        description: Include warnings in addition to errors
      context_lines:
        type: integer
        default: 3
        description: Number of context lines around errors

  output_schema:
    type: object
    properties:
      valid:
        type: boolean
        description: Whether file has valid syntax
      language:
        type: string
        description: Detected or specified language
      errors:
        type: array
        items:
          type: object
          properties:
            line:
              type: integer
            column:
              type: integer
            end_line:
              type: integer
            end_column:
              type: integer
            message:
              type: string
            severity:
              type: string
              enum: [error, warning, info]
            code:
              type: string
              description: Error code for categorization
            context:
              type: string
              description: Code snippet around error
      metrics:
        type: object
        properties:
          total_lines:
            type: integer
          parse_time_ms:
            type: integer
          error_count:
            type: integer
          warning_count:
            type: integer

  performance:
    avg_latency_ms: 500
    max_tokens: 4000
    timeout_seconds: 30

  cost:
    tier: haiku
    per_execution_estimate: 0.001

  parallelization:
    max_concurrent: 200
    recommended_batch_size: 50
    supports_streaming: false

  error_handling:
    retry_on_failure: true
    max_retries: 2
    fallback_agent: null
    on_timeout: return_partial

  quality_metrics:
    expected_accuracy: 0.99
    false_positive_rate: 0.01

  collaboration:
    receives_from:
      - code-reviewer: Syntax validation in PR reviews
      - migration-transformer: Validate migrated code syntax
      - code-generator: Validate generated code syntax
      - configuration-generator: Validate generated config syntax
      - refactoring-guru: Syntax check after refactoring
    returns_to:
      - orchestrating-agent: Syntax validation result with error locations
    swarm_pattern: fan-out
    coordinates_with:
      - style-validator: Run after syntax validation passes

  tags:
    - validation
    - syntax
    - parsing
    - universal
    - fast
    - parallelizable

  examples:
    - name: Validate TypeScript file
      input:
        file_path: src/components/Button.tsx
      output:
        valid: true
        language: typescript
        errors: []
        metrics:
          total_lines: 45
          parse_time_ms: 120
          error_count: 0
          warning_count: 0

    - name: Detect syntax error
      input:
        file_path: src/utils/broken.js
      output:
        valid: false
        language: javascript
        errors:
          - line: 15
            column: 23
            message: "Unexpected token '}'"
            severity: error
            code: E001
            context: "  return { foo: bar }"
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: haiku
  per_execution_estimate: 0.005
  typical_range: [0.001, 0.01]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
