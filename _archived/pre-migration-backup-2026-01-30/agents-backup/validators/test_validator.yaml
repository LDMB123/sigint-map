# Universal Agent Framework - Test Validator
# Category: Validators | Tier: Sonnet | Parallelization: 30

agent:
  id: validator_test
  name: Test Validator
  version: 1.0.0

  functional_category: validator
  sub_category: test
  model_tier: sonnet
  model_id: claude-sonnet-4-5-20250929

  description: |
    Validates test quality, coverage, and correctness.
    Checks assertion quality, test isolation, mocking patterns,
    and identifies flaky test indicators.

  capabilities:
    - check_assertion_quality
    - detect_flaky_patterns
    - verify_test_isolation
    - validate_mock_usage
    - check_test_naming
    - verify_setup_teardown
    - detect_test_smells
    - validate_coverage_thresholds
    - check_snapshot_freshness
    - verify_async_handling

  supported_frameworks:
    - jest
    - vitest
    - mocha
    - jasmine
    - pytest
    - unittest
    - rspec
    - minitest
    - go_test
    - rust_test
    - junit
    - testng
    - xunit
    - nunit
    - swift_testing
    - xctest
    - playwright
    - cypress
    - selenium

  input_schema:
    type: object
    required:
      - test_file
    properties:
      test_file:
        type: string
      source_file:
        type: string
        description: Corresponding source file for coverage analysis
      framework:
        type: string
        description: Override auto-detected framework
      coverage_threshold:
        type: number
        default: 80
        description: Minimum coverage percentage

  output_schema:
    type: object
    properties:
      quality_score:
        type: number
        minimum: 0
        maximum: 1
      issues:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
              enum:
                - weak_assertion
                - flaky_indicator
                - isolation_violation
                - mock_anti_pattern
                - missing_cleanup
                - async_issue
                - snapshot_stale
            line:
              type: integer
            message:
              type: string
            severity:
              type: string
            suggestion:
              type: string
      coverage:
        type: object
        properties:
          line_coverage:
            type: number
          branch_coverage:
            type: number
          function_coverage:
            type: number
          uncovered_lines:
            type: array
            items:
              type: integer

  performance:
    avg_latency_ms: 2500
    max_tokens: 8000
    timeout_seconds: 60

  parallelization:
    max_concurrent: 30
    recommended_batch_size: 20

  collaboration:
    receives_from:
      - test-coverage-orchestrator: Comprehensive test validation requests
      - refactoring-guru: Validate tests before/after refactoring
      - migration-transformer: Validate migrated test suites
      - code-reviewer: Test quality review in PRs
      - vitest-testing-specialist: Test suite validation delegation
    delegates_to:
      - test-generator: Generate missing tests for low coverage
      - code-pattern-matcher: Identify test anti-patterns
    escalates_to:
      - qa-engineer: Systematic test quality issues
      - vitest-testing-specialist: Complex test framework issues
    returns_to:
      - orchestrating-agent: Test quality report with coverage metrics and recommendations
    swarm_pattern: fan-out
    coordinates_with:
      - code-generator: Ensure generated code is testable

  tags:
    - validation
    - testing
    - quality
    - coverage
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
