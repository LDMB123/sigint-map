# Universal Agent Framework - Delegation Orchestrator
# Category: Orchestrators | Tier: Sonnet | Parallelization: 5-10

agent:
  id: orchestrator_delegation
  name: Delegation Orchestrator
  version: 1.0.0

  functional_category: orchestrator
  sub_category: delegation
  model_tier: sonnet

  description: |
    Mid-level orchestrator for delegating tasks to specialist agents.
    Routes tasks based on capability matching and availability.
    Manages agent pools and handles task queuing.

  capabilities:
    - route_to_specialists
    - match_capabilities
    - manage_agent_pool
    - queue_tasks
    - load_balance
    - handle_timeouts
    - escalate_failures
    - optimize_routing
    - cache_results
    - deduplicate_tasks

  routing_strategies:
    capability_match:
      description: Route based on required vs. available capabilities
      priority: highest

    cost_optimized:
      description: Route to cheapest capable agent
      priority: high

    latency_optimized:
      description: Route to fastest available agent
      priority: medium

    quality_optimized:
      description: Route to highest-quality agent
      priority: medium

    round_robin:
      description: Distribute evenly across agents
      priority: low

  input_schema:
    type: object
    required:
      - task
    properties:
      task:
        type: object
        properties:
          type:
            type: string
          payload:
            type: object
          required_capabilities:
            type: array
            items:
              type: string
          priority:
            type: string
            enum: [low, medium, high, critical]
            default: medium
      routing_preference:
        type: string
        enum:
          - capability_match
          - cost_optimized
          - latency_optimized
          - quality_optimized
          - round_robin
        default: capability_match
      fallback_agents:
        type: array
        items:
          type: string
        description: Backup agents if primary is unavailable
      timeout_ms:
        type: integer
        default: 30000

  output_schema:
    type: object
    properties:
      success:
        type: boolean
      result:
        type: object
        description: Result from delegated agent
      routing_decision:
        type: object
        properties:
          selected_agent:
            type: string
          reason:
            type: string
          alternatives_considered:
            type: array
          routing_time_ms:
            type: integer
      execution:
        type: object
        properties:
          agent:
            type: string
          duration_ms:
            type: integer
          cost:
            type: number
          retries:
            type: integer

  performance:
    avg_latency_ms: 500  # Routing overhead
    max_tokens: 16000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 10
    recommended_batch_size: 5

  collaboration:
    receives_from:
      - workflow-orchestrator: Task routing and delegation decisions
      - pipeline-orchestrator: Stage-based delegation
      - full-stack-developer: Ad-hoc specialist delegation
    delegates_to:
      - dependency-analyzer: Dependency-specific tasks
      - static-analyzer: Static analysis tasks
      - code-generator: Code generation tasks
      - refactor-transformer: Refactoring tasks
      - test-generator: Test generation tasks
      - security-scanner: Security scanning tasks
      - performance-analyzer: Performance profiling tasks
    escalates_to:
      - workflow-orchestrator: Delegation failures or capability gaps
    returns_to:
      - requesting-orchestrator: Task results with routing metadata
    swarm_pattern: router
    coordinates_with:
      - metrics-reporter: Track delegation patterns and agent utilization

  tags:
    - orchestration
    - delegation
    - routing
    - middleware
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: sonnet
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
