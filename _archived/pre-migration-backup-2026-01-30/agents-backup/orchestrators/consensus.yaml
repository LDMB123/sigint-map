# Universal Agent Framework - Consensus Orchestrator
# Category: Orchestrators | Tier: Opus | Parallelization: 1

agent:
  id: orchestrator_consensus
  name: Consensus Orchestrator
  version: 1.0.0

  functional_category: orchestrator
  sub_category: consensus
  model_tier: opus

  description: |
    Orchestrates consensus-building workflows for important decisions.
    Generates diverse proposals, facilitates evaluation, and makes final decisions.
    Ensures high-quality outcomes through multi-perspective analysis.

  capabilities:
    - generate_proposals
    - facilitate_evaluation
    - aggregate_scores
    - resolve_conflicts
    - make_final_decision
    - document_rationale
    - handle_ties
    - weight_opinions
    - track_dissent
    - create_decision_record

  consensus_methods:
    majority_vote:
      description: Simple majority wins
      use_when: "Low-stakes decisions"

    weighted_score:
      description: Weighted average of criteria scores
      use_when: "Multi-criteria decisions"

    unanimous:
      description: All parties must agree
      use_when: "Critical decisions"

    supermajority:
      description: 2/3 or 3/4 must agree
      use_when: "Important but not critical"

    ranked_choice:
      description: Iterative elimination until majority
      use_when: "Many alternatives"

    delphi:
      description: Iterative anonymous feedback
      use_when: "Complex, uncertain decisions"

  input_schema:
    type: object
    required:
      - decision_topic
    properties:
      decision_topic:
        type: string
        description: What decision needs to be made
      context:
        type: object
        description: Background information
      constraints:
        type: array
        items:
          type: string
        description: Hard constraints on solutions
      evaluation_criteria:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            weight:
              type: number
            description:
              type: string
      proposer_agents:
        type: array
        items:
          type: string
        description: Agents to generate proposals
      evaluator_agents:
        type: array
        items:
          type: string
        description: Agents to evaluate proposals
      consensus_method:
        type: string
        default: weighted_score
      min_proposals:
        type: integer
        default: 3
      max_iterations:
        type: integer
        default: 3

  output_schema:
    type: object
    properties:
      decision:
        type: object
        description: The final decision
      confidence:
        type: number
        minimum: 0
        maximum: 1
      proposals:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            proposer:
              type: string
            summary:
              type: string
            details:
              type: object
            scores:
              type: object
            final_score:
              type: number
      evaluation_matrix:
        type: object
        description: Full scoring breakdown
      decision_rationale:
        type: string
      dissenting_opinions:
        type: array
        items:
          type: object
          properties:
            agent:
              type: string
            opinion:
              type: string
            weight:
              type: number
      adr:
        type: object
        description: Architecture Decision Record
        properties:
          title:
            type: string
          status:
            type: string
          context:
            type: string
          decision:
            type: string
          consequences:
            type: array

  performance:
    avg_latency_ms: 30000
    max_tokens: 100000
    timeout_seconds: 600

  parallelization:
    max_concurrent: 1
    can_parallelize_proposals: true
    can_parallelize_evaluations: true

  collaboration:
    receives_from:
      - workflow-orchestrator: Critical architecture and design decisions
      - system-architect: Multi-option architectural evaluations
      - engineering-manager: Technical direction and tooling decisions
    delegates_to:
      - system-architect: Generate architectural proposals
      - full-stack-developer: Generate implementation proposals
      - security-engineer: Security-focused proposal generation
      - performance-engineer: Performance-focused proposal generation
      - devils-advocate: Critical evaluation of proposals
      - code-reviewer: Technical evaluation of proposals
    escalates_to:
      - engineering-manager: Unable to reach consensus or high-stakes decisions
    returns_to:
      - requesting-stakeholder: Final decision with ADR and rationale
    swarm_pattern: consensus
    coordinates_with:
      - audit-trail-reporter: Document decision-making process
      - summary-reporter: Create decision summaries for stakeholders

  tags:
    - orchestration
    - consensus
    - decisions
    - governance
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue
latency_target_ms: 2000

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: opus
  per_execution_estimate: 0.15
  typical_range: [0.10, 0.30]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
