# Universal Agent Framework - Domain Modeler
# Category: Learners | Tier: Opus | Parallelization: 3+

agent:
  id: learner_domain_modeler
  name: Domain Modeler
  version: 1.0.0

  functional_category: learner
  sub_category: domain_modeler
  model_tier: opus

  description: |
    Builds comprehensive domain models from code analysis.
    Extracts entities, relationships, business rules, and workflows.
    Creates documentation and diagrams for domain understanding.

  capabilities:
    - extract_entities
    - identify_relationships
    - discover_business_rules
    - map_workflows
    - identify_bounded_contexts
    - extract_ubiquitous_language
    - model_aggregates
    - identify_domain_events
    - map_value_objects
    - create_domain_diagrams

  ddd_concepts:
    - entities
    - value_objects
    - aggregates
    - repositories
    - services
    - factories
    - domain_events
    - bounded_contexts
    - ubiquitous_language
    - context_maps

  input_schema:
    type: object
    required:
      - source
    properties:
      source:
        type: string
        description: Codebase root directory
      focus_modules:
        type: array
        items:
          type: string
        description: Specific modules to focus on
      existing_docs:
        type: array
        items:
          type: string
        description: Existing documentation to reference
      include_database:
        type: boolean
        default: true
        description: Include database schema analysis
      include_api:
        type: boolean
        default: true
        description: Include API contracts analysis

  output_schema:
    type: object
    properties:
      domain_model:
        type: object
        properties:
          entities:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                properties:
                  type: array
                methods:
                  type: array
                relationships:
                  type: array
                invariants:
                  type: array
          value_objects:
            type: array
          aggregates:
            type: array
            items:
              type: object
              properties:
                root:
                  type: string
                members:
                  type: array
                invariants:
                  type: array
          services:
            type: array
          events:
            type: array
      bounded_contexts:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            entities:
              type: array
            upstream:
              type: array
            downstream:
              type: array
      ubiquitous_language:
        type: object
        additionalProperties:
          type: object
          properties:
            definition:
              type: string
            examples:
              type: array
            synonyms:
              type: array
      workflows:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            trigger:
              type: string
            steps:
              type: array
            outcomes:
              type: array
      diagrams:
        type: object
        properties:
          class_diagram:
            type: string
          context_map:
            type: string
          event_flow:
            type: string
      documentation:
        type: string
        description: Generated domain documentation

  performance:
    avg_latency_ms: 15000
    max_tokens: 100000
    timeout_seconds: 600

  parallelization:
    max_concurrent: 3
    can_parallelize_modules: true

  collaboration:
    receives_from:
      - system-architect: Domain modeling for new features
      - documentation-generation-orchestrator: Domain documentation requests
      - full-stack-developer: Domain analysis for implementation
    delegates_to:
      - semantic-analyzer: Extract domain semantics from code
      - static-analyzer: Analyze domain structure
      - codebase-indexer: Index domain entities and relationships
    provides_to:
      - system-architect: Domain model for architectural decisions
      - documentation-generator: Domain documentation content
      - code-generator: Domain-driven code generation
    escalates_to:
      - system-architect: Complex domain modeling requiring expert input
    returns_to:
      - requesting-agent: Domain model with entities, relationships, and documentation
    swarm_pattern: analysis

  tags:
    - learning
    - domain
    - modeling
    - ddd
    - architecture
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue
latency_target_ms: 2000

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: opus
  per_execution_estimate: 0.15
  typical_range: [0.10, 0.30]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
