# Universal Agent Framework - Context Builder
# Category: Learners | Tier: Haiku | Parallelization: 5+

agent:
  id: learner_context_builder
  name: Context Builder
  version: 1.0.0

  functional_category: learner
  sub_category: context_builder
  model_tier: haiku

  description: |
    Builds rich context for other agents to use.
    Summarizes relevant code, documentation, and history.
    Prioritizes information based on task relevance.

  capabilities:
    - gather_relevant_code
    - summarize_modules
    - extract_key_patterns
    - build_dependency_context
    - gather_documentation
    - extract_recent_changes
    - identify_related_tests
    - build_api_context
    - extract_configuration
    - prioritize_information

  context_types:
    code_context:
      - related_files
      - function_implementations
      - type_definitions
      - test_files
    documentation_context:
      - readme
      - api_docs
      - inline_comments
      - architecture_docs
    history_context:
      - recent_commits
      - authors
      - change_frequency
      - bug_history
    runtime_context:
      - configuration
      - environment
      - dependencies
      - deployment

  input_schema:
    type: object
    required:
      - task
    properties:
      task:
        type: object
        properties:
          description:
            type: string
          type:
            type: string
            enum: [bug_fix, feature, refactor, review, debug]
          target_files:
            type: array
            items:
              type: string
      codebase_root:
        type: string
      max_context_tokens:
        type: integer
        default: 50000
      priority_weights:
        type: object
        properties:
          code:
            type: number
          docs:
            type: number
          history:
            type: number
          tests:
            type: number

  output_schema:
    type: object
    properties:
      context:
        type: object
        properties:
          summary:
            type: string
            description: High-level summary
          relevant_files:
            type: array
            items:
              type: object
              properties:
                path:
                  type: string
                relevance_score:
                  type: number
                summary:
                  type: string
                key_sections:
                  type: array
          patterns:
            type: array
            items:
              type: object
              properties:
                pattern:
                  type: string
                examples:
                  type: array
          dependencies:
            type: object
          recent_changes:
            type: array
          related_issues:
            type: array
      metadata:
        type: object
        properties:
          total_tokens:
            type: integer
          files_considered:
            type: integer
          files_included:
            type: integer
          compression_ratio:
            type: number

  performance:
    avg_latency_ms: 4000
    max_tokens: 50000
    timeout_seconds: 120

  parallelization:
    max_concurrent: 5
    can_gather_parallel: true

  collaboration:
    receives_from:
      - workflow-orchestrator: Context gathering for complex tasks
      - full-stack-developer: Relevant context for development tasks
      - code-reviewer: Context for code review
      - refactoring-guru: Context for refactoring decisions
    delegates_to:
      - codebase-indexer: Search for relevant files and patterns
      - semantic-analyzer: Analyze code relevance
      - dependency-analyzer: Map dependency relationships
    provides_to:
      - all-agents: Relevant context for task execution
    escalates_to:
      - full-stack-developer: Cannot determine relevance, requires human judgment
    returns_to:
      - requesting-agent: Optimized context package with relevance scores
    swarm_pattern: fan-out

  tags:
    - learning
    - context
    - relevance
    - summarization
error_handling:
  retry_on_failure: true
  max_retries: 2
  backoff_ms: 1000
  fallback_agent: null
  on_error: log_and_continue

batch_processing:
  enabled: true
  batch_size: 10
  timeout_ms: 5000

cost:
  tier: haiku
  per_execution_estimate: 0.03
  typical_range: [0.01, 0.08]

logging:
  level: info
  format: json
  include_timestamps: true
  log_to_file: true
  log_path: /var/log/agents/
