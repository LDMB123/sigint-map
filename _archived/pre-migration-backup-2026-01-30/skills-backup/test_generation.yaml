# Universal Agent Framework - Test Generation Skill
# Category: Quality | Swarm: Progressive Refinement | Quality: High

skill:
  id: skill_test_generation
  name: test-generation
  version: 1.0.0
  category: quality

  description: |
    Generates comprehensive test suites with high coverage.
    Uses progressive refinement for quality tests.
    Supports unit, integration, and e2e tests.

  invocation:
    command: /test-gen
    aliases: [generate-tests, tg]

  parameters:
    - name: source
      type: string
      required: true
      description: Source file or directory to generate tests for

    - name: test_types
      type: array
      items:
        type: string
        enum: [unit, integration, e2e, property]
      default: [unit]

    - name: coverage_target
      type: number
      default: 80
      description: Target coverage percentage

    - name: framework
      type: string
      description: Testing framework (auto-detected if not specified)

    - name: include_edge_cases
      type: boolean
      default: true

  workflow:
    swarm_pattern: progressive_refinement

    phases:
      - name: Source Analysis
        agent: analyzer_semantic
        tier: sonnet
        actions:
          - Analyze source code
          - Identify functions and classes
          - Understand behavior and edge cases
          - Identify dependencies to mock
        output: source_analysis

      - name: Test Draft
        agent: generator_test
        tier: sonnet
        actions:
          - Generate initial test suite
          - Include setup and teardown
          - Create mocks for dependencies
        output: draft_tests

      - name: Coverage Analysis
        agent: analyzer_static
        tier: haiku
        actions:
          - Analyze test coverage
          - Identify uncovered paths
        output: coverage_analysis

      - name: Test Refinement
        agent: generator_test
        tier: sonnet
        condition: coverage < coverage_target
        iteration: true
        max_iterations: 3
        actions:
          - Add tests for uncovered paths
          - Improve edge case coverage
        output: refined_tests

      - name: Test Validation
        agent: validator_test
        tier: haiku
        actions:
          - Validate test syntax
          - Check assertion quality
          - Detect flaky patterns
        output: validation_results

  outputs:
    - name: test_file
      type: object
      schema:
        path: string
        content: string
        test_count: integer
        coverage_estimate: number

    - name: test_summary
      type: object
      schema:
        total_tests: integer
        by_type: object
        coverage: number
        mocks_generated: array

  cost_model:
    unit_tests_only:
      sonnet_calls: 3
      haiku_calls: 2
      estimated_cost: 0.01

    full_suite:
      sonnet_calls: 6
      haiku_calls: 4
      estimated_cost: 0.02

  examples:
    - name: Generate unit tests
      invocation: /test-gen src/utils/auth.ts
      expected:
        tests_generated: 15
        coverage: 85
        cost: 0.01

    - name: Full test suite with 90% coverage
      invocation: /test-gen src/services/ --test_types unit,integration --coverage_target 90
      expected:
        tests_generated: 50
        coverage: 90
        cost: 0.05

  tags:
    - testing
    - generation
    - coverage
    - quality
