# Universal Agent Framework - Cost Limits Configuration
# Budget controls and cost optimization settings

cost_limits:
  global:
    # Hard limits
    max_cost_per_hour: 10.00
    max_cost_per_day: 50.00
    max_cost_per_task: 5.00
    max_cost_per_session: 25.00

    # Soft limits (warnings)
    warning_threshold_percent: 80

  per_tier:
    haiku:
      max_concurrent: 200
      max_per_hour: 1000
      budget_allocation_percent: 30

    sonnet:
      max_concurrent: 30
      max_per_hour: 100
      budget_allocation_percent: 50

    opus:
      max_concurrent: 5
      max_per_hour: 20
      budget_allocation_percent: 20

  per_swarm:
    fan_out_validation:
      max_workers: 200
      max_cost: 1.00
      timeout_seconds: 300

    hierarchical_delegation:
      max_sonnet_coordinators: 20
      max_haiku_workers: 500
      max_cost: 5.00
      timeout_seconds: 3600

    consensus_building:
      max_proposals: 5
      max_evaluations: 25
      max_cost: 0.50
      timeout_seconds: 600

    progressive_refinement:
      max_iterations: 5
      max_cost: 0.50
      timeout_seconds: 600

    self_healing:
      max_recovery_attempts: 3
      max_cost_per_recovery: 0.10
      max_total_cost: 0.50

# Cost optimization strategies
optimization:
  prefer_haiku:
    enabled: true
    description: Use Haiku for parallelizable tasks

  batch_similar_tasks:
    enabled: true
    min_batch_size: 5
    max_batch_size: 100

  cache_results:
    enabled: true
    ttl_seconds: 3600
    max_cache_size_mb: 100

  deduplicate_requests:
    enabled: true
    similarity_threshold: 0.95

  early_termination:
    enabled: true
    description: Stop processing if quality threshold met early

  speculative_execution:
    enabled: true
    description: Start with Haiku, escalate if struggling
    max_haiku_attempts: 2

# Alerts and notifications
alerts:
  budget_warning:
    threshold_percent: 80
    channels: [log, slack]

  budget_critical:
    threshold_percent: 95
    channels: [log, slack, email]
    action: throttle_requests

  budget_exceeded:
    action: block_new_requests
    channels: [log, slack, email, pagerduty]

  unusual_spending:
    description: Spike detection
    threshold_multiplier: 3.0
    window_minutes: 15
    channels: [log, slack]

# Reporting
reporting:
  cost_tracking:
    granularity: per_task
    retention_days: 90

  daily_summary:
    enabled: true
    time: "00:00"
    channels: [log, email]

  weekly_report:
    enabled: true
    day: monday
    channels: [email, slack]
    includes:
      - total_cost
      - cost_by_tier
      - cost_by_swarm
      - top_expensive_tasks
      - optimization_suggestions

# Budget allocation by category
category_budgets:
  validation:
    percent: 20
    preferred_tier: haiku

  generation:
    percent: 30
    preferred_tier: sonnet

  analysis:
    percent: 25
    preferred_tier: sonnet

  orchestration:
    percent: 15
    preferred_tier: opus

  debugging:
    percent: 10
    preferred_tier: sonnet
