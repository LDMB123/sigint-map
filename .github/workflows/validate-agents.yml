name: Validate Agent Framework

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude/agents/**/*.yaml'
      - '.claude/agents/**/*.md'
      - '.claude/config/**/*.yaml'
      - '.claude/scripts/**/*.sh'
  pull_request:
    branches: [main]
    paths:
      - '.claude/agents/**/*.yaml'
      - '.claude/agents/**/*.md'
      - '.claude/config/**/*.yaml'

jobs:
  yaml-validation:
    name: YAML Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML Syntax
        run: |
          python3 -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          valid_count = 0

          print('🔍 Scanning for YAML files...')
          yaml_files = list(Path('.claude').rglob('*.yaml'))
          print(f'Found {len(yaml_files)} YAML files to validate\n')

          for yaml_file in yaml_files:
              try:
                  with open(yaml_file) as f:
                      data = yaml.safe_load(f)
                      if data is None:
                          errors.append(f'{yaml_file}: Empty YAML file')
                      else:
                          valid_count += 1
                          print(f'✅ {yaml_file}')
              except yaml.YAMLError as e:
                  errors.append(f'{yaml_file}: {e}')
                  print(f'❌ {yaml_file}: {e}')
              except Exception as e:
                  errors.append(f'{yaml_file}: Unexpected error - {e}')
                  print(f'❌ {yaml_file}: {e}')

          print(f'\n📊 Validation Summary:')
          print(f'  Valid: {valid_count}/{len(yaml_files)}')
          print(f'  Errors: {len(errors)}/{len(yaml_files)}')

          if errors:
              print('\n❌ YAML Validation Failed:')
              for error in errors:
                  print(f'  • {error}')
              sys.exit(1)
          else:
              print(f'\n✅ All {valid_count} YAML files are valid!')
          "

  contract-validation:
    name: Collaboration Contract Validation
    runs-on: ubuntu-latest
    needs: yaml-validation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install pyyaml jsonschema

      - name: Validate Agent Contracts
        run: |
          python3 -c "
          import yaml
          import sys
          from pathlib import Path

          required_fields = ['name', 'role', 'triggers', 'inputs', 'outputs']
          errors = []
          agents_validated = 0

          print('🔍 Validating agent collaboration contracts...\n')

          agent_files = list(Path('.claude/agents').rglob('*.yaml'))

          for agent_file in agent_files:
              try:
                  with open(agent_file) as f:
                      agent_data = yaml.safe_load(f)

                  if not agent_data:
                      continue

                  # Check for required fields
                  missing = [field for field in required_fields if field not in agent_data]

                  if missing:
                      errors.append(f'{agent_file.name}: Missing fields: {missing}')
                  else:
                      agents_validated += 1
                      print(f'✅ {agent_file.name}')

              except Exception as e:
                  errors.append(f'{agent_file.name}: {e}')

          print(f'\n📊 Contract Validation Summary:')
          print(f'  Validated: {agents_validated}')
          print(f'  Errors: {len(errors)}')

          if errors:
              print('\n❌ Contract Validation Failures:')
              for error in errors:
                  print(f'  • {error}')
              sys.exit(1)
          else:
              print(f'\n✅ All agent contracts validated successfully!')
          "

      - name: Run Comprehensive Validation Script
        run: |
          if [ -f .claude/scripts/comprehensive-validation.sh ]; then
            bash .claude/scripts/comprehensive-validation.sh
          else
            echo "⚠️  Comprehensive validation script not found, skipping..."
          fi

  schema-validation:
    name: Schema Compliance Check
    runs-on: ubuntu-latest
    needs: yaml-validation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.claude/package.json'

      - name: Check for package.json
        id: check_package
        run: |
          if [ -f .claude/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.check_package.outputs.exists == 'true'
        run: |
          cd .claude
          npm ci

      - name: Run Schema Validation
        if: steps.check_package.outputs.exists == 'true'
        run: |
          cd .claude
          if [ -f package.json ] && grep -q "\"test\"" package.json; then
            npm test
          else
            echo "⚠️  No test script configured, skipping..."
          fi

  markdown-lint:
    name: Markdown Documentation Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lint Markdown Files
        uses: articulate/actions-markdownlint@v1
        with:
          config: .markdownlint.json
          files: '.claude/**/*.md'
          ignore: 'node_modules'
        continue-on-error: true

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [yaml-validation, contract-validation, schema-validation]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🎯 Agent Framework Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Syntax | ${{ needs.yaml-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Validation | ${{ needs.contract-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Schema Validation | ${{ needs.schema-validation.result }} |" >> $GITHUB_STEP_SUMMARY
