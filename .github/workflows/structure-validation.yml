name: Repository Structure Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run structure validation
        id: validate
        run: |
          chmod +x .claude/scripts/validate-structure.sh
          .claude/scripts/validate-structure.sh
        continue-on-error: true

      - name: Check validation result
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Repository structure validation failed"
          echo "See validation script output above for details"
          exit 1

      - name: Report success
        if: steps.validate.outcome == 'success'
        run: |
          echo "✅ Repository structure validation passed"
          echo "All structure checks completed successfully"

  validate-stale-references:
    name: Check for Stale Path References
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Search for stale references
        id: search
        run: |
          echo "Searching for 'dmb-almanac-svelte' references..."

          stale_count=$(grep -r "dmb-almanac-svelte" . \
            --exclude-dir=node_modules \
            --exclude-dir=.svelte-kit \
            --exclude-dir=build \
            --exclude-dir=dist \
            --exclude-dir=.git \
            2>/dev/null | wc -l || echo 0)

          echo "stale_count=$stale_count" >> $GITHUB_OUTPUT

          if [ "$stale_count" -gt 0 ]; then
            echo "::warning::Found $stale_count stale 'dmb-almanac-svelte' references"
            grep -r "dmb-almanac-svelte" . \
              --exclude-dir=node_modules \
              --exclude-dir=.svelte-kit \
              --exclude-dir=build \
              --exclude-dir=dist \
              --exclude-dir=.git \
              2>/dev/null || true
            exit 1
          else
            echo "✅ No stale references found"
          fi

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-structure, validate-stale-references]
    if: always()

    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.validate-structure.result }}" == "success" ] && \
             [ "${{ needs.validate-stale-references.result }}" == "success" ]; then
            echo "✅ All structure validation checks passed"
            exit 0
          else
            echo "❌ Structure validation failed"
            echo "Structure check: ${{ needs.validate-structure.result }}"
            echo "Stale references check: ${{ needs.validate-stale-references.result }}"
            exit 1
          fi
