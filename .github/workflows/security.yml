name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  filesystem-scan:
    name: Filesystem Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate Human-Readable Report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --json

      - name: Custom Secret Pattern Check
        run: |
          echo "🔍 Scanning for common secret patterns..."

          # Patterns to detect
          patterns=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api[_-]?key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
            "-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "ghp_[a-zA-Z0-9]{36}"
          )

          found_secrets=0

          for pattern in "${patterns[@]}"; do
            if grep -rEi "$pattern" .claude/ --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
              found_secrets=$((found_secrets + 1))
              echo "⚠️  Potential secret pattern found: $pattern"
            fi
          done

          if [ $found_secrets -gt 0 ]; then
            echo "❌ Found $found_secrets potential secret patterns"
            echo "⚠️  Manual review required - not failing build automatically"
          else
            echo "✅ No obvious secret patterns detected"
          fi

  dependency-security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f .claude/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run npm Audit
        if: steps.check_npm.outputs.exists == 'true'
        run: |
          cd .claude
          npm audit --audit-level=moderate --json > /tmp/npm-audit.json || true

          echo "## 📦 npm Dependency Audit" >> $GITHUB_STEP_SUMMARY

          if [ -s /tmp/npm-audit.json ]; then
            vulnerabilities=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities | to_entries[] | "\(.key): \(.value)"' 2>/dev/null || echo "Unable to parse")

            echo "### Vulnerabilities Found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for Python Requirements
        id: check_python
        run: |
          if [ -f .claude/requirements.txt ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_python.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Safety
        if: steps.check_python.outputs.exists == 'true'
        run: pip install safety

      - name: Run Python Safety Check
        if: steps.check_python.outputs.exists == 'true'
        run: |
          if [ -f .claude/requirements.txt ]; then
            safety check --file .claude/requirements.txt --json > /tmp/safety-report.json || true

            echo "## 🐍 Python Dependency Safety Check" >> $GITHUB_STEP_SUMMARY

            if [ -s /tmp/safety-report.json ]; then
              echo "### Safety Report:" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat /tmp/safety-report.json | jq '.' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

  code-scanning:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript,python'
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  permissions-audit:
    name: File Permissions Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Executable Permissions
        run: |
          echo "🔍 Auditing file permissions..."

          # Find files with unusual permissions
          echo "### Files with Execute Permissions:" > /tmp/permissions-report.txt
          find .claude -type f -perm -111 -ls >> /tmp/permissions-report.txt

          # Find world-writable files
          echo "" >> /tmp/permissions-report.txt
          echo "### World-Writable Files (Security Risk):" >> /tmp/permissions-report.txt
          world_writable=$(find .claude -type f -perm -002 2>/dev/null || echo "")

          if [ -n "$world_writable" ]; then
            echo "$world_writable" >> /tmp/permissions-report.txt
            echo "❌ Found world-writable files - security risk!"
            cat /tmp/permissions-report.txt
            exit 1
          else
            echo "✅ No world-writable files found" >> /tmp/permissions-report.txt
          fi

          cat /tmp/permissions-report.txt

      - name: Upload Permissions Report
        uses: actions/upload-artifact@v4
        with:
          name: permissions-audit
          path: /tmp/permissions-report.txt
          retention-days: 30

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [filesystem-scan, secret-scanning, dependency-security, code-scanning, permissions-audit]
    if: always()
    steps:
      - name: Generate Security Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Filesystem Scan | ${{ needs.filesystem-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-scanning.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Security | ${{ needs.dependency-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Scanning | ${{ needs.code-scanning.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Permissions Audit | ${{ needs.permissions-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "${{ needs.filesystem-scan.result }}" = "success" ] && \
             [ "${{ needs.secret-scanning.result }}" = "success" ] && \
             [ "${{ needs.dependency-security.result }}" = "success" ] && \
             [ "${{ needs.code-scanning.result }}" = "success" ] && \
             [ "${{ needs.permissions-audit.result }}" = "success" ]; then
            echo "✅ All security scans passed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Some security scans require attention" >> $GITHUB_STEP_SUMMARY
          fi
