name: Performance Benchmarks

on:
  push:
    branches: [main]
    paths:
      - '.claude/**/*.js'
      - '.claude/**/*.py'
      - '.claude/**/*.sh'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  agent-performance:
    name: Agent Dispatch Performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pyyaml psutil

      - name: Run Agent Load Benchmarks
        id: benchmark
        run: |
          python3 << 'EOF'
          import yaml
          import time
          import json
          from pathlib import Path

          print("🚀 Running agent performance benchmarks...\n")

          results = {
              "agent_count": 0,
              "load_time_ms": 0,
              "parse_time_ms": 0,
              "validation_time_ms": 0
          }

          # Benchmark 1: Agent file discovery
          start = time.time()
          agent_files = list(Path('.claude/agents').rglob('*.yaml'))
          discovery_time = (time.time() - start) * 1000
          results["agent_count"] = len(agent_files)

          print(f"📊 Discovered {len(agent_files)} agent files in {discovery_time:.2f}ms")

          # Benchmark 2: YAML parsing
          start = time.time()
          agents = []
          for agent_file in agent_files:
              try:
                  with open(agent_file) as f:
                      agents.append(yaml.safe_load(f))
              except:
                  pass
          parse_time = (time.time() - start) * 1000
          results["parse_time_ms"] = round(parse_time, 2)

          print(f"📊 Parsed {len(agents)} agents in {parse_time:.2f}ms")

          # Benchmark 3: Basic validation
          start = time.time()
          valid = sum(1 for a in agents if a and isinstance(a, dict) and 'name' in a)
          validation_time = (time.time() - start) * 1000
          results["validation_time_ms"] = round(validation_time, 2)

          print(f"📊 Validated {valid} agents in {validation_time:.2f}ms")

          # Total load time
          total_time = discovery_time + parse_time + validation_time
          results["load_time_ms"] = round(total_time, 2)

          print(f"\n⏱️  Total framework load time: {total_time:.2f}ms")

          # Performance metrics
          avg_per_agent = total_time / len(agent_files) if agent_files else 0
          print(f"📈 Average per agent: {avg_per_agent:.2f}ms")

          # Save results
          with open('/tmp/benchmark_results.json', 'w') as f:
              json.dump(results, f, indent=2)

          # Performance thresholds
          MAX_LOAD_TIME = 5000  # 5 seconds
          if total_time > MAX_LOAD_TIME:
              print(f"\n⚠️  WARNING: Load time {total_time:.2f}ms exceeds threshold {MAX_LOAD_TIME}ms")
              exit(1)
          else:
              print(f"\n✅ Performance within acceptable thresholds")

          EOF

      - name: Store Baseline
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p .claude/benchmarks
          cp /tmp/benchmark_results.json .claude/benchmarks/baseline.json
          echo "Baseline updated: $(date)" >> .claude/benchmarks/history.txt

      - name: Compare with Baseline
        if: github.event_name == 'pull_request'
        run: |
          if [ -f .claude/benchmarks/baseline.json ]; then
            python3 << 'EOF'
          import json

          with open('/tmp/benchmark_results.json') as f:
              current = json.load(f)

          with open('.claude/benchmarks/baseline.json') as f:
              baseline = json.load(f)

          print("📊 Performance Comparison\n")
          print("| Metric | Baseline | Current | Change |")
          print("|--------|----------|---------|--------|")

          for key in ['load_time_ms', 'parse_time_ms', 'validation_time_ms']:
              b_val = baseline.get(key, 0)
              c_val = current.get(key, 0)
              change = ((c_val - b_val) / b_val * 100) if b_val > 0 else 0
              emoji = "🔴" if change > 10 else "🟢" if change < -10 else "🟡"

              print(f"| {key} | {b_val:.2f}ms | {c_val:.2f}ms | {emoji} {change:+.1f}% |")

          # Check for regression
          load_regression = ((current['load_time_ms'] - baseline['load_time_ms']) / baseline['load_time_ms'] * 100) if baseline['load_time_ms'] > 0 else 0

          if load_regression > 20:
              print(f"\n❌ Performance regression detected: {load_regression:+.1f}%")
              exit(1)
          else:
              print(f"\n✅ No significant performance regression")
          EOF
          else
            echo "ℹ️  No baseline found for comparison"
          fi

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/benchmark_results.json
          retention-days: 90

  script-performance:
    name: Script Execution Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Benchmark Shell Scripts
        run: |
          echo "🔍 Benchmarking shell scripts..."

          scripts=$(find .claude/scripts -name "*.sh" -type f 2>/dev/null || echo "")

          if [ -z "$scripts" ]; then
            echo "ℹ️  No shell scripts found"
            exit 0
          fi

          echo "| Script | Execution Time | Status |" > /tmp/script_benchmarks.md
          echo "|--------|----------------|--------|" >> /tmp/script_benchmarks.md

          while IFS= read -r script; do
            if [ -x "$script" ] || [ -r "$script" ]; then
              echo "Testing: $script"

              # Dry run or syntax check
              start=$(date +%s%N)
              bash -n "$script" 2>/dev/null && status="✅" || status="❌"
              end=$(date +%s%N)

              duration=$(( (end - start) / 1000000 ))
              echo "| $(basename $script) | ${duration}ms | $status |" >> /tmp/script_benchmarks.md
            fi
          done <<< "$scripts"

          cat /tmp/script_benchmarks.md

      - name: Upload Script Benchmarks
        uses: actions/upload-artifact@v4
        with:
          name: script-benchmarks
          path: /tmp/script_benchmarks.md
          retention-days: 30

  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [agent-performance, script-performance]
    if: always()
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          merge-multiple: true

      - name: Generate Summary Report
        run: |
          echo "## 🏎️ Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f benchmark_results.json ]; then
            echo "### Agent Framework Performance" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat benchmark_results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f script_benchmarks.md ]; then
            echo "### Script Performance" >> $GITHUB_STEP_SUMMARY
            cat script_benchmarks.md >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Performance | ${{ needs.agent-performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script Performance | ${{ needs.script-performance.result }} |" >> $GITHUB_STEP_SUMMARY
