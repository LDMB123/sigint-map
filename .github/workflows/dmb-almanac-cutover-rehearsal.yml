name: DMB Almanac Cutover Rehearsal

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - "projects/dmb-almanac/**"
      - ".github/workflows/dmb-almanac-cutover-rehearsal.yml"

concurrency:
  group: dmb-almanac-cutover-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUST_VERSION: "stable"
  BASE_URL: "http://127.0.0.1:3000"
  RUST_E2E: "1"

jobs:
  cutover-rehearsal:
    name: cutover-rehearsal.sh
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: projects/dmb-almanac/app/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown
          cache: true

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-${{ env.RUST_VERSION }}

      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install app deps
        run: |
          cd projects/dmb-almanac/app
          npm ci

      - name: Install Playwright (Chromium)
        run: |
          cd projects/dmb-almanac/app
          npx playwright install --with-deps chromium

      - name: Run cutover rehearsal
        run: bash projects/dmb-almanac/scripts/cutover-rehearsal.sh

