name: Validate OpenAPI Specs

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude/api/**/*.yaml'
      - '.claude/api/**/*.yml'
      - '.claude/agents/shared/agent-api-spec.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/api/**/*.yaml'
      - '.claude/api/**/*.yml'

jobs:
  validate-openapi:
    name: OpenAPI 3.1 Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Find OpenAPI Specs
        id: find_specs
        run: |
          echo "Finding OpenAPI specification files..."
          specs=$(find .claude -name "openapi.yaml" -o -name "agent-api-spec.yaml" -o -name "*-api.yaml" 2>/dev/null || echo "")

          if [ -z "$specs" ]; then
            echo "⚠️  No OpenAPI specs found"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Found specs:"
            echo "$specs"
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$specs" > /tmp/openapi_specs.txt
          fi

      - name: Validate OpenAPI Syntax
        if: steps.find_specs.outputs.found == 'true'
        run: |
          echo "🔍 Validating OpenAPI specifications..."

          while IFS= read -r spec_file; do
            if [ -f "$spec_file" ]; then
              echo "Validating: $spec_file"
              redocly lint "$spec_file" --format=stylish || {
                echo "❌ Validation failed for $spec_file"
                exit 1
              }
              echo "✅ $spec_file is valid"
            fi
          done < /tmp/openapi_specs.txt

      - name: Check Breaking Changes
        if: steps.find_specs.outputs.found == 'true' && github.event_name == 'pull_request'
        run: |
          echo "🔍 Checking for breaking changes..."

          while IFS= read -r spec_file; do
            if [ -f "$spec_file" ]; then
              echo "Checking: $spec_file"

              # Fetch base branch version
              git fetch origin ${{ github.base_ref }}

              if git show origin/${{ github.base_ref }}:"$spec_file" > /tmp/base_spec.yaml 2>/dev/null; then
                redocly diff /tmp/base_spec.yaml "$spec_file" --format=stylish || true
              else
                echo "ℹ️  No base version found for comparison (new file)"
              fi
            fi
          done < /tmp/openapi_specs.txt

  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: validate-openapi
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Find OpenAPI Specs
        id: find_specs
        run: |
          specs=$(find .claude -name "openapi.yaml" -o -name "agent-api-spec.yaml" 2>/dev/null || echo "")

          if [ -n "$specs" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$specs" > /tmp/openapi_specs.txt
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Docs Directory
        if: steps.find_specs.outputs.found == 'true'
        run: mkdir -p .claude/api/docs

      - name: Generate HTML Documentation
        if: steps.find_specs.outputs.found == 'true'
        run: |
          echo "📚 Generating API documentation..."

          while IFS= read -r spec_file; do
            if [ -f "$spec_file" ]; then
              doc_name=$(basename "$spec_file" .yaml)
              output_file=".claude/api/docs/${doc_name}.html"

              echo "Generating docs for: $spec_file"
              redocly build-docs "$spec_file" --output "$output_file"

              echo "✅ Generated: $output_file"
            fi
          done < /tmp/openapi_specs.txt

      - name: Upload Documentation Artifacts
        if: steps.find_specs.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: .claude/api/docs/
          retention-days: 30

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: validate-openapi
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OWASP API Security Checker
        run: npm install -g @42crunch/api-security-audit

      - name: Find OpenAPI Specs
        id: find_specs
        run: |
          specs=$(find .claude -name "openapi.yaml" -o -name "agent-api-spec.yaml" 2>/dev/null || echo "")

          if [ -n "$specs" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$specs" > /tmp/openapi_specs.txt
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Security Audit
        if: steps.find_specs.outputs.found == 'true'
        run: |
          echo "🔒 Running API security audit..."

          while IFS= read -r spec_file; do
            if [ -f "$spec_file" ]; then
              echo "Auditing: $spec_file"
              api-security-audit "$spec_file" || true
            fi
          done < /tmp/openapi_specs.txt
        continue-on-error: true

  summary:
    name: OpenAPI Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-openapi, generate-docs, security-scan]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 📋 OpenAPI Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate-openapi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.generate-docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
