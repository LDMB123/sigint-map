name: Dependency Audit

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude/package.json'
      - '.claude/package-lock.json'
      - '.claude/requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - '.claude/package.json'
      - '.claude/package-lock.json'
      - '.claude/requirements.txt'
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8 AM UTC
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.claude/package-lock.json'

      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f .claude/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Dependencies
        if: steps.check_npm.outputs.exists == 'true'
        run: |
          cd .claude
          npm ci

      - name: Run npm Audit
        if: steps.check_npm.outputs.exists == 'true'
        id: npm_audit
        run: |
          cd .claude

          echo "## 📦 npm Dependency Audit" > /tmp/npm-audit-report.md
          echo "" >> /tmp/npm-audit-report.md

          # Run audit and capture results
          npm audit --json > /tmp/npm-audit.json || true

          # Parse results
          if [ -f /tmp/npm-audit.json ]; then
            critical=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities.critical // 0')
            high=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities.high // 0')
            moderate=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities.moderate // 0')
            low=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities.low // 0')
            total=$(cat /tmp/npm-audit.json | jq -r '.metadata.vulnerabilities.total // 0')

            echo "### Vulnerability Summary" >> /tmp/npm-audit-report.md
            echo "" >> /tmp/npm-audit-report.md
            echo "| Severity | Count |" >> /tmp/npm-audit-report.md
            echo "|----------|-------|" >> /tmp/npm-audit-report.md
            echo "| 🔴 Critical | $critical |" >> /tmp/npm-audit-report.md
            echo "| 🟠 High | $high |" >> /tmp/npm-audit-report.md
            echo "| 🟡 Moderate | $moderate |" >> /tmp/npm-audit-report.md
            echo "| 🟢 Low | $low |" >> /tmp/npm-audit-report.md
            echo "| **Total** | **$total** |" >> /tmp/npm-audit-report.md

            # Save for later use
            echo "critical=$critical" >> $GITHUB_OUTPUT
            echo "high=$high" >> $GITHUB_OUTPUT
            echo "total=$total" >> $GITHUB_OUTPUT

            # Generate human-readable report
            npm audit --audit-level=moderate >> /tmp/npm-audit-report.md 2>&1 || true
          fi

      - name: Check Audit Thresholds
        if: steps.check_npm.outputs.exists == 'true'
        run: |
          critical=${{ steps.npm_audit.outputs.critical }}
          high=${{ steps.npm_audit.outputs.high }}

          if [ "$critical" -gt 0 ]; then
            echo "❌ Found $critical critical vulnerabilities - action required!"
            exit 1
          elif [ "$high" -gt 5 ]; then
            echo "⚠️  Found $high high vulnerabilities - review recommended"
            exit 1
          else
            echo "✅ Dependency security within acceptable thresholds"
          fi

      - name: Upload npm Audit Report
        if: steps.check_npm.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: /tmp/npm-audit-report.md
          retention-days: 30

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f .claude/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for Outdated npm Packages
        if: steps.check_npm.outputs.exists == 'true'
        run: |
          cd .claude

          echo "## 📦 Outdated Dependencies" > /tmp/outdated-report.md
          echo "" >> /tmp/outdated-report.md

          npm outdated --json > /tmp/outdated.json || true

          if [ -s /tmp/outdated.json ]; then
            echo "### npm Packages" >> /tmp/outdated-report.md
            echo "" >> /tmp/outdated-report.md
            echo '```json' >> /tmp/outdated-report.md
            cat /tmp/outdated.json | jq '.' >> /tmp/outdated-report.md
            echo '```' >> /tmp/outdated-report.md

            outdated_count=$(cat /tmp/outdated.json | jq 'length')
            echo "" >> /tmp/outdated-report.md
            echo "**Total outdated packages**: $outdated_count" >> /tmp/outdated-report.md
          else
            echo "✅ All packages are up to date" >> /tmp/outdated-report.md
          fi

      - name: Upload Outdated Report
        if: steps.check_npm.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: /tmp/outdated-report.md
          retention-days: 30

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.claude/requirements.txt'

      - name: Check for requirements.txt
        id: check_python
        run: |
          if [ -f .claude/requirements.txt ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Safety
        if: steps.check_python.outputs.exists == 'true'
        run: pip install safety pip-audit

      - name: Run Safety Check
        if: steps.check_python.outputs.exists == 'true'
        run: |
          echo "## 🐍 Python Dependency Safety Check" > /tmp/python-audit-report.md
          echo "" >> /tmp/python-audit-report.md

          cd .claude
          safety check --file requirements.txt --json > /tmp/safety.json || true

          if [ -s /tmp/safety.json ]; then
            echo "### Vulnerabilities" >> /tmp/python-audit-report.md
            echo '```json' >> /tmp/python-audit-report.md
            cat /tmp/safety.json | jq '.' >> /tmp/python-audit-report.md
            echo '```' >> /tmp/python-audit-report.md
          else
            echo "✅ No known vulnerabilities found" >> /tmp/python-audit-report.md
          fi

      - name: Run pip-audit
        if: steps.check_python.outputs.exists == 'true'
        run: |
          cd .claude

          echo "" >> /tmp/python-audit-report.md
          echo "### pip-audit Results" >> /tmp/python-audit-report.md
          echo "" >> /tmp/python-audit-report.md

          pip-audit --requirement requirements.txt --format json > /tmp/pip-audit.json || true

          if [ -s /tmp/pip-audit.json ]; then
            echo '```json' >> /tmp/python-audit-report.md
            cat /tmp/pip-audit.json | jq '.' >> /tmp/python-audit-report.md
            echo '```' >> /tmp/python-audit-report.md
          fi

      - name: Upload Python Audit Report
        if: steps.check_python.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-report
          path: /tmp/python-audit-report.md
          retention-days: 30

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f .claude/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install license-checker
        if: steps.check_npm.outputs.exists == 'true'
        run: npm install -g license-checker

      - name: Check Licenses
        if: steps.check_npm.outputs.exists == 'true'
        run: |
          cd .claude

          echo "## 📜 License Compliance" > /tmp/license-report.md
          echo "" >> /tmp/license-report.md

          # Check for problematic licenses
          license-checker --json > /tmp/licenses.json || true

          if [ -s /tmp/licenses.json ]; then
            echo "### License Summary" >> /tmp/license-report.md
            echo "" >> /tmp/license-report.md

            # Count licenses
            cat /tmp/licenses.json | jq -r 'to_entries[] | .value.licenses' | sort | uniq -c | sort -rn >> /tmp/license-report.md

            echo "" >> /tmp/license-report.md
            echo "### Detailed License Information" >> /tmp/license-report.md
            echo '```json' >> /tmp/license-report.md
            cat /tmp/licenses.json | jq '.' >> /tmp/license-report.md
            echo '```' >> /tmp/license-report.md
          fi

      - name: Upload License Report
        if: steps.check_npm.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: /tmp/license-report.md
          retention-days: 30

  summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, outdated-check, python-audit, license-check]
    if: always()
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-report'
          merge-multiple: true

      - name: Generate Comprehensive Summary
        run: |
          echo "## 🔍 Dependency Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Audit Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm Security | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Outdated Check | ${{ needs.outdated-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Security | ${{ needs.python-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Include npm audit details if available
          if [ -f npm-audit-report.md ]; then
            cat npm-audit-report.md >> $GITHUB_STEP_SUMMARY
          fi
